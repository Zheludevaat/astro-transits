<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0f2e"/>
      <stop offset="60%" stop-color="#05081a"/>
      <stop offset="100%" stop-color="#020312"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4c14a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c14a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4d37a"/>
      <stop offset="100%" stop-color="#c89434"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>
  <!-- stars -->
  <g fill="#d8d4e8" opacity="0.55">
    <circle cx="92" cy="88" r="2"/>
    <circle cx="428" cy="110" r="1.5"/>
    <circle cx="118" cy="420" r="1.8"/>
    <circle cx="402" cy="402" r="2.2"/>
    <circle cx="70" cy="260" r="1.4"/>
    <circle cx="445" cy="280" r="1.6"/>
    <circle cx="160" cy="68" r="1.3"/>
    <circle cx="352" cy="450" r="1.5"/>
  </g>
  <!-- solar disc + rays -->
  <g stroke="url(#gold)" stroke-linecap="round" fill="none">
    <circle cx="256" cy="256" r="68" stroke-width="8"/>
    <circle cx="256" cy="256" r="12" fill="url(#gold)" stroke="none"/>
    <g stroke-width="7">
      <line x1="256" y1="120" x2="256" y2="160"/>
      <line x1="256" y1="352" x2="256" y2="392"/>
      <line x1="120" y1="256" x2="160" y2="256"/>
      <line x1="352" y1="256" x2="392" y2="256"/>
      <line x1="160" y1="160" x2="188" y2="188"/>
      <line x1="324" y1="324" x2="352" y2="352"/>
      <line x1="352" y1="160" x2="324" y2="188"/>
      <line x1="188" y1="324" x2="160" y2="352"/>
    </g>
  </g>
  <!-- outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
</svg>
