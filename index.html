<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b1a">
<title>Alexander's Transits</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070b1a;--card:#0f1529;--surface-elevated:#141a33;--gold:#c9a84c;--gold-dim:#8a7535;
  --blue:#4a9eff;--red:#ff4a6e;--green:#4aff8b;--purple:#b44aff;--orange:#ff9a4a;--teal:#4af0d0;
  --text:#e0daea;--text-dim:#7a7590;--text-bright:#fff;
  --radius-sm:8px;--radius-md:14px;--radius-lg:20px;
  --shadow-card:0 1px 3px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.03);
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom) + 20px)}
.container{padding:0 16px}

/* Starfield */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,#0d1535 0%,#070b1a 60%),
  radial-gradient(2px 2px at 20% 30%,rgba(255,255,255,.3),transparent),
  radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.2),transparent),
  radial-gradient(1.5px 1.5px at 60% 10%,rgba(255,255,255,.25),transparent),
  radial-gradient(1px 1px at 80% 50%,rgba(255,255,255,.15),transparent),
  radial-gradient(1.5px 1.5px at 10% 80%,rgba(255,255,255,.2),transparent),
  radial-gradient(1px 1px at 70% 90%,rgba(255,255,255,.15),transparent),
  radial-gradient(2px 2px at 90% 20%,rgba(255,255,255,.2),transparent);
  background-size:100% 100%,200px 200px,150px 180px,250px 220px,180px 250px,220px 190px,170px 230px,240px 160px;
  z-index:-1;pointer-events:none}

/* Header */
.header{text-align:center;padding:20px 16px 8px}
.header h1{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:500}
.date-display{font-size:24px;font-weight:700;color:var(--text-bright);margin:8px 0 4px;letter-spacing:-0.5px}
.sub-date{font-size:13px;color:var(--text-dim)}

/* Daily snapshot strip */
.daily-snapshot{display:flex;align-items:center;gap:16px;padding:12px 16px;background:var(--card);border-radius:var(--radius-md);margin:12px 16px;box-shadow:var(--shadow-card)}
.snapshot-left{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.snapshot-moon-icon{font-size:24px;line-height:1}
.snapshot-moon-info{display:flex;flex-direction:column;gap:2px}
.snapshot-moon-info .moon-name{font-size:15px;font-weight:500;color:var(--text-bright)}
.snapshot-moon-info .moon-meta{font-size:11px;color:var(--text-dim)}
.snapshot-center{flex:1;display:flex;align-items:center;gap:8px}
.energy-bar{flex:1;height:4px;background:var(--surface-elevated);border-radius:2px;overflow:hidden;min-width:80px}
.energy-bar-fill{height:100%;border-radius:2px;transition:width .3s ease}
.energy-score{font-size:11px;color:var(--text-dim);white-space:nowrap}
.snapshot-right{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.planetary-hour-tag{font-size:11px;padding:3px 8px;background:var(--surface-elevated);border-radius:var(--radius-sm);color:var(--text-dim)}
.voc-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(180,74,255,.1);border:1px solid rgba(180,74,255,.2);border-radius:var(--radius-sm);padding:2px 6px;font-size:11px;color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* Section titles */
.section-title{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);
  margin:24px 16px 12px;font-weight:500}

/* Hero transit cards */
.hero-card{position:relative;background:var(--card);border-radius:var(--radius-lg);padding:20px;margin:0 16px 12px;overflow:hidden;
  border-left:3px solid var(--text-dim);box-shadow:var(--shadow-card);animation:fadeIn .3s ease both}
.hero-card.hard{border-left-color:var(--red)}
.hero-card.easy{border-left-color:var(--blue)}
.hero-card.neutral{border-left-color:var(--gold)}
.hero-card.minor{border-left-color:var(--text-dim);opacity:.7}
.hero-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:var(--radius-sm);margin-bottom:12px}
.hero-card.hard .hero-badge{background:rgba(255,74,110,.15);color:var(--red)}
.hero-card.easy .hero-badge{background:rgba(74,158,255,.15);color:var(--blue)}
.hero-card.neutral .hero-badge{background:rgba(201,168,76,.15);color:var(--gold)}
.hero-card.minor .hero-badge{background:rgba(122,117,144,.1);color:var(--text-dim)}
.hero-planets{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hero-planets .big-glyph{font-size:24px;line-height:1}
.hero-planets .hero-label{font-size:17px;font-weight:600;color:var(--text-bright)}
.hero-planets .aspect-glyph{font-size:15px;color:var(--text-dim);margin:0 4px}
.hero-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.hero-meta .tag{font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);font-weight:500;background:var(--surface-elevated);color:var(--text-dim)}
.hero-meta .tag.applying{background:rgba(201,168,76,.12);color:var(--gold)}
.hero-meta .tag.separating{background:rgba(122,117,144,.08);color:var(--text-dim)}
.hero-meta .tag.exact{background:rgba(255,74,110,.15);color:var(--red)}
.hero-interp{font-size:15px;line-height:1.6;color:var(--text)}
.hero-card:nth-child(2){animation-delay:40ms}
.hero-card:nth-child(3){animation-delay:80ms}

/* Compact transit rows */
.transit-row{display:flex;align-items:center;background:var(--card);border-radius:var(--radius-md);padding:12px 16px;margin:0 16px 8px;cursor:pointer;
  -webkit-user-select:none;user-select:none;transition:background .15s;border-left:2px solid var(--text-dim);box-shadow:var(--shadow-card);
  min-height:48px;animation:fadeIn .3s ease both}
.transit-row.hard{border-left-color:var(--red)}
.transit-row.easy{border-left-color:var(--blue)}
.transit-row.neutral{border-left-color:var(--gold)}
.transit-row.minor{border-left-color:var(--text-dim);opacity:.6}
.transit-row:active{background:var(--surface-elevated)}
.tr-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.tr-glyph{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.tr-info{min-width:0;flex:1}
.tr-name{font-size:15px;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-sub{font-size:13px;color:var(--text-dim);margin-top:2px}
.tr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tr-orb{font-size:11px;color:var(--text-dim)}
.tr-motion{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:3px 8px;border-radius:var(--radius-sm);background:var(--surface-elevated);color:var(--text-dim)}
.tr-motion.applying{background:rgba(201,168,76,.12);color:var(--gold)}
.tr-motion.separating{background:rgba(122,117,144,.08);color:var(--text-dim)}
.tr-motion.exact{background:rgba(255,74,110,.15);color:var(--red)}

/* Expanded detail */
.transit-detail{max-height:0;opacity:0;overflow:hidden;transition:max-height .25s ease,opacity .2s ease;background:var(--card);border-radius:0 0 var(--radius-md) var(--radius-md);
  padding:0 16px;margin:-8px 16px 8px;border-top:1px solid var(--surface-elevated)}
.transit-detail.open{max-height:500px;opacity:1;padding:12px 16px}
.td-interp{font-size:15px;line-height:1.6;color:var(--text)}
.td-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.td-meta .tag{font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);background:var(--surface-elevated);color:var(--text-dim)}

/* Pills row */
.pills{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px;margin-bottom:12px}
.pill{display:flex;align-items:center;gap:4px;background:var(--card);border-radius:var(--radius-lg);padding:6px 12px;font-size:13px;
  box-shadow:var(--shadow-card);animation:fadeIn .3s ease both}
.pill .glyph{font-size:15px}
.pill.retro{color:var(--red);border:1px solid rgba(255,74,110,.15)}
.pill.stationary{color:var(--orange);border:1px solid rgba(255,154,74,.15)}
.pill.ingress{color:var(--teal);border:1px solid rgba(74,240,208,.15)}

/* Cosmic Weather section */
.cosmic-weather{margin:20px 16px 0}
.cw-header{background:var(--card);border-radius:var(--radius-md);padding:12px 16px;cursor:pointer;
  -webkit-user-select:none;user-select:none;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-card)}
.cw-title{font-size:15px;font-weight:600;color:var(--text)}
.cw-arrow{font-size:18px;color:var(--text-dim);transition:transform .3s ease}
.cw-arrow.open{transform:rotate(180deg)}
.cw-content{max-height:0;opacity:0;overflow:hidden;transition:max-height .25s ease,opacity .2s ease}
.cw-content.open{max-height:500px;opacity:1}
.cw-items{padding:12px 0}
.cw-item{font-size:13px;color:var(--text-dim);padding:8px 0;border-top:1px solid var(--surface-elevated)}

/* Week view heat map */
.week-heatmap{display:flex;gap:4px;padding:0 16px;margin:12px 0}
.heatmap-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.heatmap-bar{width:100%;height:16px;background:var(--surface-elevated);border-radius:var(--radius-sm);transition:transform .2s ease}
.heatmap-bar.hot-red{background:linear-gradient(180deg,#ff4a6e,#cc2d4d)}
.heatmap-bar.hot-gold{background:linear-gradient(180deg,#c9a84c,#9a8530)}
.heatmap-bar.hot-blue{background:linear-gradient(180deg,#4a9eff,#2a6fcc)}
.heatmap-bar.today{border-bottom:3px solid var(--gold)}
.heatmap-day:active .heatmap-bar{transform:scale(.95)}
.heatmap-label{font-size:11px;color:var(--text-dim);font-weight:500}

/* Week day cards */
.week-day{background:var(--card);border-radius:var(--radius-md);padding:14px 16px;margin:0 16px 8px;cursor:pointer;
  -webkit-user-select:none;user-select:none;transition:background .15s;border-left:2px solid var(--text-dim);
  box-shadow:var(--shadow-card);animation:fadeIn .3s ease both}
.week-day:active{background:var(--surface-elevated)}
.wd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wd-date{font-size:15px;font-weight:600;color:var(--text-bright)}
.wd-date .today-label{font-size:10px;font-weight:600;color:var(--gold);background:rgba(201,168,76,.12);
  padding:2px 6px;border-radius:var(--radius-sm);margin-left:6px;vertical-align:middle}
.wd-sub{font-size:13px;color:var(--text-dim)}
.wd-count{font-size:13px;color:var(--text-dim);background:var(--surface-elevated);padding:4px 8px;border-radius:var(--radius-sm)}
.wd-top-transits{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.wd-transit-pill{font-size:10px;padding:4px 8px;border-radius:var(--radius-sm);font-weight:500;background:var(--surface-elevated);color:var(--text-dim)}
.wd-transit-pill.hard{background:rgba(255,74,110,.12);color:var(--red)}
.wd-transit-pill.easy{background:rgba(74,158,255,.12);color:var(--blue)}
.wd-transit-pill.neutral{background:rgba(201,168,76,.12);color:var(--gold)}
.wd-transit-pill.minor{background:rgba(122,117,144,.08);color:var(--text-dim)}

/* Chart tab */
.chart-container{position:relative;width:100%;max-width:400px;margin:0 auto;aspect-ratio:1;padding:0 16px}
.chart-svg{width:100%;height:100%}
.chart-svg text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
.chart-toggle-row{display:flex;gap:8px;justify-content:center;margin:16px 0}
.chart-toggle{background:var(--card);border:1px solid rgba(201,168,76,.1);color:var(--text-dim);font-size:13px;
  padding:8px 16px;border-radius:var(--radius-lg);cursor:pointer;font-weight:500;transition:all .15s;box-shadow:var(--shadow-card)}
.chart-toggle.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.chart-toggle:active{transform:scale(.96)}

/* Planets now grid */
.pn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:20px}
.pn-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border-radius:var(--radius-md);
  box-shadow:var(--shadow-card);animation:fadeIn .3s ease both}
.pn-row .glyph{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.pn-row .info{display:flex;flex-direction:column;gap:2px;flex:1}
.pn-row .pname{font-size:11px;color:var(--text-dim)}
.pn-row .ppos{font-size:13px;font-weight:500;color:var(--text-bright)}
.pn-row .retro-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-left:4px}
.pn-row .sta-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:4px}
.pn-row .house-num{font-size:10px;color:var(--teal);margin-left:auto;opacity:.7}

/* Natal tab */
.natal-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--card);
  border-radius:var(--radius-md);padding:14px 16px;margin:0 16px;cursor:pointer;
  -webkit-user-select:none;user-select:none;box-shadow:var(--shadow-card)}
.natal-toggle .nt-label{font-size:15px;font-weight:500;color:var(--text)}
.natal-toggle .nt-arrow{font-size:18px;color:var(--text-dim);transition:transform .3s}
.natal-toggle.open .nt-arrow{transform:rotate(180deg)}
.natal-grid{display:none;padding:12px 16px}
.natal-grid.show{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.natal-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border-radius:var(--radius-md);
  box-shadow:var(--shadow-card)}
.natal-row .glyph{font-size:16px;width:20px;text-align:center}
.natal-row .planet-name{font-size:11px;color:var(--text-dim);min-width:40px}
.natal-row .position{font-size:13px;font-weight:500;color:var(--text);flex:1}
.natal-row .house-tag{font-size:10px;color:var(--teal);opacity:.7;white-space:nowrap}

.natal-detail-card{background:var(--card);border-radius:var(--radius-md);padding:16px;margin:0 16px 12px;
  box-shadow:var(--shadow-card);animation:fadeIn .3s ease both}
.nd-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.nd-glyph{font-size:28px}
.nd-name{font-size:17px;font-weight:600;color:var(--text-bright)}
.nd-pos{font-size:13px;color:var(--text-dim);margin-top:2px}
.nd-desc{font-size:13px;line-height:1.6;color:var(--text);margin-top:10px}
.nd-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.nd-tags .tag{font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);background:var(--surface-elevated);color:var(--text-dim)}

/* Lunar events */
.lunar-events{display:flex;gap:8px;padding:0 16px;margin:12px 0;flex-wrap:wrap}
.lunar-event{flex:1;min-width:140px;background:var(--card);border-radius:var(--radius-md);padding:12px;text-align:center;
  box-shadow:var(--shadow-card)}
.le-icon{font-size:24px;margin-bottom:6px}
.le-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:500}
.le-date{font-size:13px;font-weight:600;color:var(--text-bright);margin-top:4px}
.le-sign{font-size:11px;color:var(--text-dim);margin-top:2px}
.le-eclipse{display:inline-block;font-size:9px;font-weight:700;color:var(--red);background:rgba(255,74,110,.12);
  padding:2px 6px;border-radius:var(--radius-sm);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Planetary hour */
.planet-hour{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--radius-md);
  padding:12px 16px;margin:12px 16px 0;box-shadow:var(--shadow-card)}
.ph-icon{font-size:20px}
.ph-text{font-size:13px;color:var(--text)}
.ph-ruler{font-weight:600;color:var(--gold)}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface-elevated) 25%,var(--card) 50%,var(--surface-elevated) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-md)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.pulse{animation:pulse 1.5s ease-in-out infinite}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;
  background:linear-gradient(180deg,rgba(7,11,26,.92),rgba(7,11,26,.98));backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,.08);padding:8px 0 calc(var(--safe-bottom) + 4px);z-index:100}
.tab-bar .tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px;color:var(--text-dim);
  font-size:11px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s;
  border:none;background:none;position:relative}
.tab-bar .tab.active{color:var(--gold)}
.tab-bar .tab.active::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:16px;height:3px;background:var(--gold);border-radius:2px}
.tab-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center}

body{padding-bottom:calc(var(--safe-bottom) + 70px)!important}

/* Tab content */
.tab-content{display:none;animation:fadeIn .15s ease}
.tab-content.active{display:block}

/* Date navigation */
.date-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0 0}
.date-nav button{background:none;border:none;color:var(--text-dim);font-size:20px;padding:8px 14px;cursor:pointer;
  border-radius:var(--radius-md);transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent}
.date-nav button:active{background:var(--surface-elevated);color:var(--text)}
.date-nav .today-btn{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;
  border:1px solid rgba(201,168,76,.2);border-radius:var(--radius-lg);color:var(--gold);display:none;background:rgba(201,168,76,.05)}
.date-nav .today-btn.show{display:inline-block}
.date-nav .today-btn:active{background:rgba(201,168,76,.15)}
<script>
// ═══════════════════════════════════════════════════════════
// ASTRONOMICAL ENGINE v2 — Verified against JPL DE421 + Swiss Ephemeris
// ═══════════════════════════════════════════════════════════

const DEG = Math.PI / 180, RAD = 180 / Math.PI;
const sin = a => Math.sin(a * DEG), cos = a => Math.cos(a * DEG);
const atan2d = (y, x) => Math.atan2(y, x) * RAD;
const norm = a => ((a % 360) + 360) % 360;

function julianDate(y, m, d, h = 0) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + h / 24 + B - 1524.5;
}
function jdToT(jd) { return (jd - 2451545.0) / 36525; }

function sunLongitude(T) {
  const L0 = norm(280.46646 + 36000.76983 * T + 0.0003032 * T * T);
  const M = norm(357.52911 + 35999.05029 * T - 0.0001537 * T * T);
  const C = (1.914602 - 0.004817 * T) * sin(M) + (0.019993 - 0.000101 * T) * sin(2 * M) + 0.000289 * sin(3 * M);
  return norm(L0 + C);
}

function moonLongitude(T) {
  // Full Meeus Chapter 47 with 60 terms for high accuracy
  const Lp=norm(218.3164477+481267.88123421*T-0.0015786*T*T+T*T*T/538841-T*T*T*T/65194000);
  const D=norm(297.8501921+445267.1114034*T-0.0018819*T*T+T*T*T/545868-T*T*T*T/113065000);

function heliocentricLon(planet, T) {

  let L = norm(el.v[3]+el.r[3]*T);

  if (EXTRA[planet]) { const [b,c,s,f]=EXTRA[planet]; L += f!==0 ? b*T*T+c*cos(f*T)+s*sin(f*T) : b*T*T; L=norm(L); }
  let M = norm(L - lp), E = M;
  for (let i=0;i<30;i++){const dE=(M-(E-e*RAD*sin(E)))/(1-e*cos(E));E+=dE;if(Math.abs(dE)<1e-10)break;}
  const xp=a*(cos(E)-e), yp=a*Math.sqrt(1-e*e)*sin(E);
  const cN=cos(node),sN=sin(node),cI=cos(I),w=lp-node,cW=cos(w),sW=sin(w);
  const x=(cN*cW-sN*sW*cI)*xp+(-cN*sW-sN*cW*cI)*yp;
  const y=(sN*cW+cN*sW*cI)*xp+(-sN*sW+cN*cW*cI)*yp;
  return {lon:norm(atan2d(y,x)),dist:Math.sqrt(x*x+y*y)};
}

function planetMotion(planet, jd) {

function isVoidOfCourse(moonLon, jd) {

function houseOf(lon) {

function findExactDate(tp, np, aspectAngle, jd) {
  // Search ±90 days for the moment when the aspect is exact (orb closest to 0)
  // For Moon transits, search ±15 days; for others ±90 days
  const isMoon = tp === 'Moon';
  const range = isMoon ? 15 : 90;
  const step = isMoon ? 0.1 : 1; // days per step in coarse scan
  const nLon = NATAL[np]; // natal position is fixed

  let bestJd = jd, bestOrb = 999;

  // Coarse scan
  for (let d = -range; d <= range; d += step) {
    const testJd = jd + d;
    const tLon = getLon(tp, testJd);
    let diff = Math.abs(norm(tLon - nLon) - aspectAngle);
    if (diff > 180) diff = 360 - diff;
    if (diff < bestOrb) { bestOrb = diff; bestJd = testJd; }
  }

  // Fine binary-style refinement
  let lo = bestJd - step, hi = bestJd + step;
  for (let iter = 0; iter < 30; iter++) {
    const m1 = lo + (hi - lo) / 3, m2 = lo + 2 * (hi - lo) / 3;
    let o1 = Math.abs(norm(getLon(tp, m1) - nLon) - aspectAngle);
    let o2 = Math.abs(norm(getLon(tp, m2) - nLon) - aspectAngle);
    if (o1 > 180) o1 = 360 - o1;
    if (o2 > 180) o2 = 360 - o2;
    if (o1 < o2) hi = m2; else lo = m1;
    if (hi - lo < 0.0001) break; // ~8.6 seconds precision
  }

  const exactJd = (lo + hi) / 2;
  let finalOrb = Math.abs(norm(getLon(tp, exactJd) - nLon) - aspectAngle);
  if (finalOrb > 180) finalOrb = 360 - finalOrb;

  // Convert JD back to date
  const z = Math.floor(exactJd + 0.5);
  const f = exactJd + 0.5 - z;
  let A = z;
  if (z >= 2299161) { const alpha = Math.floor((z - 1867216.25) / 36524.25); A = z + 1 + alpha - Math.floor(alpha / 4); }
  const B = A + 1524, C = Math.floor((B - 122.1) / 365.25), D = Math.floor(365.25 * C), E = Math.floor((B - D) / 30.6001);
  const day = B - D - Math.floor(30.6001 * E);
  const month = E < 14 ? E - 1 : E - 13;
  const year = month > 2 ? C - 4716 : C - 4715;

  return { jd: exactJd, orb: finalOrb, year, month, day, daysFromNow: exactJd - jd };
}

function fmtExactDate(ed) {
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = Math.abs(Math.round(ed.daysFromNow));
  const dir = ed.daysFromNow < -0.5 ? 'ago' : ed.daysFromNow > 0.5 ? 'ahead' : 'today';
  if (dir === 'today') return `Exact today`;
  if (d === 1) return `Exact ${dir === 'ago' ? 'yesterday' : 'tomorrow'}`;
  return `Exact ${mn[ed.month-1]} ${ed.day}${d <= 30 ? '' : ', '+ed.year}`;
}

function findLunarEvent(jd, targetPhase) {

        if (o1 > 180) o1 = 360 - o1;
        if (o2 > 180) o2 = 360 - o2;

      }
      const exactJd = (lo + hi) / 2;
      // Convert JD to date
      const z = Math.floor(exactJd + 0.5);
      let A = z;
      if (z >= 2299161) { const alpha = Math.floor((z - 1867216.25) / 36524.25); A = z + 1 + alpha - Math.floor(alpha / 4); }
      const B = A + 1524, C = Math.floor((B - 122.1) / 365.25), D = Math.floor(365.25 * C), E = Math.floor((B - D) / 30.6001);
      const day = B - D - Math.floor(30.6001 * E);
      const month = E < 14 ? E - 1 : E - 13;
      const moonLon = moonLongitude(jdToT(exactJd));
      return { jd: exactJd, day, month, daysAway: exactJd - jd, sign: SIGNS[Math.floor(moonLon / 30)], glyph: SG[Math.floor(moonLon / 30)] };
    }
  }
  return null;
}

// ── Eclipse detection (simplified: check if New/Full Moon is near nodes) ──
function checkEclipse(lunarEvent, jd) {
  if (!lunarEvent) return null;
  const T = jdToT(lunarEvent.jd);
  const node = northNodeLongitude(T);
  const moonLon = moonLongitude(T);
  let distToNode = Math.abs(norm(moonLon - node));
  if (distToNode > 180) distToNode = 360 - distToNode;
  let distToSNode = Math.abs(norm(moonLon - norm(node + 180)));
  if (distToSNode > 180) distToSNode = 360 - distToSNode;
  const minDist = Math.min(distToNode, distToSNode);
  if (minDist < 18) return { type: minDist < 10 ? 'total' : 'partial' };
  return null;
}

// ── Planetary Hours (Chaldean order) ──
const CHALDEAN_ORDER = ['Saturn','Jupiter','Mars','Sun','Venus','Mercury','Moon'];
const DAY_RULERS = [/* Sun=0 */ 'Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];

function getPlanetaryHour(date) {
  const dayOfWeek = date.getDay();
  const dayRuler = DAY_RULERS[dayOfWeek];
  const startIdx = CHALDEAN_ORDER.indexOf(dayRuler);
  // Approximate: divide daylight ~6am-6pm into 12 hours, night into 12
  const h = date.getHours(), m = date.getMinutes();
  const totalMins = h * 60 + m;
  // Rough sunrise/sunset: 6am/6pm (simplified)
  const isDay = totalMins >= 360 && totalMins < 1080;
  const periodStart = isDay ? 360 : 1080;
  const periodEnd = isDay ? 1080 : 1800;
  const hourLen = (isDay ? 720 : 720) / 12;
  const hourIdx = Math.floor((totalMins - periodStart + (totalMins < 360 ? 1440 : 0)) / hourLen) % 12;
  const offset = isDay ? hourIdx : hourIdx + 12;
  const ruler = CHALDEAN_ORDER[(startIdx + offset) % 7];
  return { ruler, glyph: PG[ruler], isDay, hourIdx: hourIdx + 1 };
}

function getInterp(tp,np,an){const k=`${tp}_${an}_${np}`;if(SPEC[k])return SPEC[k];
  const tt=TT[tp],na=NA[np],af=AF[an];if(!tt||!na||!af)return'A subtle influence at work.';
  return`${tt[0].toUpperCase()+tt.slice(1)} energy is ${af.w} ${na}. ${af.f}`;}

function vibeCalc(transits){if(!transits.length)return{score:5,text:'A quiet day. Good for rest and reflection.'};
  let p=0,n=0,w=0;for(const t of transits){const v=t.importance/20;
    if(t.aspect.type==='easy')p+=v;else if(t.aspect.type==='hard')n+=v;else w+=v;}
  let s=Math.round(5+(p-n)*1.5);s=Math.max(1,Math.min(10,s));
  let text;if(n>p*2)text='A demanding day. Growth through friction — lean in.';
  else if(p>n*2)text='The skies smile on you. Positive energy flows — make the most of it.';
  else if(w>3)text='Intense transformative energy. Big shifts possible — stay intentional.';
  else if(p+n+w>5)text='High-energy day, mixed influences. Navigate tension, leverage flow.';
  else if(p+n+w>2)text='Moderate cosmic weather. Some areas boosted, others need attention.';
  else text='Calm skies. Good for steady progress and your own rhythm.';
  return{score:s,text};}

function renderChartWheel(cur, transits, jd) {
  const cx = 200, cy = 200;
  const rOuter = 190, rSign = 160, rHouse = 135, rNatal = 105, rTransit = 170, rInner = 60;
  const ascDeg = NATAL.Ascendant;

  function toXY(deg, r) {
    const angle = (180 - (deg - ascDeg)) * DEG;
    return { x: cx + r * Math.cos(angle), y: cy - r * Math.sin(angle) };
  }

  let svg = `<svg class="chart-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs><radialGradient id="centerGrad"><stop offset="0%" style="stop-color:#0d1535;stop-opacity:1"/><stop offset="100%" style="stop-color:#070b1a;stop-opacity:1"/></radialGradient></defs>`;

  svg += `<circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="#0a0f22" stroke="rgba(201,168,76,.15)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rSign}" fill="none" stroke="rgba(201,168,76,.1)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rHouse}" fill="none" stroke="rgba(201,168,76,.08)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rNatal}" fill="none" stroke="rgba(201,168,76,.12)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="url(#centerGrad)" stroke="rgba(201,168,76,.1)" stroke-width=".5"/>`;

  for (let i = 0; i < 12; i++) {
    const deg = i * 30;
    const p1 = toXY(deg, rSign), p2 = toXY(deg, rOuter);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="rgba(201,168,76,.12)" stroke-width=".5"/>`;
    const mid = toXY(deg + 15, (rSign + rOuter) / 2);
    const signColor = i % 3 === 0 ? '#ff4a6e' : i % 3 === 1 ? '#4aff8b' : '#4a9eff';
    svg += `<text x="${mid.x}" y="${mid.y}" text-anchor="middle" dominant-baseline="central" fill="${signColor}" font-size="16" opacity=".45">${SG[i]}</text>`;
  }

  for (let i = 0; i < 12; i++) {
    const deg = HOUSES[i];
    const p1 = toXY(deg, rInner), p2 = toXY(deg, rSign);
    const isAngle = [0, 3, 6, 9].includes(i);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isAngle ? 'rgba(201,168,76,.3)' : 'rgba(201,168,76,.08)'}" stroke-width="${isAngle ? '1.5' : '.5'}"/>`;
    const nextCusp = HOUSES[(i + 1) % 12];
    let midDeg = (deg + nextCusp) / 2;
    if (Math.abs(nextCusp - deg) > 180) midDeg = norm(midDeg + 180);
    const hPos = toXY(midDeg, rInner + 20);
    svg += `<text x="${hPos.x}" y="${hPos.y}" text-anchor="middle" dominant-baseline="central" fill="rgba(201,168,76,.3)" font-size="10" opacity=".3">${i + 1}</text>`;
  }

  const ascP = toXY(NATAL.Ascendant, rOuter + 2);
  svg += `<text x="${ascP.x - 14}" y="${ascP.y}" text-anchor="middle" dominant-baseline="central" fill="var(--gold)" font-size="11" font-weight="700">ASC</text>`;
  const mcP = toXY(NATAL.MC, rOuter + 2);
  svg += `<text x="${mcP.x}" y="${mcP.y - 12}" text-anchor="middle" dominant-baseline="central" fill="var(--gold)" font-size="11" font-weight="700">MC</text>`;

  function spreadPositions(items, minGap, radius) {
    const sorted = items.map((it, idx) => ({ ...it, origIdx: idx })).sort((a, b) => a.deg - b.deg);
    for (let pass = 0; pass < 5; pass++) {
      for (let i = 0; i < sorted.length; i++) {
        const next = sorted[(i + 1) % sorted.length];
        let gap = norm(next.deg - sorted[i].deg);
        if (gap < minGap) {
          const push = (minGap - gap) / 2;
          sorted[i].deg = norm(sorted[i].deg - push);
          next.deg = norm(next.deg + push);
        }
      }
    }
    return sorted;
  }

  const natalPlanets = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto', 'Chiron', 'NorthNode'];
  const natalItems = natalPlanets.map(p => ({ name: p, deg: NATAL[p], glyph: PG[p] }));
  const spreadNatal = spreadPositions(natalItems, 8, rNatal);

  for (const item of spreadNatal) {
    const pos = toXY(item.deg, rNatal - 14);
    svg += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="var(--text)" font-size="13" opacity=".85">${item.glyph}</text>`;
    const tick1 = toXY(NATAL[item.name], rNatal), tick2 = toXY(NATAL[item.name], rNatal - 5);
    svg += `<line x1="${tick1.x}" y1="${tick1.y}" x2="${tick2.x}" y2="${tick2.y}" stroke="var(--text)" stroke-width=".5" opacity=".4"/>`;
  }

  if (showTransitRing) {
    const transitPlanets = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto', 'Chiron'];
    const transitItems = transitPlanets.map(p => ({ name: p, deg: cur[p], glyph: PG[p] }));
    const spreadTransit = spreadPositions(transitItems, 8, rTransit);

    for (const item of spreadTransit) {
      const pos = toXY(item.deg, rTransit + 4);
      const ms = motionStatus(item.name, julianDate(getTargetDate().getUTCFullYear(), getTargetDate().getUTCMonth()+1, getTargetDate().getUTCDate(), 12));
      const color = ms.retrograde ? 'var(--red)' : 'var(--blue)';
      svg += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="11" opacity=".7">${item.glyph}</text>`;
      const tick1 = toXY(cur[item.name], rSign), tick2 = toXY(cur[item.name], rSign + 4);
      svg += `<line x1="${tick1.x}" y1="${tick1.y}" x2="${tick2.x}" y2="${tick2.y}" stroke="${color}" stroke-width=".5" opacity=".5" stroke-linecap="round"/>`;
    }
  }

  if (showAspectLines && transits.length > 0) {
    const topTransits = transits.slice(0, 12);
    for (const t of topTransits) {
      const from = toXY(t.tLon, rInner + 5);
      const to = toXY(t.nLon, rInner + 5);
      let color, dash;
      if (t.aspect.type === 'hard') { color = 'rgba(255,74,110,.35)'; dash = ''; }
      else if (t.aspect.type === 'easy') { color = 'rgba(74,158,255,.3)'; dash = ''; }
      else if (t.aspect.type === 'minor') { color = 'rgba(122,117,144,.15)'; dash = '2,3'; }
      else { color = 'rgba(201,168,76,.3)'; dash = ''; }
      const width = t.aspect.orbActual < 1 ? '1.5' : t.aspect.orbActual < 3 ? '1' : '.5';
      svg += `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${color}" stroke-width="${width}" ${dash ? `stroke-dasharray="${dash}"` : ''} stroke-linecap="round"/>`;
    }
  }

  svg += `<text x="${cx}" y="${cy - 10}" text-anchor="middle" fill="var(--gold)" font-size="9" font-weight="600" letter-spacing="1.5" opacity=".6">NATAL</text>`;
  svg += `<text x="${cx}" y="${cy + 6}" text-anchor="middle" fill="var(--text-dim)" font-size="8" opacity=".4">☉${signOf(NATAL.Sun).name.slice(0, 3)} ☽${signOf(NATAL.Moon).name.slice(0, 3)}</text>`;

  svg += `</svg>`;
  return svg;
}

    </div>
    <div class="snapshot-center">
      <div class="energy-bar"><div class="energy-bar-fill" style="width:${energyPercent}%;background:${energyColor}"></div></div>
      <div class="energy-score">${energyScore}/10</div>
    </div>
    <div class="snapshot-right">
      ${isToday ? `<span class="planetary-hour-tag">◆ ${getPlanetaryHour(new Date()).ruler.slice(0, 3)}</span>` : ''}
      ${vocResult.voc ? `<span class="voc-badge">VOC</span>` : ''}
    </div>
  </div>`;

  // Pills
  if (retros.length || stats.length || ingresses.length) {
    h += `<div class="pills">`;
    for (const p of stats) h += `<div class="pill stationary"><span class="glyph">${PG[p]}</span>${p} STA</div>`;
    for (const p of retros) h += `<div class="pill retro"><span class="glyph">${PG[p]}</span>${p} ℞</div>`;
    for (const ig of ingresses) h += `<div class="pill ingress"><span class="glyph">${PG[ig.planet]}</span>→ ${ig.glyph}</div>`;
    h += `</div>`;
  }

  // Hero transits
  const heroCount = Math.min(3, transits.length);
  if (heroCount > 0) {
    h += `<div class="section-title">Key Transits</div>`;
    for (let i = 0; i < heroCount; i++) {
      const t = transits[i];
      const cls = t.aspect.type === 'hard' ? 'hard' : t.aspect.type === 'easy' ? 'easy' : t.aspect.type === 'minor' ? 'minor' : 'neutral';
      const tpName = t.tp === 'NorthNode' ? 'N.Node' : t.tp;
      const npName = t.np === 'NorthNode' ? 'N.Node' : t.np;
      const tG = PG[t.tp] || '?', nG = PG[t.np] || (t.np === 'Ascendant' ? 'AC' : 'MC');
      h += `<div class="hero-card ${cls}">
        <div class="hero-badge">${t.aspect.name}</div>
        <div class="hero-planets">
          <span class="big-glyph">${tG}</span>
          <span class="hero-label">${tpName}<span class="aspect-glyph">${t.aspect.glyph}</span>natal ${npName}</span>
        </div>
        <div class="hero-meta">
          <span class="tag">${t.aspect.orbActual.toFixed(1)}° orb</span>
          <span class="tag ${t.aspect.motion}">${t.aspect.motion}</span>
          ${t.exactDate ? `<span class="tag">${fmtExactDate(t.exactDate)}</span>` : ''}
        </div>
        <div class="hero-interp">${t.interp}</div>
      </div>`;
    }
  }

  // Cosmic Weather
  const hasCosmic = retros.length || stats.length || ingresses.length || transits.length > 3;
  if (hasCosmic) {
    h += `<div class="cosmic-weather">
      <div class="cw-header" onclick="toggleCosmicWeather()">
        <span class="cw-title">Cosmic Weather</span>
        <span class="cw-arrow" id="cw-arrow">▼</span>
      </div>
      <div class="cw-content" id="cw-content">
        <div class="cw-items">`;
    if (transits.length > heroCount) {
      h += `<div class="cw-item" style="padding:8px 16px"><strong>${transits.length - heroCount} more aspects active</strong></div>`;
    }
    h += `</div></div></div>`;
  }

  // Remaining transits (compact)
  if (transits.length > heroCount) {
    h += `<div class="section-title">All Transits (${transits.length})</div>`;
    for (let i = heroCount; i < transits.length; i++) {
      const t = transits[i];
      const id = `t-${t.tp}-${t.np}-${t.aspect.name}`;
      const isOpen = expandedCards[id];
      const tpName = t.tp === 'NorthNode' ? 'N.Node' : t.tp;
      const npName = t.np === 'NorthNode' ? 'N.Node' : t.np;
      const tG = PG[t.tp] || '?';
      const pipCls = t.aspect.type === 'hard' ? 'hard' : t.aspect.type === 'easy' ? 'easy' : t.aspect.type === 'minor' ? 'minor' : 'neutral';

      h += `<div class="transit-row ${pipCls}" data-id="${id}" onclick="toggleTransit('${id}')">
        <div class="tr-left">
          <span class="tr-glyph">${tG}</span>
          <div class="tr-info">
            <div class="tr-name">${tpName} ${t.aspect.glyph} natal ${npName}</div>
            <div class="tr-sub">${t.aspect.name} · House ${t.house}</div>
          </div>
        </div>
        <div class="tr-right">
          <span class="tr-orb">${t.aspect.orbActual.toFixed(1)}°</span>
          <span class="tr-motion ${t.aspect.motion}">${t.aspect.motion.slice(0, 3)}</span>
        </div>
      </div>
      <div class="transit-detail ${isOpen ? 'open' : ''}" id="${id}">
        <div class="td-interp">${t.interp}</div>
        <div class="td-meta">
          <span class="tag">${t.aspect.orbActual.toFixed(1)}° orb</span>
          <span class="tag">${t.aspect.motion}</span>
          <span class="tag">House ${t.house}</span>
          <span class="tag">${t.duration}</span>
          ${t.exactDate ? `<span class="tag">${fmtExactDate(t.exactDate)}</span>` : ''}
        </div>
      </div>`;
    }
  }

  h += `</div>`;

  // WEEK TAB
  h += `<div class="tab-content ${activeTab === 'week' ? 'active' : ''}" id="tab-week">`;
  h += renderWeekView(jd, now);
  h += `</div>`;

  // CHART TAB
  h += `<div class="tab-content ${activeTab === 'chart' ? 'active' : ''}" id="tab-chart">`;
  h += `<div class="chart-container">${renderChartWheel(cur, transits, jd)}</div>`;
  h += `<div class="chart-toggle-row">
    <button class="chart-toggle ${showTransitRing ? 'active' : ''}" onclick="toggleChartOpt('transit')">Transits</button>
    <button class="chart-toggle ${showAspectLines ? 'active' : ''}" onclick="toggleChartOpt('aspects')">Aspects</button>
  </div>`;

  h += `<div class="section-title">Planets Now</div><div class="pn-grid">`;
  for (const p of TPS) {
    const g = PG[p];
    const isR = retros.includes(p), isS = stats.includes(p);
    const label = p === 'NorthNode' ? 'N.Node' : p;
    const dig = getDignity(p, cur[p]);

    h += `<div class="pn-row">
      <span class="glyph">${g}</span>
      <div class="info">
        <span class="pname">${label}${isR ? '<span class="retro-dot"></span>' : ''}${isS ? '<span class="sta-dot"></span>' : ''}${dig ? `<span style="background:${dig.color}22;color:${dig.color};margin-left:4px;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700">${dig.label}</span>` : ''}</span>
        <span class="ppos">${fmtShort(cur[p])}</span>
      </div>
      <span class="house-num">H${houseOf(cur[p])}</span>
    </div>`;
  }
  h += `</div>`;
  h += `</div>`;

  // NATAL TAB
  h += `<div class="tab-content ${activeTab === 'natal' ? 'active' : ''}" id="tab-natal">`;
  h += renderNatalTab();
  h += `</div>`;

  // TAB BAR
  const svgToday = `<svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/><line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/></svg>`;
  const svgWeek = `<svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="9" y1="4" x2="9" y2="22"/><line x1="15" y1="4" x2="15" y2="22"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const svgChart = `<svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>`;
  const svgNatal = `<svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 18,8 18,14 12,20 6,14 6,8"/></svg>`;

  h += `<div class="tab-bar">
    <button class="tab ${activeTab === 'today' ? 'active' : ''}" onclick="switchTab('today')">${svgToday}<span>Today</span></button>
    <button class="tab ${activeTab === 'week' ? 'active' : ''}" onclick="switchTab('week')">${svgWeek}<span>Week</span></button>
    <button class="tab ${activeTab === 'chart' ? 'active' : ''}" onclick="switchTab('chart')">${svgChart}<span>Chart</span></button>
    <button class="tab ${activeTab === 'natal' ? 'active' : ''}" onclick="switchTab('natal')">${svgNatal}<span>Natal</span></button>
  </div>`;

  h += `<div class="footer">Updated ${Math.round((new Date() - new Date(new Date().setHours(0, 0, 0, 0))) / 60000)} min ago</div>`;

  document.getElementById('app').innerHTML = h;
}

function getTargetDate() {
  const today = new Date();
  today.setDate(today.getDate() + dayOffset);
  return today;
}

function navDay(offset) {
  dayOffset += offset;
  renderApp();
}

function navToday() {
  dayOffset = 0;
  renderApp();
}

function switchTab(tab) {
  activeTab = tab;
  renderApp();
}

function toggleTransit(id) {
  expandedCards[id] = !expandedCards[id];
  renderApp();
}

function toggleCosmicWeather() {
  const content = document.getElementById('cw-content');
  const arrow = document.getElementById('cw-arrow');
  if (content && arrow) {
    content.classList.toggle('open');
    arrow.classList.toggle('open');
  }
}

function toggleChartOpt(opt) {
  if (opt === 'transit') showTransitRing = !showTransitRing;
  else if (opt === 'aspects') showAspectLines = !showAspectLines;
  renderApp();
}

// Touch navigation
let touchStartX = 0, touchStartY = 0, swiping = false;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  swiping = true;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!swiping) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dy) > Math.abs(dx) * 1.2) swiping = false;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) navDay(1);
    else navDay(-1);
  }
  swiping = false;
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navDay(-1);
  else if (e.key === 'ArrowRight') navDay(1);
  else if (e.key === 'Home' || e.key === 'Escape') navToday();
});

renderApp();
setInterval(() => { if (dayOffset === 0) renderApp(); }, 10 * 60 * 1000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (prefersReduced) {
  const style = document.createElement('style');
  style.textContent = '*{animation:none!important;transition:none!important}';
  document.head.appendChild(style);
}
</script>
</body>
</html>
