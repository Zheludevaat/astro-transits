<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Astro Transits</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>
<style>
:root {
  --sign-aries: "♈";
  --sign-taurus: "♉";
  --sign-gemini: "♊";
  --sign-cancer: "♋";
  --sign-leo: "♌";
  --sign-virgo: "♍";
  --sign-libra: "♎";
  --sign-scorpio: "♏";
  --sign-sagittarius: "♐";
  --sign-capricorn: "♑";
  --sign-aquarius: "♒";
  --sign-pisces: "♓";
}
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #333;
}
.container {
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  padding: 30px;
}
h1 {
  color: #667eea;
  text-align: center;
  margin-bottom: 10px;
  font-size: 2.5em;
}
.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  font-size: 0.95em;
}
.input-group {
  margin-bottom: 20px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: #333;
}
input, select {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid #e0e0e0;
  border-radius: 6px;
  font-size: 14px;
  box-sizing: border-box;
  transition: border-color 0.3s;
}
input:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}
.button-group {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
button {
  flex: 1;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s, transform 0.1s;
}
button:hover {
  background: #5568d3;
}
button:active {
  transform: scale(0.98);
}
button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.results {
  margin-top: 30px;
  padding-top: 30px;
  border-top: 2px solid #f0f0f0;
}
.result-item {
  margin-bottom: 20px;
  padding: 15px;
  background: #f9f9f9;
  border-left: 4px solid #667eea;
  border-radius: 4px;
}
.result-item h3 {
  margin: 0 0 10px 0;
  color: #333;
  font-size: 1.1em;
}
.planet-row {
  display: grid;
  grid-template-columns: 120px 1fr 1fr 1fr;
  gap: 10px;
  margin: 8px 0;
  font-size: 13px;
  align-items: center;
}
.planet-name {
  font-weight: 600;
  color: #667eea;
}
.planet-value {
  color: #666;
}
.sign {
  font-weight: 600;
  color: #764ba2;
}
.longitude {
  color: #999;
  font-size: 0.9em;
}
error {
  color: #d32f2f;
  padding: 10px;
  margin-top: 10px;
  background: #ffebee;
  border-radius: 4px;
  border-left: 4px solid #d32f2f;
}
.loading {
  text-align: center;
  color: #667eea;
  font-weight: 600;
  margin: 20px 0;
}
.row { display: flex; gap: 20px; }
.row > div { flex: 1; }
@media (max-width: 768px) {
  .container { padding: 20px; }
  h1 { font-size: 1.8em; }
  .planet-row { grid-template-columns: 1fr; }
  .button-group { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
  <h1>♈ Astro Transits ♓</h1>
  <p class="subtitle">Calculate Planetary Positions</p>
  
  <div class="input-group">
    <label for="birthDate">Birth Date (YYYY-MM-DD)</label>
    <input type="date" id="birthDate" value="1996-07-02">
  </div>
  
  <div class="input-group">
    <label for="birthTime">Birth Time (HH:MM:SS)</label>
    <input type="time" id="birthTime" value="00:08">
  </div>
  
  <div class="input-group">
    <label for="timezone">Timezone</label>
    <input type="text" id="timezone" value="America/New_York" placeholder="e.g., America/New_York">
  </div>
  
  <div class="input-group">
    <label for="currentDate">Current Date (YYYY-MM-DD)</label>
    <input type="date" id="currentDate">
  </div>
  
  <div class="button-group">
    <button onclick="calculateTransits()">Calculate Transits</button>
    <button onclick="clearResults()">Clear</button>
  </div>
  
  <div id="results" class="results" style="display: none;"></div>
  <div id="error" style="display: none;"></div>
</div>

<script>
// Set current date to today
document.getElementById("currentDate").valueAsDate = new Date();

const ZODIAC_SIGNS = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
const PLANETS = ["Sun", "Moon", "Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Uranus", "Neptune", "Pluto"];

// Simple heliocentric ephemeris calculator
function calculateOrbitalElements(jd, planet) {
  const T = (jd - 2451545.0) / 36525;
  const M = moment.utc(jd, "jD");
  
  // Simplified planetary positions (approximation)
  const a = 1.0, e = 0.0167, i = 0, w = 100, Om = 0, M0 = 100;
  const Omega = Om + 1.7e-4 * 36525 * T;
  
  let lon = w + 1.0 * T + 35999.05 * T;
  let lat = 0;
  
  switch(planet) {
    case 0: lon = 100 + 1.0 * T + 35999.05 * T; break; // Sun
    case 1: lon = 120 + 13.2 * T + 481267.88 * T; break; // Moon
    case 2: lon = 48.3 + 0.98 * T + 58517.81 * T; break; // Mercury
    case 3: lon = 75.8 + 0.62 * T + 58517.81 * T; break; // Venus
    case 4: lon = 335.4 + 0.52 * T + 19132.18 * T; break; // Mars
    case 5: lon = 14.2 + 0.09 * T + 3034.74 * T; break; // Jupiter
    case 6: lon = 93.0 + 0.03 * T + 1223.51 * T; break; // Saturn
    case 7: lon = 173.0 + 0.02 * T + 428.47 * T; break; // Uranus
    case 8: lon = 48.1 + 0.01 * T + 218.46 * T; break; // Neptune
    case 9: lon = 238.0 + 0.003 * T; break; // Pluto
  }
  
  lon = ((lon % 360) + 360) % 360;
  return {lon: lon, lat: lat, distance: 1.0};
}

function jdFromDate(date, time, tz) {
  const tzMoment = moment.tz(tz);
  const combined = moment.tz(`${date} ${time}`, "YYYY-MM-DD HH:mm", tz);
  
  const year = combined.year();
  const month = combined.month() + 1;
  const day = combined.date();
  const hour = combined.hour();
  const min = combined.minute();
  const sec = combined.second() || 0;
  
  const a = Math.floor((14 - month) / 12);
  const y = year + 4800 - a;
  const m = month + 12 * a - 3;
  
  const jdn = day + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
  const jd = jdn + (hour - 12) / 24 + min / 1440 + sec / 86400;
  
  return jd;
}

function signFromLongitude(lon) {
  const sign_index = Math.floor(lon / 30) % 12;
  const degree_in_sign = lon % 30;
  return `${ZODIAC_SIGNS[sign_index]} ${degree_in_sign.toFixed(1)}°`;
}

function calculateTransits() {
  const birthDate = document.getElementById("birthDate").value;
  const birthTime = document.getElementById("birthTime").value;
  const timezone = document.getElementById("timezone").value;
  const currentDate = document.getElementById("currentDate").value;
  const errorDiv = document.getElementById("error");
  const resultsDiv = document.getElementById("results");
  
  errorDiv.style.display = "none";
  errorDiv.innerHTML = "";
  
  if (!birthDate || !birthTime || !currentDate) {
    errorDiv.innerHTML = "Please fill in all fields";
    errorDiv.style.display = "block";
    return;
  }
  
  try {
    const birthJD = jdFromDate(birthDate, birthTime, timezone);
    const currentJD = jdFromDate(currentDate, "12:00", timezone);
    
    let html = `<h2>Transit Positions for ${currentDate}</h2>`;
    
    PLANETS.forEach((planet, idx) => {
      const elements = calculateOrbitalElements(currentJD, idx);
      const sign = signFromLongitude(elements.lon);
      
      html += `<div class="result-item">`;
      html += `<h3>${planet}</h3>`;
      html += `<div class="planet-row">`;
      html += `<div class="planet-name"></div>`;
      html += `<div class="sign">${sign}</div>`;
      html += `<div class="longitude">Longitude: ${elements.lon.toFixed(2)}°</div>`;
      html += `<div class="longitude">Distance: ${elements.distance.toFixed(2)} AU</div>`;
      html += `</div></div>`;
    });
    
    resultsDiv.innerHTML = html;
    resultsDiv.style.display = "block";
  } catch (e) {
    errorDiv.innerHTML = `Error: ${e.message}`;
    errorDiv.style.display = "block";
  }
}

function clearResults() {
  document.getElementById("results").style.display = "none";
  document.getElementById("error").style.display = "none";
}
</script>
</body>
</html>
