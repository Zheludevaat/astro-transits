// ── Profections ──
function computeProfections(date){
  const birth=new Date(Date.UTC(BIRTH.year,BIRTH.month-1,BIRTH.day));
  const d=typeof date==='number'?jdToDate(date):date; // accept JD or Date
  const ms=d.getTime()-birth.getTime();
  const ageYears=Math.floor(ms/(365.25*24*3600000));
  const ascSignIdx=Math.floor(norm(NATAL.Ascendant)/30); // Pisces=11

  // Annual profection
  const yearIdx=(ascSignIdx+(ageYears%12))%12;
  const yearSign=SIGNS[yearIdx];
  const yearLord=TRAD_RULERS[yearSign];

  // Monthly profection (each calendar month from birthday advances one sign)
  const lastBday=new Date(d.getFullYear(),BIRTH.month-1,BIRTH.day);
  if(d<lastBday)lastBday.setFullYear(lastBday.getFullYear()-1);
  let monthsSince=0;
  const tmp=new Date(lastBday);
  while(true){const nxt=new Date(tmp);nxt.setMonth(nxt.getMonth()+1);if(nxt>d)break;tmp.setMonth(tmp.getMonth()+1);monthsSince++;}
  const monthIdx=(yearIdx+(monthsSince%12))%12;
  const monthSign=SIGNS[monthIdx];
  const monthLord=TRAD_RULERS[monthSign];

  return{ageYears,yearIdx,yearSign,yearLord,monthIdx,monthSign,monthLord};
}

// ── Sunrise / Sunset ──
function computeSunTimes(jd,lat,lon){
  const jd0=Math.floor(jd-0.5)+0.5; // 0h UT of this day
  const T=jdToT(jd0+0.5); // ~noon
  const sunLon_=sunLongitude(T);
  const eps=23.4393-0.0130*T;
  const decl=Math.asin(sin(eps)*sin(sunLon_))*RAD;

  // Hour angle for h0=-0.833 (standard refraction)
  const cosHA=(sin(-0.833)-sin(lat)*sin(decl))/(cos(lat)*cos(decl));
  if(Math.abs(cosHA)>1)return null;
  const HA=Math.acos(cosHA)*RAD; // degrees

  // Right ascension of Sun
  const ra=norm(atan2d(cos(eps)*sin(sunLon_),cos(sunLon_)));

  // GMST at 0h UT
  const T0=jdToT(jd0);
  const GMST0=norm(280.46061837+360.98564736629*(jd0-2451545.0)+0.000387933*T0*T0);

  // Transit hour (UT)
  let transit=((ra-GMST0-lon)%360+360)%360;
  const transitUT=transit/15; // degrees→hours

  const sunriseUT=transitUT-HA/15;
  const sunsetUT=transitUT+HA/15;

  return{sunrise:sunriseUT,sunset:sunsetUT,transit:transitUT};
}

// ── Planetary Hours ──
function computePlanetaryHours(jd,lat,lon){
  const times=computeSunTimes(jd,lat,lon);
  if(!times)return null;
  let{sunrise,sunset}=times;
  // Clamp to 0-24 range
  if(sunrise<0)sunrise+=24;if(sunrise>24)sunrise-=24;
  if(sunset<0)sunset+=24;if(sunset>24)sunset-=24;

  const dayLen=sunset-sunrise;
  const nightLen=24-dayLen;
  const dayHr=dayLen/12;
  const nightHr=nightLen/12;

  // Day of week → day ruler
  const d=jdToDate(jd);
  const dow=d.getDay(); // 0=Sun
  const dayPlanets=['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];
  const dayRuler=dayPlanets[dow];
  const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dow];

  // Chaldean order
  const chaldean=['Saturn','Jupiter','Mars','Sun','Venus','Mercury','Moon'];
  const startIdx=chaldean.indexOf(dayRuler);

  const hours=[];
  for(let i=0;i<24;i++){
    const isDay=i<12;
    const hrLen=isDay?dayHr:nightHr;
    const start=isDay?sunrise+i*dayHr:sunset+(i-12)*nightHr;
    const end=start+hrLen;
    const ruler=chaldean[(startIdx+i)%7];
    hours.push({ruler,start,end,isDay,index:i});
  }

  return{hours,sunrise,sunset,dayRuler,dayName};
}

// Find current planetary hour index
function currentHourIndex(hours,utHours){
  for(let i=0;i<hours.length;i++){
    let s=hours[i].start,e=hours[i].end;
    // Handle wrap around midnight
    if(e>24){if(utHours>=s||utHours<e-24)return i;}
    else if(s<0){if(utHours>=s+24||utHours<e)return i;}
    else{if(utHours>=s&&utHours<e)return i;}
  }
  return 0;
}

function fmtHourTime(h){
  // Convert UT hours to EDT (UTC-4) for display
  let local=h-4; // EDT offset
  if(local<0)local+=24;if(local>=24)local-=24;
  const hr=Math.floor(local);const mn=Math.round((local-hr)*60);
  const ampm=hr>=12?'PM':'AM';const h12=hr===0?12:hr>12?hr-12:hr;
  return h12+':'+String(mn).padStart(2,'0')+ampm;
}

// ── Consult Synthesis (the "what should I do right now?" answer) ──
function synthesizeConsult(transits,vibe,vocResult,moonSign,prof,pHours,isToday){
  if(!pHours||!isToday)return null;

  const now=new Date();
  const utNow=now.getUTCHours()+now.getUTCMinutes()/60;
  const curIdx=currentHourIndex(pHours.hours,utNow);
  const curHour=pHours.hours[curIdx];
  const nextHour=pHours.hours[(curIdx+1)%24];
  const hp=HOUR_PURPOSE[curHour.ruler]||{};
  const nhp=HOUR_PURPOSE[nextHour.ruler]||{};

  // Minutes until next hour
  let minsLeft=Math.round((curHour.end-utNow)*60);
  if(minsLeft<0)minsLeft+=24*60;
  if(minsLeft>120)minsLeft=Math.round(minsLeft);

  const sentences=[];

  // Current hour guidance
  sentences.push(`You are in a ${curHour.ruler} hour (${minsLeft} minutes remaining). ${hp.brief||''}`);

  // VOC warning
  if(vocResult&&vocResult.voc){
    sentences.push('The Moon is void of course — this is not the time to start anything you want to stick. Finish tasks in progress, organize, or rest.');
  }

  // Dominant transit energy — just the top transit if hard
  const hardActive=transits.filter(t=>t.aspect.type==='hard'&&t.importance>18);
  const easyActive=transits.filter(t=>(t.aspect.type==='easy'||t.aspect.name==='conjunction')&&t.importance>18);

  if(hardActive.length>0){
    const t=hardActive[0];
    const sp=SPHERE[t.tp]||{};
    const hv=HOUSE_VOICE[t.house]||{};
    sentences.push(`Be aware that ${sp.name||t.tp} is pressing on your ${(hv.name||'').toLowerCase()} — ${sp.when_stressed||'move carefully in this area'}. This is not the hour for impulsive action in that domain.`);
  } else if(easyActive.length>0){
    const t=easyActive[0];
    const sp=SPHERE[t.tp]||{};
    const hv=HOUSE_VOICE[t.house]||{};
    sentences.push(`${sp.name||t.tp} supports your ${(hv.name||'').toLowerCase()} right now — ${sp.when_active||'take what is offered'}.`);
  }

  // Profected lord relevance
  const lordTransits=transits.filter(t=>t.tp===prof.yearLord||t.np===prof.yearLord).filter(t=>t.importance>10);
  if(lordTransits.length>0){
    sentences.push(`Your lord of the year (${prof.yearLord}) is active in today\'s transits — what happens now connects to the year\'s larger story.`);
  }

  // Next hour preview
  sentences.push(`Next hour: ${nextHour.ruler} (${fmtHourTime(nextHour.start)}). ${nhp.brief||''}`);

  return{
    text:sentences.join(' '),
    hourRuler:curHour.ruler,
    hourPurpose:hp,
    minsLeft,
    nextRuler:nextHour.ruler,
    nextStart:fmtHourTime(nextHour.start),
    factors:{
      hour:curHour.ruler,
      moon:`${moonSign.name} ${vocResult&&vocResult.voc?'(VOC)':''}`,
      vibe:vibe.score,
      yearLord:prof.yearLord
    }
  };
}

// Score a single time window for the given task
function scoreElectionalWindow(task,hourRuler,moonSignName,moonPhaseAngle,vocActive,retros){
  const t=ELECTIONAL_TASKS[task];if(!t)return null;
  let score=50;
  const reasons=[];const factors=[];

  // Hour match
  if(t.idealHour.includes(hourRuler)){
    const rank=t.idealHour.indexOf(hourRuler);
    const bonus=rank===0?30:rank===1?22:16;
    score+=bonus;
    reasons.push(`${hourRuler} hour — ideal for ${t.label.toLowerCase()}`);
    factors.push({label:`${hourRuler} hour`,type:'good'});
  } else if(t.avoidHour.includes(hourRuler)){
    score-=25;
    reasons.push(`${hourRuler} hour works against this kind of action`);
    factors.push({label:`${hourRuler} hour`,type:'bad'});
  } else {
    score-=5;
    factors.push({label:`${hourRuler} hour`,type:'neutral'});
  }

  // Moon sign element
  const moonEl=SIGN_ELEMENTS[moonSignName];
  if(t.idealMoon.includes(moonEl)){
    score+=12;
    reasons.push(`Moon in ${moonSignName} (${moonEl}) supports the nature of this work`);
    factors.push({label:`Moon ${moonEl}`,type:'good'});
  } else {
    score-=4;
    factors.push({label:`Moon ${moonEl}`,type:'neutral'});
  }

  // Moon phase — waxing (0-180) is generative, waning (180-360) is releasing
  const waxing=moonPhaseAngle<180;
  const startTasks=['start-project','ask-favor','hard-convo','send-email','sign-contract','buy-beautiful','date','physical'];
  const releaseTasks=['rest-retreat','reconcile'];
  if(startTasks.includes(task)){
    if(waxing){score+=5;factors.push({label:'Waxing',type:'good'});}
    else{score-=5;factors.push({label:'Waning',type:'bad'});}
  } else if(releaseTasks.includes(task)){
    if(!waxing){score+=5;factors.push({label:'Waning',type:'good'});}
  }

  // VOC Moon
  if(vocActive){
    if(t.vocOk){factors.push({label:'VOC ok',type:'neutral'});}
    else{score-=20;reasons.push('Moon is void of course — intentions won\'t stick');factors.push({label:'VOC',type:'bad'});}
  }

  // Retrograde concerns
  if(t.retroAvoid){
    for(const rp of t.retroAvoid){
      if(retros.includes(rp)){
        score-=18;
        reasons.push(`${rp} retrograde — classical warning against this task`);
        factors.push({label:`${rp} Rx`,type:'bad'});
      }
    }
  }

  score=Math.max(0,Math.min(100,score));
  return{score,reasons,factors};
}

// Find top windows over the next N days (hour granularity)
function findBestElectionalWindows(task,daysAhead,limit){
  const results=[];
  const now=new Date();
  daysAhead=daysAhead||7;limit=limit||3;

  for(let d=0;d<daysAhead;d++){
    const date=new Date(now.getTime()+d*86400000);
    const jd=julianDate(date.getUTCFullYear(),date.getUTCMonth()+1,date.getUTCDate(),date.getUTCHours()+date.getUTCMinutes()/60);
    const ph=computePlanetaryHours(jd,BIRTH.lat,BIRTH.lon);
    if(!ph)continue;
    // Compute day's position snapshot (Moon, retros) at midday UT
    const y=date.getUTCFullYear(),m=date.getUTCMonth()+1,dy=date.getUTCDate();
    const midJd=julianDate(y,m,dy,12);
    const midPos=computeAll(midJd);
    const moonSignName=signOf(midPos.Moon).name;
    const sun=midPos.Sun;const moon=midPos.Moon;
    const phaseAngle=((moon-sun)+360)%360;
    const retros=[];
    for(const p of ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune']){
      const ms=motionStatus(p,midJd);if(ms&&ms.retrograde)retros.push(p);
    }
    const vocResult=isVoidOfCourse(midPos.Moon,midJd);

    for(let hi=0;hi<24;hi++){
      const hr=ph.hours[hi];
      // Convert hour start (UT hours) to an actual Date
      const hrDate=new Date(date);
      hrDate.setUTCHours(0,0,0,0);
      hrDate.setUTCMilliseconds(hr.start*3600*1000);
      // Skip windows already in the past
      if(hrDate.getTime()<now.getTime()-60000)continue;
      // Stop after 7 days from now
      if(hrDate.getTime()>now.getTime()+daysAhead*86400000)continue;

      // VOC for this specific hour (approximation: use day-level VOC)
      const vocActive=!!(vocResult&&vocResult.voc);

      const res=scoreElectionalWindow(task,hr.ruler,moonSignName,phaseAngle,vocActive,retros);
      if(!res)continue;

      // Duration in minutes
      const durMin=Math.round((hr.end-hr.start)*60);

      results.push({
        date:hrDate,
        endDate:new Date(hrDate.getTime()+durMin*60000),
        ruler:hr.ruler,
        isDay:hr.isDay,
        moonSign:moonSignName,
        durMin:durMin,
        score:res.score,
        reasons:res.reasons,
        factors:res.factors
      });
    }
  }

  results.sort((a,b)=>b.score-a.score);
  // Deduplicate adjacent hours of same ruler by keeping highest-scoring per day-ruler pair
  const seen={};const top=[];
  for(const r of results){
    const key=r.date.toDateString()+'|'+r.ruler;
    if(seen[key])continue;
    seen[key]=true;
    top.push(r);
    if(top.length>=limit)break;
  }
  return top;
}

function fmtElectionalWhen(d){
  const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  const tmrw=new Date(now.getTime()+86400000);
  const isTomorrow=d.toDateString()===tmrw.toDateString();
  const hr=d.getHours();const mn=d.getMinutes();
  const ampm=hr>=12?'PM':'AM';const h12=hr===0?12:hr>12?hr-12:hr;
  const t=h12+':'+String(mn).padStart(2,'0')+ampm;
  if(sameDay)return'Today '+t;
  if(isTomorrow)return'Tomorrow '+t;
  const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${dayName} ${mo} ${d.getDate()} ${t}`;
}

const MANSION_ARC=360/28; // 12.857°
function computeMansion(moonLon){
  const idx=Math.floor(norm(moonLon)/MANSION_ARC)%28;
  const start=idx*MANSION_ARC;
  const within=norm(moonLon)-start;
  const m=MANSIONS[idx];
  return{index:idx+1,start,end:start+MANSION_ARC,within,...m};
}

// SEVEN HERMETIC LOTS — sect-aware traditional formulas
// ══════════════════════════════════════════════════════════════
// All lots: if nocturnal (this user's chart is), formula is reversed.
// Result = norm(Asc + A - B) mod 360
function computeLots(cur,asc,isNocturnal){
  const A=asc;const Sun=cur.Sun;const Moon=cur.Moon;const Mer=cur.Mercury;
  const Ven=cur.Venus;const Mar=cur.Mars;const Jup=cur.Jupiter;const Sat=cur.Saturn;

  // Fortune: body — D: Asc+Moon-Sun; N: Asc+Sun-Moon
  const Fortune=norm(isNocturnal?(A+Sun-Moon):(A+Moon-Sun));
  // Spirit: soul/purpose — inverse of Fortune
  const Spirit=norm(isNocturnal?(A+Moon-Sun):(A+Sun-Moon));
  // Eros: desire — D: Asc+Venus-Spirit; N: Asc+Spirit-Venus
  const Eros=norm(isNocturnal?(A+Spirit-Ven):(A+Ven-Spirit));
  // Necessity: constraint — D: Asc+Fortune-Mercury; N: Asc+Mercury-Fortune
  const Necessity=norm(isNocturnal?(A+Mer-Fortune):(A+Fortune-Mer));
  // Courage: daring — D: Asc+Fortune-Mars; N: Asc+Mars-Fortune
  const Courage=norm(isNocturnal?(A+Mar-Fortune):(A+Fortune-Mar));
  // Victory: faith/triumph — D: Asc+Jupiter-Spirit; N: Asc+Spirit-Jupiter
  const Victory=norm(isNocturnal?(A+Spirit-Jup):(A+Jup-Spirit));
  // Nemesis: exposure/retribution — D: Asc+Fortune-Saturn; N: Asc+Saturn-Fortune
  const Nemesis=norm(isNocturnal?(A+Sat-Fortune):(A+Fortune-Sat));

  return{Fortune,Spirit,Eros,Necessity,Courage,Victory,Nemesis};
}

// JOURNAL — persistent entries with astro context snapshots
// ══════════════════════════════════════════════════════════════
const JOURNAL_KEY='astro_journal_v1';
const MOOD_LABELS={1:'Heavy',2:'Low',3:'Neutral',4:'Light',5:'Open'};

function loadJournal(){
  try{const raw=localStorage.getItem(JOURNAL_KEY);if(!raw)return[];
    const arr=JSON.parse(raw);return Array.isArray(arr)?arr:[];
  }catch(e){return[];}
}
function saveJournal(entries){
  try{localStorage.setItem(JOURNAL_KEY,JSON.stringify(entries));}catch(e){console.error('journal save',e);}
}
function captureJournalContext(cur,jd,transits,vibe,vocResult,moonSign,prof,pHours,phaseAngle,retros,stats){
  // Snapshot the astro configuration at entry time for later pattern matching
  const ctx={
    moonSign:moonSign.name,
    moonMansion:computeMansion(cur.Moon).index,
    phasePct:Math.round(phaseAngle/3.6),
    yearLord:prof.yearLord,
    monthLord:prof.monthLord,
    vibe:vibe.score,
    voc:!!vocResult.voc,
    retros:retros.join(','),
    stations:stats.join(','),
  };
  if(pHours){
    const utNow=new Date().getUTCHours()+new Date().getUTCMinutes()/60;
    const idx=currentHourIndex(pHours.hours,utNow);
    ctx.hourRuler=pHours.hours[idx].ruler;
  }
  // Top 2 transits as compact signature
  const top=transits.slice(0,2).map(t=>`${t.tp}_${t.aspect.name}_${t.np}`);
  ctx.topTransits=top;
  return ctx;
}

function journalAddEntry(mood,note,ctx){
  const entries=loadJournal();
  entries.unshift({
    ts:Date.now(),
    mood,
    note:note||'',
    ctx
  });
  // Keep last 500
  if(entries.length>500)entries.length=500;
  saveJournal(entries);
  return entries;
}

function journalDelete(ts){
  const entries=loadJournal().filter(e=>e.ts!==ts);
  saveJournal(entries);
  return entries;
}

// Find past entries with similar astro configuration
function findEchoEntries(ctx){
  const entries=loadJournal();
  const echoes=[];
  for(const e of entries){
    if(!e.ctx)continue;
    let score=0;
    if(e.ctx.hourRuler===ctx.hourRuler)score+=3;
    if(e.ctx.moonSign===ctx.moonSign)score+=2;
    if(e.ctx.yearLord===ctx.yearLord)score+=2;
    if(e.ctx.monthLord===ctx.monthLord)score+=2;
    if(e.ctx.moonMansion===ctx.moonMansion)score+=3;
    if(e.ctx.voc===ctx.voc)score+=1;
    // Shared transit signatures
    const et=e.ctx.topTransits||[];
    for(const t of(ctx.topTransits||[])){
      if(et.includes(t))score+=4;
    }
    if(score>=5)echoes.push({entry:e,score});
  }
  echoes.sort((a,b)=>b.score-a.score);
  return echoes.slice(0,2);
}

// ZODIACAL RELEASING — from Spirit and Fortune (Hellenistic)
// ══════════════════════════════════════════════════════════════
// Each sign's ruler has a "minor period" in years. Period-lengths:
const ZR_YEARS={
  Aries:15,Taurus:8,Gemini:20,Cancer:25,Leo:19,Virgo:20,
  Libra:8,Scorpio:15,Sagittarius:12,Capricorn:27,Aquarius:27,Pisces:12
};
const ZR_COLORS={
  Aries:'#e0425d',Taurus:'#3dd9a0',Gemini:'#f5b843',Cancer:'#9b6dff',
  Leo:'#ffb142',Virgo:'#5cd6a8',Libra:'#f58ca3',Scorpio:'#c13b5a',
  Sagittarius:'#8a5cf0',Capricorn:'#4a6278',Aquarius:'#4a9eff',Pisces:'#7fc6e8'
};
// Returns sign index (0=Aries) for an L-period index given the starting sign
function zrNext(signIdx){return(signIdx+1)%12;}

// Compute Level 1 and Level 2 periods from startLot to limitDate
// birthDate: Date object; startSignIdx: 0-11; yearsTotal: how many years to project
function computeZR(startSignIdx,birthDate,yearsTotal){
  const periods=[];
  let cursor=0; // years elapsed since birth
  let signIdx=startSignIdx;
  while(cursor<yearsTotal){
    const signName=SIGNS[signIdx];
    const len=ZR_YEARS[signName];
    // Loosing of the Bond (LB): at the 8th sign from start, jump over
    // Canonical Valens rule: at end of period, if next period is 8 signs from start, skip.
    // Simpler: annotate LB when transitioning from period whose sign is 7 signs after startSignIdx (i.e. the 8th)
    const p={
      level:1,
      signIdx,
      sign:signName,
      ruler:TRAD_RULERS[signName],
      startYears:cursor,
      endYears:cursor+len,
      startDate:new Date(birthDate.getTime()+cursor*365.2425*86400000),
      endDate:new Date(birthDate.getTime()+(cursor+len)*365.2425*86400000),
      lengthYears:len,
      // A period is "peak" if the sign is angular (1/4/7/10) from the start sign
      peak:((signIdx-startSignIdx+12)%12)%3===0 && ((signIdx-startSignIdx+12)%12)!==0,
      subperiods:[]
    };
    // Sub-periods (L2): each L1 is divided proportionally by the same zodiacal rule
    // Each L2 sign gets its minor-period years, starting from the L1 sign itself
    let subSignIdx=signIdx;
    let subCursor=0;
    while(subCursor<len-0.001){
      const subSignName=SIGNS[subSignIdx];
      const subLenRaw=ZR_YEARS[subSignName];
      // Scale? Classical method: sub-periods use the same minor-period years but bounded by parent L1 length
      // If the sub-period would extend past parent, truncate it and stop
      const subLen=Math.min(subLenRaw,len-subCursor);
      p.subperiods.push({
        level:2,
        signIdx:subSignIdx,
        sign:subSignName,
        ruler:TRAD_RULERS[subSignName],
        startYears:cursor+subCursor,
        endYears:cursor+subCursor+subLen,
        startDate:new Date(birthDate.getTime()+(cursor+subCursor)*365.2425*86400000),
        endDate:new Date(birthDate.getTime()+(cursor+subCursor+subLen)*365.2425*86400000),
        lengthYears:subLen,
        truncated:subLen<subLenRaw,
        peak:((subSignIdx-startSignIdx+12)%12)%3===0 && ((subSignIdx-startSignIdx+12)%12)!==0
      });
      subCursor+=subLen;
      subSignIdx=zrNext(subSignIdx);
    }
    periods.push(p);

    // LB detection: if NEXT sign is the 8th from startSignIdx, jump to 9th
    const nextIdx=zrNext(signIdx);
    if(((nextIdx-startSignIdx+12)%12)===7){
      // Mark LB on this period
      p.lbFollows=true;
      signIdx=(startSignIdx+8)%12; // jump to 9th sign (0-indexed: startSignIdx+8)
    } else {
      signIdx=nextIdx;
    }
    cursor+=len;
  }
  return periods;
}

function findCurrentZRPeriod(periods,nowYears){
  for(const p of periods){
    if(nowYears>=p.startYears&&nowYears<p.endYears){
      const sub=p.subperiods.find(s=>nowYears>=s.startYears&&nowYears<s.endYears);
      return{l1:p,l2:sub};
    }
  }
  return null;
}

// ══════════════════════════════════════════════════════════════
// FIRDARIA — Persian time-lord periods (complements ZR)
// ══════════════════════════════════════════════════════════════
// Nocturnal order (user's chart): Moon→Saturn→Jupiter→Mars→Sun→Venus→Mercury
// Diurnal order: Sun→Venus→Mercury→Moon→Saturn→Jupiter→Mars
// Total: 75 years (diurnal) or 75 years (nocturnal); traditions vary 70-75
const FIRDARIA_YEARS={Sun:10,Venus:8,Mercury:13,Moon:9,Saturn:11,Jupiter:12,Mars:7};
const FIRDARIA_DAY=['Sun','Venus','Mercury','Moon','Saturn','Jupiter','Mars'];
const FIRDARIA_NIGHT=['Moon','Saturn','Jupiter','Mars','Sun','Venus','Mercury'];

// Each major period is divided into 7 equal sub-periods, beginning with the
// major lord and following the same sequence.
function computeFirdaria(birthDate,isNocturnal){
  const seq=isNocturnal?FIRDARIA_NIGHT:FIRDARIA_DAY;
  const majors=[];
  let cursor=0;
  for(let i=0;i<seq.length;i++){
    const lord=seq[i];
    const years=FIRDARIA_YEARS[lord];
    const subLen=years/7;
    const subs=[];
    // Sub-period sequence: starting at the major lord, cycle through seq
    const startIdx=seq.indexOf(lord);
    for(let j=0;j<7;j++){
      const subLord=seq[(startIdx+j)%seq.length];
      subs.push({
        level:2,
        lord:subLord,
        startYears:cursor+j*subLen,
        endYears:cursor+(j+1)*subLen,
        startDate:new Date(birthDate.getTime()+(cursor+j*subLen)*365.2425*86400000),
        endDate:new Date(birthDate.getTime()+(cursor+(j+1)*subLen)*365.2425*86400000),
        lengthYears:subLen
      });
    }
    majors.push({
      level:1,
      lord,
      startYears:cursor,
      endYears:cursor+years,
      startDate:new Date(birthDate.getTime()+cursor*365.2425*86400000),
      endDate:new Date(birthDate.getTime()+(cursor+years)*365.2425*86400000),
      lengthYears:years,
      subperiods:subs
    });
    cursor+=years;
  }
  return majors;
}

function findCurrentFirdaria(majors,ageYears){
  for(const m of majors){
    if(ageYears>=m.startYears&&ageYears<m.endYears){
      const sub=m.subperiods.find(s=>ageYears>=s.startYears&&ageYears<s.endYears);
      return{major:m,sub:sub};
    }
  }
  return null;
}

function computeDecan(lon){
  const s=signOf(lon);
  const signName=s.name;
  const degIntoSign=norm(lon)%30;
  const decanIdx=Math.floor(degIntoSign/10); // 0,1,2
  const rulers=DECAN_RULERS[signName]||['','',''];
  const ruler=rulers[decanIdx];
  const face=PICATRIX_FACES[signName+'-'+(decanIdx+1)]||{};
  return{
    signName,
    decanIdx,
    decanNum:decanIdx+1,
    ruler,
    rangeStart:decanIdx*10,
    rangeEnd:(decanIdx+1)*10,
    degIntoDecan:degIntoSign-decanIdx*10,
    image:face.image,
    indication:face.indication,
    keyword:face.keyword
  };
}

// SOLAR & LUNAR RETURNS
// ══════════════════════════════════════════════════════════════
// A Solar Return is the chart cast for the moment the transiting Sun
// returns to its exact natal position each year — valid birthday to
// birthday. A Lunar Return repeats every ~27.3 days as the Moon
// returns to natal longitude, governing the upcoming lunar month.

function _angDiff(a,b){let d=((a-b+540)%360)-180;return d;}

function findReturnJD(targetLon,approxJd,body){
  // Bisect/secant: find JD within ±7d of approxJd where body crosses targetLon.
  const fn=body==='Sun'
    ?(jd)=>_angDiff(sunLongitude(jdToT(jd)),targetLon)
    :(jd)=>_angDiff(moonLongitude(jdToT(jd)),targetLon);
  // Search a window; sample to bracket a sign change
  const halfWindow=body==='Sun'?10:2;
  let lo=approxJd-halfWindow,hi=approxJd+halfWindow;
  let fLo=fn(lo),fHi=fn(hi);
  // If same sign, step out
  let steps=0;
  while(fLo*fHi>0 && steps<20){
    lo-=halfWindow;hi+=halfWindow;fLo=fn(lo);fHi=fn(hi);steps++;
  }
  if(fLo*fHi>0)return approxJd; // couldn't bracket
  // Bisection
  for(let i=0;i<60;i++){
    const mid=(lo+hi)/2;const fM=fn(mid);
    if(Math.abs(fM)<1e-5)return mid;
    if(fLo*fM<0){hi=mid;fHi=fM;}else{lo=mid;fLo=fM;}
  }
  return(lo+hi)/2;
}

function findSolarReturnJD(year){
  // Birthday approximation
  const approx=julianDate(year,BIRTH.month,BIRTH.day,BIRTH.hour);
  return findReturnJD(NATAL.Sun,approx,'Sun');
}

function findLunarReturnJD(fromJd,forward){
  // Approximate: natal Moon position, stepping back/forward in ~27.3d increments
  const synodic=27.32166;
  // Start near fromJd, search bracket containing natal moon crossing
  // Use angular progress: moon is at L now; we need crossing of natalMoon.
  const curL=moonLongitude(jdToT(fromJd));
  let offset=_angDiff(NATAL.Moon,curL); // deg ahead (+) or behind (-) the natal
  // Moon moves ~13.2°/day; rough dt:
  let dt=offset/13.176;
  if(forward){if(dt<0)dt+=synodic;}
  else{if(dt>0)dt-=synodic;}
  const approx=fromJd+dt;
  return findReturnJD(NATAL.Moon,approx,'Moon');
}

function computeReturn(rjd){
  const R=computeAll(rjd);
  R.Ascendant=computeAsc(rjd,BIRTH.lat,BIRTH.lon);
  R.MC=computeMC(rjd,BIRTH.lon);
  R.jd=rjd;
  R.date=jdToDate(rjd);
  return R;
}

const CLAUDE_SYSTEM_PROMPT=`You are a traditional astrologer writing a daily reading for an astrologer-in-training. The voice is educated, grounded, and literary — closer to Demetra George or Austin Coppock than to newspaper-column astrology. You work primarily from Hellenistic doctrine (Valens, Ptolemy, Paulus), with Picatrix and Perso-Arabic material where relevant (decans, mansions, firdaria).

Rules of the reading:
- Sect-aware. If the chart is nocturnal, the Moon is the sect light; Venus is the sect benefic; Saturn is the out-of-sect malefic.
- Never give generic sign-based pop astrology. Always ground interpretations in the concrete positions provided.
- Weight transits by importance score; do not treat every transit as equally significant.
- Connect the short-term (transits, Moon sign, planetary hour, VOC) to the long-term (profection year-lord, ZR L1/L2 period, firdaria major/sub). The reading should feel nested — today inside the month inside the year inside the chapter.
- If an important fact is ambiguous, say so rather than inventing. Hedge with "traditionally" or "in the tradition of X" when assigning meaning.
- Never recommend medical, legal, or financial actions. Keep the focus on time and quality of the day.
- Favor English prose paragraphs. Avoid bullet lists. Avoid emoji. Section headings allowed if they earn their space.
- Keep the entire reading under ~650 words unless the context requests more detail.
- Address the native directly ("you") in a warm but not saccharine tone.`;

function buildChartContext(cur,jd,transits,vibe,mPhase,retros,stats,vocResult,moonSign,phaseAngle,prof,pHours,lots,mansion,fortuneCur,firdariaCur,zrCurL1,zrCurL2){
  // Strip down computed state to a structured brief for Claude.
  const now=new Date();
  const dateStr=now.toLocaleString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const fmt=(p,v)=>{const s=signOf(v);return`${p} ${s.name} ${s.degree.toFixed(1)}° (house ${houseOf(v)})`;};
  const planets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  const moonDecan=computeDecan(cur.Moon);
  const sunDecan=computeDecan(cur.Sun);
  const curLit=pHours&&PLANETARY_LITURGY[pHours.dayRuler]?PLANETARY_LITURGY[pHours.dayRuler]:null;

  // Current planetary hour
  let curHour=null;
  if(pHours){
    const utNow=now.getUTCHours()+now.getUTCMinutes()/60;
    const idx=currentHourIndex(pHours.hours,utNow);
    curHour=pHours.hours[idx];
  }

  // Top transits by importance
  const topTransits=[...transits].sort((a,b)=>(b.importance||0)-(a.importance||0)).slice(0,8).map(t=>{
    const ap=t.aspect;
    return`${t.tp} ${ap.name} natal ${t.np==='Ascendant'?'Ascendant':t.np==='MC'?'MC':t.np} (orb ${ap.orb.toFixed(2)}°, ${ap.applying?'applying':'separating'}, importance ${t.importance})`;
  });

  const fsNatal=scanNatalFixedStars(1.0).map(h=>`${h.point} ⊙ ${h.star.name} (${h.orb.toFixed(2)}° — nature ${h.star.nature})`);
  const fsTrans=scanTransitFixedStars(cur,jd,0.5).map(h=>`${h.point} ⊙ ${h.star.name} (${h.orb.toFixed(2)}° — nature ${h.star.nature})`);

  const ctx={
    meta:{
      dateLocal:dateStr,
      birthLocation:`Stony Brook, NY (${BIRTH.lat}°N, ${Math.abs(BIRTH.lon)}°W)`,
      birthDate:`${BIRTH.year}-${String(BIRTH.month).padStart(2,'0')}-${String(BIRTH.day).padStart(2,'0')} ${Math.floor(BIRTH.hour)}:${String(Math.round((BIRTH.hour%1)*60)).padStart(2,'0')} local`,
      sect:SECT.isNocturnal?'nocturnal':'diurnal',
      sectLight:SECT.sectLight,
      sectBenefic:SECT.sectBenefic,
      outOfSectMalefic:SECT.outOfSectMalefic
    },
    natal:{
      ascendant:`${signOf(NATAL.Ascendant).name} ${signOf(NATAL.Ascendant).degree.toFixed(1)}°`,
      mc:`${signOf(NATAL.MC).name} ${signOf(NATAL.MC).degree.toFixed(1)}°`,
      planets:planets.map(p=>fmt(p,NATAL[p])),
      fixedStars:fsNatal
    },
    today:{
      planets:planets.map(p=>fmt(p,cur[p])),
      moonPhase:`${mPhase.name} (${phaseAngle.toFixed(0)}° from Sun)`,
      moonSign:moonSign.name,
      moonDecan:`Decan ${moonDecan.decanNum} of ${moonDecan.signName}, ruled by ${moonDecan.ruler} — Picatrix: ${moonDecan.image||'(none)'}`,
      moonMansion:mansion?`Mansion ${mansion.index} ${mansion.name||''} (${mansion.nature})`:null,
      sunDecan:`Decan ${sunDecan.decanNum} of ${sunDecan.signName}, ruled by ${sunDecan.ruler}`,
      voc:vocResult&&vocResult.active?`VOC until Moon enters ${vocResult.nextSign}`:'Moon is not void of course',
      planetaryHour:curHour?`Hour of ${curHour.ruler}`:null,
      dayRuler:pHours?pHours.dayRuler:null,
      dayLiturgyIntent:curLit?curLit.intent:null,
      retrogrades:retros.join(', ')||'none',
      vibeScore:vibe.score,
      transitFixedStars:fsTrans,
      topTransits:topTransits
    },
    periods:{
      profectionYearLord:`${prof.yearLord} (age ${prof.ageYears}, ${prof.yearSign} profected Ascendant)`,
      profectionMonthLord:`${prof.monthLord} (${prof.monthSign})`,
      zrL1:zrCurL1?`${zrCurL1.sign} (${zrCurL1.ruler}), ${fmtZRDate(zrCurL1.startDate)} – ${fmtZRDate(zrCurL1.endDate)}${zrCurL1.peak?', PEAK':''}${zrCurL1.lbFollows?', Loosing of the Bond follows':''}`:null,
      zrL2:zrCurL2?`${zrCurL2.sign} (${zrCurL2.ruler}), ${fmtZRDate(zrCurL2.startDate)} – ${fmtZRDate(zrCurL2.endDate)}${zrCurL2.peak?', PEAK':''}`:null,
      firdariaMajor:firdariaCur?`${firdariaCur.major.lord} major (${fmtZRDate(firdariaCur.major.startDate)} – ${fmtZRDate(firdariaCur.major.endDate)})`:null,
      firdariaSub:firdariaCur?`${firdariaCur.sub.lord} sub (${fmtZRDate(firdariaCur.sub.startDate)} – ${fmtZRDate(firdariaCur.sub.endDate)})`:null
    },
    lots:lots?{
      fortune:`${signOf(lots.Fortune).name} ${signOf(lots.Fortune).degree.toFixed(1)}°`,
      spirit:`${signOf(lots.Spirit).name} ${signOf(lots.Spirit).degree.toFixed(1)}°`,
      eros:`${signOf(lots.Eros).name} ${signOf(lots.Eros).degree.toFixed(1)}°`,
      victory:`${signOf(lots.Victory).name} ${signOf(lots.Victory).degree.toFixed(1)}°`,
      courage:`${signOf(lots.Courage).name} ${signOf(lots.Courage).degree.toFixed(1)}°`,
      necessity:`${signOf(lots.Necessity).name} ${signOf(lots.Necessity).degree.toFixed(1)}°`,
      nemesis:`${signOf(lots.Nemesis).name} ${signOf(lots.Nemesis).degree.toFixed(1)}°`
    }:null
  };
  return ctx;
}

async function callClaude(chartContext,userFocus){
  const key=loadClaudeKey();
  if(!key)throw new Error('No API key set.');
  const userMsg=`Here is today's sky read against the native's nativity.

${userFocus?'The native is asking: '+userFocus+'\n\n':''}Chart context (JSON):
\`\`\`json
${JSON.stringify(chartContext,null,2)}
\`\`\`

Write an integrated reading. Open with the quality of the day, move through the most significant transits, and close by situating today inside the governing ZR period and firdaria. Name the relevant traditional authorities where it strengthens the point.`;

  const body={
    model:CLAUDE_MODEL,
    max_tokens:2048,
    system:CLAUDE_SYSTEM_PROMPT,
    messages:[{role:'user',content:userMsg}]
  };
  const ctrl=new AbortController();
  const timeoutId=setTimeout(()=>ctrl.abort(),60000); // 60s timeout
  let res;
  try{
    res=await fetch(CLAUDE_API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify(body),
      signal:ctrl.signal
    });
  } catch(e){
    clearTimeout(timeoutId);
    if(e.name==='AbortError')throw new Error('Request timed out after 60s. Check connection and retry.');
    throw e;
  }
  clearTimeout(timeoutId);
  if(!res.ok){
    let errText='';
    try{const j=await res.json();errText=j.error&&j.error.message||JSON.stringify(j);}catch(e){errText=await res.text();}
    // Cap error text length + strip HTML tags to prevent 10MB error pages from bloating state
    errText=String(errText).replace(/<[^>]*>/g,'').slice(0,400);
    const hint=res.status===429?' (rate limited — wait a minute and retry)':res.status===401?' (check your API key)':res.status>=500?' (Anthropic server error — try again shortly)':'';
    throw new Error('API error '+res.status+hint+': '+errText);
  }
  const data=await res.json();
  const text=(data.content||[]).map(c=>c.type==='text'?c.text:'').join('\n').trim();
  return{text,usage:data.usage||null,ts:Date.now()};
}

// NOTIFICATIONS (foreground + optional service-worker)
// ══════════════════════════════════════════════════════════════
// Foreground notifications fire while the app is open in a tab or
// running as an installed PWA. Real background push would require
// a backend with VAPID; this engine covers the common case —
// the app is frequently consulted during the day and fires local
// alerts for planetary hour changes, Moon sign ingresses, VOC
// transitions, and a morning briefing at a user-set time.

const NOTIF_PREFS_KEY='astro_notif_prefs_v1';
const DEFAULT_NOTIF_PREFS={
  enabled:false,
  morningBrief:true,
  morningTime:'07:30',  // local HH:MM
  moonIngress:true,
  vocAlerts:true,
  planetaryHour:false,  // can be noisy — default off
  lastFiredIds:{}
};

function loadNotifPrefs(){
  try{
    const raw=localStorage.getItem(NOTIF_PREFS_KEY);
    if(!raw)return{...DEFAULT_NOTIF_PREFS};
    return{...DEFAULT_NOTIF_PREFS,...JSON.parse(raw)};
  }catch(e){return{...DEFAULT_NOTIF_PREFS};}
}
function saveNotifPrefs(p){
  try{localStorage.setItem(NOTIF_PREFS_KEY,JSON.stringify(p));}catch(e){}
}

let notifPrefs=loadNotifPrefs();

async function requestNotificationPermission(){
  if(!('Notification' in window)){
    alert('Notifications are not supported in this browser.');
    return false;
  }
  let perm=Notification.permission;
  if(perm==='default'){
    try{perm=await Notification.requestPermission();}catch(e){perm='denied';}
  }
  if(perm==='granted'){
    notifPrefs.enabled=true;saveNotifPrefs(notifPrefs);
    registerServiceWorker();
    startNotificationEngine();
    return true;
  } else {
    notifPrefs.enabled=false;saveNotifPrefs(notifPrefs);
    return false;
  }
}

// Register an inline service worker via Blob URL so installed PWAs
// can show notifications when the page is in background (iOS 16.4+
// home-screen PWAs support notifications via registered SW).
let _swReg=null;
async function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  if(_swReg)return _swReg;
  try{
    // Prefer a same-origin /sw.js if one exists (hostable); else inline via blob.
    const swSource=`
      self.addEventListener('install',e=>self.skipWaiting());
      self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
      self.addEventListener('message',async(e)=>{
        const d=e.data||{};
        if(d.type==='notify'){
          try{ await self.registration.showNotification(d.title||'',{body:d.body||'',tag:d.tag||'',icon:d.icon,badge:d.badge,silent:!!d.silent}); }catch(err){}
        }
      });
      self.addEventListener('notificationclick',e=>{
        e.notification.close();
        e.waitUntil((async()=>{
          const all=await self.clients.matchAll({type:'window'});
          for(const c of all){if('focus' in c)return c.focus();}
          if(self.clients.openWindow)return self.clients.openWindow('/');
        })());
      });
    `;
    const blob=new Blob([swSource],{type:'text/javascript'});
    const url=URL.createObjectURL(blob);
    _swReg=await navigator.serviceWorker.register(url);
    return _swReg;
  }catch(e){return null;}
}

// Fire a notification. If the page is visible, use an in-page Notification;
// else send via the registered service worker so it persists/tray-shows.
async function fireNotification(title,body,tag,opts){
  if(!notifPrefs.enabled)return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  opts=opts||{};
  // Dedupe: don't fire the same tag twice in one engine tick
  if(tag&&notifPrefs.lastFiredIds[tag]===opts.fireKey)return;
  if(tag&&opts.fireKey){notifPrefs.lastFiredIds[tag]=opts.fireKey;saveNotifPrefs(notifPrefs);}
  try{
    if(_swReg&&_swReg.active){
      _swReg.active.postMessage({type:'notify',title,body,tag,silent:opts.silent});
    } else {
      new Notification(title,{body,tag,silent:opts.silent});
    }
  }catch(e){}
}

// The engine runs every 60s while the app is open. It computes the
// current state and compares against fireKeys stored in prefs, so
// each event fires at most once per occurrence.
let _notifTimer=null;
function startNotificationEngine(){
  stopNotificationEngine();
  checkNotifications(); // immediate check
  _notifTimer=setInterval(checkNotifications,60000);
}
function stopNotificationEngine(){
  if(_notifTimer){clearInterval(_notifTimer);_notifTimer=null;}
}

function checkNotifications(){
  if(!notifPrefs.enabled)return;
  try{
    const now=new Date();
    const jd=julianDate(now.getUTCFullYear(),now.getUTCMonth()+1,now.getUTCDate(),now.getUTCHours()+now.getUTCMinutes()/60);
    const cur=computeAll(jd);

    // Morning briefing
    if(notifPrefs.morningBrief){
      const[hh,mm]=(notifPrefs.morningTime||'07:30').split(':').map(Number);
      const todayKey=now.toISOString().slice(0,10);
      if(now.getHours()===hh&&now.getMinutes()>=mm&&now.getMinutes()<mm+2){
        const tag='morning-brief';
        if(notifPrefs.lastFiredIds[tag]!==todayKey){
          const phase=moonPhaseInfo(moonPhase(jdToT(jd))).name;
          const mSign=signOf(cur.Moon).name;
          const pHours=computePlanetaryHours(jd,BIRTH.lat,BIRTH.lon);
          const dayRuler=pHours?pHours.dayRuler:'';
          fireNotification(
            'Today\'s sky',
            `Day of ${dayRuler}. Moon in ${mSign}, ${phase}.`,
            tag,
            {fireKey:todayKey}
          );
        }
      }
    }

    // Moon ingress: sign change since last check
    if(notifPrefs.moonIngress){
      const curMoonSign=signOf(cur.Moon).name;
      const tag='moon-ingress';
      const fireKey=now.toISOString().slice(0,10)+'-'+curMoonSign;
      const prev=notifPrefs.lastFiredIds['_moonSign'];
      if(prev&&prev!==curMoonSign){
        fireNotification('Moon ingress',`The Moon has entered ${curMoonSign}.`,tag,{fireKey});
      }
      notifPrefs.lastFiredIds['_moonSign']=curMoonSign;
      saveNotifPrefs(notifPrefs);
    }

    // VOC start/end: transition since last check
    if(notifPrefs.vocAlerts){
      const voc=isVoidOfCourse(cur.Moon,jd);
      const prev=notifPrefs.lastFiredIds['_voc'];
      const curIs=voc&&voc.active?'on':'off';
      if(prev&&prev!==curIs){
        if(curIs==='on'){
          fireNotification('Moon goes void','The Moon has made her last aspect. Hold off on new undertakings until she enters '+(voc.nextSign||'the next sign')+'.','voc-on',{fireKey:now.getTime()});
        } else {
          fireNotification('Moon out of void','The Moon has entered '+signOf(cur.Moon).name+'. New undertakings are available again.','voc-off',{fireKey:now.getTime()});
        }
      }
      notifPrefs.lastFiredIds['_voc']=curIs;
      saveNotifPrefs(notifPrefs);
    }

    // Planetary hour change
    if(notifPrefs.planetaryHour){
      const pHours=computePlanetaryHours(jd,BIRTH.lat,BIRTH.lon);
      if(pHours){
        const utNow=now.getUTCHours()+now.getUTCMinutes()/60;
        const idx=currentHourIndex(pHours.hours,utNow);
        const hr=pHours.hours[idx];
        const fireKey=now.toISOString().slice(0,13)+'-'+hr.ruler;
        const tag='phour';
        if(notifPrefs.lastFiredIds[tag]!==fireKey){
          fireNotification('Planetary hour of '+hr.ruler,(PLANETARY_LITURGY[hr.ruler]||{}).intent||'',tag,{fireKey});
        }
      }
    }
  }catch(e){/* non-fatal */}
}

// Launch engine on page load if previously enabled
function bootNotifications(){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'&&notifPrefs.enabled){
    registerServiceWorker();
    startNotificationEngine();
  }
}

// Precession-adjusted longitude (small correction for years away from 2026)
function fixedStarLon(star,jd){
  const yr=(jd-2461041)/365.2425; // years since 2026.0
  return((star.lon2026+0.01397*yr)%360+360)%360;
}

// Given a longitude, find fixed stars conjunct within orb (in deg).
function findFixedStarConjunctions(lon,jd,orb){
  const hits=[];
  for(const s of FIXED_STARS){
    const sLon=fixedStarLon(s,jd);
    let d=Math.abs(sLon-lon);if(d>180)d=360-d;
    if(d<=orb)hits.push({star:s,orb:d,sLon});
  }
  return hits.sort((a,b)=>a.orb-b.orb);
}

// Scan natal planets + angles for fixed-star contacts. Orb: ~1° by default.
function scanNatalFixedStars(orb){
  const pts=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Ascendant','MC'];
  const nJd=NJD;
  const out=[];
  for(const p of pts){
    if(NATAL[p]===undefined)continue;
    const hits=findFixedStarConjunctions(NATAL[p],nJd,orb||1.0);
    for(const h of hits)out.push({point:p,...h});
  }
  return out;
}

// Scan current transit positions for fixed-star contacts. Tighter orb (0.5°).
function scanTransitFixedStars(cur,jd,orb){
  const pts=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  const out=[];
  for(const p of pts){
    if(cur[p]===undefined)continue;
    const hits=findFixedStarConjunctions(cur[p],jd,orb||0.5);
    for(const h of hits)out.push({point:p,...h});
  }
  return out;
}

function groupReferences(){

}

function interpretLunarReturn(R){
  const lrMoonHouse=houseOf(R.Moon);
  const lrAscSign=signOf(R.Ascendant).name;
  const lrSunHouse=houseOf(R.Sun);
  return{lrMoonHouse,lrAscSign,lrSunHouse,
    moonTheme:SOLAR_RETURN_HOUSE_THEMES[lrMoonHouse]||'',
    note:`This month wears a ${lrAscSign} face; the lunar body works through your natal ${lrMoonHouse}${lrMoonHouse===1?'st':lrMoonHouse===2?'nd':lrMoonHouse===3?'rd':'th'} house.`};
}


function fmtZRDate(d){
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${mo} ${d.getFullYear()}`;
}

function fmtJournalDate(ts){
  const d=new Date(ts);const now=new Date();
  const dayMs=86400000;
  const diff=Math.floor((now-d)/dayMs);
  if(diff===0){
    const hr=d.getHours();const mn=d.getMinutes();
    const ampm=hr>=12?'PM':'AM';const h12=hr===0?12:hr>12?hr-12:hr;
    return'Today '+h12+':'+String(mn).padStart(2,'0')+ampm;
  }
  if(diff===1)return'Yesterday';
  if(diff<7)return diff+' days ago';
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${mo} ${d.getDate()}`+(d.getFullYear()!==now.getFullYear()?' '+d.getFullYear():'');
}

// ── Special deep interpretations for high-impact transits ──
const DEEP={
Pluto_conjunction_Sun:'Pluto is merging with your Sun — your fundamental identity is being dismantled and rebuilt from the ground up. This is one of the most powerful transits possible, happening only once or twice in a lifetime. You may feel compelled to confront issues of power, control, and authenticity that you\'ve avoided for years. Old identities, roles, and self-concepts that no longer reflect who you truly are will be stripped away. This can feel like an ego death. Relationships, career paths, and life structures that were built on a false foundation may collapse. What emerges is a more powerful, authentic version of you — but the process is not gentle. Trust the transformation even when it feels like destruction.',
Pluto_conjunction_Moon:'Pluto is sitting on your Moon, dredging up your deepest emotional patterns, childhood wounds, and unconscious needs. This is an emotional pressure cooker. Feelings you\'ve suppressed for years — grief, rage, fear, longing — demand to be felt and processed. Your relationship with women, mother figures, and your own nurturing instincts undergoes radical transformation. You may become obsessive about emotional security or go through periods of intense isolation. The gift: emotional honesty and depth that wasn\'t possible before. You\'re learning to feel everything fully and survive it.',
Pluto_conjunction_Uranus:'A once-in-a-lifetime transit reshaping your relationship with individuality, freedom, and radical change. The structures of your independence are being transformed at the deepest level. Expect sudden, permanent shifts in how you express your uniqueness. Old rebellions become mature liberation. What felt like chaos becomes your authentic path.',
Saturn_conjunction_Sun:'Saturn is sitting on your Sun — your core identity is being tested and restructured. This happens roughly every 29 years and marks a major maturation point. You may feel heavy, burdened with new responsibilities, or confronted by authority figures. Energy can feel low. But this isn\'t punishment — it\'s crystallization. Saturn asks: is your life reflecting who you truly are? Where the answer is no, things fall away. What survives has been proven real. Accept the weight — it\'s building something that lasts for decades.',
Saturn_conjunction_Moon:'Saturn is pressing on your Moon — your emotional life, comfort zone, and sense of inner security are being restructured. This can feel isolating, emotionally cold, or like your needs aren\'t being met. Old emotional patterns and dependencies that no longer serve you are being outgrown. Relationships with family or mother figures may feel strained. But Saturn is teaching you emotional maturity — the ability to nurture yourself, set healthy boundaries, and build genuine inner stability rather than depending on external comfort.',
Saturn_conjunction_Saturn:'Your Saturn Return — one of astrology\'s most significant passages. Everything in your life that isn\'t working, that was built on someone else\'s expectations, or that you\'ve outgrown now demands restructuring. Careers change, relationships end or solidify, and you\'re forced to take full responsibility for your own life. It\'s heavy but necessary. This is the bridge between youth and true adulthood. What you build in the next two years will define the next 29.',
Saturn_conjunction_Mercury:'Saturn is restructuring how you think, communicate, and make decisions. Your mind becomes more disciplined but may also feel heavy or pessimistic. Important contracts, tests, or formal communications demand precision. You\'re learning to think more carefully, speak more deliberately, and commit to ideas that have lasting value. Mental shortcuts and casual promises no longer work.',
Saturn_conjunction_Venus:'Saturn is testing your relationships and values. Love feels serious, commitments deepen or end, and superficial connections fall away. You may feel lonely or question whether you deserve love. Financial discipline is required. But this transit builds lasting bonds — the relationships and values that survive Saturn\'s test are the real ones.',
Saturn_conjunction_Mars:'Saturn is putting the brakes on your drive and ambition. You may feel frustrated, blocked, or physically depleted. Anger simmers without easy release. But this transit teaches you disciplined action — the difference between explosive impulse and sustained effort. Channel the frustration into patient, strategic work. What you build through this restriction will outlast anything achieved through raw force.',
Jupiter_conjunction_Sun:'Jupiter is expanding your sense of self, bringing optimism, confidence, and new opportunities. This is one of the luckiest transits — doors open, people are generous, and you feel like more is possible. Travel, education, and publishing are favored. The risk is overconfidence or taking on too much. Enjoy the expansion but keep one foot on the ground.',
Jupiter_conjunction_Moon:'Jupiter warms your emotional life, bringing comfort, generosity, and a sense of emotional abundance. Home improvements, family celebrations, and feeling nurtured are highlighted. Your intuition is strong and your capacity for empathy expands. A wonderful time for emotional healing and deepening family bonds.',
Jupiter_conjunction_Jupiter:'Your Jupiter Return — a renewal of faith, vision, and life direction that happens every 12 years. Your philosophical outlook refreshes, new teachers or mentors may appear, and you feel a pull toward growth and adventure. It\'s time to dream bigger and recommit to what gives your life meaning.',
Uranus_conjunction_Sun:'Uranus is electrifying your identity — expect sudden, liberating changes to who you are and how you live. This transit can feel like an earthquake in your sense of self. Old identities crack open. You may change careers, relationships, locations, or appearance dramatically and suddenly. The common thread is authenticity: whatever was constraining your true nature gets shattered. Embrace the disruption — you\'re becoming more yourself than ever.',
Uranus_conjunction_Moon:'Uranus is disrupting your emotional patterns and domestic life. Expect sudden mood swings, unexpected changes at home, and a fierce need for emotional freedom. Old comfort zones feel suffocating. You may move suddenly, change family dynamics, or discover emotions you didn\'t know you had. Unsettling but ultimately liberating.',
Neptune_conjunction_Sun:'Neptune is dissolving the boundaries of your identity. You may feel confused about who you are, unusually sensitive, or drawn to spiritual and creative pursuits. Your ego softens — which can be beautiful (compassion, inspiration) or disorienting (confusion, loss of direction). Stay grounded in practical routines while allowing your identity to become more fluid and compassionate.',
Neptune_conjunction_Moon:'Neptune is dissolving your emotional boundaries. Empathy heightens to an almost psychic degree. You absorb others\' feelings, dreams become vivid and meaningful, and you may feel uncharacteristically vulnerable. Beautiful for artistic and spiritual growth, but watch for emotional manipulation, substance issues, or difficulty distinguishing your feelings from others\'.',
Chiron_conjunction_Sun:'Chiron is touching your core identity, reopening fundamental wounds around self-worth and purpose. You may revisit old pain about not being seen, valued, or allowed to be yourself. This hurts — but it\'s healing. By facing these wounds consciously, you transform them into wisdom. You emerge as someone who can help others face their own identity crises.',
Chiron_conjunction_Moon:'Chiron is pressing on your deepest emotional wounds — particularly around nurturing, belonging, and mother. Old feelings of abandonment, emotional neglect, or not being allowed to have needs may surface with surprising intensity. This is deep healing work. Allow the feelings without judgment.',
Chiron_conjunction_Chiron:'Your Chiron Return (around age 50) — a profound encounter with your core wound and the wisdom it has given you. You\'re being asked to fully accept the wound you\'ve carried your whole life and recognize how it became your greatest gift. This is when the wounded healer archetype fully activates.',
NorthNode_conjunction_Sun:'The North Node is activating your Sun — a fated period for your identity and life purpose. Encounters feel destined. You may meet people or encounter situations that accelerate your growth in exactly the direction your soul needs to go. Say yes to what calls you, even if it\'s unfamiliar.',
Saturn_square_Sun:'Saturn is creating friction with your identity and life direction. You feel tested, restricted, and forced to prove yourself. Authority figures challenge you. Responsibilities mount. But this pressure is refining you — it reveals where your life structure is weak and demands you strengthen it through effort, not luck.',
Saturn_opposition_Sun:'Saturn opposes your Sun, creating tension between your desires and external demands. You may feel like the world is pushing back against who you are. Relationships with authority, partners, or institutions feel strained. The lesson: mature self-expression means balancing your needs with your responsibilities to others.',
Pluto_square_Sun:'Pluto is creating intense friction with your core identity. Power struggles, control issues, and confrontations with dark truths about yourself and others dominate. Something about how you\'ve been living is fundamentally unsustainable and Pluto is forcing a crisis to catalyze change. Resist the urge to manipulate or control — surrender to the transformation.',
Pluto_opposition_Sun:'Pluto opposes your Sun, projecting its transformative intensity through other people and external events. Someone or something is forcing you to confront your shadow — issues of power, control, jealousy, or manipulation that you\'d rather not see. The transformation happens when you own these qualities in yourself rather than fighting them in others.',
Uranus_square_Sun:'Uranus is shaking the foundations of your identity through unexpected challenges and disruptions. You feel restless, rebellious, and desperate for change — but the path isn\'t clear. Impulsive decisions tempt you. The key is conscious revolution: make the changes you need, but with some awareness of consequences.',
Jupiter_trine_Sun:'Beautiful flow between expansion and your core self. Confidence comes naturally, opportunities align with who you are, and generosity flows both ways. Travel, education, and creative expression are especially favored. This is harvest energy — enjoy what you\'ve built.',
Saturn_trine_Sun:'Saturn supports your identity with steady, reliable energy. Your discipline pays off. Authority figures recognize your competence. This is a time of quiet achievement — nothing flashy, but the results are solid and lasting. Good for long-term commitments.',

Saturn_conjunction_Ascendant:'Saturn is crossing your Ascendant, beginning a new 29-year cycle of personal development. You feel the weight of new responsibilities settling onto your shoulders. Your appearance may seem more serious or aged. Others perceive you as more authoritative but also more distant. This is a major maturation point — you are being asked to take full ownership of how you show up in the world. Health and physical vitality need attention. The structures you build around your identity now will define you for years.',

Chiron_conjunction_Ascendant:'Chiron crossing your Ascendant reopens wounds around your identity, body, and how you present yourself to the world. Old insecurities about appearance, acceptability, or your right to take up space surface with surprising force. You may feel exposed or raw in social situations. But this vulnerability is the doorway to deep healing — by facing these wounds publicly, you become someone who gives others permission to be imperfect too.',

Saturn_opposition_Ascendant:'Saturn opposing your Ascendant focuses its weight on your closest relationships. Partners, collaborators, and one-on-one connections demand maturity, commitment, or dissolution. You cannot hide behind charm — others see you clearly and expect substance. Relationships that survive this are built to last.',
Pluto_opposition_Ascendant:'Pluto opposing your Ascendant projects its transformative intensity through your closest relationships. A partner, collaborator, or adversary becomes the catalyst for deep personal change. Power struggles in relationships force you to confront your own need for control. The transformation happens through the mirror of others.',

Uranus_opposition_Moon:'Uranus opposing your Moon creates sudden disruptions in domestic life, family relationships, and emotional security. Unexpected events force you out of emotional ruts. A move, a family upheaval, or a sudden shift in your closest relationships breaks patterns you didn\'t realize were constraining you. Unsettling but ultimately freeing.',

// ── Educational glossary ──
const GLOSSARY={
'Orb':'The orb is how far from exact an aspect is, measured in degrees. A 0° orb means the aspect is perfectly exact and at peak intensity. A wider orb (like 5-8°) means the aspect is present but weaker. Think of it like standing near a campfire — the closer you are (smaller orb), the more heat you feel.',
'Applying':'An applying aspect means the transit planet is moving TOWARD exact alignment with your natal point. The energy is building, becoming stronger each day. Think of it like a wave approaching the shore — the impact hasn\'t peaked yet.',
'Separating':'A separating aspect means the transit planet has already passed the exact point and is moving away. The energy is fading. The peak experience has passed, and you\'re now integrating what happened.',
'Exact':'An exact aspect means the transit planet is at the precise degree of alignment with your natal point (0° orb). This is the peak moment of the transit — its influence is at maximum intensity.',
'Stationary':'A stationary planet appears to stand still in the sky as it shifts between direct and retrograde motion. A stationary planet\'s energy is concentrated and intensified, like a magnifying glass focusing sunlight.',
'Retrograde':'When a planet appears to move backward through the zodiac (an optical illusion caused by orbital mechanics). Retrograde periods are times of review, revision, and internalization of that planet\'s themes.',
'Void of Course':'The Moon is void of course when it makes no more major aspects before changing signs. Traditional astrology says: don\'t start important new things during VOC. Existing projects are fine; new initiatives may fizzle. Good for routine tasks, rest, and meditation.',
'Transit':'A transit is when a currently-moving planet forms an aspect (geometric angle) to a point in your birth chart. It\'s how the current sky activates your personal astrology.',
'House':'Houses are 12 divisions of your birth chart, each governing a different area of life (identity, money, communication, home, etc.). When a transit happens in a particular house, that life area gets activated.',
'Conjunction':'Two planets at the same degree (0°). The most intense aspect — their energies merge completely. Can be harmonious or challenging depending on the planets.',
'Opposition':'Two planets 180° apart. Creates tension, awareness, and often plays out through relationships and external events. The lesson is finding balance between two opposing needs.',
'Square':'Two planets 90° apart. Creates friction, pressure, and the motivation to act. Challenging but productive — squares are where the most growth happens.',
'Trine':'Two planets 120° apart. Natural harmony and flow. Talents and opportunities come easily. The risk is passivity.',
'Sextile':'Two planets 60° apart. Gentle opportunities that reward initiative. Less dramatic than a trine but more motivating.',
'Dignity':'A planet\'s dignity describes how well it functions in a particular zodiac sign. A planet in its own sign (domicile) is at full power. In the opposite sign (detriment), it struggles.',
'Energy Score':'A composite rating (1-10) reflecting the overall tone of today\'s transits. Higher scores indicate more harmonious, flowing energy. Lower scores indicate more challenging, growth-oriented energy. Neither is inherently good or bad — easy days offer comfort while challenging days drive the most transformation.',
'VOC_REC':'The Moon makes no more aspects before leaving the sign. Don\'t start anything new — new projects, important emails, big purchases, or first dates begun during Void of Course tend to fizzle. Good window for: finishing what\'s in progress, organizing, routine maintenance, rest, meditation, and sleeping on decisions.',
'STATION_REC':'A planet appearing to stop in the sky concentrates its power to an extreme point. Whatever this planet signifies is amplified far beyond its normal volume today. Move carefully in its domain — the energy is intense and focused.',
'RETRO_REC_Mercury':'Mercury retrograde: communication tangles, technology glitches, and old contacts resurfacing. Review contracts before signing. Back up your data. Reconnect with people from your past. Don\'t launch — refine.',
'RETRO_REC_Venus':'Venus retrograde: relationships from the past return for reconsideration. Your sense of what you value and who you love is being revised. Not the time for major purchases, cosmetic changes, or new romantic commitments.',

// ── Combine layers into full interpretation ──
function getDeepInterp(tp,np,aspectName,house){
  const key=tp+'_'+aspectName+'_'+np;
  const deep=DEEP[key];
  const tv=TRANSIT_VOICE[tp]||{};
  const nv=NATAL_VOICE[np]||{};
  const av=ASPECT_VOICE[aspectName]||{};
  const hv=HOUSE_VOICE[house]||{};

  let summary='',full='',advice='',houseContext='';

  if(deep){
    summary=deep.split('. ').slice(0,2).join('. ')+'.';
    full=deep;
  }else{
    const tDesc=tv.desc||'A subtle cosmic influence is at work.';
    const nDesc=nv.desc||'';
    const aDesc=av.desc||'';
    summary=`${tv.theme||tp} energy is activating ${nv.title||np}. ${av.feel||''} — ${(av.desc||'').split('.')[0]}.`;
    full=tDesc+'\n\n'+aDesc;
    if(nDesc)full+='\n\nIn your chart, this targets '+nDesc.charAt(0).toLowerCase()+nDesc.slice(1);
  }
  advice=av.advice||'';
  if(hv.desc)houseContext='Playing out in your '+hv.name+' sector: '+hv.desc;

  return{summary,full,advice,houseContext,aspectLabel:av.label||aspectName,aspectFeel:av.feel||''};
}

// Synthesize the Shape of the Day paragraph (Layer 1)
function synthesizeShapeOfDay(transits,vibe,mPhase,retros,stats,vocResult,moonSign,prof,pHours,isToday){
  const sentences=[];

  // 1. Profected lord sets the frame
  const top3=transits.slice(0,3);
  const lordIsActive=top3.some(t=>t.tp===prof.yearLord||t.np===prof.yearLord);
  const sph=SPHERE[prof.yearLord]||{};
  if(lordIsActive){
    sentences.push(`Your lord of the year, ${sph.name||prof.yearLord}, is directly active today — ${sph.when_active||'pay close attention'}. What happens now speaks to the year\'s central themes.`);
  }

  // 2. Dominant transit energy
  const hardTop=transits.filter(t=>t.aspect.type==='hard'&&t.importance>15);
  const easyTop=transits.filter(t=>(t.aspect.type==='easy'||t.aspect.name==='conjunction')&&t.importance>15);

  if(hardTop.length>=2){
    const p1=SPHERE[hardTop[0].tp]||{},p2=SPHERE[hardTop[1].tp]||{};
    const h1=HOUSE_VOICE[hardTop[0].house]||{},h2=HOUSE_VOICE[hardTop[1].house]||{};
    sentences.push(`Two spheres press hard today: ${p1.name||hardTop[0].tp}, whose office is to ${p1.office||'act'}, bears on your ${(h1.name||'').toLowerCase()}${h2.name&&h2.name!==h1.name?`, while ${p2.name||hardTop[1].tp} tests your ${(h2.name||'').toLowerCase()}`:''}. The friction is not punishment — it is the quality of this particular time, and it carries information about what needs to change.`);
  } else if(hardTop.length===1){
    const p1=SPHERE[hardTop[0].tp]||{};const h1=HOUSE_VOICE[hardTop[0].house]||{};
    const np1=hardTop[0].np==='Ascendant'?'your self-presentation':hardTop[0].np==='MC'?'your public standing':`your natal ${hardTop[0].np}`;
    sentences.push(`${p1.name||hardTop[0].tp} ${p1.office||'acts'} today, pressing on ${np1} in the area of ${(h1.name||'your life').toLowerCase()}. ${p1.when_stressed||'This asks something of you'}. Work with it rather than against it.`);
  } else if(easyTop.length>=2){
    const p1=SPHERE[easyTop[0].tp]||{};
    sentences.push(`The spheres are cooperative today — ${p1.name||easyTop[0].tp} ${p1.office||'supports you'}, and ${easyTop[1].tp} adds its own harmonious note. This is time with a generous texture. The question is not whether you have support but whether you will use it.`);
  } else if(easyTop.length===1){
    const p1=SPHERE[easyTop[0].tp]||{};const h1=HOUSE_VOICE[easyTop[0].house]||{};
    sentences.push(`${p1.name||easyTop[0].tp} offers support in the area of ${(h1.name||'your life').toLowerCase()} — ${p1.when_active||'take what is offered'}. This is not dramatic energy, but it is real, and it rewards initiative.`);
  } else if(vibe.score>=5){
    sentences.push('The planetary spheres are relatively quiet today — no single intelligence dominates. This is neutral time, good for steady work and your own agenda.');
  } else {
    sentences.push('Today\'s cosmic weather is complex, with multiple subtle pressures rather than one clear signal. Move deliberately and stay attentive to small shifts.');
  }

  // 3. Moon condition
  const moonSph=SPHERE.Moon;
  if(vocResult&&vocResult.voc){
    sentences.push(`The Moon is void of course in ${moonSign.name} — she makes no further aspects before leaving the sign. This is a pause in the day\'s emotional rhythm. Don\'t launch anything new; finish what\'s in motion, organize, rest.`);
  } else {
    const moonQualities={Aries:'urgent and direct',Taurus:'steady and sensual',Gemini:'restless and curious',Cancer:'tender and protective',Leo:'warm and expressive',Virgo:'precise and serviceable',Libra:'harmonious and relational',Scorpio:'deep and penetrating',Sagittarius:'expansive and restless',Capricorn:'sober and determined',Aquarius:'detached and visionary',Pisces:'sensitive and permeable'};
    const mq=moonQualities[moonSign.name]||'shifting';
    sentences.push(`The Moon in ${moonSign.name} makes the emotional ground ${mq}. ${mPhase.name==='Full Moon'?'At full illumination, feelings peak and truths surface.':mPhase.name==='New Moon'?'At the dark of the Moon, energy is low but potential is seeding.':''}`);
  }

  // 4. Retrogrades as undercurrent
  if(retros.length>=3){
    sentences.push(`${retros.length} planets are retrograde — ${retros.slice(0,3).join(', ')} among them. The cosmos is in a reflective season. Forward motion meets internal revision; let both proceed.`);
  } else if(retros.length>0&&retros.some(r=>['Saturn','Jupiter','Pluto'].includes(r))){
    sentences.push(`${retros.join(' and ')} ${retros.length>1?'are':'is'} retrograde, turning ${retros.map(r=>(SPHERE[r]||{}).domain||'its domain').join(' and ')} inward for revision.`);
  }

  // 5. Stations (high-impact)
  if(stats.length>0){
    const stn=stats[0];const sp=SPHERE[stn]||{};
    sentences.push(`${sp.name||stn} is stationary — the moment a planet appears to stop in the sky concentrates its power to an almost unbearable point. Whatever ${sp.name||stn} signifies is amplified today.`);
  }

  return sentences.join(' ');
}

// ── Daily guidance generator (Three-layer structure) ──
function generateDailyGuidance(transits,vibe,mPhase,retros,stats,vocResult,moonSign,cur,phaseAngle,prof,pHours,isToday){
  let h='';

  // Gather active house themes
  const activeHouses={};
  transits.filter(t=>t.importance>10).forEach(t=>{if(t.house)activeHouses[t.house]=(activeHouses[t.house]||0)+t.importance;});

  // ═══ LAYER 1: THE SHAPE OF TODAY ═══
  const synthesis=synthesizeShapeOfDay(transits,vibe,mPhase,retros,stats,vocResult,moonSign,prof,pHours,isToday);
  h+=`<div class="g-theme">The Shape of Today</div>`;
  h+=`<div class="g-overview">${synthesis}</div>`;

  // ═══ LAYER 2: CONTRIBUTING FACTORS ═══
  h+=`<div class="g-section-title" style="cursor:pointer" onclick="toggleLayer2()">Contributing Factors <span id="l2-arrow" style="font-size:10px;opacity:.5">${layersExpanded.l2?'&#9660;':'&#9654;'}</span></div>`;
  h+=`<div id="layer2" style="display:${layersExpanded.l2?'block':'none'}">`;

  // Profected lord context
  const lordFrame=LORD_FRAME[prof.yearLord]||'';
  if(lordFrame){
    h+=`<div class="g-transit" style="border-left-color:var(--gold)">`;
    h+=`<div class="g-transit-head"><span class="g-planets">${pSVG(prof.yearLord,16,'var(--gold)')}</span>`;
    h+=`<span class="g-transit-label">Lord of the Year: ${prof.yearLord} (${prof.yearSign})</span></div>`;
    h+=`<div class="g-transit-body">${lordFrame}</div>`;
    h+=`<div class="g-transit-house">Monthly lord: ${prof.monthLord} (${prof.monthSign})</div></div>`;
  }

  // Moon condition
  if(moonSign){
    h+=`<div class="g-transit" style="border-left-color:var(--violet)">`;
    h+=`<div class="g-transit-head"><div class="g-moon-icon" style="margin-right:4px">${renderMoonSVG(phaseAngle||0,20)}</div>`;
    h+=`<span class="g-transit-label">${mPhase.name} in ${moonSign.name}</span>`;
    if(vocResult&&vocResult.voc)h+=`<span class="g-tag" style="background:var(--violet-soft);color:var(--violet)">VOC</span>`;
    h+=`</div>`;
    const msf=MOON_SIGN_FLAVOR[moonSign.name]||'';
    h+=`<div class="g-transit-body">${msf}</div></div>`;
  }

  // Top transits (contributing, not standalone)
  const top=transits.filter(t=>t.importance>12).slice(0,4);
  if(top.length){
    for(const t of top){
      const av=ASPECT_VOICE[t.aspect.name]||{};const hv=HOUSE_VOICE[t.house]||{};
      const aspCol=t.aspect.type==='hard'?'var(--crimson)':t.aspect.type==='easy'?'var(--azure)':'var(--gold)';
      const motionTag=t.aspect.motion==='exact'?'<span class="g-tag exact">Exact</span>':t.aspect.motion==='applying'?'<span class="g-tag applying">Building</span>':'<span class="g-tag separating">Fading</span>';
      const tpName=t.tp==='NorthNode'?'North Node':t.tp;
      const npName=t.np==='NorthNode'?'North Node':t.np==='Ascendant'?'Ascendant':t.np==='MC'?'Midheaven':t.np;
      h+=`<div class="g-transit" style="border-left-color:${aspCol}">`;
      h+=`<div class="g-transit-head">`;
      h+=`<span class="g-planets">${pSVG(t.tp,16,aspCol)} ${aSVG(t.aspect.name,12,aspCol)} ${pSVG(t.np==='Ascendant'||t.np==='MC'?'Sun':t.np,16,'var(--text)')}</span>`;
      h+=`<span class="g-transit-label">${tpName} ${av.label||t.aspect.name} ${npName}</span>`;
      h+=motionTag;
      h+=`</div>`;
      h+=`<div class="g-transit-body">${av.feel?av.feel+'. ':''}${(SPHERE[t.tp]||{}).when_active||av.advice||''}</div>`;
      if(hv.name)h+=`<div class="g-transit-house">House ${t.house}: ${hv.name}</div>`;
      h+=`</div>`;
    }
  }

  // Focus areas
  const houseEntries=Object.entries(activeHouses).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(houseEntries.length){
    h+=`<div class="g-focus-grid" style="margin-top:8px">`;
    for(const [hNum] of houseEntries){
      const hv=HOUSE_VOICE[parseInt(hNum)]||{};
      h+=`<div class="g-focus-card"><div class="g-focus-num">H${hNum}</div><div class="g-focus-name">${hv.name||'House '+hNum}</div></div>`;
    }
    h+=`</div>`;
  }

  h+=`</div>`; // end layer2

  // ═══ LAYER 3: MECHANICS (collapsed) ═══
  h+=`<div class="g-section-title" style="cursor:pointer" onclick="toggleLayer3()">Mechanics <span id="l3-arrow" style="font-size:10px;opacity:.5">${layersExpanded.l3?'&#9660;':'&#9654;'}</span></div>`;
  h+=`<div id="layer3" style="display:${layersExpanded.l3?'block':'none'}">`;

  // Exact positions and aspects
  if(top.length){
    h+=`<div style="font-size:11px;line-height:1.8;color:var(--text2);font-family:monospace">`;
    for(const t of transits.filter(tt=>tt.importance>8).slice(0,8)){
      const tpName=t.tp==='NorthNode'?'N.Node':t.tp;
      const npName=t.np==='NorthNode'?'N.Node':t.np==='Ascendant'?'ASC':t.np==='MC'?'MC':t.np;
      const dig=getDignity(t.tp,t.tLon);const digStr=dig?` [${dig.label}]`:'';
      h+=`${tpName} ${fmtShort(t.tLon)}${digStr} ${t.aspect.name} ${npName} ${fmtShort(t.nLon)} · ${t.aspect.orbActual.toFixed(1)} orb · ${t.aspect.motion}`;
      if(t.exactDate)h+=` · exact ${fmtExactDate(t.exactDate)}`;
      h+=`<br>`;
    }
    h+=`</div>`;
  }

  // Planetary hour detail
  if(pHours){
    h+=`<div style="font-size:11px;color:var(--text2);margin-top:8px">`;
    h+=`Day of ${pHours.dayRuler} · Sunrise ${fmtHourTime(pHours.sunrise)} · Sunset ${fmtHourTime(pHours.sunset)}`;
    h+=`<br>Sect: Nocturnal chart · Sect light: Moon · Sect benefic: Venus · Sect malefic: Mars`;
    h+=`</div>`;
  }

  // Profection detail
  h+=`<div style="font-size:11px;color:var(--text2);margin-top:4px">`;
  h+=`Profection: Age ${prof.ageYears} → ${prof.yearSign} (${prof.yearLord}) · Month: ${prof.monthSign} (${prof.monthLord})`;
  h+=`<br>ASC ${fmtShort(NATAL.Ascendant)} · MC ${fmtShort(NATAL.MC)}`;
  h+=`</div>`;

  h+=`</div>`; // end layer3

  return h;
}

// ── Vibe calculator (importance-weighted) ──
function vibeCalc(transits){
  if(!transits.length)return{score:5,text:'A quiet day cosmically. Good for rest, reflection, and working at your own pace.',dominant:null,positives:[],negatives:[]};
  let p=0,n=0,totalW=0;
  const planetEnergy={};
  const contribs=[]; // per-transit contribution
  for(const t of transits){
    const w=Math.max(1,t.importance);totalW+=w;
    const v=w/20;
    let sign=0;
    if(t.aspect.type==='easy'){p+=v;sign=+1;}
    else if(t.aspect.type==='hard'){n+=v;sign=-1;}
    else {p+=v*.3;sign=+0.3;}
    planetEnergy[t.tp]=(planetEnergy[t.tp]||0)+w;
    contribs.push({t,sign,weight:w,mag:v*Math.abs(sign||1)});
  }
  const avg=(p-n)/totalW*10;
  let s=Math.round(5+avg*8);s=Math.max(1,Math.min(10,s));
  let dominant=null,maxE=0;
  for(const[pl,e]of Object.entries(planetEnergy)){if(e>maxE){maxE=e;dominant=pl;}}
  // Top positive + negative contributors
  const positives=contribs.filter(c=>c.sign>0).sort((a,b)=>b.mag-a.mag).slice(0,3)
    .map(c=>({label:`${c.t.tp} ${c.t.aspect.symbol||c.t.aspect.name} ${c.t.np}`,weight:c.weight}));
  const negatives=contribs.filter(c=>c.sign<0).sort((a,b)=>b.mag-a.mag).slice(0,3)
    .map(c=>({label:`${c.t.tp} ${c.t.aspect.symbol||c.t.aspect.name} ${c.t.np}`,weight:c.weight}));
  return{score:s,dominant,positives,negatives};
}


// ── Build transit timeline (upcoming exact dates for non-Moon transits) ──
function buildTimeline(transits,jd){
  const events=[];
  const seen=new Set();
  for(const t of transits){
    if(t.tp==='Moon')continue;
    const key=t.tp+'-'+t.np+'-'+t.aspect.name;
    if(seen.has(key))continue;seen.add(key);
    if(t.exactDate){
      const now=jdToDate(jd);
      const diffDays=Math.round((t.exactDate.getTime()-now.getTime())/(86400000));
      if(diffDays>=-3&&diffDays<=90){
        events.push({
          tp:t.tp,np:t.np,aspect:t.aspect,date:t.exactDate,diffDays,
          importance:t.importance,duration:t.duration,
          cls:t.aspect.type==='hard'?'hard':t.aspect.type==='easy'?'easy':t.aspect.name==='conjunction'?'conj':'minor'
        });
      }
    }
  }
  // Also scan for major transits not currently in orb but coming soon
  const outerPlanets=['Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'];
  const natalPoints=['Sun','Moon','Mercury','Venus','Mars','Ascendant','MC'];
  for(const tp of outerPlanets){
    for(const np of natalPoints){
      const key=tp+'-'+np;
      if(Array.from(seen).some(k=>k.startsWith(key)))continue;
      // Check if an aspect forms within next 60 days
      for(const asp of ASPECTS){
        if(asp.type==='minor')continue;
        const nLon=NATAL[np];
        for(let d=1;d<=60;d+=3){
          const testJd=jd+d;const tLon=getLon(tp,testJd);
          let diff=Math.abs(norm(tLon-nLon)-asp.angle);if(diff>180)diff=360-diff;
          if(diff<2){
            const exactD=findExactDate(tp,np,asp.angle,testJd);
            const now=jdToDate(jd);
            const diffDays=Math.round((exactD.getTime()-now.getTime())/86400000);
            if(diffDays>3&&diffDays<=60){
              events.push({tp,np,aspect:{...asp,motion:'approaching'},date:exactD,diffDays,
                importance:transitImportance(tp,np,asp),duration:DUR[tp],cls:asp.type==='hard'?'hard':asp.type==='easy'?'easy':asp.name==='conjunction'?'conj':'minor'
              });
              seen.add(key+'-'+asp.name);
            }
            break;
          }
        }
      }
    }
  }
  events.sort((a,b)=>a.diffDays-b.diffDays);
  return events.slice(0,12);
}
