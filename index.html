.app-loader-orbit .planet{position:absolute;width:7px;height:7px;border-radius:50%;top:-3.5px;left:50%;margin-left:-3.5px}
.app-loader-orbit .ring-1 .planet{background:#ffc870;box-shadow:0 0 10px rgba(255,200,120,.9)}
.app-loader-orbit .ring-2 .planet{background:#b48cff;box-shadow:0 0 10px rgba(180,140,255,.9)}
.app-loader-orbit .ring-3 .planet{background:#78dcb4;box-shadow:0 0 10px rgba(120,220,180,.9)}
.app-loader-title{margin-top:32px;font-size:11px;color:var(--text2);letter-spacing:.3em;text-transform:uppercase;opacity:0;animation:splashTextIn 1.4s ease-out 1.2s both}
.app-loader-name{margin-top:16px;font-size:22px;font-weight:300;color:var(--bright);letter-spacing:.08em;opacity:0;animation:splashNameIn 1.6s ease-out 2s both}
.app-loader-date{margin-top:8px;font-size:12px;color:var(--text2);letter-spacing:.15em;opacity:0;animation:splashTextIn 1.2s ease-out 2.6s both}
.app-loader-enter{margin-top:36px;font-size:10px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;opacity:0;animation:splashEnterPulse 2s ease-in-out 3.4s both}
@keyframes splashTextIn{from{opacity:0;transform:translateY(8px)}to{opacity:.7;transform:translateY(0)}}
@keyframes splashNameIn{from{opacity:0;letter-spacing:.2em}to{opacity:1;letter-spacing:.08em}}
@keyframes splashEnterPulse{0%{opacity:0;transform:translateY(6px)}30%{opacity:.8;transform:translateY(0)}60%{opacity:.4}100%{opacity:.8}}

/* TAB BAR ADJUSTMENTS FOR 6 TABS */
.tab-bar {
  justify-content: space-around;
  gap: 0;
}
.tab-bar button {
  flex: 1 1 0;
  padding: 5px 2px;
  font-size: 8px;
  min-width: 0;
  gap: 2px;
  letter-spacing: 0.3px;
}
.tab-bar button svg{width:16px;height:16px}
.tab-bar button.active::after{width:16px}

/* SYNASTRY SECTION */
.synastry-container {
  padding: 0 16px 20px;
}

.chart-selector {
  margin-bottom: 1.5rem;
}

.chart-selector select {
  width: 100%;
  padding: 0.6rem;
  background-color: var(--card);
  color: var(--text);
  border: 1px solid var(--gold-line);
  border-radius: var(--r-sm);
  font-size: 0.95rem;
}

.add-chart-btn, .edit-chart-btn, .delete-chart-btn {
  padding: 7px 14px;
  background-color: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--r-lg);
  font-weight: 600;
  cursor: pointer;
  font-size: var(--fs-ui);
  letter-spacing: .3px;
  transition: transform .1s ease, opacity .15s;
}

.add-chart-btn:active, .edit-chart-btn:active, .delete-chart-btn:active {
  transform: scale(.96);
  opacity: 0.85;
}

.delete-chart-btn {
  background-color: var(--crimson);
}

/* Synastry section cards with staggered entry */
.syn-section { animation: fadeUp .5s ease-out both; }
.syn-section:nth-child(1) { animation-delay: .05s; }
.syn-section:nth-child(2) { animation-delay: .1s; }
.syn-section:nth-child(3) { animation-delay: .15s; }
.syn-section:nth-child(4) { animation-delay: .2s; }
.syn-section:nth-child(5) { animation-delay: .25s; }
.syn-section:nth-child(6) { animation-delay: .3s; }
.syn-section:nth-child(7) { animation-delay: .35s; }
.syn-section:nth-child(8) { animation-delay: .4s; }
.syn-section:nth-child(9) { animation-delay: .45s; }
.syn-section:nth-child(10) { animation-delay: .5s; }

.chart-form-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(10,15,30,0.95);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.chart-form-modal.hidden {
  display: none;
}

.chart-form-panel {
  background-color: var(--card);
  border: 1px solid var(--gold-line);
  border-top: 2px solid var(--gold);
  padding: 1.5rem;
  max-height: 85vh;
  width: 100%;
  max-width: 420px;
  overflow-y: auto;
  border-radius: var(--r-md);
}

.city-search-wrap { position: relative; }
.city-search-wrap input { padding-right: 3rem; }
.city-search-btn {
  position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
  background: var(--gold); color: var(--bg); border: none; border-radius: var(--r-sm);
  padding: 4px 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
}
.city-results {
  position: absolute; left: 0; right: 0; top: 100%; z-index: 10;
  background: var(--card); border: 1px solid var(--gold-line); border-radius: var(--r-sm);
  max-height: 150px; overflow-y: auto; margin-top: 2px;
}
.city-results div {
  padding: 8px 10px; font-size: 0.85rem; color: var(--text); cursor: pointer;
  border-bottom: 1px solid var(--hairline);
}
.city-results div:hover, .city-results div:active { background: var(--surface); }
.city-resolved { font-size: 0.8rem; color: var(--emerald); margin-top: 4px; }

.chart-form-panel h2 {
  color: var(--gold);
  margin-bottom: 1.5rem;
  font-size: 1.3rem;
}

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;
  color: var(--text2);
  font-size: 0.85rem;
  margin-bottom: 0.4rem;
  font-weight: 600;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 0.6rem;
  background-color: var(--bg);
  color: var(--text);
  border: 1px solid var(--gold-line);
  border-radius: var(--r-sm);
  font-size: 0.95rem;
  box-sizing: border-box;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.form-row.three {
  grid-template-columns: 1fr 1fr 1fr;
}

.form-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 1.5rem;
}

.form-buttons button {
  flex: 1;
  padding: 0.7rem;
  border: none;
  border-radius: var(--r-sm);
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
}

.form-buttons .save-btn {
  background-color: var(--gold);
  color: var(--bg);
}

.form-buttons .cancel-btn {
  background-color: var(--surface);
  color: var(--text);
  border: 1px solid var(--gold-line);
}

/* SYNASTRY BIWHEEL */
.biwheel-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 0 6px;
  animation: scaleIn .6s ease-out both;
}
.biwheel-container {
  display: flex;
  justify-content: center;
  overflow-x: auto;
}
.biwheel-svg {
  max-width: 100%;
  height: auto;
}
.biwheel-legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: var(--fs-label);
  color: var(--text2);
  margin-bottom: 6px;
}
.biwheel-legend-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.biwheel-hint {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* SYNASTRY NARRATIVE (guidance-style gradient card) */
.synastry-narrative {
  background: linear-gradient(135deg, rgba(212,168,67,.08) 0%, rgba(155,109,255,.06) 100%);
  border: 1px solid rgba(212,168,67,.15);
  border-radius: var(--r-lg);
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  line-height: 1.7;
  color: var(--text);
  font-size: var(--fs-body);
}
.synastry-narrative::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, rgba(212,168,67,.08), transparent 70%);
  pointer-events: none;
}

/* SYNASTRY ASPECT GRID */
.aspect-grid {
  display: grid;
  grid-template-columns: 40px repeat(10, 1fr);
  gap: 1px;
  background-color: var(--surface);
  padding: 4px;
  border-radius: var(--r-md);
  overflow-x: auto;
}
.grid-header {
  background-color: var(--surface);
  color: var(--text2);
  font-size: var(--fs-label);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px;
  text-align: center;
  min-height: 30px;
}
.grid-cell {
  background-color: var(--bg);
  border: 1px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 30px;
  cursor: pointer;
  transition: background-color 0.2s, transform .1s;
}
.grid-cell:active {
  background-color: var(--card-hover);
  transform: scale(.92);
}
.grid-cell svg {
  width: 20px;
  height: 20px;
}

/* SYNASTRY ASPECT INTERPRETATION */
.aspect-interpretation {
  background: var(--card);
  border: 1px solid var(--gold-line);
  border-left: 3px solid var(--gold);
  border-radius: var(--r-md);
  padding: 14px;
  color: var(--text);
  animation: fadeIn 0.3s ease-out;
  box-shadow: var(--shadow);
}
.aspect-interpretation .header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.8rem;
  cursor: pointer;
}
.aspect-interpretation .header svg {
  width: 24px;
  height: 24px;
}
.aspect-interpretation .title {
  font-weight: 600;
  color: var(--gold);
  font-size: var(--fs-card);
}
.aspect-interpretation .detail {
  color: var(--text2);
  font-size: var(--fs-body);
  line-height: 1.6;
  margin-top: 0.5rem;
}

/* TRADITIONAL INDICATORS (proper card style) */
.traditional-indicators {
  background: var(--card);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  padding: 16px;
  box-shadow: var(--shadow);
}
.traditional-indicators .trad-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.indicator-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--hairline);
  color: var(--text);
  line-height: 1.5;
}
.indicator-item:last-child {
  border-bottom: none;
}
.indicator-label {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--gold);
  font-weight: 600;
  font-size: var(--fs-body);
  margin-bottom: 4px;
}

/* Synastry sign comparison grid */
.syn-sign-grid {
  display: grid;
  grid-template-columns: auto 1fr 1fr;
  gap: 6px 12px;
  font-size: var(--fs-body);
  align-items: center;
}
.syn-sign-grid .sgrid-label { color: var(--text3); font-size: var(--fs-label); }
.syn-sign-grid .sgrid-a { color: var(--gold); font-size: var(--fs-label); font-weight: 600; }
.syn-sign-grid .sgrid-b { color: var(--azure); font-size: var(--fs-label); font-weight: 600; }
.syn-sign-grid .sgrid-planet { display: flex; align-items: center; gap: 4px; }
.syn-sign-grid .sgrid-val { color: var(--text); }

/* Synastry balance bar */
.syn-balance-bar {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--surface);
}
.syn-balance-fill { transition: width .5s ease-out; }

/* Synastry aspect list item */
.syn-asp-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 0;
  border-top: 1px solid var(--hairline);
  cursor: pointer;
  transition: background .15s;
}
.syn-asp-item:active { background: var(--surface); border-radius: var(--r-sm); }

/* Composite moon mini-card */
.composite-moon {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--hairline);
}

/* ASTROCARTOGRAPHY SECTION */
.astrocarto-container { padding: 0; }

.ac-header { padding: 14px 16px 8px; }
.ac-header .section-title { margin-top: 0; }
.ac-header p { font-size: var(--fs-body); line-height: 1.55; color: var(--text2); margin-top: 6px; }

.planet-toggles {
  display: grid !important; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 6px 12px;
}
.planet-toggles::-webkit-scrollbar { display: none; }
.planet-toggle {
  padding: 5px 2px; background: var(--card); border: 1px solid var(--hairline);
  border-radius: 14px; color: var(--text2); font-size: 9px; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  gap: 2px; white-space: nowrap; text-align: center;
}
.planet-toggle.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }
.planet-toggle svg { width: 12px; height: 12px; flex-shrink: 0; }

.ac-map-wrap {
  margin: 6px 10px; border-radius: var(--r-md); overflow: hidden;
  border: 1px solid var(--gold-line); position: relative;
  box-shadow: 0 2px 12px rgba(0,0,0,.35);
}
.ac-map-wrap svg { display: block; width: 100%; height: auto; }
.ac-map-hint {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  font-size: var(--fs-label); color: var(--text3); background: rgba(5,8,26,.7);
  padding: 2px 8px; border-radius: 10px; pointer-events: none;
}

.ac-legend {
  display: flex; gap: 8px; padding: 8px 12px; font-size: var(--fs-label); color: var(--text3);
  flex-wrap: wrap; justify-content: center;
}
.ac-legend span { display: flex; align-items: center; gap: 3px; }
.ac-leg-line { display: inline-block; width: 18px; height: 0; vertical-align: middle; }

.map-pin { fill: var(--crimson); stroke: var(--gold); stroke-width: 1.5; }

.ac-info-card {
  background: var(--card); border: 1px solid var(--gold-line); border-left: 3px solid var(--gold);
  padding: 14px; margin: 10px 12px; border-radius: var(--r-md);
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ac-info-card .ac-info-head { display: flex; justify-content: space-between; align-items: start; }
.ac-info-card .ac-info-title { font-size: var(--fs-card); font-weight: 600; color: var(--gold); }
.ac-info-card .ac-info-short { font-size: var(--fs-meta); color: var(--text2); margin-top: 3px; }
.ac-info-card .ac-info-detail { font-size: var(--fs-body); line-height: 1.6; color: var(--text); margin-top: 10px; }
.ac-info-card .ac-info-close {
  background: none; border: none; color: var(--text3); font-size: 18px;
  cursor: pointer; padding: 0 0 0 12px; line-height: 1;
}

.ac-planet-cards { padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
.ac-planet-card {
  background: var(--card); border: 1px solid var(--hairline); border-radius: var(--r-sm);
  padding: 10px 12px; cursor: pointer; transition: border-color 0.15s;
}
.ac-planet-card:active { border-color: var(--gold-line); }

.ac-region-row { display:flex;gap:4px;padding:6px 12px;flex-wrap:wrap;justify-content:center; }
.ac-region-btn { padding:4px 8px;background:var(--card);border:1px solid var(--hairline);border-radius:12px;color:var(--text3);font-size:9px;cursor:pointer;transition:all 0.15s; }
.ac-region-btn.active { background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600; }
.ac-intention-row { display:flex;gap:5px;padding:4px 12px 2px;flex-wrap:wrap;justify-content:center; }
.ac-intention-chip { padding:5px 10px;border-radius:14px;font-size:10px;cursor:pointer;border:1px solid var(--hairline);background:var(--card);color:var(--text2);transition:all 0.15s;font-weight:500; }
.ac-intention-chip.active { color:var(--bg);font-weight:700; }
.ac-crossing-marker { fill:#d4a843;stroke:#000;stroke-width:0.3; }
.ac-crossing-card { background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px; }
.ac-crossing-head { display:flex;align-items:center;gap:6px;margin-bottom:4px; }
.ac-crossing-city { font-size:var(--fs-label);color:var(--text3); }
.ac-crossing-interp { font-size:var(--fs-meta);color:var(--text2);line-height:1.5; }
.ac-saved-section { padding:10px 12px; }
.ac-saved-card { background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px;position:relative; }
.ac-saved-name { font-size:var(--fs-body);font-weight:600;color:var(--gold);margin-bottom:4px; }
.ac-saved-coords { font-size:var(--fs-label);color:var(--text3);margin-bottom:6px; }
.ac-saved-lines { font-size:var(--fs-meta);color:var(--text2);line-height:1.5; }
.ac-saved-remove { position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px; }
.ac-save-btn { display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:14px;color:var(--gold);font-size:var(--fs-label);cursor:pointer;margin-top:8px; }

.ac-planet-card .ac-pc-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.ac-planet-card .ac-pc-name { font-size: var(--fs-body); font-weight: 600; color: var(--text); }
.ac-planet-card .ac-pc-angles { font-size: var(--fs-label); color: var(--text3); }
.ac-planet-card .ac-pc-brief { font-size: var(--fs-meta); color: var(--text2); line-height: 1.45; }

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.acarto-info-location {
  color: var(--text2);
  font-size: 0.8rem;
  margin-bottom: 1rem;
}

.acarto-info-detail {
  color: var(--text);
  font-size: 0.85rem;
  line-height: 1.6;
  margin-bottom: 1rem;
}

.acarto-close-btn {
  width: 100%;
  padding: 0.6rem;
  background-color: var(--surface);
  color: var(--text);
  border: 1px solid var(--gold-line);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text2);
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

.empty-state p {
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

/* ══ Phase 1: Time-scale strip ══ */
.ts-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:10px 0 4px;border-radius:var(--r-md);overflow:hidden;background:var(--card);border:1px solid var(--hairline)}
.ts-cell{padding:8px 4px;text-align:center;cursor:pointer;transition:background .2s;position:relative}
.ts-cell:not(:last-child){border-right:1px solid var(--hairline)}
.ts-cell:active,.ts-cell.open{background:var(--gold-soft)}
.ts-cell-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:2px}
.ts-cell-val{font-size:12px;font-weight:600;color:var(--bright);display:flex;align-items:center;justify-content:center;gap:3px}
.ts-cell-sub{font-size:9px;color:var(--text2);opacity:.7;margin-top:1px}
.ts-panel{display:none;padding:12px 14px;font-size:12.5px;line-height:1.65;color:var(--text);background:var(--card);border:1px solid var(--hairline);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);margin:-1px 0 8px}
.ts-panel.open{display:block}

/* ══ Phase 1: Citation pills ══ */
.cite-pill{display:inline;padding:1px 6px;margin:0 1px;border-radius:10px;background:var(--gold-soft);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--gold-line);white-space:nowrap;transition:background .15s}
.cite-pill:active{background:var(--gold-line)}
.cite-flash{animation:citeFlash .6s ease 2}
@keyframes citeFlash{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px var(--gold)}}

/* ══ Phase 1: Layer 1 day shape ══ */
.day-shape{padding:16px 0 12px}
.day-shape-text{font-size:14.5px;line-height:1.75;color:var(--text);letter-spacing:.01em}
.day-shape-meta{font-size:10px;color:var(--text2);opacity:.6;margin-top:6px;display:flex;align-items:center;gap:8px}
.day-shape-regen{cursor:pointer;color:var(--gold);opacity:.7}
.day-shape-regen:active{opacity:1}

/* ══ Phase 1: Layer 2 factors ══ */
.factors-block{margin:0 0 12px;border-radius:var(--r-md);overflow:hidden}
.factor-line{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--hairline);cursor:pointer;transition:background .15s}
.factor-line:last-child{border-bottom:none}
.factor-line:active{background:var(--gold-soft)}
.factor-icon{flex-shrink:0;width:20px;display:flex;align-items:center;justify-content:center;padding-top:1px}
.factor-text{font-size:12.5px;line-height:1.6;color:var(--text);flex:1}
.factor-tag{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap;flex-shrink:0}

/* ══ Phase 1: Layer 3 mechanics ══ */
.mech-toggle{display:flex;align-items:center;justify-content:center;padding:10px;margin:8px 0;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--hairline);border-radius:var(--r-md);background:var(--card);transition:all .2s}
.mech-toggle:active{background:var(--gold-soft);color:var(--gold)}
.mech-section{margin-bottom:2px}
.mech-section summary{padding:10px 12px;font-size:12px;font-weight:600;color:var(--bright);cursor:pointer;background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-md);list-style:none;display:flex;align-items:center;gap:6px}
.mech-section summary::before{content:'';display:inline-block;width:0;height:0;border-left:5px solid var(--text2);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .2s}
.mech-section[open] summary::before{transform:rotate(90deg)}
.mech-section .mech-body{padding:8px 12px 12px}

/* ══ Layer 3: Mechanic groups ══ */
.mech-group{margin:6px 0;border:1px solid var(--hairline);border-radius:var(--r-md);overflow:hidden}
.mech-group-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);cursor:pointer;user-select:none}
.mech-group-head:active{background:var(--gold-soft)}
.mech-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);flex:1}
.mech-group-chev{color:var(--text2);font-size:10px;transition:transform .2s}
.mech-group.open .mech-group-chev{transform:rotate(90deg)}
.mech-group-body{display:none;padding:4px 0;border-top:1px solid var(--hairline)}
.mech-group.open .mech-group-body{display:block}

/* ══ Guide tab ══ */
.guide-section{margin-bottom:20px}
.guide-h2{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--hairline)}
.guide-h3{font-size:12px;font-weight:600;color:var(--bright);margin:10px 0 4px}
.guide-p{font-size:12.5px;line-height:1.7;color:var(--text);margin-bottom:8px}
.guide-setting{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--hairline)}
.guide-setting-label{font-size:12px;color:var(--text)}
.guide-setting-desc{font-size:10px;color:var(--text2);margin-top:2px}

/* ══ Phase 3: Ledger view ══ */
.ledger-synth-open{max-height:300px!important}

/* ══ Floating Chat ══ */
.chat-fab{position:fixed;bottom:72px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--gold);color:#1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s,box-shadow .2s}
.chat-fab:active{transform:scale(.9)}
.chat-fab.open{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.chat-fab svg{transition:transform .3s ease}
.chat-fab.open svg{transform:rotate(90deg)}

.chat-panel{position:fixed;bottom:130px;right:16px;width:min(360px,calc(100vw - 32px));max-height:min(520px,calc(100vh - 180px));background:var(--bg);border:1px solid var(--hairline);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:999;display:flex;flex-direction:column;overflow:hidden;animation:chatSlideUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes chatSlideUp{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--hairline);flex-shrink:0}
.chat-header-title{font-size:13px;font-weight:600;color:var(--bright)}
.chat-clear{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--hairline);background:none;color:var(--text3);cursor:pointer}
.chat-clear:active{background:var(--surface)}

.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;min-height:120px;-webkit-overflow-scrolling:touch}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px 16px;text-align:center}
.chat-empty-icon{opacity:.4}
.chat-empty-text{font-size:14px;color:var(--text2);font-weight:500}
.chat-empty-hint{font-size:11px;color:var(--text3);line-height:1.5;font-style:italic}

.chat-msg-user{align-self:flex-end;background:var(--gold);color:#1a1a1a;padding:8px 14px;border-radius:16px 16px 4px 16px;font-size:13px;line-height:1.5;max-width:85%;word-wrap:break-word;animation:chatMsgIn .25s ease}
.chat-msg-assistant{align-self:flex-start;background:var(--surface);color:var(--text);padding:10px 14px;border-radius:16px 16px 16px 4px;font-size:13px;line-height:1.6;max-width:90%;word-wrap:break-word;animation:chatMsgIn .25s ease}
@keyframes chatMsgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.chat-typing{display:flex;gap:4px;padding:10px 16px}
.chat-typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:chatDot 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes chatDot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}

.chat-error{font-size:11px;color:var(--crimson);padding:6px 12px;background:rgba(239,68,68,.08);border-radius:8px;margin-top:4px}

.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--hairline);flex-shrink:0;align-items:center}
.chat-input-field{flex:1;background:var(--surface);border:1px solid var(--hairline);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.chat-input-field:focus{border-color:var(--gold-line)}
.chat-input-field::placeholder{color:var(--text3)}
.chat-send{width:36px;height:36px;border-radius:50%;background:var(--gold);border:none;color:#1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-send:active:not(:disabled){transform:scale(.9)}

</style>
</head>

</div>
<script>
(function(){
  const now=new Date();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('splash-name').textContent='Alexander';
  document.getElementById('splash-date').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate();
})();
var splashDismissed=false;
function dismissSplash(){
  if(splashDismissed)return;splashDismissed=true;
  var loader=document.getElementById('app-loader');
  if(!loader)return;
  loader.classList.add('hide');
  setTimeout(function(){loader.remove();},900);
}
</script>
