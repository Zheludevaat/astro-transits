.app-loader-orbit .planet{position:absolute;width:7px;height:7px;border-radius:50%;top:-3.5px;left:50%;margin-left:-3.5px}
.app-loader-orbit .ring-1 .planet{background:#ffc870;box-shadow:0 0 10px rgba(255,200,120,.9)}
.app-loader-orbit .ring-2 .planet{background:#b48cff;box-shadow:0 0 10px rgba(180,140,255,.9)}
.app-loader-orbit .ring-3 .planet{background:#78dcb4;box-shadow:0 0 10px rgba(120,220,180,.9)}
.app-loader-title{margin-top:32px;font-size:11px;color:var(--text2);letter-spacing:.3em;text-transform:uppercase;opacity:0;animation:splashTextIn 1.4s ease-out 1.2s both}
.app-loader-name{margin-top:16px;font-size:22px;font-weight:300;color:var(--bright);letter-spacing:.08em;opacity:0;animation:splashNameIn 1.6s ease-out 2s both}
.app-loader-date{margin-top:8px;font-size:12px;color:var(--text2);letter-spacing:.15em;opacity:0;animation:splashTextIn 1.2s ease-out 2.6s both}
.app-loader-enter{margin-top:36px;font-size:10px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;opacity:0;animation:splashEnterPulse 2s ease-in-out 3.4s both}
@keyframes splashTextIn{from{opacity:0;transform:translateY(8px)}to{opacity:.7;transform:translateY(0)}}
@keyframes splashNameIn{from{opacity:0;letter-spacing:.2em}to{opacity:1;letter-spacing:.08em}}
@keyframes splashEnterPulse{0%{opacity:0;transform:translateY(6px)}30%{opacity:.8;transform:translateY(0)}60%{opacity:.4}100%{opacity:.8}}

.tab-bar {
  justify-content: flex-start;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  gap: 0;
}
.tab-bar button {
  flex: 0 0 auto;
  padding: 0.5rem 0.6rem;
  font-size: 0.7rem;
  min-width: 56px;

.delete-chart-btn {

.chart-form-panel {
  background-color: var(--card);

  max-height: 90vh;
  overflow-y: auto;

  font-size: 1.3rem;

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;

  margin-bottom: 0.4rem;

}

.form-group input, .form-group select {
  width: 100%;
  padding: 0.6rem;
  background-color: var(--bg);
  color: var(--text);
  border: 1px solid var(--gold-line);
  border-radius: var(--r-sm);
  font-size: 0.95rem;
  box-sizing: border-box;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.form-row.three {
  grid-template-columns: 1fr 1fr 1fr;
}

.form-buttons {
  display: flex;
  gap: 1rem;

}

.form-buttons button {
  flex: 1;

  font-weight: 600;

}

  color: var(--bg);
}

  display: flex;

  background-color: var(--card);

  border-radius: var(--r-sm);
  margin: 1.5rem 0;
  line-height: 1.6;
  color: var(--text);
  font-size: 0.9rem;
}

  display: grid;

  background-color: var(--surface);

  justify-content: center;
  padding: 0.3rem;
  text-align: center;
  min-height: 40px;
}

.grid-cell {
  background-color: var(--bg);
  border: 1px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;

}

.grid-cell:active {
  background-color: var(--card-hover);
}

.grid-cell svg {
  width: 28px;

.aspect-interpretation {
  background-color: var(--card);
  border: 1px solid var(--gold-line);
  border-radius: var(--r-sm);

.aspect-interpretation .header {
  display: flex;
  align-items: center;

  height: 24px;
}

.aspect-interpretation .title {

.aspect-interpretation .detail {

  opacity: 0.5;
}

.empty-state p {
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

function findExactDate(tp,np,aspectAngle,jd){
  const isMoon=tp==='Moon';const range=isMoon?15:90;const step=isMoon?.1:1;const nLon=NATAL[np];
  let bestJd=jd,bestOrb=999;
  for(let d=-range;d<=range;d+=step){const testJd=jd+d;const tLon=getLon(tp,testJd);
    let diff=Math.abs(norm(tLon-nLon)-aspectAngle);if(diff>180)diff=360-diff;
    if(diff<bestOrb){bestOrb=diff;bestJd=testJd;}}
  let lo=bestJd-step,hi=bestJd+step;
  for(let iter=0;iter<30;iter++){const m1=lo+(hi-lo)/3,m2=lo+2*(hi-lo)/3;
    let o1=Math.abs(norm(getLon(tp,m1)-nLon)-aspectAngle);
    let o2=Math.abs(norm(getLon(tp,m2)-nLon)-aspectAngle);
    if(o1>180)o1=360-o1;if(o2>180)o2=360-o2;if(o1<o2)hi=m2;else lo=m1;}
  const eJd=(lo+hi)/2;const eDate=jdToDate(eJd);return eDate;}

function jdToDate(jd){const z=Math.floor(jd+.5);const a=z<2299161?z:z+1+Math.floor((z-1867216.25)/36524.25)-Math.floor(Math.floor((z-1867216.25)/36524.25)/4);
  const b=a+1524;const c=Math.floor((b-122.1)/365.25);const d=Math.floor(365.25*c);const e=Math.floor((b-d)/30.6001);
  const day=b-d-Math.floor(30.6001*e);const month=e<14?e-1:e-13;const year=month>2?c-4716:c-4715;
  return new Date(year,month-1,day);}

// ── Profections ──
function computeProfections(date){
  const birth=new Date(Date.UTC(BIRTH.year,BIRTH.month-1,BIRTH.day));
  const d=typeof date==='number'?jdToDate(date):date; // accept JD or Date
  const ms=d.getTime()-birth.getTime();
  const ageYears=Math.floor(ms/(365.25*24*3600000));
  const ascSignIdx=Math.floor(norm(NATAL.Ascendant)/30); // Pisces=11

  // Annual profection
  const yearIdx=(ascSignIdx+(ageYears%12))%12;
  const yearSign=SIGNS[yearIdx];
  const yearLord=TRAD_RULERS[yearSign];

  // Monthly profection (each calendar month from birthday advances one sign)
  const lastBday=new Date(d.getFullYear(),BIRTH.month-1,BIRTH.day);
  if(d<lastBday)lastBday.setFullYear(lastBday.getFullYear()-1);
  let monthsSince=0;
  const tmp=new Date(lastBday);
  while(true){const nxt=new Date(tmp);nxt.setMonth(nxt.getMonth()+1);if(nxt>d)break;tmp.setMonth(tmp.getMonth()+1);monthsSince++;}
  const monthIdx=(yearIdx+(monthsSince%12))%12;
  const monthSign=SIGNS[monthIdx];
  const monthLord=TRAD_RULERS[monthSign];

  return{ageYears,yearIdx,yearSign,yearLord,monthIdx,monthSign,monthLord};
}

// ── Sunrise / Sunset ──
function computeSunTimes(jd,lat,lon){
  const jd0=Math.floor(jd-0.5)+0.5; // 0h UT of this day
  const T=jdToT(jd0+0.5); // ~noon
  const sunLon_=sunLongitude(T);
  const eps=23.4393-0.0130*T;
  const decl=Math.asin(sin(eps)*sin(sunLon_))*RAD;

  // Hour angle for h0=-0.833 (standard refraction)
  const cosHA=(sin(-0.833)-sin(lat)*sin(decl))/(cos(lat)*cos(decl));
  if(Math.abs(cosHA)>1)return null;
  const HA=Math.acos(cosHA)*RAD; // degrees

  // Right ascension of Sun
  const ra=norm(atan2d(cos(eps)*sin(sunLon_),cos(sunLon_)));

  // GMST at 0h UT
  const T0=jdToT(jd0);
  const GMST0=norm(280.46061837+360.98564736629*(jd0-2451545.0)+0.000387933*T0*T0);

  // Transit hour (UT)
  let transit=((ra-GMST0-lon)%360+360)%360;
  const transitUT=transit/15; // degrees→hours

  const sunriseUT=transitUT-HA/15;
  const sunsetUT=transitUT+HA/15;

  return{sunrise:sunriseUT,sunset:sunsetUT,transit:transitUT};
}

// ── Planetary Hours ──
function computePlanetaryHours(jd,lat,lon){
  const times=computeSunTimes(jd,lat,lon);
  if(!times)return null;
  let{sunrise,sunset}=times;
  // Clamp to 0-24 range
  if(sunrise<0)sunrise+=24;if(sunrise>24)sunrise-=24;
  if(sunset<0)sunset+=24;if(sunset>24)sunset-=24;

  const dayLen=sunset-sunrise;
  const nightLen=24-dayLen;
  const dayHr=dayLen/12;
  const nightHr=nightLen/12;

  // Day of week → day ruler
  const d=jdToDate(jd);
  const dow=d.getDay(); // 0=Sun
  const dayPlanets=['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];
  const dayRuler=dayPlanets[dow];
  const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dow];

  // Chaldean order
  const chaldean=['Saturn','Jupiter','Mars','Sun','Venus','Mercury','Moon'];
  const startIdx=chaldean.indexOf(dayRuler);

  const hours=[];
  for(let i=0;i<24;i++){
    const isDay=i<12;
    const hrLen=isDay?dayHr:nightHr;
    const start=isDay?sunrise+i*dayHr:sunset+(i-12)*nightHr;
    const end=start+hrLen;
    const ruler=chaldean[(startIdx+i)%7];
    hours.push({ruler,start,end,isDay,index:i});
  }

  return{hours,sunrise,sunset,dayRuler,dayName};
}

// Find current planetary hour index
function currentHourIndex(hours,utHours){
  for(let i=0;i<hours.length;i++){
    let s=hours[i].start,e=hours[i].end;
    // Handle wrap around midnight
    if(e>24){if(utHours>=s||utHours<e-24)return i;}
    else if(s<0){if(utHours>=s+24||utHours<e)return i;}
    else{if(utHours>=s&&utHours<e)return i;}
  }
  return 0;
}

function fmtHourTime(h){
  // Convert UT hours to OBSERVER local time (Europe/Zurich, DST-aware)
  const off=tzOffsetHours(new Date());
  let local=h+off;
  if(local<0)local+=24;if(local>=24)local-=24;
  const hr=Math.floor(local);const mn=Math.round((local-hr)*60);
  const ampm=hr>=12?'PM':'AM';const h12=hr===0?12:hr>12?hr-12:hr;
  return h12+':'+String(mn).padStart(2,'0')+ampm;
}

const SIGN_ELEMENTS={Aries:'fire',Leo:'fire',Sagittarius:'fire',
  Taurus:'earth',Virgo:'earth',Capricorn:'earth',
  Gemini:'air',Libra:'air',Aquarius:'air',
  Cancer:'water',Scorpio:'water',Pisces:'water'};

// Score a single time window for the given task
function scoreElectionalWindow(task,hourRuler,moonSignName,moonPhaseAngle,vocActive,retros){
  const t=ELECTIONAL_TASKS[task];if(!t)return null;
  let score=50;
  const reasons=[];const factors=[];

  // Hour match
  if(t.idealHour.includes(hourRuler)){
    const rank=t.idealHour.indexOf(hourRuler);
    const bonus=rank===0?30:rank===1?22:16;
    score+=bonus;
    reasons.push(`${hourRuler} hour — ideal for ${t.label.toLowerCase()}`);
    factors.push({label:`${hourRuler} hour`,type:'good'});
  } else if(t.avoidHour.includes(hourRuler)){
    score-=25;
    reasons.push(`${hourRuler} hour works against this kind of action`);
    factors.push({label:`${hourRuler} hour`,type:'bad'});
  } else {
    score-=5;
    factors.push({label:`${hourRuler} hour`,type:'neutral'});
  }

  // Moon sign element
  const moonEl=SIGN_ELEMENTS[moonSignName];
  if(t.idealMoon.includes(moonEl)){
    score+=12;
    reasons.push(`Moon in ${moonSignName} (${moonEl}) supports the nature of this work`);
    factors.push({label:`Moon ${moonEl}`,type:'good'});
  } else {
    score-=4;
    factors.push({label:`Moon ${moonEl}`,type:'neutral'});
  }

  // Moon phase — waxing (0-180) is generative, waning (180-360) is releasing
  const waxing=moonPhaseAngle<180;
  const startTasks=['start-project','ask-favor','hard-convo','send-email','sign-contract','buy-beautiful','date','physical'];
  const releaseTasks=['rest-retreat','reconcile'];
  if(startTasks.includes(task)){
    if(waxing){score+=5;factors.push({label:'Waxing',type:'good'});}
    else{score-=5;factors.push({label:'Waning',type:'bad'});}
  } else if(releaseTasks.includes(task)){
    if(!waxing){score+=5;factors.push({label:'Waning',type:'good'});}
  }

  // VOC Moon
  if(vocActive){
    if(t.vocOk){factors.push({label:'VOC ok',type:'neutral'});}
    else{score-=20;reasons.push('Moon is void of course — intentions won\'t stick');factors.push({label:'VOC',type:'bad'});}
  }

  // Retrograde concerns
  if(t.retroAvoid){
    for(const rp of t.retroAvoid){
      if(retros.includes(rp)){
        score-=18;
        reasons.push(`${rp} retrograde — classical warning against this task`);
        factors.push({label:`${rp} Rx`,type:'bad'});
      }
    }
  }

  score=Math.max(0,Math.min(100,score));
  return{score,reasons,factors};
}

// Find top windows over the next N days (hour granularity)
function findBestElectionalWindows(task,daysAhead,limit){
  const results=[];
  const now=new Date();
  daysAhead=daysAhead||7;limit=limit||3;

  for(let d=0;d<daysAhead;d++){
    const date=new Date(now.getTime()+d*86400000);
    const jd=julianDate(date.getUTCFullYear(),date.getUTCMonth()+1,date.getUTCDate(),date.getUTCHours()+date.getUTCMinutes()/60);
    const ph=computePlanetaryHours(jd,OBSERVER.lat,OBSERVER.lon);
    if(!ph)continue;
    // Compute day's position snapshot (Moon, retros) at midday UT
    const y=date.getUTCFullYear(),m=date.getUTCMonth()+1,dy=date.getUTCDate();
    const midJd=julianDate(y,m,dy,12);
    const midPos=computeAll(midJd);
    const moonSignName=signOf(midPos.Moon).name;
    const sun=midPos.Sun;const moon=midPos.Moon;
    const phaseAngle=((moon-sun)+360)%360;
    const retros=[];
    for(const p of ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune']){
      const ms=motionStatus(p,midJd);if(ms&&ms.retrograde)retros.push(p);
    }
    const vocResult=isVoidOfCourse(midPos.Moon,midJd);

    for(let hi=0;hi<24;hi++){
      const hr=ph.hours[hi];
      // Convert hour start (UT hours) to an actual Date
      const hrDate=new Date(date);
      hrDate.setUTCHours(0,0,0,0);
      hrDate.setUTCMilliseconds(hr.start*3600*1000);
      // Skip windows already in the past
      if(hrDate.getTime()<now.getTime()-60000)continue;
      // Stop after 7 days from now
      if(hrDate.getTime()>now.getTime()+daysAhead*86400000)continue;

      // VOC for this specific hour (approximation: use day-level VOC)
      const vocActive=!!(vocResult&&vocResult.voc);

      const res=scoreElectionalWindow(task,hr.ruler,moonSignName,phaseAngle,vocActive,retros);
      if(!res)continue;

      // Duration in minutes
      const durMin=Math.round((hr.end-hr.start)*60);

      results.push({
        date:hrDate,
        endDate:new Date(hrDate.getTime()+durMin*60000),
        ruler:hr.ruler,
        isDay:hr.isDay,
        moonSign:moonSignName,
        durMin:durMin,
        score:res.score,
        reasons:res.reasons,
        factors:res.factors
      });
    }
  }

  results.sort((a,b)=>b.score-a.score);
  // Deduplicate adjacent hours of same ruler by keeping highest-scoring per day-ruler pair
  const seen={};const top=[];
  for(const r of results){
    const key=r.date.toDateString()+'|'+r.ruler;
    if(seen[key])continue;
    seen[key]=true;
    top.push(r);
    if(top.length>=limit)break;
  }
  return top;
}

function fmtElectionalWhen(d){
  const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  const tmrw=new Date(now.getTime()+86400000);
  const isTomorrow=d.toDateString()===tmrw.toDateString();
  const hr=d.getHours();const mn=d.getMinutes();
  const ampm=hr>=12?'PM':'AM';const h12=hr===0?12:hr>12?hr-12:hr;
  const t=h12+':'+String(mn).padStart(2,'0')+ampm;
  if(sameDay)return'Today '+t;
  if(isTomorrow)return'Tomorrow '+t;
  const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${dayName} ${mo} ${d.getDate()} ${t}`;
}

const MANSION_ARC=360/28; // 12.857°
function computeMansion(moonLon){
  const idx=Math.floor(norm(moonLon)/MANSION_ARC)%28;
  const start=idx*MANSION_ARC;
  const within=norm(moonLon)-start;
  const m=MANSIONS[idx];
  return{index:idx+1,start,end:start+MANSION_ARC,within,...m};
}

// SEVEN HERMETIC LOTS — sect-aware traditional formulas
// ══════════════════════════════════════════════════════════════
// All lots: if nocturnal (this user's chart is), formula is reversed.
// Result = norm(Asc + A - B) mod 360
function computeLots(cur,asc,isNocturnal){
  const A=asc;const Sun=cur.Sun;const Moon=cur.Moon;const Mer=cur.Mercury;
  const Ven=cur.Venus;const Mar=cur.Mars;const Jup=cur.Jupiter;const Sat=cur.Saturn;

  // Fortune: body — D: Asc+Moon-Sun; N: Asc+Sun-Moon
  const Fortune=norm(isNocturnal?(A+Sun-Moon):(A+Moon-Sun));
  // Spirit: soul/purpose — inverse of Fortune
  const Spirit=norm(isNocturnal?(A+Moon-Sun):(A+Sun-Moon));
  // Eros: desire — D: Asc+Venus-Spirit; N: Asc+Spirit-Venus
  const Eros=norm(isNocturnal?(A+Spirit-Ven):(A+Ven-Spirit));
  // Necessity: constraint — D: Asc+Fortune-Mercury; N: Asc+Mercury-Fortune
  const Necessity=norm(isNocturnal?(A+Mer-Fortune):(A+Fortune-Mer));
  // Courage: daring — D: Asc+Fortune-Mars; N: Asc+Mars-Fortune
  const Courage=norm(isNocturnal?(A+Mar-Fortune):(A+Fortune-Mar));
  // Victory: faith/triumph — D: Asc+Jupiter-Spirit; N: Asc+Spirit-Jupiter
  const Victory=norm(isNocturnal?(A+Spirit-Jup):(A+Jup-Spirit));
  // Nemesis: exposure/retribution — D: Asc+Fortune-Saturn; N: Asc+Saturn-Fortune
  const Nemesis=norm(isNocturnal?(A+Sat-Fortune):(A+Fortune-Sat));

  return{Fortune,Spirit,Eros,Necessity,Courage,Victory,Nemesis};
}

const JOURNAL_KEY='astro_journal_v1';
const MOOD_LABELS={1:'Heavy',2:'Low',3:'Neutral',4:'Light',5:'Open'};

function loadJournal(){
  try{const raw=localStorage.getItem(JOURNAL_KEY);if(!raw)return[];
    const arr=JSON.parse(raw);return Array.isArray(arr)?arr:[];
  }catch(e){return[];}
}
function saveJournal(entries){
  try{localStorage.setItem(JOURNAL_KEY,JSON.stringify(entries));}catch(e){console.error('journal save',e);}
}
function captureJournalContext(cur,jd,transits,vibe,vocResult,moonSign,prof,pHours,phaseAngle,retros,stats){
  // Snapshot the astro configuration at entry time for later pattern matching
  const ctx={
    moonSign:moonSign.name,
    moonMansion:computeMansion(cur.Moon).index,
    phasePct:Math.round(phaseAngle/3.6),
    yearLord:prof.yearLord,
    monthLord:prof.monthLord,
    vibe:vibe.score,
    voc:!!vocResult.voc,
    retros:retros.join(','),
    stations:stats.join(','),
  };
  if(pHours){
    const utNow=new Date().getUTCHours()+new Date().getUTCMinutes()/60;
    const idx=currentHourIndex(pHours.hours,utNow);
    ctx.hourRuler=pHours.hours[idx].ruler;
  }
  // Top 2 transits as compact signature
  const top=transits.slice(0,2).map(t=>`${t.tp}_${t.aspect.name}_${t.np}`);
  ctx.topTransits=top;
  return ctx;
}

function journalAddEntry(mood,note,ctx){
  const entries=loadJournal();
  entries.unshift({
    ts:Date.now(),
    mood,
    note:note||'',
    ctx
  });
  // Keep last 500
  if(entries.length>500)entries.length=500;
  saveJournal(entries);
  return entries;
}

function journalDelete(ts){
  const entries=loadJournal().filter(e=>e.ts!==ts);
  saveJournal(entries);
  return entries;
}

// Find past entries with similar astro configuration
function findEchoEntries(ctx){
  const entries=loadJournal();
  const echoes=[];
  for(const e of entries){
    if(!e.ctx)continue;
    let score=0;
    if(e.ctx.hourRuler===ctx.hourRuler)score+=3;
    if(e.ctx.moonSign===ctx.moonSign)score+=2;
    if(e.ctx.yearLord===ctx.yearLord)score+=2;
    if(e.ctx.monthLord===ctx.monthLord)score+=2;
    if(e.ctx.moonMansion===ctx.moonMansion)score+=3;
    if(e.ctx.voc===ctx.voc)score+=1;
    // Shared transit signatures
    const et=e.ctx.topTransits||[];
    for(const t of(ctx.topTransits||[])){
      if(et.includes(t))score+=4;
    }
    if(score>=5)echoes.push({entry:e,score});
  }
  echoes.sort((a,b)=>b.score-a.score);
  return echoes.slice(0,2);
}

// Each sign's ruler has a "minor period" in years. Period-lengths:
const ZR_YEARS={
  Aries:15,Taurus:8,Gemini:20,Cancer:25,Leo:19,Virgo:20,
  Libra:8,Scorpio:15,Sagittarius:12,Capricorn:27,Aquarius:27,Pisces:12
};
const ZR_COLORS={
  Aries:'#e0425d',Taurus:'#3dd9a0',Gemini:'#f5b843',Cancer:'#9b6dff',
  Leo:'#ffb142',Virgo:'#5cd6a8',Libra:'#f58ca3',Scorpio:'#c13b5a',
  Sagittarius:'#8a5cf0',Capricorn:'#4a6278',Aquarius:'#4a9eff',Pisces:'#7fc6e8'
};
// Returns sign index (0=Aries) for an L-period index given the starting sign
function zrNext(signIdx){return(signIdx+1)%12;}

// Compute Level 1 and Level 2 periods from startLot to limitDate
// birthDate: Date object; startSignIdx: 0-11; yearsTotal: how many years to project
function computeZR(startSignIdx,birthDate,yearsTotal){
  const periods=[];
  let cursor=0; // years elapsed since birth
  let signIdx=startSignIdx;
  while(cursor<yearsTotal){
    const signName=SIGNS[signIdx];
    const len=ZR_YEARS[signName];
    // Loosing of the Bond (LB): at the 8th sign from start, jump over
    // Canonical Valens rule: at end of period, if next period is 8 signs from start, skip.
    // Simpler: annotate LB when transitioning from period whose sign is 7 signs after startSignIdx (i.e. the 8th)
    const p={
      level:1,
      signIdx,
      sign:signName,
      ruler:TRAD_RULERS[signName],
      startYears:cursor,
      endYears:cursor+len,
      startDate:new Date(birthDate.getTime()+cursor*365.2425*86400000),
      endDate:new Date(birthDate.getTime()+(cursor+len)*365.2425*86400000),
      lengthYears:len,
      // A period is "peak" if the sign is angular (1/4/7/10) from the start sign
      peak:((signIdx-startSignIdx+12)%12)%3===0 && ((signIdx-startSignIdx+12)%12)!==0,
      subperiods:[]
    };
    // Sub-periods (L2): each L1 is divided proportionally by the same zodiacal rule
    // Each L2 sign gets its minor-period years, starting from the L1 sign itself
    let subSignIdx=signIdx;
    let subCursor=0;
    while(subCursor<len-0.001){
      const subSignName=SIGNS[subSignIdx];
      const subLenRaw=ZR_YEARS[subSignName];
      // Scale? Classical method: sub-periods use the same minor-period years but bounded by parent L1 length
      // If the sub-period would extend past parent, truncate it and stop
      const subLen=Math.min(subLenRaw,len-subCursor);
      p.subperiods.push({
        level:2,
        signIdx:subSignIdx,
        sign:subSignName,
        ruler:TRAD_RULERS[subSignName],
        startYears:cursor+subCursor,
        endYears:cursor+subCursor+subLen,
        startDate:new Date(birthDate.getTime()+(cursor+subCursor)*365.2425*86400000),
        endDate:new Date(birthDate.getTime()+(cursor+subCursor+subLen)*365.2425*86400000),
        lengthYears:subLen,
        truncated:subLen<subLenRaw,
        peak:((subSignIdx-startSignIdx+12)%12)%3===0 && ((subSignIdx-startSignIdx+12)%12)!==0
      });
      subCursor+=subLen;
      subSignIdx=zrNext(subSignIdx);
    }
    periods.push(p);

    // LB detection: if NEXT sign is the 8th from startSignIdx, jump to 9th
    const nextIdx=zrNext(signIdx);
    if(((nextIdx-startSignIdx+12)%12)===7){
      // Mark LB on this period
      p.lbFollows=true;
      signIdx=(startSignIdx+8)%12; // jump to 9th sign (0-indexed: startSignIdx+8)
    } else {
      signIdx=nextIdx;
    }
    cursor+=len;
  }
  return periods;
}

function findCurrentZRPeriod(periods,nowYears){
  for(const p of periods){
    if(nowYears>=p.startYears&&nowYears<p.endYears){
      const sub=p.subperiods.find(s=>nowYears>=s.startYears&&nowYears<s.endYears);
      return{l1:p,l2:sub};
    }
  }
  return null;
}

// ══════════════════════════════════════════════════════════════
// FIRDARIA — Persian time-lord periods (complements ZR)
// ══════════════════════════════════════════════════════════════
// Nocturnal order (user's chart): Moon→Saturn→Jupiter→Mars→Sun→Venus→Mercury
// Diurnal order: Sun→Venus→Mercury→Moon→Saturn→Jupiter→Mars
// Total: 75 years (diurnal) or 75 years (nocturnal); traditions vary 70-75
const FIRDARIA_YEARS={Sun:10,Venus:8,Mercury:13,Moon:9,Saturn:11,Jupiter:12,Mars:7};
const FIRDARIA_DAY=['Sun','Venus','Mercury','Moon','Saturn','Jupiter','Mars'];
const FIRDARIA_NIGHT=['Moon','Saturn','Jupiter','Mars','Sun','Venus','Mercury'];

// Each major period is divided into 7 equal sub-periods, beginning with the
// major lord and following the same sequence.
function computeFirdaria(birthDate,isNocturnal){
  const seq=isNocturnal?FIRDARIA_NIGHT:FIRDARIA_DAY;
  const majors=[];
  let cursor=0;
  for(let i=0;i<seq.length;i++){
    const lord=seq[i];
    const years=FIRDARIA_YEARS[lord];
    const subLen=years/7;
    const subs=[];
    // Sub-period sequence: starting at the major lord, cycle through seq
    const startIdx=seq.indexOf(lord);
    for(let j=0;j<7;j++){
      const subLord=seq[(startIdx+j)%seq.length];
      subs.push({
        level:2,
        lord:subLord,
        startYears:cursor+j*subLen,
        endYears:cursor+(j+1)*subLen,
        startDate:new Date(birthDate.getTime()+(cursor+j*subLen)*365.2425*86400000),
        endDate:new Date(birthDate.getTime()+(cursor+(j+1)*subLen)*365.2425*86400000),
        lengthYears:subLen
      });
    }
    majors.push({
      level:1,
      lord,
      startYears:cursor,
      endYears:cursor+years,
      startDate:new Date(birthDate.getTime()+cursor*365.2425*86400000),
      endDate:new Date(birthDate.getTime()+(cursor+years)*365.2425*86400000),
      lengthYears:years,
      subperiods:subs
    });
    cursor+=years;
  }
  return majors;
}

function findCurrentFirdaria(majors,ageYears){
  for(const m of majors){
    if(ageYears>=m.startYears&&ageYears<m.endYears){
      const sub=m.subperiods.find(s=>ageYears>=s.startYears&&ageYears<s.endYears);
      return{major:m,sub:sub};
    }
  }
  return null;
}

function computeDecan(lon){
  const s=signOf(lon);
  const signName=s.name;
  const degIntoSign=norm(lon)%30;
  const decanIdx=Math.floor(degIntoSign/10); // 0,1,2
  const rulers=DECAN_RULERS[signName]||['','',''];
  const ruler=rulers[decanIdx];
  const face=TAROT_DECANS[signName+'-'+(decanIdx+1)]||{};
  return{
    signName,
    decanIdx,
    decanNum:decanIdx+1,
    ruler,
    rangeStart:decanIdx*10,
    rangeEnd:(decanIdx+1)*10,
    degIntoDecan:degIntoSign-decanIdx*10,
    // Backward-compat: keep .image/.indication so any old call sites still render.
    image:face.card?(face.card+' — '+face.title):'',
    indication:face.meaning,
    card:face.card,
    title:face.title,
    meaning:face.meaning,
    keyword:face.keyword
  };
}

// SOLAR & LUNAR RETURNS
// ══════════════════════════════════════════════════════════════
// A Solar Return is the chart cast for the moment the transiting Sun
// returns to its exact natal position each year — valid birthday to
// birthday. A Lunar Return repeats every ~27.3 days as the Moon
// returns to natal longitude, governing the upcoming lunar month.

function _angDiff(a,b){let d=((a-b+540)%360)-180;return d;}

function findReturnJD(targetLon,approxJd,body){
  // Bisect/secant: find JD within ±7d of approxJd where body crosses targetLon.
  const fn=body==='Sun'
    ?(jd)=>_angDiff(sunLongitude(jdToT(jd)),targetLon)
    :(jd)=>_angDiff(moonLongitude(jdToT(jd)),targetLon);
  // Search a window; sample to bracket a sign change
  const halfWindow=body==='Sun'?10:2;
  let lo=approxJd-halfWindow,hi=approxJd+halfWindow;
  let fLo=fn(lo),fHi=fn(hi);
  // If same sign, step out
  let steps=0;
  while(fLo*fHi>0 && steps<20){
    lo-=halfWindow;hi+=halfWindow;fLo=fn(lo);fHi=fn(hi);steps++;
  }
  if(fLo*fHi>0)return approxJd; // couldn't bracket
  // Bisection
  for(let i=0;i<60;i++){
    const mid=(lo+hi)/2;const fM=fn(mid);
    if(Math.abs(fM)<1e-5)return mid;
    if(fLo*fM<0){hi=mid;fHi=fM;}else{lo=mid;fLo=fM;}
  }
  return(lo+hi)/2;
}

function findSolarReturnJD(year){
  // Birthday approximation
  const approx=julianDate(year,BIRTH.month,BIRTH.day,BIRTH.hour);
  return findReturnJD(NATAL.Sun,approx,'Sun');
}

function findLunarReturnJD(fromJd,forward){
  // Approximate: natal Moon position, stepping back/forward in ~27.3d increments
  const synodic=27.32166;
  // Start near fromJd, search bracket containing natal moon crossing
  // Use angular progress: moon is at L now; we need crossing of natalMoon.
  const curL=moonLongitude(jdToT(fromJd));
  let offset=_angDiff(NATAL.Moon,curL); // deg ahead (+) or behind (-) the natal
  // Moon moves ~13.2°/day; rough dt:
  let dt=offset/13.176;
  if(forward){if(dt<0)dt+=synodic;}
  else{if(dt>0)dt-=synodic;}
  const approx=fromJd+dt;
  return findReturnJD(NATAL.Moon,approx,'Moon');
}

function computeReturn(rjd){
  const R=computeAll(rjd);
  R.Ascendant=computeAsc(rjd,BIRTH.lat,BIRTH.lon);
  R.MC=computeMC(rjd,BIRTH.lon);
  R.jd=rjd;
  R.date=jdToDate(rjd);
  return R;
}

  const srSunHouse=houseOf(R.Sun);

const CLAUDE_SYSTEM_PROMPT=`You are a traditional astrologer writing a daily reading for an astrologer-in-training. The voice is educated, grounded, and literary — closer to Demetra George or Austin Coppock than to newspaper-column astrology. You work primarily from Hellenistic doctrine (Valens, Ptolemy, Paulus), with Picatrix and Perso-Arabic material where relevant (decans, mansions, firdaria).

Rules of the reading:
- Sect-aware. If the chart is nocturnal, the Moon is the sect light; Venus is the sect benefic; Saturn is the out-of-sect malefic.
- Never give generic sign-based pop astrology. Always ground interpretations in the concrete positions provided.
- Weight transits by importance score; do not treat every transit as equally significant.
- Connect the short-term (transits, Moon sign, planetary hour, VOC) to the long-term (profection year-lord, ZR L1/L2 period, firdaria major/sub). The reading should feel nested — today inside the month inside the year inside the chapter.
- If an important fact is ambiguous, say so rather than inventing. Hedge with "traditionally" or "in the tradition of X" when assigning meaning.
- Never recommend medical, legal, or financial actions. Keep the focus on time and quality of the day.
- Favor English prose paragraphs. Avoid bullet lists. Avoid emoji. Section headings allowed if they earn their space.
- Keep the entire reading under ~650 words unless the context requests more detail.
- Address the native directly ("you") in a warm but not saccharine tone.`;

function buildChartContext(cur,jd,transits,vibe,mPhase,retros,stats,vocResult,moonSign,phaseAngle,prof,pHours,lots,mansion,fortuneCur,firdariaCur,zrCurL1,zrCurL2){
  // Strip down computed state to a structured brief for Claude.
  const now=new Date();
  const dateStr=now.toLocaleString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const fmt=(p,v)=>{const s=signOf(v);return`${p} ${s.name} ${s.degree.toFixed(1)}° (house ${houseOf(v)})`;};
  const planets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  const moonDecan=computeDecan(cur.Moon);
  const sunDecan=computeDecan(cur.Sun);
  const curLit=pHours&&PLANETARY_LITURGY[pHours.dayRuler]?PLANETARY_LITURGY[pHours.dayRuler]:null;

  // Current planetary hour
  let curHour=null;
  if(pHours){
    const utNow=now.getUTCHours()+now.getUTCMinutes()/60;
    const idx=currentHourIndex(pHours.hours,utNow);
    curHour=pHours.hours[idx];
  }

  // Top transits by importance
  const topTransits=[...transits].sort((a,b)=>(b.importance||0)-(a.importance||0)).slice(0,8).map(t=>{
    const ap=t.aspect;
    return`${t.tp} ${ap.name} natal ${t.np==='Ascendant'?'Ascendant':t.np==='MC'?'MC':t.np} (orb ${ap.orb.toFixed(2)}°, ${ap.applying?'applying':'separating'}, importance ${t.importance})`;
  });

  const fsNatal=scanNatalFixedStars(1.0).map(h=>`${h.point} ⊙ ${h.star.name} (${h.orb.toFixed(2)}° — nature ${h.star.nature})`);
  const fsTrans=scanTransitFixedStars(cur,jd,0.5).map(h=>`${h.point} ⊙ ${h.star.name} (${h.orb.toFixed(2)}° — nature ${h.star.nature})`);

  const ctx={
    meta:{
      dateLocal:dateStr,
      birthLocation:`Stony Brook, NY (${BIRTH.lat}°N, ${Math.abs(BIRTH.lon)}°W)`,
      birthDate:`${BIRTH.year}-${String(BIRTH.month).padStart(2,'0')}-${String(BIRTH.day).padStart(2,'0')} ${Math.floor(BIRTH.hour)}:${String(Math.round((BIRTH.hour%1)*60)).padStart(2,'0')} local`,
      sect:SECT.isNocturnal?'nocturnal':'diurnal',
      sectLight:SECT.sectLight,
      sectBenefic:SECT.sectBenefic,
      outOfSectMalefic:SECT.outOfSectMalefic
    },
    natal:{
      ascendant:`${signOf(NATAL.Ascendant).name} ${signOf(NATAL.Ascendant).degree.toFixed(1)}°`,
      mc:`${signOf(NATAL.MC).name} ${signOf(NATAL.MC).degree.toFixed(1)}°`,
      planets:planets.map(p=>fmt(p,NATAL[p])),
      fixedStars:fsNatal
    },
    today:{
      planets:planets.map(p=>fmt(p,cur[p])),
      moonPhase:`${mPhase.name} (${phaseAngle.toFixed(0)}° from Sun)`,
      moonSign:moonSign.name,
      moonDecan:`Decan ${moonDecan.decanNum} of ${moonDecan.signName}, ruled by ${moonDecan.ruler} — Tarot: ${moonDecan.card||''} ${moonDecan.title?'('+moonDecan.title+')':''}`,
      moonMansion:mansion?`Mansion ${mansion.index} ${mansion.name||''} (${mansion.nature})`:null,
      sunDecan:`Decan ${sunDecan.decanNum} of ${sunDecan.signName}, ruled by ${sunDecan.ruler}`,
      voc:vocResult&&vocResult.active?`VOC until Moon enters ${vocResult.nextSign}`:'Moon is not void of course',
      planetaryHour:curHour?`Hour of ${curHour.ruler}`:null,
      dayRuler:pHours?pHours.dayRuler:null,
      dayLiturgyIntent:curLit?curLit.intent:null,
      retrogrades:retros.join(', ')||'none',
      vibeScore:vibe.score,
      transitFixedStars:fsTrans,
      topTransits:topTransits
    },
    periods:{
      profectionYearLord:`${prof.yearLord} (age ${prof.ageYears}, ${prof.yearSign} profected Ascendant)`,
      profectionMonthLord:`${prof.monthLord} (${prof.monthSign})`,
      zrL1:zrCurL1?`${zrCurL1.sign} (${zrCurL1.ruler}), ${fmtZRDate(zrCurL1.startDate)} – ${fmtZRDate(zrCurL1.endDate)}${zrCurL1.peak?', PEAK':''}${zrCurL1.lbFollows?', Loosing of the Bond follows':''}`:null,
      zrL2:zrCurL2?`${zrCurL2.sign} (${zrCurL2.ruler}), ${fmtZRDate(zrCurL2.startDate)} – ${fmtZRDate(zrCurL2.endDate)}${zrCurL2.peak?', PEAK':''}`:null,
      firdariaMajor:firdariaCur?`${firdariaCur.major.lord} major (${fmtZRDate(firdariaCur.major.startDate)} – ${fmtZRDate(firdariaCur.major.endDate)})`:null,
      firdariaSub:firdariaCur?`${firdariaCur.sub.lord} sub (${fmtZRDate(firdariaCur.sub.startDate)} – ${fmtZRDate(firdariaCur.sub.endDate)})`:null
    },
    lots:lots?{
      fortune:`${signOf(lots.Fortune).name} ${signOf(lots.Fortune).degree.toFixed(1)}°`,
      spirit:`${signOf(lots.Spirit).name} ${signOf(lots.Spirit).degree.toFixed(1)}°`,
      eros:`${signOf(lots.Eros).name} ${signOf(lots.Eros).degree.toFixed(1)}°`,
      victory:`${signOf(lots.Victory).name} ${signOf(lots.Victory).degree.toFixed(1)}°`,
      courage:`${signOf(lots.Courage).name} ${signOf(lots.Courage).degree.toFixed(1)}°`,
      necessity:`${signOf(lots.Necessity).name} ${signOf(lots.Necessity).degree.toFixed(1)}°`,
      nemesis:`${signOf(lots.Nemesis).name} ${signOf(lots.Nemesis).degree.toFixed(1)}°`
    }:null
  };
  return ctx;
}

async function callClaude(chartContext,userFocus){
  const key=loadClaudeKey();
  if(!key)throw new Error('No API key set.');
  const userMsg=`Here is today's sky read against the native's nativity.

${userFocus?'The native is asking: '+userFocus+'\n\n':''}Chart context (JSON):
\`\`\`json
${JSON.stringify(chartContext,null,2)}
\`\`\`

Write an integrated reading. Open with the quality of the day, move through the most significant transits, and close by situating today inside the governing ZR period and firdaria. Name the relevant traditional authorities where it strengthens the point.`;

  const body={
    model:CLAUDE_MODEL,
    max_tokens:2048,
    system:CLAUDE_SYSTEM_PROMPT,
    messages:[{role:'user',content:userMsg}]
  };
  const ctrl=new AbortController();
  const timeoutId=setTimeout(()=>ctrl.abort(),60000); // 60s timeout
  let res;
  try{
    res=await fetch(CLAUDE_API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify(body),
      signal:ctrl.signal
    });
  } catch(e){
    clearTimeout(timeoutId);
    if(e.name==='AbortError')throw new Error('Request timed out after 60s. Check connection and retry.');
    throw e;
  }
  clearTimeout(timeoutId);
  if(!res.ok){
    let errText='';
    try{const j=await res.json();errText=j.error&&j.error.message||JSON.stringify(j);}catch(e){errText=await res.text();}
    // Cap error text length + strip HTML tags to prevent 10MB error pages from bloating state
    errText=String(errText).replace(/<[^>]*>/g,'').slice(0,400);
    const hint=res.status===429?' (rate limited — wait a minute and retry)':res.status===401?' (check your API key)':res.status>=500?' (Anthropic server error — try again shortly)':'';
    throw new Error('API error '+res.status+hint+': '+errText);
  }
  const data=await res.json();
  const text=(data.content||[]).map(c=>c.type==='text'?c.text:'').join('\n').trim();
  return{text,usage:data.usage||null,ts:Date.now()};
}

// NOTIFICATIONS (foreground + optional service-worker)
// ══════════════════════════════════════════════════════════════
// Foreground notifications fire while the app is open in a tab or
// running as an installed PWA. Real background push would require
// a backend with VAPID; this engine covers the common case —
// the app is frequently consulted during the day and fires local
// alerts for planetary hour changes, Moon sign ingresses, VOC
// transitions, and a morning briefing at a user-set time.

const NOTIF_PREFS_KEY='astro_notif_prefs_v1';
const DEFAULT_NOTIF_PREFS={
  enabled:false,
  morningBrief:true,
  morningTime:'07:30',  // local HH:MM
  moonIngress:true,
  vocAlerts:true,
  planetaryHour:false,  // can be noisy — default off
  lastFiredIds:{}
};

function loadNotifPrefs(){
  try{
    const raw=localStorage.getItem(NOTIF_PREFS_KEY);
    if(!raw)return{...DEFAULT_NOTIF_PREFS};
    return{...DEFAULT_NOTIF_PREFS,...JSON.parse(raw)};
  }catch(e){return{...DEFAULT_NOTIF_PREFS};}
}
function saveNotifPrefs(p){
  try{localStorage.setItem(NOTIF_PREFS_KEY,JSON.stringify(p));}catch(e){}
}

let notifPrefs=loadNotifPrefs();

async function requestNotificationPermission(){
  if(!('Notification' in window)){
    alert('Notifications are not supported in this browser.');
    return false;
  }
  let perm=Notification.permission;
  if(perm==='default'){
    try{perm=await Notification.requestPermission();}catch(e){perm='denied';}
  }
  if(perm==='granted'){
    notifPrefs.enabled=true;saveNotifPrefs(notifPrefs);
    registerServiceWorker();
    startNotificationEngine();
    return true;
  } else {
    notifPrefs.enabled=false;saveNotifPrefs(notifPrefs);
    return false;
  }
}

// Register an inline service worker via Blob URL so installed PWAs
// can show notifications when the page is in background (iOS 16.4+
// home-screen PWAs support notifications via registered SW).
let _swReg=null;
async function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  if(_swReg)return _swReg;
  try{
    // Prefer a same-origin /sw.js if one exists (hostable); else inline via blob.
    const swSource=`
      self.addEventListener('install',e=>self.skipWaiting());
      self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
      self.addEventListener('message',async(e)=>{
        const d=e.data||{};
        if(d.type==='notify'){
          try{ await self.registration.showNotification(d.title||'',{body:d.body||'',tag:d.tag||'',icon:d.icon,badge:d.badge,silent:!!d.silent}); }catch(err){}
        }
      });
      self.addEventListener('notificationclick',e=>{
        e.notification.close();
        e.waitUntil((async()=>{
          const all=await self.clients.matchAll({type:'window'});
          for(const c of all){if('focus' in c)return c.focus();}
          if(self.clients.openWindow)return self.clients.openWindow('/');
        })());
      });
    `;
    const blob=new Blob([swSource],{type:'text/javascript'});
    const url=URL.createObjectURL(blob);
    _swReg=await navigator.serviceWorker.register(url);
    return _swReg;
  }catch(e){return null;}
}

// Fire a notification. If the page is visible, use an in-page Notification;
// else send via the registered service worker so it persists/tray-shows.
async function fireNotification(title,body,tag,opts){
  if(!notifPrefs.enabled)return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  opts=opts||{};
  // Dedupe: don't fire the same tag twice in one engine tick
  if(tag&&notifPrefs.lastFiredIds[tag]===opts.fireKey)return;
  if(tag&&opts.fireKey){notifPrefs.lastFiredIds[tag]=opts.fireKey;saveNotifPrefs(notifPrefs);}
  try{
    if(_swReg&&_swReg.active){
      _swReg.active.postMessage({type:'notify',title,body,tag,silent:opts.silent});
    } else {
      new Notification(title,{body,tag,silent:opts.silent});
    }
  }catch(e){}
}

// The engine runs every 60s while the app is open. It computes the
// current state and compares against fireKeys stored in prefs, so
// each event fires at most once per occurrence.
let _notifTimer=null;
function startNotificationEngine(){
  stopNotificationEngine();
  checkNotifications(); // immediate check
  _notifTimer=setInterval(checkNotifications,60000);
}
function stopNotificationEngine(){
  if(_notifTimer){clearInterval(_notifTimer);_notifTimer=null;}
}

function checkNotifications(){
  if(!notifPrefs.enabled)return;
  try{
    const now=new Date();
    const jd=julianDate(now.getUTCFullYear(),now.getUTCMonth()+1,now.getUTCDate(),now.getUTCHours()+now.getUTCMinutes()/60);
    const cur=computeAll(jd);

    // Morning briefing
    if(notifPrefs.morningBrief){
      const[hh,mm]=(notifPrefs.morningTime||'07:30').split(':').map(Number);
      const todayKey=now.toISOString().slice(0,10);
      if(now.getHours()===hh&&now.getMinutes()>=mm&&now.getMinutes()<mm+2){
        const tag='morning-brief';
        if(notifPrefs.lastFiredIds[tag]!==todayKey){
          const phase=moonPhaseInfo(moonPhase(jdToT(jd))).name;
          const mSign=signOf(cur.Moon).name;
          const pHours=computePlanetaryHours(jd,OBSERVER.lat,OBSERVER.lon);
          const dayRuler=pHours?pHours.dayRuler:'';
          fireNotification(
            'Today\'s sky',
            `Day of ${dayRuler}. Moon in ${mSign}, ${phase}.`,
            tag,
            {fireKey:todayKey}
          );
        }
      }
    }

    // Moon ingress: sign change since last check
    if(notifPrefs.moonIngress){
      const curMoonSign=signOf(cur.Moon).name;
      const tag='moon-ingress';
      const fireKey=now.toISOString().slice(0,10)+'-'+curMoonSign;
      const prev=notifPrefs.lastFiredIds['_moonSign'];
      if(prev&&prev!==curMoonSign){
        fireNotification('Moon ingress',`The Moon has entered ${curMoonSign}.`,tag,{fireKey});
      }
      notifPrefs.lastFiredIds['_moonSign']=curMoonSign;
      saveNotifPrefs(notifPrefs);
    }

    // VOC start/end: transition since last check
    if(notifPrefs.vocAlerts){
      const voc=isVoidOfCourse(cur.Moon,jd);
      const prev=notifPrefs.lastFiredIds['_voc'];
      const curIs=voc&&voc.active?'on':'off';
      if(prev&&prev!==curIs){
        if(curIs==='on'){
          fireNotification('Moon goes void','The Moon has made her last aspect. Hold off on new undertakings until she enters '+(voc.nextSign||'the next sign')+'.','voc-on',{fireKey:now.getTime()});
        } else {
          fireNotification('Moon out of void','The Moon has entered '+signOf(cur.Moon).name+'. New undertakings are available again.','voc-off',{fireKey:now.getTime()});
        }
      }
      notifPrefs.lastFiredIds['_voc']=curIs;
      saveNotifPrefs(notifPrefs);
    }

    // Planetary hour change
    if(notifPrefs.planetaryHour){
      const pHours=computePlanetaryHours(jd,OBSERVER.lat,OBSERVER.lon);
      if(pHours){
        const utNow=now.getUTCHours()+now.getUTCMinutes()/60;
        const idx=currentHourIndex(pHours.hours,utNow);
        const hr=pHours.hours[idx];
        const fireKey=now.toISOString().slice(0,13)+'-'+hr.ruler;
        const tag='phour';
        if(notifPrefs.lastFiredIds[tag]!==fireKey){
          fireNotification('Planetary hour of '+hr.ruler,(PLANETARY_LITURGY[hr.ruler]||{}).intent||'',tag,{fireKey});
        }
      }
    }
  }catch(e){/* non-fatal */}
}

// Launch engine on page load if previously enabled
function bootNotifications(){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'&&notifPrefs.enabled){
    registerServiceWorker();
    startNotificationEngine();
  }
}

// Precession-adjusted longitude (small correction for years away from 2026)
function fixedStarLon(star,jd){
  const yr=(jd-2461041)/365.2425; // years since 2026.0
  return((star.lon2026+0.01397*yr)%360+360)%360;
}

// Given a longitude, find fixed stars conjunct within orb (in deg).
function findFixedStarConjunctions(lon,jd,orb){
  const hits=[];
  for(const s of FIXED_STARS){
    const sLon=fixedStarLon(s,jd);
    let d=Math.abs(sLon-lon);if(d>180)d=360-d;
    if(d<=orb)hits.push({star:s,orb:d,sLon});
  }
  return hits.sort((a,b)=>a.orb-b.orb);
}

// Scan natal planets + angles for fixed-star contacts. Orb: ~1° by default.
function scanNatalFixedStars(orb){
  const pts=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Ascendant','MC'];
  const nJd=NJD;
  const out=[];
  for(const p of pts){
    if(NATAL[p]===undefined)continue;
    const hits=findFixedStarConjunctions(NATAL[p],nJd,orb||1.0);
    for(const h of hits)out.push({point:p,...h});
  }
  return out;
}

// Scan current transit positions for fixed-star contacts. Tighter orb (0.5°).
function scanTransitFixedStars(cur,jd,orb){
  const pts=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  const out=[];
  for(const p of pts){
    if(cur[p]===undefined)continue;
    const hits=findFixedStarConjunctions(cur[p],jd,orb||0.5);
    for(const h of hits)out.push({point:p,...h});
  }
  return out;
}

// Per-term practical info — replaces source/lineage with what actually helps when reading a chart.
// {whenItMatters, howToRead, watchFor}
const REF_USEFUL={
  'Zodiacal Releasing':{whenItMatters:'In long-arc career and identity questions. The chapters do not predict events as much as define the question being asked of you for that span.',howToRead:'Locate which sign is currently ruling. The ruler\'s natal condition (sign, house, dignity, aspects) describes the texture of the period. Peak L1 periods correspond to maximum visibility; Loosings mark forced reorientation.',watchFor:'Major peak years and the eight-from-eight Loosing of the Bond — these are the structural turning points, not random transits.'},
  'Firdaria':{whenItMatters:'When you want a steady year-by-year throughline for the whole life. Useful as a backdrop to ZR — Firdaria says who is in charge for the next ~10 years; ZR says what episode is playing.',howToRead:'Read the major-period planet through its natal placement and its relationship to the sect light. Sub-period planet adds the flavour for the current ~1–2 years.',watchFor:'Sub-period transitions every 1–2 years — they tend to land as quiet shifts in mood or focus, not events.'},
  'Solar Return':{whenItMatters:'Once a year around your birthday. Read it as the keynote chart for the next 12 months.',howToRead:'Look at the SR Ascendant (whole-sign), the houses of the SR Sun and Moon, and any tight aspects to natal points. Profected lord placement in the SR is the year\'s headline.',watchFor:'A SR chart cast for your current location, not your birthplace. Where you are at the moment of return matters.'},
  'Lunar Return':{whenItMatters:'Each lunar month, useful for short-arc planning and emotional weather forecasting.',howToRead:'Note the LR Ascendant and Moon house. The placement of the LR Moon\'s ruler shows where the month\'s feeling will be processed.',watchFor:'Don\'t over-weight a single LR — they swing too fast. Use as one signal among several.'},
  'Annual Profection':{whenItMatters:'Every birthday. The simplest, most reliable timing tool — start here before more complex techniques.',howToRead:'Count one sign per year of age from the natal Ascendant. The sign reached gives the topic (its house) and a Year Lord (its planetary ruler). The Year Lord\'s natal condition + current transits = the year\'s plot.',watchFor:'Year Lord transits, especially returns and stations, tend to land hard during the profected year.'},
  'Planetary Hours':{whenItMatters:'When choosing the moment for a deliberate action — sending an important message, opening a conversation, beginning a piece of work.',howToRead:'Match the action to the hour ruler\'s nature: Mercury for communication, Venus for art and reconciliation, Mars for confrontation, Jupiter for big asks, Saturn for grinding focus. The day ruler colours the whole day; the hour ruler the next ~60 minutes.',watchFor:'Hours change at sunrise and sunset, so the first daytime hour is always the day\'s ruler. Don\'t use clock-hours.'},
  'Electional Astrology':{whenItMatters:'Before any deliberate beginning that will have ongoing consequences — a launch, a contract, a journey.',howToRead:'Pick a moment whose hour-ruler matches the work, with the Moon waxing and not void, and the planet most important to the work strong by sign and house. Avoid stations and tight malefic aspects.',watchFor:'Don\'t let perfect be the enemy of good. A clean Moon condition and a sympathetic hour matter more than chasing every detail.'},
  'Sect':{whenItMatters:'In every chart reading. Sect determines who the helpers and challengers are.',howToRead:'Day chart: Sun is sect light, Jupiter is sect benefic, Mars is out-of-sect malefic. Night chart: reverse — Moon, Venus, Saturn. The in-sect benefic helps cleanly; the out-of-sect malefic causes the bigger trouble.',watchFor:'Modern textbooks often skip sect. It is the single most-overlooked piece of usable Hellenistic doctrine.'},
  'Lot of Fortune':{whenItMatters:'Body, money, daily circumstance, the field of luck. Read alongside the 2nd house and the Moon for material questions.',howToRead:'Note its house and any planets aspecting. Transits to Fortune correspond to shifts in income, health, or living circumstance more reliably than to inner life.',watchFor:'Use the correct sect formula. Day: Asc + Moon − Sun. Night: Asc + Sun − Moon.'},
  'Lot of Spirit':{whenItMatters:'Career, vocation, deliberate action, the field of agency. Pair with the 10th house and the sect light for vocation questions.',howToRead:'Spirit is what the soul chooses to do; Fortune is what happens to the body. Spirit\'s house = arena of intentional action; its ruler\'s condition = the agency available.',watchFor:'When Spirit and Fortune are in dialogue (aspecting each other), action and circumstance are unusually well-aligned.'},
  'Seven Hermetic Lots':{whenItMatters:'When you want a richer cartography of psychic functions than just Fortune and Spirit. Each lot is a calculated point representing a specific theme.',howToRead:'Read each lot in its house, then by aspects to its position. Eros = what attracts you; Necessity = what binds you; Courage = where you push past fear; Victory = where success comes; Nemesis = where the trap is.',watchFor:'Don\'t overload a reading with all seven. Pick the two or three most relevant to the question.'},
  'Lunar Mansions':{whenItMatters:'For lunar electional work and for fine-grained Moon transits. The 28 mansions slice the Moon\'s nightly travel, ~12°51\' each.',howToRead:'Note the mansion the Moon currently occupies. Each has traditional indications (favourable for X, unfavourable for Y) drawn from Picatrix and Manāzil traditions.',watchFor:'The Moon spends ~24 hours in each mansion, so the indication shifts daily. Useful for choosing which day in a week to act.'},
  'Picatrix Faces (Decans)':{whenItMatters:'For finer-grained reading of any planet. Each 30° sign breaks into three 10° decans, each ruled by a different planet in Chaldean order.',howToRead:'In this app the decans are presented through their Golden Dawn / Crowley tarot attributions — the minor arcana 2-10 of each suit map to one decan apiece. The card is a vehicle for the planet-in-sign quality of that 10° slice.',watchFor:'The decan ruler often matters more than the sign ruler for understanding why a planet feels off — e.g., Sun in late Pisces (Mars decan) bites in a way Sun in early Pisces (Saturn decan) does not.'},
  'Essential Dignities':{whenItMatters:'Whenever a planet feels weak or strong and you want to know why. Dignity is structural condition — independent of aspects.',howToRead:'Domicile = home; Exaltation = honoured guest; Detriment = stranger in hostile territory; Fall = exiled. Triplicity, term, and face add finer scoring. A planet in dignity does its job; in detriment/fall it struggles regardless of how well-aspected.',watchFor:'A dignified malefic is still a malefic — Saturn in Capricorn is harsh and effective. A debilitated benefic still helps but with less reach.'},
  'Void of Course Moon':{whenItMatters:'Before initiating anything that needs to grow — a meeting, a contract, a new project, a message expecting reply.',howToRead:'If the Moon will perfect no further Ptolemaic aspect before changing sign, she is void. Traditionally: nothing comes of plans launched here. They drift, fizzle, or get reabsorbed.',watchFor:'Routine and continuation are fine on a void Moon. The doctrine targets new beginnings only.'},
  'Peak Period (ZR)':{whenItMatters:'In Zodiacal Releasing, when a sub-period reaches an angle (1, 4, 7, 10) from the start. Peak periods are when the chapter\'s themes go public.',howToRead:'Peak L1s are career-defining stretches. Peak L2s within a non-peak L1 are smaller crests — the kind of months where things show up.',watchFor:'Not every peak is positive. The texture depends on the ruler\'s natal condition. A weak ruler at peak can mean visible failure as easily as visible success.'},
  'Loosing of the Bond':{whenItMatters:'When ZR jumps to the 9th sign because the next sub-period would fall in the 8th. These are forced reorientations.',howToRead:'Expect a structural break — relationship, vocation, location, identity. Loosings rewrite the chapter, they do not just colour it.',watchFor:'Loosings often coincide with what feels like external disruption but is structural. Don\'t fight the rerouting.'},
  'Benefic / Malefic':{whenItMatters:'In every aspect read. Benefic-malefic mixing tells you whether a configuration helps or hurts.',howToRead:'Jupiter and Venus help; Mars and Saturn obstruct. Sect modifies: in-sect malefic is workable, out-of-sect malefic is the real trouble. Mercury and Moon flex by company.',watchFor:'Modern psychological astrology often denies the malefic/benefic distinction. The traditional reading is more useful for predictive work.'},
  'Retrograde':{whenItMatters:'Whenever a planet is moving backward by apparent motion. Mercury retrogrades ~3-4 times a year for ~3 weeks each; Venus and Mars rarely but for longer. Outer planets retrograde annually for months.',howToRead:'The planet\'s significations turn inward: re-do, re-think, re-encounter. Old situations and people resurface for completion or reconsideration. Mercury Rx disrupts logistics and communication; Venus Rx re-examines relationships and values; Mars Rx stalls initiative and redirects aggression inward.',watchFor:'Retrograde does not invalidate action — it invalidates the assumption that action will move forward in a straight line. The station (the days when the planet appears to stop) is often more disruptive than the retrograde itself. Watch the shadow period: the degrees the planet will retrace are sensitised before the retrograde begins.'},
  'Sect Light':{whenItMatters:'In every chart. The sect light is the chart\'s primary luminary and a key indicator of vitality and direction.',howToRead:'Sun for day birth, Moon for night birth. Its sign, house, and condition outweigh the other luminary for life-direction questions.',watchFor:'Modern readings that lead with the Sun in night charts miss the Moon\'s structural priority.'},
  'Hellenistic Astrology':{whenItMatters:'When you want the original system that everything else descends from — sect, lots, time-lord techniques, whole-sign houses.',howToRead:'Read with sect and whole-sign houses. Lots are first-class objects, not curiosities. Time-lord techniques (profections, ZR, firdaria) sit on top of natal indication.',watchFor:'Hellenistic does not mean outdated — it is the densest and most predictive layer of Western astrology.'},
  'Perso-Arabic Astrology':{whenItMatters:'For mundane and annual techniques (firdaria, world revolutions) and for lots beyond Fortune and Spirit.',howToRead:'Treat as a refinement and elaboration of the Hellenistic system rather than a replacement. Most techniques modern astrologers use as "traditional" come through this layer.',watchFor:'The translations are uneven. Some Latinised Arabic terms have lost meaning across two language jumps.'},
  'Picatrix':{whenItMatters:'When working with talismanic magic, planetary hours, mansions, or decans for ritual/electional purposes.',howToRead:'It is a magical handbook, not a natal text. Its decan and mansion images are tools for talisman-making and psychic reorientation, not personality readings.',watchFor:'In this app the decans are presented through tarot, not Picatrix images — the underlying planetary attribution is the same.'},
  'Hermetic Tradition':{whenItMatters:'Mostly as the source of lots, decans, and the philosophical frame around astrology as a sympathetic art.',howToRead:'Hermetic doctrine sees the chart as a single living configuration mirroring a soul. Useful as a reading posture even when the techniques themselves are pre- or post-Hermetic.',watchFor:'The Hermetic Corpus itself is mostly philosophy, not practical astrology. The astrology is in the Liber Hermetis and attributions.'},
  'Medieval Latin Astrology':{whenItMatters:'For horary, electional, and the older predictive frame that William Lilly summarised.',howToRead:'Use whole-sign or quadrant houses depending on the technique. The dignities table is the central diagnostic tool.',watchFor:'Medieval texts are dense with technical detail and easy to misapply. Lilly\'s Christian Astrology is the readable entry point.'},
  'Vettius Valens':{whenItMatters:'When working with Zodiacal Releasing, lots, or worked-example case material.',howToRead:'Valens shows you how he reasons about real charts. The Anthology is a working astrologer\'s notebook, not a textbook.',watchFor:'Translations vary. Schmidt\'s Project Hindsight edition is the most rigorous; Riley\'s online translation is the most accessible.'},
  'Abū Maʿshar (Albumasar)':{whenItMatters:'For firdaria, mundane techniques, and the medieval transmission of Hellenistic doctrine.',howToRead:'His Great Introduction is the canonical source. Firdaria sequence and rulerships of years come from him.',watchFor:'His mundane work focuses on world events. For natal application, use the firdaria and dignities and skip the world-historical apparatus.'},
  'Guido Bonatti':{whenItMatters:'For horary, electional, and a comprehensive single-author medieval reference.',howToRead:'Liber Astronomiae is encyclopaedic — read by topic, not cover to cover.',watchFor:'Translations are partial. Dykes\' English edition is the working standard.'},
  'William Lilly':{whenItMatters:'For horary practice and for the void-of-course Moon doctrine.',howToRead:'Christian Astrology is structured pedagogically — it teaches the technique, not just the lore. Read for the worked horary examples.',watchFor:'Lilly\'s aspect orbs are wider than modern Hellenistic practice. His void doctrine is stricter than modern usage.'},
  'Hermes Trismegistus':{whenItMatters:'As the legendary attribution for lots, decans, and much of the talismanic apparatus.',howToRead:'Read the attribution as cultural signal — texts assigned to Hermes are claiming a particular lineage and authority. The actual authors are usually anonymous Hellenistic astrologers.',watchFor:'Don\'t treat the Hermes attribution as historical fact. The figure is a syncretic conflation of Hermes and Thoth.'},
  'Whole-Sign Houses':{whenItMatters:'In every natal chart reading. The house system determines which topics a planet rules — switching systems can reassign planets to different houses entirely.',howToRead:'Count signs from the Ascendant sign: the Ascendant sign is the 1st house, the next sign the 2nd, and so on. The degree of the Ascendant marks the rising point but does not define where houses begin. Every planet in that sign is in that house, period.',watchFor:'This app uses whole-sign houses throughout. If you are used to Placidus, some planets may appear in different houses than you expect — especially at high latitudes where Placidus houses become distorted.'},
  'Fixed Stars':{whenItMatters:'When a natal or transiting planet is within about 1 degree of a major star. The tighter the conjunction, the more vivid the effect.',howToRead:'Each star has a traditional planetary nature — e.g., Regulus (Jupiter-Mars) confers ambition and leadership; Algol (Saturn-Jupiter) warns of obsessive extremes. A planet conjunct a star takes on the star\'s coloring in addition to its own.',watchFor:'Fixed stars precess about 1 degree every 72 years, so their zodiacal positions shift over centuries. This app accounts for precession. Only conjunctions matter — no aspects to stars.'},
  'Applying and Separating Aspects':{whenItMatters:'In every transit and natal aspect reading. The distinction tells you whether an influence is building or fading.',howToRead:'Applying: the faster planet is closing in on exact aspect — the event or feeling is approaching, gathering force. Separating: the aspect already perfected — the peak has passed and the energy is dissipating. In horary, applying aspects signify events that will happen; separating ones describe what already has.',watchFor:'An aspect that is applying but very wide (say 8 degrees) may never perfect if the faster planet changes sign first. This is called refranation — a promise that falls through.'},
  'Dignity Scoring':{whenItMatters:'When assessing how effectively a planet can deliver its significations. A planet in strong dignity acts with authority; one in debility struggles or distorts.',howToRead:'Domicile (+5) = the planet is at home and acts naturally. Exaltation (+4) = honoured and elevated. Triplicity (+3), Term (+2), Face (+1) = lesser dignities that add comfort. Detriment (-5) and Fall (-4) = the planet is structurally weakened. Total the score for a quick strength snapshot.',watchFor:'Dignity is not the same as beneficence. A dignified Mars is still Mars — it cuts cleanly rather than clumsily, but it still cuts. A debilitated Jupiter still tries to help but overreaches or disappoints.'},
  'Orbs':{whenItMatters:'When deciding whether an aspect is active. A conjunction at 0 degrees 15 minutes is more potent than one at 9 degrees — orbs quantify that difference.',howToRead:'Traditional practice assigns orbs to planets: the Sun radiates influence across ~15 degrees, the Moon ~12 degrees, others ~7-8 degrees. An aspect is "in orb" when the sum of both planets\' moieties covers the angular distance. Modern practice often uses simpler aspect-based orbs (e.g., 8 degrees for a conjunction, 6 for a trine).',watchFor:'This app uses moderate orbs. If you see an aspect listed as "wide," it is at the edge of effectiveness — real but muted. Exact aspects within 1 degree are the ones that define the chart.'},
  'Synastry':{whenItMatters:'When comparing two charts for compatibility — romantic, business, or familial. It maps where two people\'s planetary energies overlap, clash, or amplify.',howToRead:'Look for conjunctions between one person\'s personal planets (Sun, Moon, Venus, Mars, Mercury) and the other\'s. Harmonious aspects (trine, sextile) flow easily; hard aspects (square, opposition) create friction that can be generative or destructive. Check each person\'s 7th house ruler in the other\'s chart for the relationship\'s structural fit.',watchFor:'Synastry shows dynamics, not outcomes. A chart full of trines can be pleasant but stagnant; a chart with squares generates energy. The question is whether the friction is productive.'},
  'Derived Houses':{whenItMatters:'When asking about someone else through your own chart — your partner\'s finances (8th = their 2nd), your child\'s education (7th from 5th = 11th), your employer\'s stability (4th from 10th = 1st).',howToRead:'Turn the chart so the relevant house becomes "their 1st house," then count forward. The technique works best in horary but can add depth to natal readings when asking specific relational questions.',watchFor:'Don\'t overrotate. Derived houses are useful for pointed questions, but reading every house as someone else\'s something quickly becomes noise. Use when you have a specific question about a specific person.'},
};
// Each entry: {category, term, summary, source, lineage}
// Categories: Technique, Object, Concept, Tradition, Figure
const REFERENCES=[
  // TECHNIQUES
  {cat:'Technique',term:'Zodiacal Releasing',summary:'A Hellenistic time-lord technique that unfolds the life as nested chapters of varying lengths, measured from the Lot of Spirit (career and action) or the Lot of Fortune (body and circumstance). Each chapter is ruled by a sign and its lord; peak periods and Loosings of the Bond signal structural turning points.',source:'Vettius Valens, Anthology, Book IV (2nd c. CE)',lineage:'Hellenistic Alexandria → recovered by Schmidt and Hand (Project Hindsight, 1990s) → widely practiced post-2000.'},
  {cat:'Technique',term:'Firdaria',summary:'Persian-Arabic time-lord sequence in which each planet rules a fixed span of years in a set order — 70 years for the night chart, 75 for the day. Each period is subdivided into seven equal sub-periods cycling through the same planets.',source:'Abū Maʿshar, Book of the Revolutions of the Years of the World; later Latinised by Bonatti.',lineage:'Perso-Arabic synthesis (8th–9th c.) → medieval Latin astrology → still used in traditional Western practice today.'},
  {cat:'Technique',term:'Solar Return',summary:'A chart cast for the exact instant each year that the transiting Sun returns to its natal longitude. It is read as a sub-chart describing the character of the upcoming birthday-to-birthday year.',source:'Abū Maʿshar (9th c.); Morin de Villefranche, Astrologia Gallica (17th c.).',lineage:'Perso-Arabic origin → Latin → modern Placidean practice.'},
  {cat:'Technique',term:'Lunar Return',summary:'A chart cast for the instant the Moon returns to its natal longitude, repeating every ~27.3 days. Describes the texture of the coming lunar month.',source:'Morin, Astrologia Gallica (17th c.); developed in modern practice.',lineage:'Latin astrology → 20th c. revival by the Church of Light / Morinus school.'},
  {cat:'Technique',term:'Annual Profection',summary:'A traditional timing technique in which each year of life advances the Ascendant one sign. The sign reached becomes the year\'s Lord of the Time and colours that year\'s themes.',source:'Dorotheus of Sidon, Carmen Astrologicum (1st c. CE); Valens; Abū ʿAlī al-Khayyāt.',lineage:'Hellenistic → Perso-Arabic → Latin → Schmidt/Brennan revival.'},
  {cat:'Technique',term:'Planetary Hours',summary:'A division of day and night into twelve "hours" each, ruled in Chaldean order from the day\'s ruling planet at sunrise. Used in electional and magical contexts.',source:'Picatrix, Book III; Agrippa, Three Books of Occult Philosophy.',lineage:'Hellenistic through Picatrix (11th c. Arabic, Latin 13th c.) → Renaissance magic → modern Hermetic practice.'},
  {cat:'Technique',term:'Electional Astrology',summary:'Selecting an auspicious moment to begin an action by matching the intended work to favourable planetary hour, day, Moon condition, and freedom from afflictions (e.g., Void of Course, retrograde).',source:'Dorotheus, Carmen V; Bonatti, Liber Astronomiae; Lilly, Christian Astrology.',lineage:'Hellenistic → medieval Latin → early modern English traditional astrology.'},
  {cat:'Technique',term:'Sect',summary:'The division of planets by diurnal (day) and nocturnal (night) charts. Sun, Jupiter, Saturn are diurnal; Moon, Venus, Mars are nocturnal; Mercury takes sect from whichever light he is closer to by rising. In-sect planets behave more benevolently.',source:'Antiochus of Athens; Valens; Ptolemy, Tetrabiblos.',lineage:'Foundational Hellenistic doctrine, largely lost in medieval Latin practice, restored in modern Hellenistic revival.'},

  // OBJECTS
  {cat:'Object',term:'Lot of Fortune',summary:'Also "Pars Fortunae". A calculated point marking circumstance, body, and material well-being. Day formula: Asc + Moon − Sun. Night formula reverses: Asc + Sun − Moon.',source:'Valens, Anthology II; Paulus Alexandrinus; Abū Maʿshar.',lineage:'Hellenistic core → medieval → modern.'},
  {cat:'Object',term:'Lot of Spirit',summary:'A calculated point marking agency, action, vocation, and what the soul undertakes. Day: Asc + Sun − Moon. Night: reversed.',source:'Valens, Anthology II.IV–VI.',lineage:'Hellenistic → Schmidt\'s translation programme.'},
  {cat:'Object',term:'Seven Hermetic Lots',summary:'A traditional set of seven lots attributed to Hermes: Fortune, Spirit, Eros, Necessity, Courage, Victory, Nemesis. Each is derived from a pair of planets distanced from the Ascendant and reversed by sect.',source:'Paulus Alexandrinus, Introduction, ch. 23; attributed to Hermes Trismegistus.',lineage:'Hellenistic → Olympiodorus commentary → recovered through Project Hindsight.'},
  {cat:'Object',term:'Lunar Mansions',summary:'Twenty-eight divisions of the ecliptic based on the Moon\'s nightly travel (roughly 12°51\' each). Each mansion has traditional images, indications, and magical uses — especially in Picatrix and in the Arabic "Manāzil al-Qamar" system.',source:'Picatrix, Book IV; Agrippa, Book II, ch. 46.',lineage:'Indian Nakṣatras → Arabic Manāzil → Latin Picatrix → Renaissance magic.'},
  {cat:'Object',term:'Picatrix Faces (Decans)',summary:'The thirty-six divisions of ten degrees each along the zodiac. The Picatrix assigns each decan a talismanic image, a ruler (in Chaldean order), and a magical indication.',source:'Picatrix (Ghāyat al-Ḥakīm), Book II, ch. 11.',lineage:'Egyptian decans → Hellenistic → Arabic Picatrix → Latin 13th c. → Renaissance magic.'},
  {cat:'Object',term:'Essential Dignities',summary:'A system ranking each planet\'s condition by the degree it occupies: domicile, exaltation, triplicity, term (bound), and face. Each dignity carries traditional scoring.',source:'Ptolemy, Tetrabiblos I.17–23; Dorotheus I; Bonatti Liber Astronomiae.',lineage:'Hellenistic → Perso-Arabic → Latin → Lilly.'},
  {cat:'Object',term:'Void of Course Moon',summary:'The Moon is said to be "void of course" from the moment it perfects its last Ptolemaic aspect within a sign until it leaves the sign. Traditionally unfavourable for electing new undertakings.',source:'William Lilly, Christian Astrology I.110; Bonatti.',lineage:'Horary tradition (medieval Latin → 17th c. English).'},

  // CONCEPTS
  {cat:'Concept',term:'Peak Period (ZR)',summary:'Within Zodiacal Releasing, a subperiod whose sign is in an angular relationship (1st, 4th, 7th, 10th) to the starting sign of the major period. Peak periods are times of elevated public outcome and consequence.',source:'Valens, Anthology IV; modern elaboration by Chris Brennan, Demetra George.',lineage:'Hellenistic text → modern practice.'},
  {cat:'Concept',term:'Loosing of the Bond',summary:'In Zodiacal Releasing, a rupture that occurs when the next subperiod would fall in the eighth sign from the start. The sequence jumps instead to the ninth, marking a major life reorientation.',source:'Valens, Anthology IV.5–6.',lineage:'Hellenistic → recovered modern usage.'},
  {cat:'Concept',term:'Benefic / Malefic',summary:'Jupiter and Venus are benefics, Saturn and Mars malefics. The sect benefic (Venus by night, Jupiter by day) is most helpful; the out-of-sect malefic (Mars by day, Saturn by night) is most difficult.',source:'Ptolemy, Tetrabiblos I.5; Valens.',lineage:'Hellenistic core doctrine.'},
  {cat:'Concept',term:'Retrograde',summary:'The apparent backward motion of a planet as seen from Earth. Traditionally weakening or introverting the planet\'s significations; it does not reverse effects, but turns them inward.',source:'Ptolemy; Masha\'allah, On the Revolution of the Years of the World.',lineage:'Hellenistic → medieval → modern.'},
  {cat:'Concept',term:'Sect Light',summary:'The luminary that matches the chart\'s sect — Sun in a day chart, Moon in a night chart. Its condition is taken as the primary indicator of the native\'s overall fate and vitality.',source:'Valens, Anthology II; Porphyry, Introduction.',lineage:'Hellenistic foundational doctrine.'},

  // TRADITIONS
  {cat:'Tradition',term:'Hellenistic Astrology',summary:'The Greek-language astrological tradition from roughly the 1st c. BCE through the 7th c. CE, based in Alexandria. Systematised signs, houses, aspects, lots, time-lord techniques, and sect.',source:'Valens, Dorotheus, Ptolemy, Paulus, Porphyry, Hephaestio.',lineage:'Foundation of all subsequent Western astrology.'},
  {cat:'Tradition',term:'Perso-Arabic Astrology',summary:'The translation and elaboration of Hellenistic and Sassanid material in Abbasid Baghdad (8th–10th c.). Added firdaria, refined world-historical techniques, and transmitted Greek astrology to the Latin West.',source:'Abū Maʿshar, Masha\'allah, al-Kindi, al-Biruni.',lineage:'Sassanid Persian + Greek sources → Arabic → Latin 12th c.'},
  {cat:'Tradition',term:'Picatrix',summary:'The most important surviving text of medieval astrological magic: an Arabic grimoire (Ghāyat al-Ḥakīm, "The Aim of the Sage", c. 11th c.), translated to Latin in 1256. Covers planetary images, mansions, faces, talismans, and ritual.',source:'Ghāyat al-Ḥakīm / Picatrix (Arabic 11th c., Latin 13th c.).',lineage:'Sabian/Harranian syncretic magic → Arabic → Latin → Renaissance.'},
  {cat:'Tradition',term:'Hermetic Tradition',summary:'Texts attributed to Hermes Trismegistus — a syncretic Graeco-Egyptian sage — covering astrology, alchemy, and theurgy. Source of lots, decans, and much talismanic lore.',source:'Corpus Hermeticum; Asclepius; Liber Hermetis.',lineage:'Ptolemaic Egypt → late antiquity → Renaissance revival (Ficino).'},
  {cat:'Tradition',term:'Medieval Latin Astrology',summary:'The Latin synthesis (12th–17th c.) that produced Bonatti, Lilly, Morin. Emphasised horary, elections, nativities and annual revolutions using Hellenistic and Perso-Arabic material.',source:'Bonatti, Liber Astronomiae; Lilly, Christian Astrology; Morin, Astrologia Gallica.',lineage:'Latin translations of Arabic → European universities → early modern practice.'},

  // FIGURES
  {cat:'Figure',term:'Vettius Valens',summary:'Second-century Alexandrian astrologer whose nine-book Anthology is the most extensive surviving Hellenistic practical text. Primary source for Zodiacal Releasing, lots, and worked example charts.',source:'Anthology (Ἀνθολογίαι).',lineage:'Alexandrian school.'},
  {cat:'Figure',term:'Abū Maʿshar (Albumasar)',summary:'9th-century Persian astrologer of Baghdad. His Great Introduction and Book of Revolutions transmitted astrology to the Latin West and systematised firdaria and mundane techniques.',source:'Kitāb al-Madkhal al-Kabīr; Kitāb Taḥāwil Sinī al-ʿĀlam.',lineage:'Perso-Arabic → European medieval.'},

function interpretLunarReturn(R){
  const lrMoonHouse=houseOf(R.Moon);
  const lrAscSign=signOf(R.Ascendant).name;
  const lrSunHouse=houseOf(R.Sun);
  return{lrMoonHouse,lrAscSign,lrSunHouse,
    moonTheme:SOLAR_RETURN_HOUSE_THEMES[lrMoonHouse]||'',
    note:`This month wears a ${lrAscSign} face; the lunar body works through your natal ${lrMoonHouse}${lrMoonHouse===1?'st':lrMoonHouse===2?'nd':lrMoonHouse===3?'rd':'th'} house.`};
}


function fmtZRDate(d){
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${mo} ${d.getFullYear()}`;
}

function fmtJournalDate(ts){
  const d=new Date(ts);const now=new Date();
  const dayMs=86400000;
  const diff=Math.floor((now-d)/dayMs);
  if(diff===0){
    const hr=d.getHours();const mn=d.getMinutes();
    const ampm=hr>=12?'PM':'AM';const h12=hr===0?12:hr>12?hr-12:hr;
    return'Today '+h12+':'+String(mn).padStart(2,'0')+ampm;
  }
  if(diff===1)return'Yesterday';
  if(diff<7)return diff+' days ago';
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${mo} ${d.getDate()}`+(d.getFullYear()!==now.getFullYear()?' '+d.getFullYear():'');
}
