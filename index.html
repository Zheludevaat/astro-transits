<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b1a">
<title>Alexander's Transits</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070b1a;--card:#0f1529;--card2:#141a33;--card3:#1a2040;--gold:#c9a84c;--gold-dim:#8a7535;
  --blue:#4a9eff;--red:#ff4a6e;--green:#4aff8b;--purple:#b44aff;--orange:#ff9a4a;--teal:#4af0d0;
  --text:#e0daea;--text-dim:#7a7590;--text-bright:#fff;
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom) + 20px)}
.container{padding:0 16px}

/* Starfield */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,#0d1535 0%,#070b1a 60%),
  radial-gradient(2px 2px at 20% 30%,rgba(255,255,255,.3),transparent),
  radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.2),transparent),
  radial-gradient(1.5px 1.5px at 60% 10%,rgba(255,255,255,.25),transparent),
  radial-gradient(1px 1px at 80% 50%,rgba(255,255,255,.15),transparent),
  radial-gradient(1.5px 1.5px at 10% 80%,rgba(255,255,255,.2),transparent),
  radial-gradient(1px 1px at 70% 90%,rgba(255,255,255,.15),transparent),
  radial-gradient(2px 2px at 90% 20%,rgba(255,255,255,.2),transparent);
  background-size:100% 100%,200px 200px,150px 180px,250px 220px,180px 250px,220px 190px,170px 230px,240px 160px;
  z-index:-1;pointer-events:none}

/* Header */
.header{text-align:center;padding:20px 16px 10px}
.header h1{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:500}
.date-display{font-size:28px;font-weight:700;color:var(--text-bright);margin:6px 0 2px;letter-spacing:-0.5px}
.sub-date{font-size:13px;color:var(--text-dim)}

/* Moon + VOC strip */
.moon-strip{display:flex;align-items:center;gap:8px;padding:12px 16px;margin-top:12px}
.moon-strip .moon-icon{font-size:26px;line-height:1}
.moon-strip .moon-text{font-size:14px;font-weight:500;color:var(--text)}
.moon-strip .moon-text .dim{color:var(--text-dim);font-weight:400;font-size:12px}
.voc-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(180,74,255,.1);
  border:1px solid rgba(180,74,255,.2);border-radius:8px;padding:3px 8px;font-size:11px;
  color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}

/* Vibe */
.vibe-card{background:linear-gradient(135deg,#1a1440,#0f1529);border:1px solid rgba(201,168,76,.12);
  border-radius:20px;padding:18px 20px;margin:12px 16px 0;text-align:center}
.vibe-card .vibe-label{font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.vibe-card .vibe-text{font-size:15px;line-height:1.5;color:var(--text)}
.vibe-card .vibe-meter{display:flex;gap:4px;justify-content:center;margin-top:10px}
.vibe-card .vibe-dot{width:7px;height:7px;border-radius:50%;background:var(--card2)}
.vibe-card .vibe-dot.on{background:var(--gold)}
.vibe-card .vibe-dot.on.blue{background:var(--blue)}
.vibe-card .vibe-dot.on.red{background:var(--red)}

/* Section titles */
.section-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);
  margin:24px 16px 10px;font-weight:500}

/* Pills row */
.pills{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px;margin-bottom:6px}
.pill{display:flex;align-items:center;gap:4px;background:var(--card);border-radius:20px;
  padding:7px 12px;font-size:12px;min-height:34px}
.pill.retro{color:var(--red);border:1px solid rgba(255,74,110,.12)}
.pill.stationary{color:var(--orange);border:1px solid rgba(255,154,74,.12)}
.pill.ingress{color:var(--orange);border:1px solid rgba(255,154,74,.12)}
.pill .glyph{font-size:15px}

/* ─── HERO TRANSIT CARDS (Top 3) ─── */
.hero-card{position:relative;border-radius:20px;padding:20px;margin:0 16px 10px;overflow:hidden;
  min-height:100px}
.hero-card::before{content:'';position:absolute;inset:0;border-radius:20px;z-index:0}
.hero-card.hard::before{background:linear-gradient(135deg,#1a0a15,#1a0f20)}
.hero-card.easy::before{background:linear-gradient(135deg,#0a1520,#0f1a2a)}
.hero-card.neutral::before{background:linear-gradient(135deg,#1a1430,#141028)}
.hero-card.minor::before{background:linear-gradient(135deg,#0f1320,#0d1025)}
.hero-card>*{position:relative;z-index:1}
.hero-card .hero-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;padding:3px 8px;border-radius:6px;margin-bottom:10px}
.hero-card.hard .hero-badge{background:rgba(255,74,110,.15);color:var(--red)}
.hero-card.easy .hero-badge{background:rgba(74,158,255,.15);color:var(--blue)}
.hero-card.neutral .hero-badge{background:rgba(201,168,76,.15);color:var(--gold)}
.hero-card.minor .hero-badge{background:rgba(122,117,144,.1);color:var(--text-dim)}
.hero-card .hero-planets{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hero-card .hero-planets .big-glyph{font-size:28px;line-height:1}
.hero-card .hero-planets .hero-label{font-size:17px;font-weight:600;color:var(--text-bright)}
.hero-card .hero-planets .aspect-glyph{font-size:16px;color:var(--text-dim)}
.hero-card .hero-meta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.hero-card .hero-meta .tag{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500}
.hero-card .hero-meta .tag.orb{background:var(--card2);color:var(--text-dim)}
.hero-card .hero-meta .tag.applying{background:rgba(201,168,76,.12);color:var(--gold)}
.hero-card .hero-meta .tag.separating{background:rgba(122,117,144,.08);color:var(--text-dim)}
.hero-card .hero-meta .tag.exact{background:rgba(255,74,110,.15);color:var(--red)}
.hero-card .hero-meta .tag.stationary{background:rgba(255,154,74,.12);color:var(--orange)}
.hero-card .hero-meta .tag.house{background:rgba(74,240,208,.1);color:var(--teal)}
.hero-card .hero-meta .tag.duration{background:rgba(122,117,144,.06);color:var(--text-dim)}
.hero-card .hero-interp{font-size:14px;line-height:1.6;color:var(--text);opacity:.85}

/* ─── COMPACT TRANSIT ROWS (expandable) ─── */
.transit-row{display:flex;align-items:center;background:var(--card);border-radius:12px;
  padding:12px 14px;margin:0 16px 6px;cursor:pointer;-webkit-user-select:none;user-select:none;
  transition:background .15s}
.transit-row:active{background:var(--card2)}
.transit-row .tr-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.transit-row .tr-glyph{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.transit-row .tr-info{min-width:0;flex:1}
.transit-row .tr-name{font-size:13px;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.transit-row .tr-sub{font-size:11px;color:var(--text-dim);margin-top:1px}
.transit-row .tr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.transit-row .tr-orb{font-size:11px;color:var(--text-dim);background:var(--card2);padding:2px 6px;border-radius:6px}
.transit-row .tr-motion{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;
  padding:2px 5px;border-radius:4px}
.transit-row .tr-motion.applying{background:rgba(201,168,76,.12);color:var(--gold)}
.transit-row .tr-motion.separating{background:rgba(122,117,144,.06);color:var(--text-dim)}
.transit-row .tr-motion.exact{background:rgba(255,74,110,.12);color:var(--red)}
.transit-row .tr-motion.stationary{background:rgba(255,154,74,.1);color:var(--orange)}
.transit-row .tr-pip{width:3px;height:24px;border-radius:2px;flex-shrink:0}
.transit-row .tr-pip.hard{background:var(--red)}
.transit-row .tr-pip.easy{background:var(--blue)}
.transit-row .tr-pip.neutral{background:var(--gold)}
.transit-row .tr-pip.minor{background:var(--text-dim);opacity:.3}

/* Expanded detail under a compact row */
.transit-detail{display:none;background:var(--card);border-radius:0 0 12px 12px;
  padding:0 14px 14px;margin:-6px 16px 6px;border-top:1px solid var(--card2)}
.transit-detail.open{display:block}
.transit-detail .td-interp{font-size:13px;line-height:1.55;color:var(--text-dim);padding-top:10px}
.transit-detail .td-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.transit-detail .td-meta .tag{font-size:10px;padding:2px 6px;border-radius:5px}

/* ─── Natal section ─── */
.natal-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--card);
  border-radius:14px;padding:14px 16px;margin:0 16px;cursor:pointer;-webkit-user-select:none;user-select:none}
.natal-toggle .nt-label{font-size:14px;font-weight:500;color:var(--text)}
.natal-toggle .nt-arrow{font-size:18px;color:var(--text-dim);transition:transform .3s}
.natal-toggle.open .nt-arrow{transform:rotate(180deg)}
.natal-grid{display:none;padding:10px 16px}
.natal-grid.show{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.natal-row{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--card);border-radius:10px}
.natal-row .glyph{font-size:16px;width:22px;text-align:center}
.natal-row .planet-name{font-size:11px;color:var(--text-dim);min-width:36px}
.natal-row .position{font-size:12px;font-weight:500;color:var(--text)}
.natal-row .house-tag{font-size:10px;color:var(--teal);margin-left:auto;opacity:.7}

/* Planets now */
.pn-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 16px}
.pn-row{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--card);border-radius:10px}
.pn-row .glyph{font-size:16px;width:22px;text-align:center}
.pn-row .info{display:flex;flex-direction:column}
.pn-row .pname{font-size:11px;color:var(--text-dim)}
.pn-row .ppos{font-size:12px;font-weight:500;color:var(--text)}
.pn-row .retro{color:var(--red);font-size:9px;font-weight:600;margin-left:3px}
.pn-row .sta{color:var(--orange);font-size:9px;font-weight:600;margin-left:3px}
.pn-row .house-num{font-size:10px;color:var(--teal);margin-left:auto;opacity:.7}

/* ─── Bottom Tab Bar ─── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;
  background:linear-gradient(180deg,rgba(7,11,26,.92),rgba(7,11,26,.98));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(201,168,76,.08);
  padding:8px 0 calc(var(--safe-bottom) + 4px);z-index:100}
.tab-bar .tab{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 12px;color:var(--text-dim);font-size:10px;font-weight:500;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s;
  border:none;background:none}
.tab-bar .tab.active{color:var(--gold)}
.tab-bar .tab .tab-icon{font-size:20px;line-height:1}
body{padding-bottom:calc(var(--safe-bottom) + 70px)!important}

/* Tab content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Week view */
.week-day{background:var(--card);border-radius:14px;padding:14px 16px;margin:0 16px 8px;
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .15s}
.week-day:active{background:var(--card2)}
.week-day .wd-header{display:flex;align-items:center;justify-content:space-between}
.week-day .wd-date{font-size:15px;font-weight:600;color:var(--text-bright)}
.week-day .wd-date .today-label{font-size:10px;font-weight:600;color:var(--gold);
  background:rgba(201,168,76,.12);padding:2px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}
.week-day .wd-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
.week-day .wd-count{font-size:12px;color:var(--text-dim);background:var(--card2);
  padding:3px 8px;border-radius:8px}
.week-day .wd-top-transits{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.week-day .wd-transit-pill{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:500}
.week-day .wd-transit-pill.hard{background:rgba(255,74,110,.1);color:var(--red)}
.week-day .wd-transit-pill.easy{background:rgba(74,158,255,.08);color:var(--blue)}
.week-day .wd-transit-pill.neutral{background:rgba(201,168,76,.08);color:var(--gold)}
.week-day .wd-transit-pill.minor{background:rgba(122,117,144,.06);color:var(--text-dim)}
.week-vibe{display:flex;gap:3px;align-items:center}
.week-vibe .wv-dot{width:5px;height:5px;border-radius:50%;background:var(--card2)}
.week-vibe .wv-dot.on{background:var(--gold)}

/* Natal tab - detailed */
.natal-detail-card{background:var(--card);border-radius:16px;padding:16px;margin:0 16px 8px}
.natal-detail-card .nd-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.natal-detail-card .nd-glyph{font-size:26px}
.natal-detail-card .nd-name{font-size:16px;font-weight:600;color:var(--text-bright)}
.natal-detail-card .nd-pos{font-size:13px;color:var(--text-dim);margin-top:1px}
.natal-detail-card .nd-desc{font-size:13px;line-height:1.55;color:var(--text);opacity:.8}
.natal-detail-card .nd-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.natal-detail-card .nd-tags .tag{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:500}

.footer{text-align:center;padding:30px 16px 10px;font-size:11px;color:var(--text-dim);opacity:.4}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-card{animation:fadeIn .35s ease both}
.hero-card:nth-child(2){animation-delay:.06s}
.hero-card:nth-child(3){animation-delay:.12s}
.transit-row{animation:fadeIn .3s ease both}
.refresh-note{text-align:center;font-size:11px;color:var(--text-dim);padding:16px 0 4px;opacity:.3}

/* ─── Date Navigation ─── */
.date-nav{display:flex;align-items:center;justify-content:center;gap:6px;margin:4px 0 0}
.date-nav button{background:none;border:none;color:var(--text-dim);font-size:20px;padding:8px 14px;
  cursor:pointer;border-radius:12px;transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent}
.date-nav button:active{background:var(--card);color:var(--text)}
.date-nav .today-btn{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:6px 12px;border:1px solid var(--card2);border-radius:20px;color:var(--gold);display:none}
.date-nav .today-btn.show{display:inline-block}
.date-nav .today-btn:active{background:rgba(201,168,76,.1)}
.date-offset{font-size:11px;color:var(--text-dim);text-align:center;margin-top:2px;opacity:.6}

/* Exact date tag */
.hero-card .hero-meta .tag.exact-date{background:rgba(74,240,208,.08);color:var(--teal);font-size:10px}
.transit-detail .td-meta .tag.exact-date{background:rgba(74,240,208,.08);color:var(--teal)}

/* Swipe hint */
.swipe-hint{text-align:center;font-size:10px;color:var(--text-dim);opacity:.25;margin-top:6px;
  transition:opacity .5s}
.swipe-hint.fade{opacity:0}

/* ─── Chart Wheel ─── */
.chart-container{position:relative;width:100%;max-width:380px;margin:0 auto;aspect-ratio:1}
.chart-svg{width:100%;height:100%}
.chart-svg text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
.chart-toggle-row{display:flex;gap:6px;justify-content:center;margin:10px 0 4px}
.chart-toggle{background:var(--card);border:1px solid var(--card2);color:var(--text-dim);font-size:11px;
  padding:6px 14px;border-radius:20px;cursor:pointer;font-weight:500;transition:all .15s}
.chart-toggle.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.25);color:var(--gold)}
.chart-toggle:active{transform:scale(.96)}

/* Lunar Events */
.lunar-events{display:flex;gap:8px;padding:0 16px;margin-top:10px}
.lunar-event{flex:1;background:var(--card);border-radius:14px;padding:12px;text-align:center}
.lunar-event .le-icon{font-size:22px;margin-bottom:4px}
.lunar-event .le-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.lunar-event .le-date{font-size:13px;font-weight:600;color:var(--text-bright);margin-top:2px}
.lunar-event .le-sign{font-size:11px;color:var(--text-dim);margin-top:1px}
.lunar-event .le-eclipse{display:inline-block;font-size:9px;font-weight:700;color:var(--red);
  background:rgba(255,74,110,.12);padding:2px 6px;border-radius:4px;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Planetary Hour */
.planet-hour{display:flex;align-items:center;gap:8px;justify-content:center;
  background:var(--card);border-radius:12px;padding:10px 16px;margin:10px 16px 0}
.planet-hour .ph-icon{font-size:20px}
.planet-hour .ph-text{font-size:12px;color:var(--text)}
.planet-hour .ph-ruler{font-weight:600;color:var(--gold)}

/* Dignity badge */
.dignity-badge{font-size:8px;font-weight:700;letter-spacing:.3px;padding:1px 4px;border-radius:3px;margin-left:3px}
</style>
</head>
<body>
<div id="app" role="main" aria-label="Astrological transit tracker"></div>

<script>
// ═══════════════════════════════════════════════════════════
// ASTRONOMICAL ENGINE v2 — Verified against JPL DE421 + Swiss Ephemeris
// ═══════════════════════════════════════════════════════════

const DEG = Math.PI / 180, RAD = 180 / Math.PI;
const sin = a => Math.sin(a * DEG), cos = a => Math.cos(a * DEG);
const atan2d = (y, x) => Math.atan2(y, x) * RAD;
const norm = a => ((a % 360) + 360) % 360;

function julianDate(y, m, d, h = 0) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + h / 24 + B - 1524.5;
}
function jdToT(jd) { return (jd - 2451545.0) / 36525; }

function sunLongitude(T) {
  const L0 = norm(280.46646 + 36000.76983 * T + 0.0003032 * T * T);
  const M = norm(357.52911 + 35999.05029 * T - 0.0001537 * T * T);
  const C = (1.914602 - 0.004817 * T) * sin(M) + (0.019993 - 0.000101 * T) * sin(2 * M) + 0.000289 * sin(3 * M);
  return norm(L0 + C);
}

function moonLongitude(T) {
  const Lp = norm(218.3165 + 481267.8813 * T), D = norm(297.8502 + 445267.1115 * T);
  const M = norm(357.5291 + 35999.0503 * T), Mp = norm(134.9634 + 477198.8676 * T);
  const F = norm(93.2720 + 483202.0175 * T);
  return norm(Lp + 6.289*sin(Mp) + 1.274*sin(2*D-Mp) + 0.658*sin(2*D) + 0.214*sin(2*Mp)
    - 0.186*sin(M) - 0.114*sin(2*F) + 0.059*sin(2*D-2*Mp) + 0.057*sin(2*D-M-Mp)
    + 0.053*sin(2*D+Mp) + 0.046*sin(2*D-M) - 0.041*sin(M-Mp) - 0.035*sin(D)
    - 0.031*sin(M+Mp) + 0.015*sin(2*F-2*D) + 0.010*sin(2*D-2*F-Mp)
    - 0.009*sin(D-Mp) + 0.008*sin(2*D+M-Mp) - 0.006*sin(2*D-2*F));
}

function northNodeLongitude(T) { return norm(125.0446 - 1934.1363 * T + 0.0021 * T * T); }

const ELEMENTS = {

function heliocentricLon(planet, T) {
  const el = ELEMENTS[planet];
  const a = el.v[0]+el.r[0]*T, e = el.v[1]+el.r[1]*T, I = el.v[2]+el.r[2]*T;
  let L = norm(el.v[3]+el.r[3]*T);
  const lp = el.v[4]+el.r[4]*T, node = el.v[5]+el.r[5]*T;
  if (EXTRA[planet]) { const [b,c,s,f]=EXTRA[planet]; L += f!==0 ? b*T*T+c*cos(f*T)+s*sin(f*T) : b*T*T; L=norm(L); }
  let M = norm(L - lp), E = M;
  for (let i=0;i<30;i++){const dE=(M-(E-e*RAD*sin(E)))/(1-e*cos(E));E+=dE;if(Math.abs(dE)<1e-10)break;}
  const xp=a*(cos(E)-e), yp=a*Math.sqrt(1-e*e)*sin(E);
  const cN=cos(node),sN=sin(node),cI=cos(I),w=lp-node,cW=cos(w),sW=sin(w);
  const x=(cN*cW-sN*sW*cI)*xp+(-cN*sW-sN*cW*cI)*yp;
  const y=(sN*cW+cN*sW*cI)*xp+(-sN*sW+cN*cW*cI)*yp;
  return {lon:norm(atan2d(y,x)),dist:Math.sqrt(x*x+y*y)};
}
function geocentricLon(planet, T) {
  const e=heliocentricLon('Earth',T), p=heliocentricLon(planet,T);
  return norm(atan2d(p.dist*sin(p.lon)-e.dist*sin(e.lon), p.dist*cos(p.lon)-e.dist*cos(e.lon)));
}

function planetMotion(planet, jd) {
  const T1=jdToT(jd-0.5), T2=jdToT(jd+0.5);
  let l1,l2;
  if(planet==='Sun'){l1=sunLongitude(T1);l2=sunLongitude(T2);}
  else if(planet==='Moon'){l1=moonLongitude(T1);l2=moonLongitude(T2);}
  else{l1=geocentricLon(planet,T1);l2=geocentricLon(planet,T2);}
  let d=l2-l1;if(d>180)d-=360;if(d<-180)d+=360;return d;
}
function motionStatus(planet, jd) {
  const m=planetMotion(planet,jd),am=Math.abs(m);
  const th={Mercury:.15,Venus:.08,Mars:.03,Jupiter:.01,Saturn:.005,Uranus:.003,Neptune:.002,Pluto:.002,Chiron:.005};
  return am<(th[planet]||.01)?{retrograde:m<0,stationary:true,motion:m}:{retrograde:m<0,stationary:false,motion:m};
}

  return{name:'New Moon',icon:'🌑'};
}

function isVoidOfCourse(moonLon, jd) {
  const ms=Math.floor(moonLon/30), aspA=[0,60,90,120,180];
  const tps=['Sun','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  for(let h=0.5;h<=72;h+=2){
    const fJd=jd+h/24, fT=jdToT(fJd), fMl=moonLongitude(fT);
    if(Math.floor(fMl/30)!==ms) return{voc:true,endsIn:h,nextSign:SIGNS[Math.floor(fMl/30)]};
    for(const p of tps){
      const pL=p==='Sun'?sunLongitude(fT):geocentricLon(p,fT);
      for(const aa of aspA){let d=norm(fMl-pL),o=Math.abs(d-aa);if(o>180)o=360-o;
        if(aa===0){let ad=Math.abs(d);if(ad>180)ad=360-ad;if(ad<1)return{voc:false};}
        else if(o<1)return{voc:false};}
    }
  }
  return{voc:true,endsIn:72,nextSign:'?'};
}

function houseOf(lon) {
  const l = norm(lon);
  for (let i = 0; i < 12; i++) {

    if (start < end) { if (l >= start && l < end) return i + 1; }

function getOrb(a,tp,np){let o=a.orb;if(['Sun','Moon'].includes(np))o+=1;if(['Saturn','Jupiter','Uranus','Neptune','Pluto'].includes(tp))o+=1;return o;}

function findAspect(tL,nL,tp,np,jd){
  for(const a of ASPECTS){const orb=getOrb(a,tp,np);let d=Math.abs(norm(tL-nL)-a.angle);

      else if(d2<d)motion='applying';else motion='separating';

function getLon(planet, jd) {
  const T = jdToT(jd);
  if (planet === 'Sun') return sunLongitude(T);
  if (planet === 'Moon') return moonLongitude(T);
  if (planet === 'NorthNode') return northNodeLongitude(T);

}

function findExactDate(tp, np, aspectAngle, jd) {
  // Search ±90 days for the moment when the aspect is exact (orb closest to 0)
  // For Moon transits, search ±15 days; for others ±90 days
  const isMoon = tp === 'Moon';
  const range = isMoon ? 15 : 90;
  const step = isMoon ? 0.1 : 1; // days per step in coarse scan
  const nLon = NATAL[np]; // natal position is fixed

  let bestJd = jd, bestOrb = 999;

  // Coarse scan
  for (let d = -range; d <= range; d += step) {
    const testJd = jd + d;
    const tLon = getLon(tp, testJd);
    let diff = Math.abs(norm(tLon - nLon) - aspectAngle);
    if (diff > 180) diff = 360 - diff;
    if (diff < bestOrb) { bestOrb = diff; bestJd = testJd; }
  }

  // Fine binary-style refinement
  let lo = bestJd - step, hi = bestJd + step;
  for (let iter = 0; iter < 30; iter++) {
    const m1 = lo + (hi - lo) / 3, m2 = lo + 2 * (hi - lo) / 3;
    let o1 = Math.abs(norm(getLon(tp, m1) - nLon) - aspectAngle);
    let o2 = Math.abs(norm(getLon(tp, m2) - nLon) - aspectAngle);
    if (o1 > 180) o1 = 360 - o1;
    if (o2 > 180) o2 = 360 - o2;
    if (o1 < o2) hi = m2; else lo = m1;
    if (hi - lo < 0.0001) break; // ~8.6 seconds precision
  }

  const exactJd = (lo + hi) / 2;
  let finalOrb = Math.abs(norm(getLon(tp, exactJd) - nLon) - aspectAngle);
  if (finalOrb > 180) finalOrb = 360 - finalOrb;

  // Convert JD back to date
  const z = Math.floor(exactJd + 0.5);
  const f = exactJd + 0.5 - z;
  let A = z;
  if (z >= 2299161) { const alpha = Math.floor((z - 1867216.25) / 36524.25); A = z + 1 + alpha - Math.floor(alpha / 4); }
  const B = A + 1524, C = Math.floor((B - 122.1) / 365.25), D = Math.floor(365.25 * C), E = Math.floor((B - D) / 30.6001);
  const day = B - D - Math.floor(30.6001 * E);
  const month = E < 14 ? E - 1 : E - 13;
  const year = month > 2 ? C - 4716 : C - 4715;

  return { jd: exactJd, orb: finalOrb, year, month, day, daysFromNow: exactJd - jd };
}

function fmtExactDate(ed) {
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = Math.abs(Math.round(ed.daysFromNow));
  const dir = ed.daysFromNow < -0.5 ? 'ago' : ed.daysFromNow > 0.5 ? 'ahead' : 'today';
  if (dir === 'today') return `Exact today`;
  if (d === 1) return `Exact ${dir === 'ago' ? 'yesterday' : 'tomorrow'}`;
  return `Exact ${mn[ed.month-1]} ${ed.day}${d <= 30 ? '' : ', '+ed.year}`;
}

// ── Find next New Moon / Full Moon ──
function findLunarEvent(jd, targetPhase) {
  // targetPhase: 0 = new moon (sun-moon diff = 0), 180 = full moon
  for (let d = 0; d <= 35; d += 0.5) {
    const T = jdToT(jd + d);
    const phase = norm(moonLongitude(T) - sunLongitude(T));
    const diff = Math.abs(phase - targetPhase);
    if (diff < 8 || diff > 352) {
      // Refine with ternary search
      let lo = jd + d - 1, hi = jd + d + 1;
      for (let i = 0; i < 25; i++) {
        const m1 = lo + (hi - lo) / 3, m2 = lo + 2 * (hi - lo) / 3;
        let o1 = Math.abs(norm(moonLongitude(jdToT(m1)) - sunLongitude(jdToT(m1))) - targetPhase);
        let o2 = Math.abs(norm(moonLongitude(jdToT(m2)) - sunLongitude(jdToT(m2))) - targetPhase);
        if (o1 > 180) o1 = 360 - o1;
        if (o2 > 180) o2 = 360 - o2;
        if (o1 < o2) hi = m2; else lo = m1;
      }
      const exactJd = (lo + hi) / 2;
      // Convert JD to date
      const z = Math.floor(exactJd + 0.5);
      let A = z;
      if (z >= 2299161) { const alpha = Math.floor((z - 1867216.25) / 36524.25); A = z + 1 + alpha - Math.floor(alpha / 4); }
      const B = A + 1524, C = Math.floor((B - 122.1) / 365.25), D = Math.floor(365.25 * C), E = Math.floor((B - D) / 30.6001);
      const day = B - D - Math.floor(30.6001 * E);
      const month = E < 14 ? E - 1 : E - 13;
      const moonLon = moonLongitude(jdToT(exactJd));
      return { jd: exactJd, day, month, daysAway: exactJd - jd, sign: SIGNS[Math.floor(moonLon / 30)], glyph: SG[Math.floor(moonLon / 30)] };
    }
  }
  return null;
}

// ── Eclipse detection (simplified: check if New/Full Moon is near nodes) ──
function checkEclipse(lunarEvent, jd) {
  if (!lunarEvent) return null;
  const T = jdToT(lunarEvent.jd);
  const node = northNodeLongitude(T);
  const moonLon = moonLongitude(T);
  let distToNode = Math.abs(norm(moonLon - node));
  if (distToNode > 180) distToNode = 360 - distToNode;
  let distToSNode = Math.abs(norm(moonLon - norm(node + 180)));
  if (distToSNode > 180) distToSNode = 360 - distToSNode;
  const minDist = Math.min(distToNode, distToSNode);
  if (minDist < 18) return { type: minDist < 10 ? 'total' : 'partial' };
  return null;
}

// ── Planetary Hours (Chaldean order) ──
const CHALDEAN_ORDER = ['Saturn','Jupiter','Mars','Sun','Venus','Mercury','Moon'];
const DAY_RULERS = [/* Sun=0 */ 'Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];

function getPlanetaryHour(date) {
  const dayOfWeek = date.getDay();
  const dayRuler = DAY_RULERS[dayOfWeek];
  const startIdx = CHALDEAN_ORDER.indexOf(dayRuler);
  // Approximate: divide daylight ~6am-6pm into 12 hours, night into 12
  const h = date.getHours(), m = date.getMinutes();
  const totalMins = h * 60 + m;
  // Rough sunrise/sunset: 6am/6pm (simplified)
  const isDay = totalMins >= 360 && totalMins < 1080;
  const periodStart = isDay ? 360 : 1080;
  const periodEnd = isDay ? 1080 : 1800;
  const hourLen = (isDay ? 720 : 720) / 12;
  const hourIdx = Math.floor((totalMins - periodStart + (totalMins < 360 ? 1440 : 0)) / hourLen) % 12;
  const offset = isDay ? hourIdx : hourIdx + 12;
  const ruler = CHALDEAN_ORDER[(startIdx + offset) % 7];
  return { ruler, glyph: PG[ruler], isDay, hourIdx: hourIdx + 1 };
}

  trine:{w:'flowing with',f:'Natural ease and support. Gifts arrive — reach for them.'},
  sextile:{w:'opening doors for',f:'Gentle opportunities. Step through them.'},
  quincunx:{w:'requiring adjustment to',f:'An awkward angle demanding creative adaptation.'},
  'semi-sextile':{w:'subtly nudging',f:'Quiet background influence, persistently shifting.'}};
const DUR={Moon:'~4-6 hours',Sun:'~2 days',Mercury:'~2-3 days',Venus:'~3-4 days',Mars:'~1 week',
  Jupiter:'~2-3 weeks',Saturn:'~3-4 weeks',Chiron:'~3-4 weeks',Uranus:'~2-3 months',Neptune:'~3-4 months',
  Pluto:'~4-6 months',NorthNode:'~2-3 weeks'};

const SPEC={
  'Pluto_conjunction_Uranus':'A once-in-a-lifetime transit. Your individuality and freedom are being radically transformed. Expect sudden, permanent shifts.',
  'Pluto_sextile_Saturn':'Steady empowerment through discipline. Your structures gain depth and staying power.',
  'Pluto_trine_Venus':'Deep transformative energy flowing into relationships. Attractions carry unusual intensity.',
  'Pluto_sextile_Pluto':'Your relationship with power and transformation matures naturally, without crisis.',
  'Neptune_conjunction_Saturn':'Your structures are being dissolved by something larger. What felt solid becomes uncertain — spiritual renovation.',
  'Neptune_sextile_Uranus':'Subtle spiritual and creative awakening. Intuition and innovation blend harmoniously.',
  'Uranus_trine_Neptune':'Spiritual and creative insights flash unexpectedly. Dreams become vivid.',
  'Uranus_opposition_Pluto':'Generational power structures face disruption. What felt permanent shifts suddenly.',
  'Saturn_conjunction_Saturn':'Your Saturn return. A major life passage — everything that isn\'t working gets restructured.',
  'Saturn_square_Jupiter':'Tension between expansion and limitation. Growth meets reality checks.',
  'Saturn_sextile_Uranus':'Structured innovation. Discipline and freedom find productive partnership.',
  'Jupiter_conjunction_Sun':'Expansion, optimism, luck. Opportunities find you. Enjoy this one.',
  'Jupiter_trine_Sun':'One of the most fortunate transits. Everything flows with benevolence.',
  'Jupiter_opposition_Jupiter':'Halfway through your Jupiter cycle. Reassess your path of growth.',
  'Mars_conjunction_Saturn':'Disciplined action meets frustration — but focused effort builds real results.',
  'Mars_sextile_Uranus':'Quick decisive energy with a spark of brilliance. Good for bold moves.',
};

function getInterp(tp,np,an){const k=`${tp}_${an}_${np}`;if(SPEC[k])return SPEC[k];
  const tt=TT[tp],na=NA[np],af=AF[an];if(!tt||!na||!af)return'A subtle influence at work.';
  return`${tt[0].toUpperCase()+tt.slice(1)} energy is ${af.w} ${na}. ${af.f}`;}

function vibeCalc(transits){if(!transits.length)return{score:5,text:'A quiet day. Good for rest and reflection.'};
  let p=0,n=0,w=0;for(const t of transits){const v=t.importance/20;
    if(t.aspect.type==='easy')p+=v;else if(t.aspect.type==='hard')n+=v;else w+=v;}
  let s=Math.round(5+(p-n)*1.5);s=Math.max(1,Math.min(10,s));
  let text;if(n>p*2)text='A demanding day. Growth through friction — lean in.';
  else if(p>n*2)text='The skies smile on you. Positive energy flows — make the most of it.';
  else if(w>3)text='Intense transformative energy. Big shifts possible — stay intentional.';
  else if(p+n+w>5)text='High-energy day, mixed influences. Navigate tension, leverage flow.';
  else if(p+n+w>2)text='Moderate cosmic weather. Some areas boosted, others need attention.';
  else text='Calm skies. Good for steady progress and your own rhythm.';
  return{score:s,text};}

let showAspectLines = true;
let showTransitRing = true;

function renderChartWheel(cur, transits) {
  const cx = 190, cy = 190; // center
  const rOuter = 180, rSign = 158, rHouse = 130, rNatal = 100, rTransit = 168, rInner = 55;
  const ascDeg = NATAL.Ascendant; // rotate chart so ASC is on the left (180°)

  function toXY(deg, r) {
    // Astrological convention: ASC at left (9 o'clock), counter-clockwise
    const angle = (180 - (deg - ascDeg)) * DEG;
    return { x: cx + r * Math.cos(angle), y: cy - r * Math.sin(angle) };
  }

  let svg = `<svg class="chart-svg" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">`;

  // Background
  svg += `<circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="#0a0f22" stroke="rgba(201,168,76,.15)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rSign}" fill="none" stroke="rgba(201,168,76,.1)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rHouse}" fill="none" stroke="rgba(201,168,76,.08)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rNatal}" fill="none" stroke="rgba(201,168,76,.12)" stroke-width=".5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="#070b1a" stroke="rgba(201,168,76,.1)" stroke-width=".5"/>`;

  // Sign divisions (every 30°) with glyphs
  for (let i = 0; i < 12; i++) {
    const deg = i * 30;
    const p1 = toXY(deg, rSign), p2 = toXY(deg, rOuter);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="rgba(201,168,76,.12)" stroke-width=".5"/>`;
    // Sign glyph at midpoint of each 30° arc
    const mid = toXY(deg + 15, (rSign + rOuter) / 2);
    const isFireOrAir = [0,2,4,6,8,10].includes(i); // alternating element colors
    const signColor = i % 3 === 0 ? '#ff4a6e' : i % 3 === 1 ? '#4aff8b' : '#4a9eff';
    svg += `<text x="${mid.x}" y="${mid.y}" text-anchor="middle" dominant-baseline="central" fill="${signColor}" font-size="14" opacity=".6">${SG[i]}</text>`;
  }

  // House cusps
  for (let i = 0; i < 12; i++) {
    const deg = HOUSES[i];
    const p1 = toXY(deg, rInner), p2 = toXY(deg, rSign);
    const isAngle = [0, 3, 6, 9].includes(i);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isAngle ? 'rgba(201,168,76,.3)' : 'rgba(201,168,76,.08)'}" stroke-width="${isAngle ? '1' : '.5'}"/>`;
    // House number
    const nextCusp = HOUSES[(i + 1) % 12];
    let midDeg = (deg + nextCusp) / 2;
    if (Math.abs(nextCusp - deg) > 180) midDeg = norm(midDeg + 180);
    const hPos = toXY(midDeg, rInner + 18);
    svg += `<text x="${hPos.x}" y="${hPos.y}" text-anchor="middle" dominant-baseline="central" fill="rgba(201,168,76,.25)" font-size="9" font-weight="500">${i + 1}</text>`;
  }

  // ASC / MC labels
  const ascP = toXY(NATAL.Ascendant, rOuter + 1);
  svg += `<text x="${ascP.x - 14}" y="${ascP.y}" text-anchor="middle" dominant-baseline="central" fill="var(--gold)" font-size="10" font-weight="700">AC</text>`;
  const mcP = toXY(NATAL.MC, rOuter + 1);
  svg += `<text x="${mcP.x}" y="${mcP.y - 10}" text-anchor="middle" dominant-baseline="central" fill="var(--gold)" font-size="10" font-weight="700">MC</text>`;

  // Natal planets (inner ring)
  const natalPlanets = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];

  // Anti-collision: spread natal planets that are too close
  function spreadPositions(items, minGap, radius) {
    const sorted = items.map((it, idx) => ({ ...it, origIdx: idx })).sort((a, b) => a.deg - b.deg);
    for (let pass = 0; pass < 5; pass++) {
      for (let i = 0; i < sorted.length; i++) {
        const next = sorted[(i + 1) % sorted.length];
        let gap = norm(next.deg - sorted[i].deg);
        if (gap < minGap) {
          const push = (minGap - gap) / 2;
          sorted[i].deg = norm(sorted[i].deg - push);
          next.deg = norm(next.deg + push);
        }
      }
    }
    return sorted;
  }

  const natalItems = natalPlanets.map(p => ({ name: p, deg: NATAL[p], glyph: PG[p] }));
  const spreadNatal = spreadPositions(natalItems, 8, rNatal);

  for (const item of spreadNatal) {
    const pos = toXY(item.deg, rNatal - 14);
    const retro = ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'].includes(item.name) &&
      motionStatus(item.name, NJD).retrograde;
    svg += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="var(--text)" font-size="13" opacity=".85">${item.glyph}</text>`;
    // Tick mark from exact position
    const tick1 = toXY(NATAL[item.name], rNatal), tick2 = toXY(NATAL[item.name], rNatal - 5);
    svg += `<line x1="${tick1.x}" y1="${tick1.y}" x2="${tick2.x}" y2="${tick2.y}" stroke="var(--text)" stroke-width=".5" opacity=".4"/>`;
  }

  // Transit planets (outer ring)
  if (showTransitRing) {
    const transitPlanets = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'];
    const transitItems = transitPlanets.map(p => ({ name: p, deg: cur[p], glyph: PG[p] }));
    const spreadTransit = spreadPositions(transitItems, 8, rTransit);

    for (const item of spreadTransit) {
      const pos = toXY(item.deg, rTransit + 4);
      const ms = ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'].includes(item.name) ?
        motionStatus(item.name, julianDate(getTargetDate().getUTCFullYear(), getTargetDate().getUTCMonth()+1, getTargetDate().getUTCDate(), 12)) : null;
      const color = ms && ms.retrograde ? 'var(--red)' : 'var(--blue)';
      svg += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="11" opacity=".7">${item.glyph}</text>`;
      // Tick mark
      const tick1 = toXY(cur[item.name], rSign), tick2 = toXY(cur[item.name], rSign + 4);
      svg += `<line x1="${tick1.x}" y1="${tick1.y}" x2="${tick2.x}" y2="${tick2.y}" stroke="${color}" stroke-width=".5" opacity=".5"/>`;
    }
  }

  // Aspect lines
  if (showAspectLines && transits.length > 0) {
    const topTransits = transits.slice(0, 12); // limit lines for clarity
    for (const t of topTransits) {
      const from = toXY(t.tLon, rInner + 5);
      const to = toXY(t.nLon, rInner + 5);
      let color, dash;
      if (t.aspect.type === 'hard') { color = 'rgba(255,74,110,.35)'; dash = ''; }
      else if (t.aspect.type === 'easy') { color = 'rgba(74,158,255,.3)'; dash = ''; }
      else if (t.aspect.type === 'minor') { color = 'rgba(122,117,144,.15)'; dash = '2,3'; }
      else { color = 'rgba(201,168,76,.3)'; dash = ''; }
      const width = t.aspect.orbActual < 1 ? '1.5' : t.aspect.orbActual < 3 ? '1' : '.5';
      svg += `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${color}" stroke-width="${width}" ${dash ? `stroke-dasharray="${dash}"` : ''}/>`;
    }
  }

  // Center info
  svg += `<text x="${cx}" y="${cy - 8}" text-anchor="middle" fill="var(--gold)" font-size="9" font-weight="600" letter-spacing="1.5" opacity=".6">NATAL</text>`;
  svg += `<text x="${cx}" y="${cy + 6}" text-anchor="middle" fill="var(--text-dim)" font-size="8" opacity=".4">☉${signOf(NATAL.Sun).name.slice(0,3)} ☽${signOf(NATAL.Moon).name.slice(0,3)}</text>`;

  svg += `</svg>`;
  return svg;
}

// ── Week View renderer ──
function renderWeekView(baseJd, baseDate) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const NPS = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode','Ascendant','MC'];
  const TPS2 = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  let html = '';

  for (let d = 0; d < 7; d++) {
    const date = new Date(baseDate);
    date.setDate(date.getDate() + d - (dayOffset)); // relative to actual today
    const dd = new Date(); dd.setDate(dd.getDate() + d);
    const jd = julianDate(dd.getUTCFullYear(), dd.getUTCMonth()+1, dd.getUTCDate(), 12);
    const cur = computeAll(jd);

    const weekTransits = [];
    for (const tp of TPS2) { for (const np of NPS) {
      if (tp === np && !['Saturn','Jupiter','Mars','Chiron','NorthNode'].includes(tp)) continue;
      const asp = findAspect(cur[tp], NATAL[np], tp, np, jd);
      if (asp) weekTransits.push({ tp, np, aspect: asp, importance: transitImportance(tp, np, asp) });
    }}
    weekTransits.sort((a, b) => b.importance - a.importance);
    const vibe = vibeCalc(weekTransits);
    const isActualToday = d === 0;

    html += `<div class="week-day" onclick="navDay(${d});switchTab('today')">
      <div class="wd-header">
        <div>
          <div class="wd-date">${days[dd.getDay()]} ${months[dd.getMonth()]} ${dd.getDate()}${isActualToday?'<span class="today-label">Today</span>':''}</div>
          <div class="wd-sub">${weekTransits.length} transit${weekTransits.length!==1?'s':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="week-vibe">`;
    for (let i = 1; i <= 5; i++) {
      const on = i <= Math.round(vibe.score / 2);
      html += `<div class="wv-dot ${on ? 'on' : ''}"></div>`;
    }
    html += `</div>
          <span class="wd-count">${weekTransits.length}</span>
        </div>
      </div>`;

    // Show top 3 transits as pills
    if (weekTransits.length > 0) {
      html += `<div class="wd-top-transits">`;
      for (let i = 0; i < Math.min(3, weekTransits.length); i++) {
        const t = weekTransits[i];
        const cls = t.aspect.type;
        const tpN = t.tp === 'NorthNode' ? 'NN' : t.tp.slice(0,3);
        const npN = t.np === 'NorthNode' ? 'NN' : t.np === 'Ascendant' ? 'AC' : t.np === 'MC' ? 'MC' : t.np.slice(0,3);
        html += `<span class="wd-transit-pill ${cls}">${PG[t.tp]} ${t.aspect.glyph} ${PG[t.np]||(t.np==='Ascendant'?'AC':'MC')} ${t.aspect.orbActual}°</span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  return html;
}

  h+=`<div class="vibe-card"><div class="vibe-label">Today's Energy</div>
    <div class="vibe-text">${vibe.text}</div><div class="vibe-meter">`;
  for(let i=1;i<=10;i++)h+=`<div class="vibe-dot ${i<=vibe.score?'on '+vc:''}"></div>`;
  h+=`</div></div>`;

  // ── Pills: retro + stationary + ingresses ──
  if(retros.length||stats.length||ingresses.length){
    h+=`<div class="pills" style="margin-top:14px">`;
    for(const p of stats)h+=`<div class="pill stationary"><span class="glyph">${PG[p]}</span>${p} Stationary</div>`;
    for(const p of retros)h+=`<div class="pill retro"><span class="glyph">${PG[p]}</span>${p} ℞</div>`;
    for(const ig of ingresses)h+=`<div class="pill ingress">${PG[ig.planet]} → ${ig.glyph} ${ig.days}d</div>`;
    h+=`</div>`;}

  // ── Hero transits (top 3) ──
  const heroCount = Math.min(3, transits.length);
  if(heroCount > 0) {
    h+=`<div class="section-title">Key Transits</div>`;
    for(let i=0;i<heroCount;i++){const t=transits[i];
      const cls=t.aspect.type==='hard'?'hard':t.aspect.type==='easy'?'easy':t.aspect.type==='minor'?'minor':'neutral';
      const tpName=t.tp==='NorthNode'?'N.Node':t.tp;
      const npName=t.np==='NorthNode'?'N.Node':t.np;
      const tG=PG[t.tp]||'?', nG=PG[t.np]||(t.np==='Ascendant'?'AC':'MC');
      h+=`<div class="hero-card ${cls}">
        <div class="hero-badge">${t.aspect.name}</div>
        <div class="hero-planets">
          <span class="big-glyph">${tG}</span>
          <span class="hero-label">${tpName} <span class="aspect-glyph">${t.aspect.glyph}</span> natal ${npName}</span>
        </div>
        <div class="hero-meta">
          <span class="tag orb">${t.aspect.orbActual}° orb</span>
          <span class="tag ${t.aspect.motion}">${t.aspect.motion}</span>
          <span class="tag house">House ${t.house}</span>
          <span class="tag duration">${t.duration}</span>
          ${t.exactDate ? `<span class="tag exact-date">${fmtExactDate(t.exactDate)}</span>` : ''}
        </div>
        <div class="hero-interp">${t.interp}</div>
      </div>`;
    }
  }

  // ── Remaining transits (compact, expandable) ──
  if(transits.length > heroCount) {
    h+=`<div class="section-title">All Transits (${transits.length})</div>`;
    for(let i=heroCount;i<transits.length;i++){const t=transits[i];
      const id=`t-${t.tp}-${t.np}-${t.aspect.name}`;
      const isOpen = expandedCards[id];
      const tpName=t.tp==='NorthNode'?'N.Node':t.tp;
      const npName=t.np==='NorthNode'?'N.Node':t.np;
      const tG=PG[t.tp]||'?';
      const pipCls=t.aspect.type==='hard'?'hard':t.aspect.type==='easy'?'easy':t.aspect.type==='minor'?'minor':'neutral';
      h+=`<div class="transit-row" data-id="${id}" onclick="toggleTransit('${id}')">
        <div class="tr-pip ${pipCls}"></div>
        <div class="tr-left">
          <span class="tr-glyph">${tG}</span>
          <div class="tr-info">
            <div class="tr-name">${tpName} ${t.aspect.glyph} natal ${npName}</div>
            <div class="tr-sub">${t.aspect.name} · House ${t.house}</div>
          </div>
        </div>
        <div class="tr-right">
          <span class="tr-orb">${t.aspect.orbActual}°</span>
          <span class="tr-motion ${t.aspect.motion}">${t.aspect.motion.slice(0,3)}</span>
        </div>
      </div>
      <div class="transit-detail ${isOpen?'open':''}" id="${id}">
        <div class="td-interp">${t.interp}</div>
        <div class="td-meta">
          <span class="tag orb">${t.aspect.orbActual}° orb</span>
          <span class="tag ${t.aspect.motion}">${t.aspect.motion}</span>
          <span class="tag" style="background:rgba(74,240,208,.08);color:var(--teal)">House ${t.house}</span>
          <span class="tag" style="background:rgba(122,117,144,.06);color:var(--text-dim)">${t.duration}</span>
          ${t.exactDate ? `<span class="tag exact-date">${fmtExactDate(t.exactDate)}</span>` : ''}
        </div>
      </div>`;
    }
  }

  h+=`</div>`; // end tab-today

  // ═══ TAB: WEEK ═══
  h += `<div class="tab-content ${activeTab==='week'?'active':''}" id="tab-week">`;
  h += renderWeekView(jd, now);
  h += `</div>`; // end tab-week

  // ═══ TAB: CHART ═══
  h += `<div class="tab-content ${activeTab==='chart'?'active':''}" id="tab-chart">`;
  h+=`<div class="chart-container">${renderChartWheel(cur, transits)}</div>`;
  h+=`<div class="chart-toggle-row">
    <button class="chart-toggle ${showTransitRing?'active':''}" onclick="toggleChartOpt('transit')">Transits</button>
    <button class="chart-toggle ${showAspectLines?'active':''}" onclick="toggleChartOpt('aspects')">Aspects</button>
  </div>`;
  // Current planets grid in chart tab
  h+=`<div class="section-title">Planets Now</div><div class="pn-grid">`;
  for(const p of TPS){const g=PG[p];const isR=retros.includes(p),isS=stats.includes(p);
    const label=p==='NorthNode'?'N.Node':p;
    const dig=getDignity(p,cur[p]);
    h+=`<div class="pn-row"><span class="glyph">${g}</span><div class="info">
      <span class="pname">${label}${isR?'<span class="retro"> ℞</span>':''}${isS?'<span class="sta"> STA</span>':''}${dig?`<span class="dignity-badge" style="background:${dig.color}22;color:${dig.color}">${dig.label}</span>`:''}</span>
      <span class="ppos">${fmtShort(cur[p])}</span></div>
      <span class="house-num">H${houseOf(cur[p])}</span></div>`;}
  h+=`</div>`;
  h += `</div>`; // end tab-chart

  // ═══ TAB: NATAL ═══
  h += `<div class="tab-content ${activeTab==='natal'?'active':''}" id="tab-natal">`;
  h += renderNatalTab();
  h += `</div>`; // end tab-natal

  h+=`<div class="footer">Born July 2, 1996 · 00:08 EDT · Stony Brook, NY<br>Engine v2 · Verified against JPL DE421 + Swiss Ephemeris</div>`;

  // ── Tab Bar ──
  h+=`<nav class="tab-bar" role="tablist" aria-label="Navigation">
    <button class="tab ${activeTab==='today'?'active':''}" onclick="switchTab('today')" role="tab" aria-selected="${activeTab==='today'}" aria-controls="tab-today">
      <span class="tab-icon" aria-hidden="true">☉</span>Today</button>
    <button class="tab ${activeTab==='week'?'active':''}" onclick="switchTab('week')" role="tab" aria-selected="${activeTab==='week'}" aria-controls="tab-week">
      <span class="tab-icon" aria-hidden="true">📅</span>Week</button>
    <button class="tab ${activeTab==='chart'?'active':''}" onclick="switchTab('chart')" role="tab" aria-selected="${activeTab==='chart'}" aria-controls="tab-chart">
      <span class="tab-icon" aria-hidden="true">◎</span>Chart</button>
    <button class="tab ${activeTab==='natal'?'active':''}" onclick="switchTab('natal')" role="tab" aria-selected="${activeTab==='natal'}" aria-controls="tab-natal">
      <span class="tab-icon" aria-hidden="true">★</span>Natal</button>
  </nav>`;

  document.getElementById('app').innerHTML = h;
}

function toggleTransit(id){expandedCards[id]=!expandedCards[id];
  const el=document.getElementById(id);if(el)el.classList.toggle('open');}

// ── Tab switching ──
function switchTab(tab) {
  activeTab = tab;
  renderApp();
  window.scrollTo(0, 0);
}

// ── Chart toggles ──
function toggleChartOpt(opt) {
  if (opt === 'transit') showTransitRing = !showTransitRing;
  if (opt === 'aspects') showAspectLines = !showAspectLines;
  renderApp();
}

// ── Date navigation ──
function navDay(dir) { dayOffset += dir; renderApp(); }
function navToday() { dayOffset = 0; renderApp(); }

// ── Swipe gesture support ──
let touchStartX = 0, touchStartY = 0, swiping = false;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  swiping = true;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!swiping) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  // If vertical scroll dominates, cancel swipe detection
  if (Math.abs(dy) > Math.abs(dx) * 1.2) swiping = false;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) { // 60px threshold
    if (dx < 0) navDay(1);  // swipe left → next day
    else navDay(-1);         // swipe right → prev day
  }
  swiping = false;
});

// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navDay(-1);
  else if (e.key === 'ArrowRight') navDay(1);
  else if (e.key === 'Home' || e.key === 'Escape') navToday();
});

renderApp();
// Auto-refresh only when viewing today
setInterval(() => { if (dayOffset === 0) renderApp(); }, 10 * 60 * 1000);

// ── Service Worker Registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Reduced motion preference ──
const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (prefersReduced) {
  const style = document.createElement('style');
  style.textContent = '*{animation:none!important;transition:none!important}';
  document.head.appendChild(style);
}
</script>
</body>
