function renderMoonSVG(phaseAngle,size){
  const cx=size/2,cy=size/2,r=size/2-4;
  const a=((phaseAngle%360)+360)%360;
  const illuminated=.5*(1-Math.cos(a*DEG));
  const waxing=a<180;
  const gid='rmg'+Math.round(a*10);
  // Special cases
  if(illuminated<.005){
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;filter:drop-shadow(0 0 10px rgba(155,109,255,.2))">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="#12153a" stroke="rgba(155,109,255,.25)" stroke-width="1" stroke-dasharray="2 3"/></svg>`;
  }
  if(illuminated>.995){
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;filter:drop-shadow(0 0 10px rgba(155,109,255,.2))">
      <defs><radialGradient id="${gid}"><stop offset="0%" stop-color="#f0e8d0"/><stop offset="100%" stop-color="#c8b890"/></radialGradient></defs>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#${gid})"/></svg>`;
  }
  // Clamp for visibility at small sizes
  const minVis=.15,maxVis=.85;
  let drawIllum=illuminated;
  if(drawIllum<minVis)drawIllum=minVis;
  if(drawIllum>maxVis)drawIllum=maxVis;
  const theta=Math.acos(1-2*drawIllum)*RAD;
  const drawPhase=waxing?theta:(360-theta);
  const termR=Math.abs(r*Math.cos(drawPhase*DEG));
  let litPath;
  if(drawIllum<.5){
    if(waxing){litPath=`M ${cx} ${cy-r} A ${r} ${r} 0 0 1 ${cx} ${cy+r} A ${termR} ${r} 0 0 0 ${cx} ${cy-r} Z`;}
    else{litPath=`M ${cx} ${cy-r} A ${r} ${r} 0 0 0 ${cx} ${cy+r} A ${termR} ${r} 0 0 1 ${cx} ${cy-r} Z`;}
  } else {
    if(waxing){litPath=`M ${cx} ${cy-r} A ${r} ${r} 0 0 1 ${cx} ${cy+r} A ${termR} ${r} 0 0 1 ${cx} ${cy-r} Z`;}
    else{litPath=`M ${cx} ${cy-r} A ${r} ${r} 0 0 0 ${cx} ${cy+r} A ${termR} ${r} 0 0 0 ${cx} ${cy-r} Z`;}
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;filter:drop-shadow(0 0 10px rgba(155,109,255,.2))">
    <defs><radialGradient id="${gid}"><stop offset="0%" stop-color="#f0e8d0"/><stop offset="100%" stop-color="#c8b890"/></radialGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#12153a" stroke="rgba(155,109,255,.15)" stroke-width="1"/>
    <path d="${litPath}" fill="url(#${gid})" stroke="rgba(240,232,208,.4)" stroke-width="0.5"/></svg>`;
}

  const ascDeg=NATAL.Ascendant;

  function toXY(deg,r){const a=(180-(deg-ascDeg))*DEG;return{x:cx+r*Math.cos(a),y:cy-r*Math.sin(a)};}

  // Theme-aware colors
  const bgOuter=lt?'#e8e2d6':'#060a1e';

  const bgInner=lt?'#f4f0e6':'#0a0e2a';
  const ringStroke=lt?'rgba(123,82,204,.2)':'rgba(155,109,255,.15)';
  const ringStrokeBold=lt?'rgba(123,82,204,.35)':'rgba(155,109,255,.25)';
  const ringStrokeSubtle=lt?'rgba(123,82,204,.12)':'rgba(155,109,255,.08)';
  const tickColor=lt?'rgba(123,82,204,.25)':'rgba(155,109,255,.15)';
  const tickColorSub=lt?'rgba(123,82,204,.15)':'rgba(155,109,255,.08)';
  const divLine=lt?'rgba(123,82,204,.3)':'rgba(155,109,255,.2)';
  const cuspColor=lt?'rgba(158,122,46,.4)':'rgba(212,168,67,.3)';
  const cuspColorSub=lt?'rgba(123,82,204,.12)':'rgba(155,109,255,.06)';
  const houseNumColor=lt?'rgba(158,122,46,.3)':'rgba(212,168,67,.2)';
  const gradStop1=lt?'#e0d9cc':'#0d1240';
  const gradStop2=lt?'#f4f0e6':'#05081a';

  let svg=`<svg class="chart-svg" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<defs><radialGradient id="cg"><stop offset="0%" stop-color="${gradStop1}"/><stop offset="100%" stop-color="${gradStop2}"/></radialGradient>`;
  svg+=`<filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  // ── BACKGROUND RINGS ──
  // Outermost circle (zodiac band fill)
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rZodOuter}" fill="${bgOuter}" stroke="${ringStrokeBold}" stroke-width="1"/>`;
  // Zodiac inner edge (strong separation)
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rZodInner}" fill="${bgMid}" stroke="${ringStrokeBold}" stroke-width="1"/>`;
  // Transit ring inner edge
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rTransitInner}" fill="${bgInner}" stroke="${ringStroke}" stroke-width=".8"/>`;
  // House area
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rHouse}" fill="none" stroke="${ringStroke}" stroke-width=".8"/>`;
  // Natal ring
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rNatal}" fill="none" stroke="${ringStrokeSubtle}" stroke-width=".6"/>`;
  // Center hub
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="url(#cg)" stroke="${ringStroke}" stroke-width=".8"/>`;

  // ── ZODIAC BAND (outermost ring) ──
  // Degree tick marks every 5 deg on zodiac outer edge
  for(let d=0;d<360;d+=5){
    const isTen=d%10===0;
    const p1=toXY(d,rZodOuter);
    const p2=toXY(d,rZodOuter-(isTen?5:3));
    svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isTen?tickColor:tickColorSub}" stroke-width="${isTen?'.8':'.5'}"/>`;
  }
  // Sign division lines spanning full zodiac band
  const sColors=lt?
    ['#c03348','#248a64','#2a6db5','#c03348','#248a64','#2a6db5','#c03348','#248a64','#2a6db5','#c03348','#248a64','#2a6db5']:
    ['#e0425d','#3dd9a0','#4a9eff','#e0425d','#3dd9a0','#4a9eff','#e0425d','#3dd9a0','#4a9eff','#e0425d','#3dd9a0','#4a9eff'];
  for(let i=0;i<12;i++){
    const deg=i*30;
    const p1=toXY(deg,rZodInner),p2=toXY(deg,rZodOuter);
    svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${divLine}" stroke-width="1"/>`;
    const mid=toXY(deg+15,(rZodInner+rZodOuter)/2);
    svg+=sChG(i, mid.x, mid.y, 14, sColors[i], lt?0.7:0.5);
  }

  // ── HOUSE CUSPS ──
  for(let i=0;i<12;i++){
    const deg=HOUSES[i];const p1=toXY(deg,rInner),p2=toXY(deg,rTransitInner);
    const isAngle=[0,3,6,9].includes(i);
    svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isAngle?cuspColor:cuspColorSub}" stroke-width="${isAngle?'1.2':'.6'}"/>`;
    // Extend angular cusps through transit ring
    if(isAngle){
      const p3=toXY(deg,rTransitInner),p4=toXY(deg,rZodInner);
      svg+=`<line x1="${p3.x}" y1="${p3.y}" x2="${p4.x}" y2="${p4.y}" stroke="${isAngle?cuspColor:'transparent'}" stroke-width=".8" opacity=".5"/>`;
    }
    const nextCusp=HOUSES[(i+1)%12];let midDeg=(deg+nextCusp)/2;
    if(Math.abs(nextCusp-deg)>180)midDeg=norm(midDeg+180);
    const hPos=toXY(midDeg,rInner+16);
    svg+=`<text x="${hPos.x}" y="${hPos.y}" text-anchor="middle" dominant-baseline="central" fill="${houseNumColor}" font-size="9" font-weight="600">${i+1}</text>`;
  }

  // ── ASC/MC LABELS ──
  const ascTick1=toXY(NATAL.Ascendant,rTransitInner),ascTick2=toXY(NATAL.Ascendant,rZodOuter);
  svg+=`<line x1="${ascTick1.x}" y1="${ascTick1.y}" x2="${ascTick2.x}" y2="${ascTick2.y}" stroke="${lt?'rgba(158,122,46,.5)':'rgba(212,168,67,.4)'}" stroke-width="1.8"/>`;
  const ascLbl=toXY(NATAL.Ascendant,rZodOuter+2);
  const ascLx=Math.max(18,Math.min(size-18,ascLbl.x+(ascLbl.x<cx?-14:14)));
  const ascLy=Math.max(10,Math.min(size-10,ascLbl.y));
  svg+=`<text x="${ascLx}" y="${ascLy}" text-anchor="${ascLbl.x<cx?'end':'start'}" dominant-baseline="central" fill="var(--gold)" font-size="9" font-weight="700" opacity=".95">ASC</text>`;
  const mcTick1=toXY(NATAL.MC,rTransitInner),mcTick2=toXY(NATAL.MC,rZodOuter);
  svg+=`<line x1="${mcTick1.x}" y1="${mcTick1.y}" x2="${mcTick2.x}" y2="${mcTick2.y}" stroke="${lt?'rgba(158,122,46,.5)':'rgba(212,168,67,.4)'}" stroke-width="1.8"/>`;
  const mcLbl=toXY(NATAL.MC,rZodOuter+2);
  const mcLx=Math.max(14,Math.min(size-14,mcLbl.x));
  const mcLy=Math.max(10,Math.min(size-10,mcLbl.y+(mcLbl.y<cy?-8:8)));
  svg+=`<text x="${mcLx}" y="${mcLy}" text-anchor="middle" dominant-baseline="${mcLbl.y<cy?'auto':'hanging'}" fill="var(--gold)" font-size="9" font-weight="700" opacity=".95">MC</text>`;

  // ── SPREAD ALGORITHM ──
  function spreadPos(items,minGap){
    const sorted=items.map((it,idx)=>({...it,origIdx:idx,origDeg:it.deg})).sort((a,b)=>a.deg-b.deg);
    for(let pass=0;pass<20;pass++){
      let moved=false;
      for(let i=0;i<sorted.length;i++){
        const next=sorted[(i+1)%sorted.length];
        let gap=norm(next.deg-sorted[i].deg);
        if(gap<minGap){
          const push=Math.min((minGap-gap)/2, 2);
          sorted[i].deg=norm(sorted[i].deg-push);
          next.deg=norm(next.deg+push);
          moved=true;
        }
      }
      if(!moved)break;
    }
    return sorted;
  }

  // ── NATAL PLANETS (inner ring) ──
  const nPlanets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  const nItems=nPlanets.map(p=>({name:p,deg:NATAL[p]}));
  const spreadN=spreadPos(nItems,9);
  for(const item of spreadN){
    const pos=toXY(item.deg,(rNatal+rHouse)/2-2);
    svg+=pChG(item.name, pos.x, pos.y, 12, 'var(--bright)', lt?0.75:0.65);
    // Tick line from true position
    const t1=toXY(NATAL[item.name],rNatal+3),t2=toXY(NATAL[item.name],rNatal-3);
    svg+=`<line x1="${t1.x}" y1="${t1.y}" x2="${t2.x}" y2="${t2.y}" stroke="var(--text)" stroke-width=".8" opacity=".3"/>`;
  }

  // ── TRANSIT PLANETS (middle ring between zodiac and natal) ──
  if(showTransitRing){
    const rTGlyph=(rZodInner+rTransitInner)/2;
    const tPlanets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'];
    const tItems=tPlanets.map(p=>({name:p,deg:cur[p]}));
    const spreadT=spreadPos(tItems,10);
    for(const item of spreadT){
      const pos=toXY(item.deg,rTGlyph);
      const ms=motionStatus(item.name,jd);
      const color=ms.retrograde?'var(--crimson)':'var(--azure)';
      svg+=pChG(item.name, pos.x, pos.y, 14, color, 1.0);
      // Tick line from glyph to true degree on zodiac inner edge
      const t1=toXY(cur[item.name],rZodInner),t2=toXY(cur[item.name],rZodInner+4);
      svg+=`<line x1="${t1.x}" y1="${t1.y}" x2="${t2.x}" y2="${t2.y}" stroke="${color}" stroke-width="1" opacity=".6"/>`;
      // Also tick inward to show degree on transit ring inner
      const t3=toXY(cur[item.name],rTransitInner),t4=toXY(cur[item.name],rTransitInner-3);
      svg+=`<line x1="${t3.x}" y1="${t3.y}" x2="${t4.x}" y2="${t4.y}" stroke="${color}" stroke-width=".6" opacity=".35"/>`;
    }
  }

  // ── ASPECT LINES with angle labels ──
  if(showAspectLines&&transits.length>0){
    const aspSymbols={'conjunction':'\u2600','opposition':'opp','trine':'\u25B3','square':'\u25A1','sextile':'\u2731','quincunx':'Q','semisextile':'ss','semisquare':'ss','sesquiquadrate':'sq'};
    const topT=transits.slice(0,10);
    for(const t of topT){
      const rAsp=rInner+10;
      const from=toXY(t.tLon,rAsp),to=toXY(t.nLon,rAsp);
      const midDeg=norm((t.tLon+t.nLon)/2);
      const angleDiff=Math.abs(norm(t.tLon-t.nLon));
      const curveR=angleDiff>150?rAsp*0.35:rAsp*0.18;
      const cp=toXY(midDeg+(angleDiff>150?180:0),curveR);
      let color,dash='';
      if(t.aspect.type==='hard')color=lt?'rgba(192,51,72,.4)':'rgba(224,66,93,.35)';
      else if(t.aspect.type==='easy')color=lt?'rgba(42,109,181,.35)':'rgba(74,158,255,.3)';
      else if(t.aspect.type==='minor'){color=lt?'rgba(123,82,204,.15)':'rgba(155,109,255,.12)';dash=' stroke-dasharray="2,3"';}
      else color=lt?'rgba(158,122,46,.35)':'rgba(212,168,67,.3)';
      const w=t.aspect.orbActual<1?'1.8':t.aspect.orbActual<3?'1.2':'.7';
      const filt=t.aspect.orbActual<0.5?' filter="url(#glow)"':'';
      svg+=`<path d="M${from.x},${from.y} Q${cp.x},${cp.y} ${to.x},${to.y}" fill="none" stroke="${color}" stroke-width="${w}"${dash}${filt} stroke-linecap="round"/>`;
      // Aspect angle label at midpoint of the bezier
      if(t.aspect.type!=='minor'){
        const labelR=curveR*0.6;
        const lPos=toXY(midDeg+(angleDiff>150?180:0),labelR);
        const aspName=t.aspect.name==='conjunction'?'0':t.aspect.name==='opposition'?'180':t.aspect.name==='trine'?'120':t.aspect.name==='square'?'90':t.aspect.name==='sextile'?'60':t.aspect.angle+'';
        svg+=`<text x="${lPos.x}" y="${lPos.y}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="7" font-weight="600" opacity=".7">${aspName}°</text>`;
      }
    }
  }

  // ── CENTER ──
  svg+=`<text x="${cx}" y="${cy-5}" text-anchor="middle" fill="var(--gold)" font-size="7" font-weight="600" letter-spacing="1.5" opacity=".5">NATAL</text>`;
  svg+=sChG(signOf(NATAL.Sun).index, cx-7, cy+6, 9, 'var(--gold)', 0.4);
  svg+=sChG(signOf(NATAL.Moon).index, cx+7, cy+6, 9, 'var(--text2)', 0.35);
  svg+='</svg>';return svg;
}

let todayZone=(function(){try{return localStorage.getItem('today_zone_v1')||'all';}catch(e){return 'all';}})();
function setTodayZone(z){todayZone=z;try{localStorage.setItem('today_zone_v1',z);}catch(e){}renderApp();window.scrollTo({top:0,behavior:'smooth'});}

// ── Theme system ──
const THEME_KEY='astro_theme_v1';
let themeOverride=(function(){try{return localStorage.getItem(THEME_KEY)||null;}catch(e){return null;}})();
function detectTheme(){
  if(themeOverride)return themeOverride;
  // Respect system preference first
  try{
    if(window.matchMedia){
      if(window.matchMedia('(prefers-color-scheme: dark)').matches)return'dark';
      if(window.matchMedia('(prefers-color-scheme: light)').matches)return'light';
    }
  }catch(e){}
  // Fallback: sun-follows time-of-day
  const h=new Date().getHours();
  return(h>=6&&h<18)?'light':'dark';
}
function applyTheme(t){document.documentElement.classList.toggle('light',t==='light');
  document.querySelector('meta[name=theme-color]').content=t==='light'?'#f4f0e6':'#05081a';}
function toggleTheme(){
  const cur=detectTheme();
  themeOverride=cur==='light'?'dark':'light';
  try{localStorage.setItem(THEME_KEY,themeOverride);}catch(e){}
  applyTheme(themeOverride);
  renderApp();
}
applyTheme(detectTheme());
// React to system theme changes when user hasn't manually overridden
try{
  const mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
  if(mq&&mq.addEventListener)mq.addEventListener('change',()=>{if(!themeOverride){applyTheme(detectTheme());if(typeof renderApp==='function')renderApp();}});
}catch(e){}

// Swipe navigation handled below

// ── Show more transits ──
let showAllTransits=false;
function toggleShowAll(){showAllTransits=!showAllTransits;renderApp();}

// ── Guidance expand ──
let guidanceExpanded=false;
function toggleGuidance(){guidanceExpanded=!guidanceExpanded;
  const el=document.querySelector('.guidance-preview');
  if(el)el.classList.toggle('expanded',guidanceExpanded);
  const btn=document.querySelector('.guidance-toggle');
  if(btn)btn.textContent=guidanceExpanded?'Show less':'Read more';}

function closeConsult(){consultOpen=false;renderApp();}

function openElectional(){electionalOpen=true;renderApp();}

function pickElectionalTask(task){
  electionalTask=task;
  try{electionalResults=findBestElectionalWindows(task,7,3);}

  renderApp();
}

function setSynthOutputCollapsed(v){synthOutputCollapsed=v;try{localStorage.setItem('synth_output_collapsed_v1',v?'1':'0');}catch(e){}renderApp();}

// ── Journal state ──
let journalMood=null;
let journalNoteInput='';
let journalHistoryOpen=false;
let journalContextPending=null; // set when user picks a mood — captures current astro snapshot
function pickMood(m){
  journalMood=m;
  // Context is captured at save time against current renderApp closure values via global stash
  renderApp();
  // Focus note
  setTimeout(()=>{const el=document.getElementById('journal-note');if(el)el.focus();},50);
}
function onJournalNoteInput(v){journalNoteInput=v;}
function saveJournalEntry(){
  if(!journalMood){return;}
  const ctx=window._pendingJournalCtx||{};
  journalAddEntry(journalMood,journalNoteInput,ctx);
  journalMood=null;
  journalNoteInput='';
  renderApp();
}
function cancelJournalEntry(){journalMood=null;journalNoteInput='';renderApp();}
function toggleJournalHistory(){journalHistoryOpen=!journalHistoryOpen;renderApp();}
function deleteJournalEntry(ts){
  if(!confirm('Delete this entry?'))return;
  journalDelete(ts);renderApp();

// ── 7-Day Forecast Engine ──
function compute7Day(baseJd){
  const days=[];
  for(let d=-1;d<=5;d++){
    const fJd=baseJd+d;const fCur=computeAll(fJd);
    const TPS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
    const NPS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode','Ascendant','MC'];
    const fTransits=[];
    for(const tp of TPS){for(const np of NPS){
      if(tp===np&&!['Saturn','Jupiter','Mars','Chiron','NorthNode'].includes(tp))continue;
      const asp=findAspect(fCur[tp],NATAL[np],tp,np,fJd);
      if(asp)fTransits.push({tp,np,aspect:asp,importance:transitImportance(tp,np,asp)});
    }}
    const v=vibeCalc(fTransits);
    const date=jdToDate(fJd);
    days.push({offset:d,date,score:v.score,transits:fTransits,count:fTransits.length});
  }
  return days;
}

function computeSynastryAspects(natalA, natalB) {
  const aspects = [];
  const planets = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto', 'Chiron', 'NorthNode'];
  const angleLons = { asc: natalA.Ascendant, mc: natalA.MC };
  const angleLonsB = { asc: natalB.Ascendant, mc: natalB.MC };

  const allPlanetsA = { ...natalA, ...angleLons };
  const allPlanetsB = { ...natalB, ...angleLonsB };

  const keys = [...planets, 'asc', 'mc'];

  for (let pA of keys) {
    if (!(pA in allPlanetsA)) continue;
    for (let pB of keys) {
      if (!(pB in allPlanetsB)) continue;

      const lonA = allPlanetsA[pA];
      const lonB = allPlanetsB[pB];

      const diff = Math.abs(lonA - lonB);
      const minDiff = Math.min(diff, 360 - diff);

      const orbs = {
        conjunction: 8,
        opposition: 8,
        trine: 6,
        sextile: 5,
        square: 6
      };

      let aspect = null;
      let orbActual = 360;

      for (let [asp, orb] of Object.entries(orbs)) {
        let ang = 0;
        if (asp === 'conjunction') ang = 0;
        else if (asp === 'opposition') ang = 180;
        else if (asp === 'trine') ang = 120;
        else if (asp === 'sextile') ang = 60;
        else if (asp === 'square') ang = 90;

        const d1 = Math.abs(minDiff - ang);
        const d2 = Math.abs(minDiff - (360 - ang));
        const d = Math.min(d1, d2);

        if (d < orb && d < orbActual) {
          aspect = asp;
          orbActual = d;
        }
      }

      if (aspect) {
        aspects.push({
          pA,
          pB,
          aspect,
          orbActual: orbActual.toFixed(2),
          type: ['conjunction', 'trine', 'sextile'].includes(aspect) ? 'easy' : 'challenging'
        });
      }
    }
  }

  return aspects.sort((a, b) => parseFloat(a.orbActual) - parseFloat(b.orbActual));
}

function computeSynastryTraditional(natalA, housesA, natalB, housesB, jdA, jdB) {
  const traditional = {
    lunarContact: false,
    lunarContactType: '',
    venusMarsMutual: false,
    saturnContacts: 0,
    mutualReceptions: 0,
    seventhRulerCheck: '',
    eroticsConnection: false
  };

  // Check for tight Sun-Moon contact
  const sunMoonDiff = Math.abs(natalA.Sun - natalB.Moon);
  const sunMoonDiff2 = Math.abs(360 - sunMoonDiff);
  const sunMoonMinDiff = Math.min(sunMoonDiff, sunMoonDiff2);
  if (sunMoonMinDiff < 8) {
    traditional.lunarContact = true;
    traditional.lunarContactType = sunMoonMinDiff < 4 ? 'conjunction' : 'near-conjunction';
  }

  // Check for Venus-Mars contact
  const venusMars = Math.abs(natalA.Venus - natalB.Mars);
  const venusMars2 = Math.abs(360 - venusMars);
  const venusMarsDiff = Math.min(venusMars, venusMars2);
  if (venusMarsDiff < 7) {
    traditional.venusMarsMutual = true;
  }

  // Count Saturn contacts (hard aspects)
  traditional.saturnContacts = synAspects.filter(a =>
    (a.pA === 'Saturn' || a.pB === 'Saturn') &&
    (a.type === 'challenging')
  ).length;

  return traditional;
}

function generateSynastryNarrative(aspects, traditional) {
  let narrative = '';

  const easy = aspects.filter(a => a.type === 'easy').length;
  const hard = aspects.filter(a => a.type === 'challenging').length;

  }

  if (traditional.venusMarsMutual) {

  </defs>`;

  // Background
  svg += `<circle cx="${cx}" cy="${cy}" r="${r1}" fill="var(--bg)" stroke="var(--gold-line)" stroke-width="1"/>`;

  // House lines (A's - solid gold)
  for (let i = 0; i < 12; i++) {
    const ang = housesA[i] * DEG;
    const x1 = cx + r2 * Math.cos(ang);
    const y1 = cy + r2 * Math.sin(ang);
    const x2 = cx + r1 * Math.cos(ang);
    const y2 = cy + r1 * Math.sin(ang);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--gold-line)" stroke-width="0.5"/>`;
  }

  // House lines (B's - dashed violet)
  for (let i = 0; i < 12; i++) {
    const ang = housesB[i] * DEG;
    const x1 = cx + r1 * Math.cos(ang);
    const y1 = cy + r1 * Math.sin(ang);
    const x2 = cx + r3 * Math.cos(ang);
    const y2 = cy + r3 * Math.sin(ang);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--violet)" stroke-width="0.5" stroke-dasharray="2,2"/>`;
  }

  // Inner ring separators
  svg += `<circle cx="${cx}" cy="${cy}" r="${r2}" fill="none" stroke="var(--gold-line)" stroke-width="0.5"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${r3}" fill="none" stroke="var(--violet)" stroke-width="0.5" stroke-dasharray="2,2"/>`;

  // A's planets (outer ring - gold)
  const planetsA = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto', 'Chiron', 'NorthNode'];
  for (let p of planetsA) {
    if (!(p in natalA)) continue;
    const lon = natalA[p];
    const ang = lon * DEG;
    const x = cx + r2 * Math.cos(ang);
    const y = cy + r2 * Math.sin(ang);
    svg += `<g transform="translate(${x},${y})">`;
    svg += pSVG(p, 18, 'var(--gold)');
    svg += `</g>`;
  }

  // A's ASC/MC (outer ring)
  let ang = natalA.Ascendant * DEG;
  let x = cx + r2 * Math.cos(ang);
  let y = cy + r2 * Math.sin(ang);
  svg += `<g transform="translate(${x},${y})">`;
  svg += `<circle cx="0" cy="0" r="8" fill="none" stroke="var(--gold)" stroke-width="1"/>`;
  svg += `<text x="0" y="3" font-size="8" fill="var(--gold)" text-anchor="middle" font-weight="600">AC</text>`;
  svg += `</g>`;

  ang = natalA.MC * DEG;
  x = cx + r2 * Math.cos(ang);
  y = cy + r2 * Math.sin(ang);
  svg += `<g transform="translate(${x},${y})">`;
  svg += `<circle cx="0" cy="0" r="8" fill="none" stroke="var(--gold)" stroke-width="1"/>`;
  svg += `<text x="0" y="3" font-size="8" fill="var(--gold)" text-anchor="middle" font-weight="600">MC</text>`;
  svg += `</g>`;

  // B's planets (inner ring - azure)
  for (let p of planetsA) {
    if (!(p in natalB)) continue;
    const lon = natalB[p];
    const ang = lon * DEG;
    const x = cx + r3 * Math.cos(ang);
    const y = cy + r3 * Math.sin(ang);
    svg += `<g transform="translate(${x},${y})">`;
    svg += pSVG(p, 16, 'var(--azure)');
    svg += `</g>`;
  }

  // B's ASC/MC (inner ring)
  ang = natalB.Ascendant * DEG;
  x = cx + r3 * Math.cos(ang);
  y = cy + r3 * Math.sin(ang);
  svg += `<g transform="translate(${x},${y})">`;
  svg += `<circle cx="0" cy="0" r="7" fill="none" stroke="var(--azure)" stroke-width="1"/>`;
  svg += `<text x="0" y="2.5" font-size="7" fill="var(--azure)" text-anchor="middle" font-weight="600">AC</text>`;
  svg += `</g>`;

  ang = natalB.MC * DEG;
  x = cx + r3 * Math.cos(ang);
  y = cy + r3 * Math.sin(ang);
  svg += `<g transform="translate(${x},${y})">`;
  svg += `<circle cx="0" cy="0" r="7" fill="none" stroke="var(--azure)" stroke-width="1"/>`;
  svg += `<text x="0" y="2.5" font-size="7" fill="var(--azure)" text-anchor="middle" font-weight="600">MC</text>`;
  svg += `</g>`;

  // Aspect lines (inter-chart only)
  const rAsp = (r2 + r3) / 2;
  for (let asp of synAspects.slice(0, 20)) { // Limit to avoid clutter
    const keyMapA = { asc: 'Ascendant', mc: 'MC' };
    const keyMapB = { asc: 'Ascendant', mc: 'MC' };
    const lonA = natalA[asp.pA] !== undefined ? natalA[asp.pA] : natalA[keyMapA[asp.pA]];
    const lonB = natalB[asp.pB] !== undefined ? natalB[asp.pB] : natalB[keyMapB[asp.pB]];

    if (lonA === undefined || lonB === undefined) continue;

    const angA = lonA * DEG;
    const angB = lonB * DEG;

    const x1 = cx + rAsp * Math.cos(angA);
    const y1 = cy + rAsp * Math.sin(angA);
    const x2 = cx + rAsp * Math.cos(angB);
    const y2 = cy + rAsp * Math.sin(angB);

    const aspColor = asp.type === 'easy' ? 'var(--emerald)' : 'var(--crimson)';
    const aspOpacity = 0.4;

    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${aspColor}" stroke-width="1" opacity="${aspOpacity}"/>`;
  }

  // Center labels
  svg += `<circle cx="${cx}" cy="${cy}" r="35" fill="var(--bg)" stroke="var(--gold-line)" stroke-width="1"/>`;
  svg += `<text x="${cx}" y="${cy - 10}" font-size="10" fill="var(--gold)" text-anchor="middle" font-weight="600">You</text>`;
  svg += `<text x="${cx}" y="${cy + 8}" font-size="10" fill="var(--azure)" text-anchor="middle" font-weight="600">Partner</text>`;

  svg += `</svg>`;
  return svg;
}

function renderSynastryGrid(natalA, natalB, synAspects) {
  const planetsA = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
  const planetsB = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];

  let html = `<div class="aspect-grid">`;

  // Header row
  html += `<div class="grid-header" style="border-right: 1px solid var(--hairline);"></div>`;
  for (let p of planetsA) {
    html += `<div class="grid-header">${p.substring(0, 3)}</div>`;
  }

  // Data rows
  for (let pB of planetsB) {
    html += `<div class="grid-header" style="border-right: 1px solid var(--hairline); justify-content: flex-end; padding-right: 0.3rem;">${pB.substring(0, 3)}</div>`;

    for (let pA of planetsA) {
      const asp = synAspects.find(a =>
        (a.pA === pA && a.pB === pB) ||
        (a.pA === pB && a.pB === pA)
      );

      html += `<div class="grid-cell" onclick="synExpanded='${pA}-${pB}'; renderApp();">`;

      if (asp) {
        const aspColor = asp.type === 'easy' ? 'var(--emerald)' : 'var(--crimson)';
        html += aSVG(asp.aspect, 24, aspColor);
      }

      html += `</div>`;
    }
  }

  html += `</div>`;

  // Expanded interpretation if selected
  if (synExpanded) {
    const [pA, pB] = synExpanded.split('-');
    const asp = synAspects.find(a =>
      (a.pA === pA && a.pB === pB) ||
      (a.pA === pB && a.pB === pA)
    );

    if (asp) {
      const interpKey = `${asp.pA}-${asp.pB}|${asp.aspect}`;
      const interp = getSynastryInterpretation(interpKey, asp);

      html += `<div class="aspect-interpretation">
        <div class="header" onclick="synExpanded=null; renderApp();">
          ${pSVG(asp.pA, 20, 'var(--gold)')}
          ${aSVG(asp.aspect, 16, asp.type === 'easy' ? 'var(--emerald)' : 'var(--crimson)')}
          ${pSVG(asp.pB, 20, 'var(--azure)')}
          <span class="title">${asp.pA} ${asp.aspect} ${asp.pB}</span>
        </div>
        <div class="detail">${interp.detail}</div>
      </div>`;
    }
  }

  return html;
}

// SECTION 7: ASTROCARTOGRAPHY COMPUTATION
// ============================================================================

function computeAstroCartoLines(birthJD, natalPositions) {
  const T = jdToT(birthJD);
  const GAST = getGAST(T);
  const RAD = Math.PI / 180;
  const DEG = 180 / Math.PI;

  const lines = {};
  const planets = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto', 'Chiron', 'NorthNode'];

  for (let planet of planets) {
    if (!(planet in natalPositions)) continue;

    const lon = natalPositions[planet];
    const ra = lonToRA(lon);
    const dec = lonToDec(lon);

    // MC line (single meridian at this RA)
    const mcLon = ((ra - GAST + 360) % 360);
    lines[planet] = {
      mc: mcLon,
      ic: (mcLon + 180) % 360,
      asc: computeASCLine(ra, dec),
      dsc: computeDSCLine(ra, dec)
    };
  }

  return lines;
}

function lonToRA(lon) {
  const DEG = Math.PI / 180;
  const RAD = 180 / Math.PI;
  const OBLIQ = 23.4392911 * DEG;

  const sinRA = Math.sin(lon * DEG) * Math.cos(OBLIQ);
  const cosRA = Math.cos(lon * DEG);

  return Math.atan2(sinRA, cosRA) * RAD;
}

function lonToDec(lon) {
  const DEG = Math.PI / 180;
  const RAD = 180 / Math.PI;
  const OBLIQ = 23.4392911 * DEG;

  const sinDec = Math.sin(lon * DEG) * Math.sin(OBLIQ);

  return Math.asin(sinDec) * RAD;
}

function computeASCLine(ra, dec) {
  const DEG = Math.PI / 180;
  const RAD = 180 / Math.PI;
  const points = [];

  for (let lat = -66; lat <= 66; lat += 6) {
    const lon = raDecToLon(ra, dec, lat);
    points.push({ lat, lon: (lon + 360) % 360 });
  }

  return points;
}

function computeDSCLine(ra, dec) {
  const points = [];

  for (let lat = -66; lat <= 66; lat += 6) {
    const lon = raDecToLon(ra, dec, lat);
    points.push({ lat, lon: (lon + 180) % 360 });
  }

  return points;
}

function raDecToLon(ra, dec, lat) {
  const DEG = Math.PI / 180;
  const RAD = 180 / Math.PI;
  const OBLIQ = 23.4392911 * DEG;

  const latRad = lat * DEG;
  const raRad = ra * DEG;
  const decRad = dec * DEG;

  const y = Math.sin(raRad) * Math.cos(decRad);
  const x = Math.sin(decRad) * Math.cos(OBLIQ) - Math.cos(raRad) * Math.cos(decRad) * Math.sin(OBLIQ);

  return Math.atan2(y, x) * RAD;
}

function getGAST(T) {
  // Simplified GAST calculation
  const JD = 2451545.0 + T * 36525;
  const D = JD - 2451545;
  const gmst = (18.697374558 + 24.06570982441908 * D) % 24;
  return gmst * 15;
}

function renderAstroCartoMap(lines, toggles, tapInfo, width = 400, height = 250) {
  const aspect = width / height;
  const svgWidth = width;
  const svgHeight = height;

  let svg = `<svg width="${svgWidth}" height="${svgHeight}" viewBox="0 0 360 180" style="background-color: var(--bg);" class="map-container">`;

  // Defs
  svg += `<defs>
    <filter id="ac-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="ocean-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: var(--bg); stop-opacity: 1"/>
      <stop offset="100%" style="stop-color: var(--surface); stop-opacity: 1"/>
    </linearGradient>
  </defs>`;

  // Ocean background
  svg += `<rect width="360" height="180" fill="url(#ocean-gradient)"/>`;

  // Coastlines
  svg += `<path d="${WORLD_COASTLINE}" fill="var(--card)" stroke="var(--violet)" stroke-width="0.3" opacity="0.6"/>`;

  // Graticule (light grid)
  for (let lon = 0; lon < 360; lon += 30) {
    svg += `<line x1="${lon}" y1="0" x2="${lon}" y2="180" stroke="var(--hairline)" stroke-width="0.2" opacity="0.3"/>`;
  }
  for (let lat = -60; lat <= 60; lat += 30) {
    const y = 90 - lat;
    svg += `<line x1="0" y1="${y}" x2="360" y2="${y}" stroke="var(--hairline)" stroke-width="0.2" opacity="0.3"/>`;
  }

  // Equator emphasis
  svg += `<line x1="0" y1="90" x2="360" y2="90" stroke="var(--gold-line)" stroke-width="0.5" opacity="0.3"/>`;

  // Planet lines
  const activePlanets = Object.keys(toggles).filter(p => toggles[p]);
  const planetColors = {
    Sun: 'var(--gold)',
    Moon: 'var(--pearl)',
    Mercury: 'var(--text2)',
    Venus: 'var(--emerald)',
    Mars: 'var(--crimson)',
    Jupiter: 'var(--violet)',
    Saturn: 'var(--text3)',
    Uranus: 'var(--azure)',
    Neptune: 'rgba(147, 112, 219, 0.6)',
    Pluto: 'rgba(220, 20, 60, 0.5)',
    Chiron: 'var(--text)',
    NorthNode: 'var(--gold)'
  };

  if (lines) {
    for (let planet of activePlanets) {
      if (!(planet in lines)) continue;

      const planetLine = lines[planet];
      const color = planetColors[planet] || 'var(--text2)';

      // MC line (vertical)
      const mcLon = planetLine.mc;
      svg += `<line x1="${mcLon}" y1="0" x2="${mcLon}" y2="180" stroke="${color}" stroke-width="1.5" opacity="0.7" filter="url(#ac-glow)"/>`;

      // IC line (vertical, opposite)
      const icLon = planetLine.ic;
      svg += `<line x1="${icLon}" y1="0" x2="${icLon}" y2="180" stroke="${color}" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>`;

      // ASC line (polyline through points)
      if (planetLine.asc && planetLine.asc.length > 0) {
        let pathData = `M ${planetLine.asc[0].lon} ${90 - planetLine.asc[0].lat}`;
        for (let i = 1; i < planetLine.asc.length; i++) {
          const pt = planetLine.asc[i];
          pathData += ` L ${pt.lon} ${90 - pt.lat}`;
        }
        svg += `<path d="${pathData}" fill="none" stroke="${color}" stroke-width="1" opacity="0.6" filter="url(#ac-glow)"/>`;
      }

      // DSC line (polyline through points)
      if (planetLine.dsc && planetLine.dsc.length > 0) {
        let pathData = `M ${planetLine.dsc[0].lon} ${90 - planetLine.dsc[0].lat}`;
        for (let i = 1; i < planetLine.dsc.length; i++) {
          const pt = planetLine.dsc[i];
          pathData += ` L ${pt.lon} ${90 - pt.lat}`;
        }
        svg += `<path d="${pathData}" fill="none" stroke="${color}" stroke-width="1" opacity="0.4" stroke-dasharray="2,1"/>`;
      }
    }
  }

  // Tap info pin
  if (tapInfo) {
    const pinX = tapInfo.lon;
    const pinY = 90 - tapInfo.lat;
    svg += `<circle cx="${pinX}" cy="${pinY}" r="4" class="map-pin" filter="url(#ac-glow)"/>`;
    svg += `<circle cx="${pinX}" cy="${pinY}" r="6" fill="none" stroke="var(--gold)" stroke-width="0.5" opacity="0.5"/>`;
  }

  svg += `</svg>`;
  return svg;
}

function getSynastryInterpretation(key, aspect) {
  // Try exact key
  if (SYNASTRY_VOICE[key]) return SYNASTRY_VOICE[key];

  // Try reversed planets
  const [pA, pB] = key.split('|')[0].split('-');
  const revKey = `${pB}-${pA}|${aspect.aspect}`;
  if (SYNASTRY_VOICE[revKey]) return SYNASTRY_VOICE[revKey];

  // Fallback generic
  return {
    feel: `A ${aspect.aspect} aspect between ${aspect.pA} and ${aspect.pB}.`,
    detail: `This ${aspect.type} aspect suggests ${aspect.type === 'easy' ? 'harmony and support' : 'tension and growth potential'} between these planetary energies in the synastry chart.`
  };
}

function handleMapClick(evt, svgEl, lines) {
  const rect = svgEl.querySelector('svg').getBoundingClientRect();
  const x = evt.clientX - rect.left;
  const y = evt.clientY - rect.top;

  const svg = svgEl.querySelector('svg');
  const viewBox = svg.getAttribute('viewBox').split(' ');
  const vbWidth = parseFloat(viewBox[2]);
  const vbHeight = parseFloat(viewBox[3]);

  const lon = (x / rect.width) * vbWidth;
  const lat = 90 - (y / rect.height) * vbHeight;

  // Find nearest line
  let nearest = null;
  let minDist = Infinity;

  for (let planet of Object.keys(acPlanetToggles)) {
    if (!acPlanetToggles[planet]) continue;
    if (!(planet in lines)) continue;

    const planetLine = lines[planet];

    // MC line
    const mcDist = Math.abs(lon - planetLine.mc);
    if (mcDist < minDist) {
      minDist = mcDist;
      nearest = { planet, angleType: 'mc' };
    }

    // IC line
    const icDist = Math.abs(lon - planetLine.ic);
    if (icDist < minDist) {
      minDist = icDist;
      nearest = { planet, angleType: 'ic' };
    }

    // ASC line
    if (planetLine.asc) {
      for (let pt of planetLine.asc) {
        const dist = Math.sqrt(Math.pow(lon - pt.lon, 2) + Math.pow(lat - pt.lat, 2));
        if (dist < minDist) {
          minDist = dist;
          nearest = { planet, angleType: 'asc' };
        }
      }
    }

    // DSC line
    if (planetLine.dsc) {
      for (let pt of planetLine.dsc) {
        const dist = Math.sqrt(Math.pow(lon - pt.lon, 2) + Math.pow(lat - pt.lat, 2));
        if (dist < minDist) {
          minDist = dist;
          nearest = { planet, angleType: 'dsc' };
        }
      }
    }
  }

  if (nearest && minDist < 20) {
    acTapInfo = { lat, lon, nearestLine: nearest };
  }

  renderApp();
}

            Sun:{Aries:'Identity reignites. The solar year begins — willpower, initiative, and self-assertion take the lead. You feel the urge to start fresh, act first, and define yourself on your own terms. Physical energy surges.',Taurus:'Energy grounds. The restless fire of Aries gives way to steady earth. Focus shifts to material security, sensory pleasure, and building what lasts. Patience replaces urgency. The body wants comfort, good food, and tangible results.',Gemini:'Curiosity wakes up. The mind speeds up, conversations multiply, and information flows from every direction. Versatility matters more than depth. Social energy rises — you want to talk, learn, and move between ideas freely.',Cancer:'Attention turns inward and homeward. Emotional needs surface. Family, roots, and domestic life demand presence. The question shifts from "what do I want?" to "what makes me feel safe?" Nurturing and being nurtured become central.',Leo:'Self-expression ignites. Creativity, romance, and the desire to be seen step forward. Generosity increases alongside ego. The heart wants to play, create, and shine. Children, art, and pleasure take center stage.',Virgo:'Precision replaces spectacle. The focus narrows to health, routines, skills, and service. What is broken demands fixing. The mind turns analytical — editing, improving, getting the details right. Humility is the operating mode.',Libra:'Relationships take the spotlight. Partnerships, negotiations, and questions of fairness dominate. You see yourself through others. Aesthetic sensibility heightens. Balance and diplomacy replace Virgo\'s solitary refinement.',Scorpio:'Intensity deepens. The surface no longer satisfies — you want truth, transformation, and power. Shared resources, debts, sexuality, and hidden motivations come into focus. What was buried demands excavation.',Sagittarius:'The horizon expands. Travel, higher learning, philosophy, and belief systems call. Optimism and restlessness increase. The mind wants big ideas, not details. Faith — in something, anything — becomes fuel.',Capricorn:'Ambition crystallizes. Career, reputation, and long-term structure come into focus. The Sun enters its most serious, disciplined territory. You are measured by results, not intentions. Authority and responsibility weigh heavier.',Aquarius:'The collective enters focus. Community, friends, networks, and ideals take precedence over personal ambition. Unconventional thinking accelerates. The question shifts from "what do I achieve?" to "what do I contribute?"',Pisces:'Boundaries dissolve. The final sign of the zodiac brings endings, rest, and spiritual surrender. Imagination, compassion, and escapism intensify equally. The ego softens. What needs releasing becomes impossible to ignore.'},

            Venus:{Aries:'Desire becomes impulsive and direct. You want what you want and you want it now. Attraction is intense but impatient. Spending can be reckless. Romance becomes a conquest. Independence in relationships is non-negotiable.',Taurus:'Venus comes home. Pleasure, comfort, and beauty become paramount. Attraction is steady and sensual. Spending favors quality. Loyalty deepens. The body wants luxury, good food, and physical affection. Relationships stabilize.',Gemini:'Attraction becomes intellectual and playful. Flirting increases, commitment feels confining, and variety appeals more than depth. You spend on books, events, and social outings. Charm is verbal.',Cancer:'Love becomes nurturing and protective. You crave emotional security in relationships. Spending turns domestic — home, food, family. Sentimentality rises. You attract by caring, sometimes by clinging.',Leo:'Love becomes dramatic, generous, and visible. You want romance with grand gestures. Creativity in self-presentation peaks. Spending on self-expression and entertainment increases. You attract by shining.',Virgo:'Love becomes practical and modest. You show affection through service and attention to detail. Attraction is quiet and discerning. Spending becomes careful. Criticism can replace warmth if unchecked.',Libra:'Venus comes home again. Beauty, harmony, and partnership are paramount. Aesthetic sense peaks. Social grace is effortless. Spending on art, clothes, and shared experiences rises. Relationships balance.',Scorpio:'Desire intensifies. Attraction becomes all-or-nothing, jealous, possessive, and deeply transformative. Surface connections repel you. Spending can be secretive. Love becomes a power exchange.',Sagittarius:'Love becomes adventurous and freedom-seeking. You attract through optimism and expansiveness. Spending on travel and experiences increases. Commitment feels like a cage unless it includes growth.',Capricorn:'Love becomes serious and goal-oriented. You are attracted to ambition, stability, and maturity. Spending is strategic. Public image in relationships matters. Warmth is real but restrained.',Aquarius:'Love becomes unconventional and friendship-based. You attract through intellect and independence. Spending supports causes and technology. Emotional intimacy can feel threatening. Freedom is paramount.',Pisces:'Love becomes transcendent, sacrificial, and boundaryless. You idealize partners and absorb their emotions. Spending on art, charity, and escapism increases. Compassion replaces judgment. Illusion is the risk.'},

ic. Ambition intensifies — you climb ruthlessly toward goals. Anger is cold and calculated. Physical effort serves long-term plans. Authority conflicts surface.',Aquarius:'Energy becomes erratic and ideological. You fight for principles and collective causes rather than personal gain. Rebellion and unpredictability mark your actions. Traditional methods bore you.',Pisces:'Energy dissolves. Motivation becomes confusing — you fight for fantasies or avoid fighting entirely. Aggression is passive or self-directed. Spiritual warrior energy can emerge but direction is hard to find.'},
            Jupiter:{Aries:'Growth comes through bold initiative. Opportunity rewards those who act first and ask later. Self-confidence expands — sometimes into arrogance. Risk-taking is amplified. Independence is the path to abundance.',Taurus:'Growth comes through material building. Financial opportunities expand. Abundance manifests as physical comfort, possessions, and steady accumulation. Excess shows as overindulgence. Patience generates wealth.',Gemini:'Growth comes through communication and learning. Opportunities multiply through conversation, writing, and networking. Information abundance can overwhelm. Teaching and media bring expansion.',Cancer:'Growth comes through home, family, and emotional roots. Real estate, domestic expansion, and nurturing others generate opportunity. Generosity becomes protective. Emotional abundance.',Leo:'Growth comes through creative expression and visibility. Entertainment, children, romance, and art bring opportunity. Generosity becomes dramatic. Ego expansion is the excess risk. Confidence attracts.',Virgo:'Growth comes through service, health, and precision. Opportunities in healthcare, analysis, and system improvement expand. Excess shows as perfectionism. Skill development generates abundance.',Libra:'Growth comes through partnership and diplomacy. Legal matters, contracts, and one-on-one relationships bring opportunity. Excess shows as over-accommodation. Justice and beauty expand.',Scorpio:'Growth comes through transformation and shared resources. Inheritance, investment, and deep psychological work bring opportunity. Power accumulates. Excess shows as obsession with control.',Sagittarius:'Jupiter comes home. Maximum expansion in travel, education, philosophy, and publishing. Optimism peaks — sometimes recklessly. The world opens. Faith becomes fuel. Excess in everything.',Capricorn:'Growth comes through discipline and ambition. Career advancement rewards sustained effort. Expansion is slow, serious, and structural. Excess shows as workaholism. Authority increases.',Aquarius:'Growth comes through innovation and community. Networks, technology, and humanitarian work bring opportunity. Expansion is unconventional. Excess shows as detachment from reality.',Pisces:'Jupiter co-rules Pisces. Growth comes through spirituality, creativity, and compassion. Imagination expands without limit. Excess shows as escapism or savior complex. Boundless empathy.'},

ing requires credentials, not just enthusiasm.',Capricorn:'Saturn comes home. Maximum structural pressure on career, reputation, and long-term goals. Authority is earned or stripped. Ambition meets reality. The hardest work of a generation. What you build now is load-bearing.',Aquarius:'Saturn co-rules Aquarius. Social structures, group commitments, and ideals are tested. Community responsibility becomes personal. Friendships are pruned to what\'s real. Innovation requires discipline, not just vision.',Pisces:'Discipline confronts dissolution. Spiritual practices, creative intuition, and emotional boundaries must find structure. Escapism is no longer available — Saturn demands you face what you\'ve been avoiding. Endings formalize.'},

illusionment. Institutional foundations become uncertain. Career paths dissolve and reform.',Aquarius:'Collective imagination merges with technology and collective ideals. Idealization of the future and human potential. Digital reality blurs with actual reality. Social movements become transcendent or delusional.',Pisces:'Neptune comes home. Maximum dissolution. Collective imagination has no boundaries. Spirituality, art, and confusion peak simultaneously. The era\'s defining question: what is real? The answer: less than you think.'},

y and social organization. How people group, network, and envision the future undergoes total transformation. Collective identity is destroyed and rebuilt.',Pisces:'Collective power confronts the unconscious. Spirituality, imagination, and collective delusion undergo total transformation. The era\'s shadow material surfaces for reckoning.'},

  {

        h+=`<div class="notif-row"><div><div class="notif-label">Void of course</div><div class="notif-desc">Alert at VOC start and end</div></div><div class="notif-toggle ${notifPrefs.vocAlerts?'on':''}" onclick="notifSetPref('vocAlerts',!notifPrefs.vocAlerts)"></div></div>`;
        h+=`<div class="notif-row"><div><div class="notif-label">Planetary hour</div><div class="notif-desc">Each new hour and its intent (can be frequent)</div></div><div class="notif-toggle ${notifPrefs.planetaryHour?'on':''}" onclick="notifSetPref('planetaryHour',!notifPrefs.planetaryHour)"></div></div>`;
        h+=`<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="notif-btn off" onclick="notifToggleMaster()">Disable</button></div>`;
      } else {
        h+=`<div class="notif-desc" style="margin-top:4px">Tap to configure alert types.</div>`;
      }
    }
    h+=`</div>`;
  }

  h+=`</div>`;/* /t-depth */
  h+=`</div>`; // end today tab

  // ══════════ CHART TAB ══════════
  h+=`<div class="tab-content ${activeTab==='chart'?'active':''}">`;
  h+=`<div class="chart-wrap full">${renderChartWheel(cur,transits,jd,420)}</div>`;
  h+=`<div class="chart-toggles">`;
  h+=`<div class="chart-toggle ${showTransitRing?'on':''}" onclick="toggleChart('transit')">Transits</div>`;
  h+=`<div class="chart-toggle ${showAspectLines?'on':''}" onclick="toggleChart('aspects')">Aspects</div></div>`;

  h+=`<div class="section-title">Current Positions</div>`;
  h+=`<div class="pos-grid">`;
  for(const p of TPS){
    const isR=retros.includes(p),isS=stats.includes(p);
    const dig=getDignity(p,cur[p]);const label=p==='NorthNode'?'N.Node':p;
    h+=`<div class="pos-item" onclick="openPlanetModal('${p}',${JSON.stringify(cur).replace(/"/g,'&quot;')},${jd})">`;
    h+=`${pSVG(p,18,'var(--gold)')}`;
    h+=`<div style="flex:1;min-width:0"><div style="font-size:10px;color:var(--text2)">${label}`;
    if(isR)h+=`<span style="color:var(--crimson);margin-left:4px" onclick="event.stopPropagation();showTip('Retrograde')">Rx</span>`;
    if(isS)h+=`<span style="color:var(--amber);margin-left:4px">STA</span>`;
    if(dig)h+=`<span style="color:${dig.color};margin-left:4px;font-size:9px;font-weight:700">${dig.label}</span>`;
    h+=`</div><div style="font-size:12px;font-weight:500;color:var(--bright)">${fmtShort(cur[p])}</div></div>`;
    h+=`<span style="font-size:10px;color:var(--emerald);opacity:.5">H${houseOf(cur[p])}</span></div>`;
  }
  h+=`</div></div>`;

  // ══════════ NATAL TAB ══════════
  h+=`<div class="tab-content ${activeTab==='natal'?'active':''}">`;
  h+=`<div class="chart-wrap full" style="margin-bottom:16px">${renderChartWheel(cur,[],jd,400)}</div>`;

  // Fixed Star natal contacts
  const fsNatal=scanNatalFixedStars(1.0);
  h+=`<div class="fs-card">`;
  h+=`<div class="fs-head" onclick="toggleFSNatal()">`;
  h+=`<span>Fixed Stars in Your Chart</span>`;
  h+=`<span class="section-chev ${fsNatalExpanded?'open':''}">&#9654;</span></div>`;
  h+=`<div class="fs-sub">Natal planets and angles within 1° of a named fixed star. These contacts were read by traditional astrologers as fate-threads — the star\'s nature woven into whatever point it touched.</div>`;
  if(fsNatal.length===0){
    h+=`<div class="fs-empty">No natal point sits within 1° of the principal named stars.</div>`;
  } else {
    for(const h1 of fsNatal){
      h+=`<div class="fs-hit">`;
      h+=`<div class="fs-hit-head"><div class="fs-hit-title">${pSVG(h1.point,12,'var(--gold)')} ${h1.point}<span class="fs-dot">☌</span>${h1.star.name}</div>`;
      h+=`<div class="fs-hit-orb">${h1.orb.toFixed(2)}° orb</div></div>`;
      h+=`<div class="fs-hit-nature">${h1.star.nature} · mag ${h1.star.mag}</div>`;
      if(fsNatalExpanded)h+=`<div class="fs-hit-meaning">${h1.star.meaning}</div>`;
      h+=`</div>`;
    }
  }
  h+=`</div>`;

  // ─── Natal Aspects ───
  const natalAspList=findNatalAspects();
  h+=`<div class="fs-card">`;
  h+=`<div class="fs-head" onclick="toggleNatalAspects()">`;
  h+=`<span>Aspects in Your Chart</span>`;
  h+=`<span class="section-chev ${natalAspectsExpanded?'open':''}">&#9654;</span></div>`;
  h+=`<div class="fs-sub">Geometric relationships between natal points. Tight aspects (small orb) and those involving Sun, Moon, or angles carry the strongest weight. Tap any aspect for a deeper reading.</div>`;
  if(natalAspectsExpanded){
    if(natalAspList.length===0){
      h+=`<div class="fs-empty">No aspects within orb — rare, and worth noting.</div>`;
    } else {
      for(const a of natalAspList){
        const nat=ASPECT_NATURE[a.aspect]||{};
        const key=natalAspectKey(a.p1,a.p2,a.aspect);
        const depth=natalAspectDepth(a.p1,a.p2,a.aspect);
        const id='na-'+a.p1+'-'+a.p2+'-'+a.aspect;
        const isOpen=expandedCards[id];
        const lbl1=a.p1==='NorthNode'?'N.Node':a.p1;const lbl2=a.p2==='NorthNode'?'N.Node':a.p2;
        const tight=a.orb<=1?' tight':'';
        h+=`<div class="natal" data-card-id="${id}" onclick="toggleCard('${id}')" style="margin-top:8px">`;
        h+=`<div class="fs-hit-head"><div class="fs-hit-title">`;
        h+=`${pSVG(a.p1,14,'var(--gold)')} ${lbl1} <span class="fs-dot" style="color:${nat.color||'var(--text2)'};font-size:14px">${nat.glyph||''}</span> ${pSVG(a.p2,14,'var(--gold)')} ${lbl2}`;
        h+=`</div><div class="fs-hit-orb${tight}">${a.orb.toFixed(2)}°</div></div>`;
        h+=`<div class="fs-hit-nature" style="color:${nat.color||'var(--text2)'}">${a.aspect} · ${a.type}</div>`;
        h+=`<div class="natal-expand ${isOpen?'open':''}"><div style="padding:10px 0 0;border-top:1px solid var(--surface);margin-top:8px">`;
        h+=`<div style="font-size:12px;line-height:1.6;color:var(--text);margin-bottom:8px"><strong style="color:${nat.color||'var(--gold)'}">${a.aspect}:</strong> ${nat.nature||''}</div>`;
        if(depth){
          h+=`<div style="font-size:12px;line-height:1.6;color:var(--violet)"><strong>${lbl1} ${nat.glyph||''} ${lbl2}:</strong> ${depth}</div>`;
        } else {
          h+=`<div style="font-size:12px;line-height:1.6;color:var(--text2);font-style:italic">Apply the general ${a.aspect} nature above to the blend of ${lbl1}'s themes (${NATAL_VOICE[a.p1]?.title||a.p1}) with ${lbl2}'s themes (${NATAL_VOICE[a.p2]?.title||a.p2}).</div>`;
        }
        h+=`</div></div></div>`;
      }
    }
  } else {
    // Compact preview: top 6
    h+=`<div style="padding:8px 0 4px;display:flex;flex-wrap:wrap;gap:6px">`;
    for(const a of natalAspList.slice(0,6)){
      const nat=ASPECT_NATURE[a.aspect]||{};
      const lbl1=a.p1==='NorthNode'?'NN':a.p1.slice(0,3);const lbl2=a.p2==='NorthNode'?'NN':a.p2.slice(0,3);
      h+=`<span class="natal-tag" style="color:${nat.color||'var(--text2)'}">${lbl1} ${nat.glyph||''} ${lbl2}</span>`;
    }
    if(natalAspList.length>6)h+=`<span class="natal-tag" style="opacity:.6">+${natalAspList.length-6} more</span>`;
    h+=`</div>`;
  }
  h+=`</div>`;

  const natalPlanets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  for(const p of natalPlanets){
    const lon=NATAL[p];const sign=signOf(lon);const house=houseOf(lon);
    const dig=getDignity(p,lon);const nv=NATAL_VOICE[p]||{};const hv=HOUSE_VOICE[house]||{};
    const label=p==='NorthNode'?'North Node':p;
    const id='n-'+p;const isOpen=expandedCards[id];

    h+=`<div class="natal" data-card-id="${id}" onclick="toggleCard('${id}')">`;
    h+=`<div class="natal-head">${pSVG(p,28,'var(--gold)')}<div>`;
    h+=`<div class="natal-name">${label}</div>`;
    h+=`<div class="natal-pos">${sign.name} ${sign.degree}° · House ${house}</div></div></div>`;
    if(nv.title)h+=`<div class="natal-title">${nv.title}</div>`;
    if(nv.desc)h+=`<div class="natal-desc">${nv.desc}</div>`;
    h+=`<div class="natal-tags">`;
    h+=`<span class="natal-tag">${sSVG(sign.name,13,'var(--text2)')} ${sign.name}</span>`;
    h+=`<span class="natal-tag" onclick="event.stopPropagation();showTip('House')">H${house}: ${hv.name||''}</span>`;
    if(dig)h+=`<span class="natal-tag" style="color:${dig.color}" onclick="event.stopPropagation()">${dig.label}</span>`;
    h+=`</div>`;

    // Expandable detail
    h+=`<div class="natal-expand ${isOpen?'open':''}"><div style="padding:12px 0 0;border-top:1px solid var(--surface);margin-top:10px">`;
    if(dig)h+=`<div style="font-size:12px;line-height:1.6;color:var(--text);margin-bottom:8px"><strong style="color:${dig.color}">${dig.label}:</strong> ${dig.desc}</div>`;
    const nPIH=planetInHouse(p,house);
    h+=`<div style="font-size:12px;line-height:1.6;color:var(--text);margin-bottom:8px"><strong>House ${house} (${hv.name||''}):</strong> ${nPIH||houseVoiceDesc(house)}</div>`;
    // House ruler connection
    const ruler=RULERS[sign.name];
    if(ruler&&NATAL[ruler]!==undefined){
      const rulerSign=signOf(NATAL[ruler]);const rulerHouse=houseOf(NATAL[ruler]);
      h+=`<div style="font-size:12px;line-height:1.6;color:var(--violet)"><strong>Sign Ruler:</strong> ${sign.name} is ruled by ${ruler} (in ${rulerSign.name}, House ${rulerHouse}). The condition of ${ruler} in your chart colors how this ${label} expresses itself.</div>`;
    }
    h+=`</div></div></div>`;
  }
  h+=`</div>`;

  // ══════════ LORE / REFERENCE TAB ══════════
  h+=`<div class="tab-content ${activeTab==='lore'?'active':''}">`;
  if(!refIntroDismissed){
    h+=`<div class="ref-intro" style="position:relative;padding-right:32px">A grounded index of the techniques, texts, and figures this app draws on — Hellenistic, Perso-Arabic, Latin, and Hermetic. Tap any term to open source and lineage.<span onclick="event.stopPropagation();dismissRefIntro()" style="position:absolute;top:8px;right:10px;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:4px">&times;</span></div>`;
  }
  const q=(refQuery||'').toLowerCase().trim();
  h+=`<div class="ref-search-wrap">`;
  h+=`<input class="ref-search" type="text" placeholder="Search terms, sources, figures..." value="${refQuery.replace(/"/g,'&quot;')}" oninput="setRefQuery(this.value)" onclick="event.stopPropagation()">`;
  const cats=['All','Technique','Object','Concept','Tradition','Figure'];
  h+=`<div class="ref-cats">`;
  for(const c of cats){
    h+=`<div class="ref-cat ${refCategory===c?'on':''}" onclick="setRefCat('${c}')">${c}</div>`;
  }
  h+=`</div>`;
  h+=`</div>`;
  // Filter
  const refFiltered=REFERENCES.filter(r=>{
    if(refCategory!=='All'&&r.cat!==refCategory)return false;
    if(!q)return true;
    return(r.term+' '+r.summary+' '+r.source+' '+r.lineage).toLowerCase().includes(q);
  });
  if(q||refCategory!=='All'){
    h+=`<div style="font-size:var(--fs-label);color:var(--text3);letter-spacing:.5px;padding:0 2px 6px;text-transform:uppercase;font-weight:600">Showing ${refFiltered.length} of ${REFERENCES.length}</div>`;
  }
  if(refFiltered.length===0){
    h+=`<div class="ref-empty">No references match your filter.</div>`;
  } else {
    const groups={};
    for(const r of refFiltered){if(!groups[r.cat])groups[r.cat]=[];groups[r.cat].push(r);}
    const catOrder=['Technique','Object','Concept','Tradition','Figure'];
    for(const c of catOrder){
      if(!groups[c])continue;
      h+=`<div class="ref-group">`;
      h+=`<div class="ref-group-head">${c}${c.endsWith('s')?'':'s'} · ${groups[c].length}</div>`;
      for(let ri=0;ri<groups[c].length;ri++){
        const r=groups[c][ri];
        const open=!!refExpanded[r.term];
        h+=`<div class="ref-card ${open?'open':''}" style="animation-delay:${Math.min(ri,6)*30}ms" onclick="toggleRef('${r.term.replace(/'/g,"\\'")}')">`;
        h+=`<div class="ref-term">${r.term}<span class="ref-term-chev">&#9654;</span></div>`;
        h+=`<div class="ref-summary">${r.summary}</div>`;
        if(open){
          const u=REF_USEFUL[r.term]||{};
          h+=`<div class="ref-meta">`;
          if(u.whenItMatters)h+=`<div class="ref-meta-row"><span class="ref-meta-k">When it matters</span><span class="ref-meta-v">${u.whenItMatters}</span></div>`;
          if(u.howToRead)h+=`<div class="ref-meta-row"><span class="ref-meta-k">How to read it</span><span class="ref-meta-v">${u.howToRead}</span></div>`;
          if(u.watchFor)h+=`<div class="ref-meta-row"><span class="ref-meta-k">Watch for</span><span class="ref-meta-v">${u.watchFor}</span></div>`;
          if(!u.whenItMatters&&!u.howToRead&&!u.watchFor){
            h+=`<div class="ref-meta-row"><span class="ref-meta-k">Note</span><span class="ref-meta-v">Practical guidance for this term has not been written yet — see the summary above.</span></div>`;
          }
          h+=`</div>`;
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    }
  }
  h+=`</div>`;

  // ══════════ SYNASTRY TAB ══════════
  h+=`<div class="tab-content ${activeTab==='synastry'?'active':''}">`;
  h+=renderSynastryTab();
  h+=`</div>`;

  // ══════════ MAP TAB ══════════
  h+=`<div class="tab-content ${activeTab==='map'?'active':''}">`;
  h+=renderAstroCartoTab();
  h+=`</div>`;

  // ══════════ CHART FORM MODAL ══════════
  if(showChartForm){
    h+=renderChartFormModal();
  }

  // ══════════ TAB BAR ══════════
  const svgToday=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/><line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/></svg>`;
  const svgChart=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>`;
  const svgNatal=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 20,8 18,18 6,18 4,8" fill="none"/><circle cx="12" cy="11" r="3"/></svg>`;

  const svgLore=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h12a2 2 0 012 2v14l-8-4-8 4V6a2 2 0 012-2z"/><line x1="8" y1="9" x2="14" y2="9"/><line x1="8" y1="13" x2="12" y2="13"/></svg>`;
  const svgHome=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>`;
  let tabBarHtml='';
  tabBarHtml+=`<button class="${activeTab==='home'?'active':''}" onclick="switchTab('home')">${svgHome}<span>Home</span></button>`;
  tabBarHtml+=`<button class="${activeTab==='today'?'active':''}" onclick="switchTab('today')">${svgToday}<span>Today</span></button>`;
  tabBarHtml+=`<button class="${activeTab==='chart'?'active':''}" onclick="switchTab('chart')">${svgChart}<span>Chart</span></button>`;
  tabBarHtml+=`<button class="${activeTab==='lore'?'active':''}" onclick="switchTab('lore')">${svgLore}<span>Lore</span></button>`;
  tabBarHtml+=`<button class="${activeTab==='natal'?'active':''}" onclick="switchTab('natal')">${svgNatal}<span>Natal</span></button>`;
  const svgSynastry=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="12" r="7"/><circle cx="15" cy="12" r="7"/></svg>`;
  const svgMap=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>`;
  tabBarHtml+=`<button class="${activeTab==='synastry'?'active':''}" onclick="switchTab('synastry')">${svgSynastry}<span>Relate</span></button>`;
  tabBarHtml+=`<button class="${activeTab==='map'?'active':''}" onclick="switchTab('map')">${svgMap}<span>Map</span></button>`;

  document.getElementById('app').innerHTML=h;
  document.getElementById('tab-bar-host').innerHTML=tabBarHtml;
  // Splash is dismissed by tap — see dismissSplash()

  // Sync body data-zone for CSS filtering (only meaningful on Today tab)
  document.body.setAttribute('data-zone', activeTab==='today'?todayZone:'all');

  // Auto-scroll planetary hours to current hour
  const hRow=document.getElementById('hours-row');
  const curCell=hRow&&hRow.querySelector('.current');
  if(curCell&&hRow){curCell.scrollIntoView({inline:'center',block:'nearest',behavior:'instant'});}

  // Restore focus to reference search input if it's the active field
  if(activeTab==='lore'&&refQuery){
    const si=document.querySelector('.ref-search');
    if(si){si.focus();const len=si.value.length;try{si.setSelectionRange(len,len);}catch(e){}}
  }

  // Energy ring fill animation: start from full offset, animate to target
  const ringArc=document.querySelector('.energy-ring-arc');
  if(ringArc){
    const full=ringArc.style.getPropertyValue('--ring-full');
    const target=ringArc.getAttribute('stroke-dashoffset');
    ringArc.style.strokeDashoffset=full;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ringArc.style.strokeDashoffset=target;}));
  }
}

// ── Event handlers ──
function navDay(offset){
  const app=document.getElementById('app');
  const dir=offset>0?'slide-left':'slide-right';
  app.classList.add(dir);
  setTimeout(()=>{
    dayOffset+=offset;renderApp();
    app.classList.remove(dir);
    app.classList.add('slide-in');
    setTimeout(()=>app.classList.remove('slide-in'),280);
  },260);
}
function navToday(){
  if(dayOffset===0)return;
  const app=document.getElementById('app');
  app.classList.add(dayOffset>0?'slide-right':'slide-left');
  setTimeout(()=>{
    dayOffset=0;renderApp();
    app.classList.remove('slide-left','slide-right');
    app.classList.add('slide-in');
    setTimeout(()=>app.classList.remove('slide-in'),280);
  },260);
}
let splashDismissed=false;
function dismissSplash(){
  if(splashDismissed)return;splashDismissed=true;
  const loader=document.getElementById('app-loader');
  if(!loader)return;
  loader.classList.add('hide');
  setTimeout(()=>{loader.remove();},900);
}
function switchTab(tab){activeTab=tab;renderApp();window.scrollTo(0,0);}
function toggleCard(id){
  expandedCards[id]=!expandedCards[id];
  // Direct DOM toggle instead of full re-render
  const el=document.querySelector(`[data-card-id="${id}"] .t-expand, [data-card-id="${id}"] .natal-expand`);
  if(el){el.classList.toggle('open');return;}
  renderApp();
}
function toggleChart(opt){if(opt==='transit')showTransitRing=!showTransitRing;else showAspectLines=!showAspectLines;renderApp();}
function setFilter(f){activeFilter=f;renderApp();}

// Touch navigation
let touchStartX=0,touchStartY=0,swiping=false;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;swiping=true;},{passive:true});
document.addEventListener('touchmove',e=>{if(!swiping)return;if(Math.abs(e.touches[0].clientY-touchStartY)>Math.abs(e.touches[0].clientX-touchStartX)*1.2)swiping=false;},{passive:true});
document.addEventListener('touchend',e=>{if(!swiping)return;const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>60){if(dx<0)navDay(1);else navDay(-1);}swiping=false;});

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')navDay(-1);else if(e.key==='ArrowRight')navDay(1);else if(e.key==='Home'||e.key==='Escape')navToday();});

// Show/hide back-to-top FAB on scroll (tooltip stays open until tap)
document.addEventListener('scroll',()=>{
  const fab=document.getElementById('fab-top');
  if(fab){if(window.scrollY>500)fab.classList.add('show');else fab.classList.remove('show');}
});

loadCharts();
renderApp();
setInterval(()=>{if(dayOffset===0)renderApp();},10*60*1000);

// Boot notifications if user previously enabled them
try{bootNotifications();}catch(e){}

const prefersReduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(prefersReduced){const s=document.createElement('style');s.textContent='*{animation:none!important;transition:none!important}';document.head.appendChild(s);}

</script>
</body>
</html>
