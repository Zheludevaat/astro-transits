<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05081a">
<title>Alexander's Transits</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#05081a;--bg2:#0a0e24;--card:#0e1330;--card-hover:#131842;--surface:#161c45;
  --gold:#d4a843;--gold-soft:rgba(212,168,67,.12);--gold-glow:rgba(212,168,67,.25);
  --crimson:#e0425d;--crimson-soft:rgba(224,66,93,.12);
  --azure:#4a9eff;--azure-soft:rgba(74,158,255,.12);
  --violet:#9b6dff;--violet-soft:rgba(155,109,255,.12);
  --emerald:#3dd9a0;--emerald-soft:rgba(61,217,160,.12);
  --amber:#f0a030;--amber-soft:rgba(240,160,48,.12);
  --pearl:#e8e0d0;
  --text:#d0cae0;--text2:#8880a0;--text3:#5a5478;--bright:#f4f0ff;
  --r-sm:10px;--r-md:16px;--r-lg:22px;
  --shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.03);
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding:var(--safe-top) 0 calc(var(--safe-bottom) + 72px)}
.container{padding:0 16px;max-width:480px;margin:0 auto}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,#0d1240 0%,#05081a 70%);pointer-events:none}
#app{position:relative;z-index:1}

/* ── Typography ── */
.label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
.title{font-size:28px;font-weight:700;line-height:1.2}
.subtitle{font-size:16px;font-weight:500;color:var(--text2)}
.body{font-size:14px;line-height:1.6}
.body-sm{font-size:12px;line-height:1.5}

/* ── Grid & Spacing ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.space-v-xl{margin-bottom:40px}
.space-v-lg{margin-bottom:24px}
.space-v-md{margin-bottom:16px}
.space-v-sm{margin-bottom:8px}
.space-v-xs{margin-bottom:4px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}

/* ── Cards & Surfaces ── */
.card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-md);padding:16px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.card:hover{background:var(--card-hover);border-color:rgba(255,255,255,.12)}
.card-inset{box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}

/* ── Buttons & Links ── */
.btn{display:flex;align-items:center;justify-content:center;height:44px;padding:0 16px;border:none;border-radius:var(--r-md);font-size:13px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s ease;-webkit-user-select:none;user-select:none;-webkit-appearance:none;appearance:none;gap:8px}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--gold) 0%,#e8c458 100%);color:#05081a;box-shadow:0 4px 12px rgba(212,168,67,.3)}
.btn-primary:hover{box-shadow:0 6px 16px rgba(212,168,67,.4)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid rgba(255,255,255,.2)}
.btn-secondary:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.4)}
.btn-icon{width:44px;height:44px;padding:0;border-radius:50%}
.btn-icon-sm{width:36px;height:36px}

/* ── Badges & Indicators ── */
.badge{display:inline-flex;align-items:center;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;gap:4px}
.badge-gold{background:var(--gold-soft);color:var(--gold)}
.badge-crimson{background:var(--crimson-soft);color:var(--crimson)}
.badge-azure{background:var(--azure-soft);color:var(--azure)}
.badge-violet{background:var(--violet-soft);color:var(--violet)}
.badge-emerald{background:var(--emerald-soft);color:var(--emerald)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}

/* ── Scrolling & Overflow ── */
.scroll-h{display:flex;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;gap:8px}
.scroll-h::-webkit-scrollbar{height:3px}
.scroll-h::-webkit-scrollbar-track{background:transparent}
.scroll-h::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

/* ── Responsive ── */
@media (max-width:380px){
  .container{padding:0 12px}
  .title{font-size:24px}
  .grid-2{grid-template-columns:1fr}
}

/* ── Dark Mode Enhancements ── */
@media (prefers-color-scheme:dark){
  .card{background:rgba(14,19,48,.6)}
}
</style>
</head>
<body>
<div id="app">
  <div class="container">
    <header style="padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: 20px;">
      <h1 class="title">Alexander's Transits</h1>
      <p class="subtitle" style="margin-top: 4px;">Birth: July 2, 1996 | 00:08 EDT | Stony Brook, NY</p>
    </header>

    <main>
      <!-- Date Selection -->
      <section class="space-v-lg">
        <label class="label">Current Date</label>
        <div style="display: flex; gap: 8px; margin-top: 12px;">
          <input type="date" id="dateInput" value="2026-04-14" style="flex:1; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.12); background:var(--card); color:var(--text); font-size:14px;">
          <button id="todayBtn" class="btn btn-secondary" style="min-width:100px;">Today</button>
        </div>
      </section>

      <div class="divider space-v-lg"></div>

      <!-- Main Results Grid -->
      <div id="results" style="display:grid; gap:16px;">
        <!-- Results will be populated here -->
      </div>
    </main>
  </div>
</div>

<script>
// Store birth data
const BIRTH_DATA = {
  month: 7,
  day: 2,
  year: 1996,
  hour: 0,
  minute: 8,
  second: 0,
  timezone: -4, // EDT
  lat: 40.9176, // Stony Brook
  lng: -72.8596
};

const PLANETS_DATA = [
  { name: 'Sun', lon: 100.88 },
  { name: 'Moon', lon: 333.82 },
  { name: 'Mercury', lon: 98.28 },
  { name: 'Venus', lon: 71.98 },
  { name: 'Mars', lon: 347.77 },
  { name: 'Jupiter', lon: 19.15 },
  { name: 'Saturn', lon: 55.96 },
  { name: 'Uranus', lon: 0.98 },
  { name: 'Neptune', lon: 325.36 },
  { name: 'Pluto', lon: 222.36 }
];

// Ephemeris (simplified for demo)
const EPHEMERIS = {
  '2026-04-14': {
    Sun: 24.89,
    Moon: 27.45,
    Mercury: 3.12,
    Venus: 352.67,
    Mars: 27.33,
    Jupiter: 38.45,
    Saturn: 68.12,
    Uranus: 18.67,
    Neptune: 337.89,
    Pluto: 234.56
  }
};

// Colors for planets
const COLORS = {
  Sun: 'var(--amber)',
  Moon: 'var(--pearl)',
  Mercury: 'var(--azure)',
  Venus: 'var(--emerald)',
  Mars: 'var(--crimson)',
  Jupiter: 'var(--gold)',
  Saturn: 'var(--gold)',
  Uranus: 'var(--violet)',
  Neptune: 'var(--azure)',
  Pluto: 'var(--crimson)'
};

// Initialize
function init() {
  const dateInput = document.getElementById('dateInput');
  const todayBtn = document.getElementById('todayBtn');
  const resultsDiv = document.getElementById('results');

  // Set today's date
  todayBtn.addEventListener('click', () => {
    const today = new Date();
    const dateStr = today.toISOString().split('T')[0];
    dateInput.value = dateStr;
    updateResults(dateStr);
  });

  // Update on date change
  dateInput.addEventListener('change', (e) => {
    updateResults(e.target.value);
  });

  // Initial load
  updateResults(dateInput.value);
}

function updateResults(dateStr) {
  const resultsDiv = document.getElementById('results');
  const currentEph = EPHEMERIS[dateStr] || EPHEMERIS['2026-04-14'];

  let html = '';

  PLANETS_DATA.forEach(planet => {
    const birthLon = planet.lon;
    const currentLon = currentEph[planet.name];
    const angle = normalizeAngle(currentLon - birthLon);
    const aspect = getAspect(angle);
    const color = COLORS[planet.name];

    html += `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
          <div>
            <div style="font-size:16px; font-weight:600; margin-bottom:4px;">${planet.name}</div>
            <div style="font-size:12px; color:var(--text2);">Birth: ${birthLon.toFixed(2)}°</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:14px; color:${color}; font-weight:600; margin-bottom:4px;">${aspect.name}</div>
            <div style="font-size:12px; color:var(--text2);">Angle: ${angle.toFixed(1)}°</div>
          </div>
        </div>
        <div style="height:4px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden;">
          <div style="height:100%; background:${color}; width:${(angle / 360) * 100}%; transition:all .3s ease;"></div>
        </div>
      </div>
    `;
  });

  resultsDiv.innerHTML = html;
}

function normalizeAngle(angle) {
  while (angle < 0) angle += 360;
  while (angle >= 360) angle -= 360;
  return angle;
}

function getAspect(angle) {
  const orb = 8; // degrees
  const aspects = [
    { name: 'Conjunction', angle: 0 },
    { name: 'Sextile', angle: 60 },
    { name: 'Square', angle: 90 },
    { name: 'Trine', angle: 120 },
    { name: 'Opposition', angle: 180 }
  ];

  let closest = aspects[0];
  let minDiff = 180;

  aspects.forEach(asp => {
    const diff = Math.abs(angle - asp.angle);
    if (diff < minDiff && diff <= orb) {
      minDiff = diff;
      closest = asp;
    }
  });

  return closest;
}

// Start the app
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
