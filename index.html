<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05081a">
<title>Alexander's Transits</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#05081a;--bg2:#0a0e24;--card:#0e1330;--card-hover:#131842;--surface:#161c45;
  --gold:#d4a843;--gold-soft:rgba(212,168,67,.12);--gold-glow:rgba(212,168,67,.25);
  --crimson:#e0425d;--crimson-soft:rgba(224,66,93,.12);
  --azure:#4a9eff;--azure-soft:rgba(74,158,255,.12);
  --violet:#9b6dff;--violet-soft:rgba(155,109,255,.12);
  --emerald:#3dd9a0;--emerald-soft:rgba(61,217,160,.12);
  --amber:#f0a030;--amber-soft:rgba(240,160,48,.12);
  --pearl:#e8e0d0;
  --text:#d0cae0;--text2:#8880a0;--text3:#5a5478;--bright:#f4f0ff;
  --r-sm:10px;--r-md:16px;--r-lg:22px;
  --shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.03);
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding:var(--safe-top) 0 calc(var(--safe-bottom) + 72px)}
.container{padding:0 16px;max-width:480px;margin:0 auto}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,#0d1240 0%,#05081a 70%);pointer-events:none}
#app{position:relative;z-index:1}

/* ── Typography ── */
.label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
.section-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);
  margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--surface)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid rgba(255,255,255,.04);border-radius:var(--r-md);
  padding:16px;margin-bottom:10px;box-shadow:var(--shadow);transition:background .15s}
.card:active{background:var(--card-hover)}

/* ── Header ── */
.header{text-align:center;padding:16px 0 8px}
.header-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:6px}
.header-date{font-size:28px;font-weight:700;color:var(--bright);margin-bottom:2px}
.header-day{font-size:13px;color:var(--text2)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0 0}
.date-nav button{background:none;border:none;color:var(--text2);font-size:20px;padding:8px 14px;cursor:pointer;
  border-radius:var(--r-md);transition:all .15s}
.date-nav button:active{background:var(--gold-soft);color:var(--gold)}
.today-btn{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;
  border:1px solid rgba(212,168,67,.3);border-radius:var(--r-lg);color:var(--gold);display:none;background:var(--gold-soft)}
.today-btn.show{display:inline-block}

/* ── Daily Guidance ── */
.guidance{background:linear-gradient(135deg,rgba(212,168,67,.08) 0%,rgba(155,109,255,.06) 100%);
  border:1px solid rgba(212,168,67,.15);border-radius:var(--r-lg);padding:20px;margin:16px 0;position:relative;overflow:hidden}
.guidance::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;
  background:radial-gradient(circle,rgba(212,168,67,.08),transparent 70%);pointer-events:none}
.guidance-title{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.g-theme{font-size:18px;font-weight:700;color:var(--bright);margin-bottom:8px;letter-spacing:.3px}
.g-overview{font-size:13.5px;line-height:1.7;color:var(--text);margin-bottom:16px}
.g-section-title{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--violet);margin:14px 0 8px;opacity:.7}
.g-transit{background:rgba(0,0,0,.2);border-radius:var(--r-md);padding:12px;margin-bottom:8px;border-left:3px solid rgba(155,109,255,.3)}
.g-transit-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.g-planets{display:flex;align-items:center;gap:2px;flex-shrink:0}
.g-transit-label{font-size:13px;font-weight:600;color:var(--bright);flex:1}
.g-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.g-tag.exact{background:rgba(224,66,93,.2);color:var(--crimson)}
.g-tag.applying{background:rgba(74,158,255,.15);color:var(--azure)}
.g-tag.separating{background:rgba(255,255,255,.08);color:var(--text2)}
.g-transit-body{font-size:12.5px;line-height:1.65;color:var(--text)}
.g-transit-house{font-size:11px;color:var(--text2);margin-top:4px;opacity:.7}
.g-moon-row{display:flex;align-items:flex-start;gap:12px;background:rgba(0,0,0,.15);border-radius:var(--r-md);padding:12px}
.g-moon-icon{flex-shrink:0}
.g-moon-label{font-size:13px;font-weight:600;color:var(--bright);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.g-moon-flavor{font-size:12px;line-height:1.6;color:var(--text)}
.g-focus-grid{display:flex;gap:8px;flex-wrap:wrap}
.g-focus-card{background:rgba(155,109,255,.08);border:1px solid rgba(155,109,255,.12);border-radius:var(--r-md);padding:8px 14px;flex:1;min-width:80px;text-align:center}
.g-focus-num{font-size:11px;font-weight:700;color:var(--violet);opacity:.6}
.g-focus-name{font-size:12px;color:var(--text);margin-top:2px}
.g-alerts{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.g-alert{font-size:12px;color:var(--amber);background:rgba(212,168,67,.08);border-radius:var(--r-sm);padding:8px 12px;line-height:1.5}
.g-advice{margin-top:14px;background:rgba(74,158,255,.06);border:1px solid rgba(74,158,255,.12);border-radius:var(--r-md);padding:12px}
.g-advice-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--azure);margin-bottom:6px;opacity:.7}
.g-advice-text{font-size:13px;line-height:1.65;color:var(--bright)}

/* ── Moon Phase ── */
.moon-card{background:var(--card);border-radius:var(--r-lg);padding:20px;margin:12px 0;
  display:flex;align-items:center;gap:16px;border:1px solid rgba(155,109,255,.1);box-shadow:var(--shadow)}
.moon-visual{flex-shrink:0}
.moon-info{flex:1}
.moon-phase-name{font-size:17px;font-weight:600;color:var(--bright);margin-bottom:4px}
.moon-detail{font-size:12px;color:var(--text2);margin-bottom:6px}
.moon-meaning{font-size:13px;line-height:1.6;color:var(--text)}

/* ── Alert Pills ── */
.alerts{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0 12px}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--r-lg);padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.pill:active{transform:scale(.96)}
.pill.retro{border-color:rgba(224,66,93,.2);color:var(--crimson)}
.pill.void{border-color:rgba(155,109,255,.2);color:var(--violet)}
.pill.station{border-color:rgba(240,160,48,.2);color:var(--amber)}
.pill.ingress{border-color:rgba(61,217,160,.2);color:var(--emerald)}
.pill .help{font-size:13px;opacity:.6;cursor:help;margin-left:2px}

/* ── Energy Meter ── */
.energy{display:flex;align-items:center;gap:12px;margin:8px 0 16px;padding:12px 16px;
  background:var(--card);border-radius:var(--r-md);border:1px solid rgba(255,255,255,.04)}
.energy-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);min-width:56px}
.energy-bar{flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden;position:relative}
.energy-fill{height:100%;border-radius:4px;transition:width .4s ease}
.energy-score{font-size:15px;font-weight:700;min-width:36px;text-align:right}
.energy-context{font-size:11px;color:var(--text2);margin-top:6px;line-height:1.5}

/* ── Transit Timeline ── */
.timeline{margin:16px 0;position:relative}
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);position:relative}
.tl-item:last-child{border-bottom:none}
.tl-date{min-width:50px;font-size:11px;font-weight:700;color:var(--text2);text-align:right;padding-top:2px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;box-shadow:0 0 6px rgba(212,168,67,.3)}
.tl-dot.exact{background:var(--gold)}
.tl-dot.applying{background:var(--azure)}
.tl-dot.separating{background:var(--text3)}
.tl-body{flex:1;min-width:0}
.tl-label{font-size:13px;font-weight:600;color:var(--bright)}
.tl-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.5}
.tl-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.tl-badge.hard{background:var(--crimson-soft);color:var(--crimson)}
.tl-badge.easy{background:var(--azure-soft);color:var(--azure)}
.tl-badge.conj{background:var(--gold-soft);color:var(--gold)}

/* ── Transit Cards ── */
.transit{background:var(--card);border:1px solid rgba(255,255,255,.04);border-radius:var(--r-md);
  padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);
  animation:fadeUp .3s ease both;position:relative;overflow:hidden}
.transit:active{background:var(--card-hover)}
.transit.hard{border-left:3px solid var(--crimson)}
.transit.easy{border-left:3px solid var(--azure)}
.transit.conj{border-left:3px solid var(--gold)}
.transit.minor{border-left:3px solid var(--text3)}
.transit.exact-transit{box-shadow:0 0 16px rgba(212,168,67,.2),var(--shadow)}

.t-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.t-planets{display:flex;align-items:center;gap:4px}
.t-glyph{width:24px;height:24px}
.t-aspect-icon{width:16px;height:16px;opacity:.5}
.t-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--r-sm);letter-spacing:.3px}
.t-badge.hard{background:var(--crimson-soft);color:var(--crimson)}
.t-badge.easy{background:var(--azure-soft);color:var(--azure)}
.t-badge.conj{background:var(--gold-soft);color:var(--gold)}
.t-badge.minor{background:rgba(255,255,255,.05);color:var(--text2)}

.t-label{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:4px}
.t-interp{font-size:13px;line-height:1.75;color:var(--text);margin-bottom:8px}
.t-advice{font-size:12px;color:var(--emerald);line-height:1.5;margin-bottom:8px;padding:8px 10px;
  background:var(--emerald-soft);border-radius:var(--r-sm)}
.t-meta{display:flex;gap:6px;flex-wrap:wrap}
.t-tag{font-size:10px;padding:4px 8px;border-radius:var(--r-sm);background:var(--surface);color:var(--text2);
  display:inline-flex;align-items:center;gap:4px;cursor:help;position:relative}
.t-tag .tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:#1a1f45;border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:8px 10px;
  font-size:11px;line-height:1.5;color:var(--text);white-space:normal;width:200px;z-index:50;
  box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none}
.t-tag:hover .tip,.t-tag.show-tip .tip{display:block}
.t-motion{font-size:10px;font-weight:700;padding:4px 8px;border-radius:var(--r-sm);text-transform:uppercase;letter-spacing:.5px}
.t-motion.applying{background:var(--gold-soft);color:var(--gold)}
.t-motion.exact{background:var(--crimson-soft);color:var(--crimson)}
.t-motion.separating{background:rgba(255,255,255,.04);color:var(--text3)}
.t-motion.stationary{background:var(--amber-soft);color:var(--amber)}

.t-expand{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .25s ease}
.t-expand.open{max-height:600px;opacity:1}
.t-expand-inner{padding:12px 0 0;border-top:1px solid var(--surface);margin-top:10px}
.t-expand-section{font-size:12px;line-height:1.6;color:var(--text);margin-bottom:8px}
.t-expand-section strong{color:var(--bright);font-weight:600}

/* ── Tab Bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;
  background:rgba(5,8,26,.92);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-top:1px solid rgba(212,168,67,.06);padding:6px 0 calc(var(--safe-bottom) + 4px);z-index:100}
.tab-bar button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;color:var(--text3);
  font-size:10px;font-weight:600;cursor:pointer;border:none;background:none;text-transform:uppercase;
  letter-spacing:.5px;transition:color .15s;position:relative}
.tab-bar button.active{color:var(--gold);filter:drop-shadow(0 0 4px rgba(212,168,67,.3))}
.tab-bar button.active::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;background:var(--gold);border-radius:2px}
.tab-bar button svg{width:20px;height:20px}

.tab-content{display:none}
.tab-content.active{display:block}

/* ── Day transition animation ── */
#app{transition:opacity .15s ease,transform .15s ease}
#app.slide-left{opacity:0;transform:translateX(-20px)}
#app.slide-right{opacity:0;transform:translateX(20px)}
#app.slide-in{opacity:1;transform:translateX(0)}

/* ── Chart ── */
.chart-wrap{position:relative;width:100%;max-width:380px;margin:0 auto;aspect-ratio:1;padding:8px 0;overflow:hidden}
.chart-wrap.full{max-width:420px}
.chart-svg{width:100%;height:100%;filter:drop-shadow(0 0 12px rgba(155,109,255,.1))}
.chart-toggles{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.chart-toggle{background:var(--card);border:1px solid rgba(255,255,255,.06);color:var(--text2);font-size:11px;
  padding:8px 14px;border-radius:var(--r-lg);cursor:pointer;font-weight:600;transition:all .15s}
.chart-toggle.on{background:var(--gold-soft);border-color:rgba(212,168,67,.3);color:var(--gold)}

/* ── Natal Cards ── */
.natal{background:var(--card);border-radius:var(--r-md);padding:16px;margin-bottom:10px;
  box-shadow:var(--shadow);border:1px solid rgba(212,168,67,.06);cursor:pointer;transition:all .15s}
.natal:active{background:var(--card-hover)}
.natal-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.natal-glyph{width:28px;height:28px;flex-shrink:0}
.natal-name{font-size:16px;font-weight:600;color:var(--bright)}
.natal-pos{font-size:12px;color:var(--text2)}
.natal-title{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:4px}
.natal-desc{font-size:13px;line-height:1.65;color:var(--text)}
.natal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.natal-tag{font-size:10px;padding:3px 8px;border-radius:var(--r-sm);background:var(--surface);color:var(--text2)}
.natal-expand{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s,opacity .25s}
.natal-expand.open{max-height:500px;opacity:1}

/* ── Planet Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,8,26,.85);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--bg2);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:480px;
  max-height:85vh;overflow-y:auto;padding:20px 16px calc(var(--safe-bottom) + 16px);
  animation:slideUp .25s ease;border:1px solid rgba(255,255,255,.04);border-bottom:none}
.modal-handle{width:40px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 16px}
.modal-close{position:absolute;top:12px;right:16px;background:var(--surface);border:none;color:var(--text2);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}

/* ── Tooltip ── */
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;
  border-radius:50%;background:var(--surface);color:var(--text3);font-size:10px;font-weight:700;
  cursor:help;border:none;vertical-align:middle;margin-left:4px;flex-shrink:0}
.tooltip-popup{display:none;position:fixed;z-index:300;background:#1a1f48;border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r-md);padding:14px;max-width:280px;font-size:12px;line-height:1.6;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,.6);pointer-events:auto}
.tooltip-popup.open{display:block}
.tooltip-popup strong{color:var(--bright);display:block;margin-bottom:4px}

/* ── Filter Bar ── */
.filters{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;font-size:11px;font-weight:600;padding:6px 12px;border-radius:var(--r-lg);
  background:var(--card);border:1px solid rgba(255,255,255,.06);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0}
.filter-chip.on{background:var(--gold-soft);border-color:rgba(212,168,67,.3);color:var(--gold)}

/* ── 7-Day Forecast ── */
.forecast{display:flex;gap:6px;margin:12px 0;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.forecast::-webkit-scrollbar{display:none}
.forecast-day{flex-shrink:0;width:56px;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:var(--r-md);cursor:pointer;transition:all .15s;background:var(--card);border:1px solid rgba(255,255,255,.04)}
.forecast-day:active,.forecast-day.sel{background:var(--card-hover);border-color:rgba(212,168,67,.3);box-shadow:0 0 12px rgba(212,168,67,.15)}
.forecast-day .fd-name{font-size:10px;font-weight:600;color:var(--text2)}
.forecast-day .fd-num{font-size:14px;font-weight:700;color:var(--bright)}
.forecast-day .fd-bar{width:6px;border-radius:3px;transition:height .3s}
.forecast-day .fd-score{font-size:10px;font-weight:600;margin-top:2px}

/* ── Grid ── */
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.pos-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);
  border-radius:var(--r-md);box-shadow:var(--shadow);cursor:pointer;transition:all .15s}
.pos-item:active{background:var(--card-hover)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(212,168,67,.15)}50%{box-shadow:0 0 20px rgba(212,168,67,.3)}}

@media(max-width:360px){.chart-wrap{max-width:300px}.chart-wrap.full{max-width:340px}}

/* ── Light / Day theme ── */
html.light{
  --bg:#f4f0e6;--bg2:#ede8dc;--card:#ffffff;--card-hover:#f8f6f0;--surface:#e8e2d6;
  --gold:#9e7a2e;--gold-soft:rgba(158,122,46,.1);--gold-glow:rgba(158,122,46,.2);
  --crimson:#c03348;--crimson-soft:rgba(192,51,72,.1);
  --azure:#2a6db5;--azure-soft:rgba(42,109,181,.1);
  --violet:#7b52cc;--violet-soft:rgba(123,82,204,.1);
  --emerald:#248a64;--emerald-soft:rgba(36,138,100,.1);
  --amber:#c88520;--amber-soft:rgba(200,133,32,.1);
  --pearl:#3a3450;
  --text:#3a3450;--text2:#6e6880;--text3:#9e98a8;--bright:#1a1530;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
}
html.light body::before{background:radial-gradient(ellipse at 50% 0%,#f8f4ec 0%,#f0ebe0 70%)}
html.light .tab-bar{background:rgba(244,240,230,.95);border-top-color:rgba(158,122,46,.12)}
html.light .chart-svg{filter:drop-shadow(0 0 8px rgba(123,82,204,.06))}
html.light .guidance{background:linear-gradient(135deg,rgba(158,122,46,.06) 0%,rgba(123,82,204,.04) 100%);
  border-color:rgba(158,122,46,.12)}
html.light .moon-card{border-color:rgba(123,82,204,.08)}
html.light .transit{border-color:rgba(0,0,0,.06)}
html.light .modal-overlay{background:rgba(244,240,230,.85)}
html.light .modal-sheet{background:var(--bg);border-color:rgba(0,0,0,.06)}

/* ── Theme toggle button ── */
.theme-toggle{position:absolute;top:16px;right:16px;background:var(--card);border:1px solid rgba(255,255,255,.06);
  border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;transition:all .2s}
.theme-toggle:active{transform:scale(.9)}
html.light .theme-toggle{border-color:rgba(0,0,0,.08)}

/* ── Show-more button ── */
.show-more{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;margin:8px 0 16px;
  background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-md);
  color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.show-more:active{background:var(--card-hover);color:var(--gold)}
html.light .show-more{border-color:rgba(0,0,0,.06)}

/* ── Guidance collapsible ── */
.guidance-preview{max-height:180px;overflow:hidden;position:relative;transition:max-height .3s ease}
.guidance-preview.expanded{max-height:3000px}
.guidance-preview:not(.expanded)::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(transparent,var(--bg));pointer-events:none}
html.light .guidance-preview:not(.expanded)::after{background:linear-gradient(transparent,#f4f0e6)}
.guidance-toggle{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;
  color:var(--gold);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;margin-top:-4px}

/* ── Chevron indicator on cards ── */
.t-chevron{width:16px;height:16px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.transit.card-open .t-chevron{transform:rotate(180deg)}

/* ── Swipe hint ── */
.swipe-zone{touch-action:pan-y}

function signOf(l){const i=Math.floor(norm(l)/30);const deg=norm(l)%30;
  return{name:SIGNS[i],abbr:SIGN_ABBR[i],index:i,degree:Math.floor(deg),degInSign:deg,minute:Math.floor((deg%1)*60)};}
function fmtShort(l){const s=signOf(l);return`${s.degree}° ${s.abbr}`;}
function fmtLong(l){const s=signOf(l);return`${s.degree}°${String(s.minute).padStart(2,'0')}' ${s.name}`;}

// Birth data
const BIRTH={year:1996,month:7,day:2,hour:4+8/60,lat:40.9256,lon:-73.1409};

function computeAll(jd){const T=jdToT(jd);return{Sun:sunLongitude(T),Moon:moonLongitude(T),
  Mercury:geocentricLon('Mercury',T),Venus:geocentricLon('Venus',T),Mars:geocentricLon('Mars',T),
  Jupiter:geocentricLon('Jupiter',T),Saturn:geocentricLon('Saturn',T),Uranus:geocentricLon('Uranus',T),
  Neptune:geocentricLon('Neptune',T),Pluto:geocentricLon('Pluto',T),Chiron:geocentricLon('Chiron',T),
  NorthNode:trueNodeLongitude(T)};}

function computeAsc(jd,lat,lon){const T=jdToT(jd);
  const LST=norm(280.46061837+360.98564736629*(jd-2451545)+.000387933*T*T+lon);
  const eps=23.4393-.0130*T;
  return norm(Math.atan2(cos(LST),-(sin(eps)*Math.tan(lat*DEG)+cos(eps)*sin(LST)))*RAD);}
function computeMC(jd,lon){const T=jdToT(jd);
  const LST=norm(280.46061837+360.98564736629*(jd-2451545)+.000387933*T*T+lon);
  const eps=23.4393-.0130*T;let mc=norm(atan2d(Math.tan(LST*DEG),cos(eps)));
  const d=norm(mc-LST);if(d>90&&d<270)mc=norm(mc+180);return mc;}

const NJD=julianDate(BIRTH.year,BIRTH.month,BIRTH.day,BIRTH.hour);
const NATAL=computeAll(NJD);
NATAL.Ascendant=computeAsc(NJD,BIRTH.lat,BIRTH.lon);
NATAL.MC=computeMC(NJD,BIRTH.lon);

// Placidus house cusps (verified against Swiss Ephemeris for birth data)
const HOUSES=[358.8483,40.7474,67.8144,89.3949,110.8756,137.5807,178.8483,220.7474,247.8144,269.3949,290.8756,317.5807];
function houseOf(lon){const l=norm(lon);for(let i=0;i<12;i++){const s=HOUSES[i],e=HOUSES[(i+1)%12];
  if(s<e){if(l>=s&&l<e)return i+1;}else{if(l>=s||l<e)return i+1;}}return 1;}

function getOrb(a,tp,np){let o=a.orb;if(['Sun','Moon'].includes(np))o+=1;if(['Saturn','Jupiter','Uranus','Neptune','Pluto'].includes(tp))o+=1;return o;}

function getLon(planet,jd){const T=jdToT(jd);if(planet==='Sun')return sunLongitude(T);if(planet==='Moon')return moonLongitude(T);
  if(planet==='NorthNode')return trueNodeLongitude(T);return geocentricLon(planet,T);}

function findAspect(tL,nL,tp,np,jd){
  for(const a of ASPECTS){const orb=getOrb(a,tp,np);let d=Math.abs(norm(tL-nL)-a.angle);
    if(d>180)d=360-d;if(d<=orb){
      const T2=jdToT(jd+1);let tL2=getLon(tp,jd+1);
      let d2=Math.abs(norm(tL2-nL)-a.angle);if(d2>180)d2=360-d2;
      const ms=(tp!=='Sun'&&tp!=='Moon'&&tp!=='NorthNode')?motionStatus(tp,jd):null;
      let motion;if(d<0.3)motion='exact';else if(ms&&ms.stationary)motion='stationary';
      else if(d2<d)motion='applying';else motion='separating';
      return{...a,orbActual:Math.round(d*10)/10,motion};
    }}return null;}

function transitImportance(tp,np,a){let s=0;
  const ow={Pluto:50,Neptune:45,Uranus:40,Saturn:35,Jupiter:25,Chiron:18,Mars:12,Venus:8,Mercury:6,Sun:10,Moon:5,NorthNode:15};
  const nw={Sun:10,Moon:9,Ascendant:8,MC:7,NorthNode:6,Mercury:5,Venus:5,Mars:5,Jupiter:4,Saturn:4,Chiron:4,Uranus:3,Neptune:3,Pluto:3};
  s+=(ow[tp]||5)+(nw[np]||3);
  if(a.type==='hard')s+=5;if(a.name==='conjunction')s+=8;if(a.type==='minor')s-=5;
  if(a.motion==='exact')s+=10;if(a.motion==='stationary')s+=8;if(a.motion==='applying')s+=3;
  s-=a.orbActual*2;return s;}

function findExactDate(tp,np,aspectAngle,jd){
  const isMoon=tp==='Moon';const range=isMoon?15:90;const step=isMoon?.1:1;const nLon=NATAL[np];
  let bestJd=jd,bestOrb=999;
  for(let d=-range;d<=range;d+=step){const testJd=jd+d;const tLon=getLon(tp,testJd);
    let diff=Math.abs(norm(tLon-nLon)-aspectAngle);if(diff>180)diff=360-diff;
    if(diff<bestOrb){bestOrb=diff;bestJd=testJd;}}
  let lo=bestJd-step,hi=bestJd+step;
  for(let iter=0;iter<30;iter++){const m1=lo+(hi-lo)/3,m2=lo+2*(hi-lo)/3;
    let o1=Math.abs(norm(getLon(tp,m1)-nLon)-aspectAngle);
    let o2=Math.abs(norm(getLon(tp,m2)-nLon)-aspectAngle);
    if(o1>180)o1=360-o1;if(o2>180)o2=360-o2;if(o1<o2)hi=m2;else lo=m1;}
  const eJd=(lo+hi)/2;const eDate=jdToDate(eJd);return eDate;}

function jdToDate(jd){const z=Math.floor(jd+.5);const a=z<2299161?z:z+1+Math.floor((z-1867216.25)/36524.25)-Math.floor(Math.floor((z-1867216.25)/36524.25)/4);
  const b=a+1524;const c=Math.floor((b-122.1)/365.25);const d=Math.floor(365.25*c);const e=Math.floor((b-d)/30.6001);
  const day=b-d-Math.floor(30.6001*e);const month=e<14?e-1:e-13;const year=month>2?c-4716:c-4715;
  return new Date(year,month-1,day);}

function fmtExactDate(d){if(!d)return'';const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[d.getMonth()]+' '+d.getDate();}

function findIngresses(cur,jd){const ing=[];
  for(const p of['Sun','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron']){
    const cs=Math.floor(cur[p]/30);
    for(let d=1;d<=7;d++){const fT=jdToT(jd+d);
      const fl=p==='Sun'?sunLongitude(fT):geocentricLon(p,fT);
      if(Math.floor(fl/30)!==cs){ing.push({planet:p,sign:SIGNS[Math.floor(fl/30)],signIdx:Math.floor(fl/30),days:d});break;}}}
  return ing;}

function getDignity(p,lon){const s=signOf(lon).name;
  if(RULERS[s]===p)return{label:'Domicile',color:'var(--emerald)',desc:'This planet rules this sign — it operates at full strength here, expressing its nature freely and powerfully.'};
  if(DETRIMENT[s]===p)return{label:'Detriment',color:'var(--crimson)',desc:'This planet is in the sign opposite its home — it must work harder to express itself, often creating tension or over-compensation.'};
  if(EXALT[s]===p)return{label:'Exalted',color:'var(--gold)',desc:'This planet is honored and elevated in this sign — its best qualities are amplified and refined.'};
  if(FALL[s]===p)return{label:'Fall',color:'var(--amber)',desc:'This planet struggles in this sign — its energy is weakened or misdirected, requiring conscious effort to express well.'};
  return null;}

// ── Educational glossary ──
const GLOSSARY={
'Orb':'The orb is how far from exact an aspect is, measured in degrees. A 0° orb means the aspect is perfectly exact and at peak intensity. A wider orb (like 5-8°) means the aspect is present but weaker. Think of it like standing near a campfire — the closer you are (smaller orb), the more heat you feel.',
'Applying':'An applying aspect means the transit planet is moving TOWARD exact alignment with your natal point. The energy is building, becoming stronger each day. Think of it like a wave approaching the shore — the impact hasn\'t peaked yet.',
'Separating':'A separating aspect means the transit planet has already passed the exact point and is moving away. The energy is fading. The peak experience has passed, and you\'re now integrating what happened.',
'Exact':'An exact aspect means the transit planet is at the precise degree of alignment with your natal point (0° orb). This is the peak moment of the transit — its influence is at maximum intensity.',
'Stationary':'A stationary planet appears to stand still in the sky as it shifts between direct and retrograde motion. A stationary planet\'s energy is concentrated and intensified, like a magnifying glass focusing sunlight.',
'Retrograde':'When a planet appears to move backward through the zodiac (an optical illusion caused by orbital mechanics). Retrograde periods are times of review, revision, and internalization of that planet\'s themes.',
'Void of Course':'The Moon is void of course when it makes no more major aspects before changing signs. Traditional astrology says: don\'t start important new things during VOC. Existing projects are fine; new initiatives may fizzle. Good for routine tasks, rest, and meditation.',
'Transit':'A transit is when a currently-moving planet forms an aspect (geometric angle) to a point in your birth chart. It\'s how the current sky activates your personal astrology.',
'House':'Houses are 12 divisions of your birth chart, each governing a different area of life (identity, money, communication, home, etc.). When a transit happens in a particular house, that life area gets activated.',
'Conjunction':'Two planets at the same degree (0°). The most intense aspect — their energies merge completely. Can be harmonious or challenging depending on the planets.',
'Opposition':'Two planets 180° apart. Creates tension, awareness, and often plays out through relationships and external events. The lesson is finding balance between two opposing needs.',
'Square':'Two planets 90° apart. Creates friction, pressure, and the motivation to act. Challenging but productive — squares are where the most growth happens.',
'Trine':'Two planets 120° apart. Natural harmony and flow. Talents and opportunities come easily. The risk is passivity.',
'Sextile':'Two planets 60° apart. Gentle opportunities that reward initiative. Less dramatic than a trine but more motivating.',
'Dignity':'A planet\'s dignity describes how well it functions in a particular zodiac sign. A planet in its own sign (domicile) is at full power. In the opposite sign (detriment), it struggles.',
'Energy Score':'A composite rating (1-10) reflecting the overall tone of today\'s transits. Higher scores indicate more harmonious, flowing energy. Lower scores indicate more challenging, growth-oriented energy. Neither is inherently good or bad — easy days offer comfort while challenging days drive the most transformation.',
};

// ── Combine layers into full interpretation ──
function getDeepInterp(tp,np,aspectName,house){
  const key=tp+'_'+aspectName+'_'+np;
  const deep=DEEP[key];
  const tv=TRANSIT_VOICE[tp]||{};
  const nv=NATAL_VOICE[np]||{};
  const av=ASPECT_VOICE[aspectName]||{};
  const hv=HOUSE_VOICE[house]||{};

  let summary='',full='',advice='',houseContext='';

  if(deep){
    summary=deep.split('. ').slice(0,2).join('. ')+'.';
    full=deep;
  }else{
    const tDesc=tv.desc||'A subtle cosmic influence is at work.';
    const nDesc=nv.desc||'';
    const aDesc=av.desc||'';
    summary=`${tv.theme||tp} energy is activating ${nv.title||np}. ${av.feel||''} — ${(av.desc||'').split('.')[0]}.`;
    full=tDesc+'\n\n'+aDesc;
    if(nDesc)full+='\n\nIn your chart, this targets '+nDesc.charAt(0).toLowerCase()+nDesc.slice(1);
  }
  advice=av.advice||'';
  if(hv.desc)houseContext='Playing out in your '+hv.name+' sector: '+hv.desc;

  return{summary,full,advice,houseContext,aspectLabel:av.label||aspectName,aspectFeel:av.feel||''};
}

// ── Daily guidance generator ──
function generateDailyGuidance(transits,vibe,mPhase,retros,stats,vocResult,moonSign,cur,phaseAngle){
  let h='';

  // ── Theme of the Day ──
  const dom=vibe.dominant;
  const themes=[];
  // Gather active house themes
  const activeHouses={};
  transits.filter(t=>t.importance>10).forEach(t=>{if(t.house)activeHouses[t.house]=(activeHouses[t.house]||0)+t.importance;});
  const topHouse=Object.entries(activeHouses).sort((a,b)=>b[1]-a[1])[0];
  const topHouseInfo=topHouse?(HOUSE_VOICE[parseInt(topHouse[0])]||{}):{};

  let themeLabel='';
  if(dom && TRANSIT_VOICE[dom]) themeLabel=TRANSIT_VOICE[dom].theme;
  else if(topHouseInfo.name) themeLabel=topHouseInfo.name;
  else themeLabel=vibe.score>=6?'Flow & Opportunity':'Growth & Adaptation';

  h+=`<div class="g-theme">${themeLabel}</div>`;

  // ── Overview ──
  let overview='';
  if(dom && DOMINANT_FLAVOR[dom]){
    overview=DOMINANT_FLAVOR[dom];
  } else if(vibe.score>=8){
    overview='The cosmic weather is exceptionally supportive. Multiple harmonious transits align to create flow, ease, and genuine opportunity. This is rare energy — use it.';
  } else if(vibe.score>=6){
    overview='Today carries positive momentum. The planets offer more support than resistance, creating space for progress and pleasant connections.';
  } else if(vibe.score>=4){
    overview='A mixed cosmic day — some areas flow smoothly while others require patience and effort. Navigate with awareness and flexibility.';
  } else if(vibe.score>=2){
    overview='The planets are pushing hard today. Challenging transits dominate, but this is where real growth happens. Stay grounded and avoid reactive decisions.';
  } else {
    overview='Intense cosmic pressure today. Multiple difficult transits converge. Move slowly, be patient, and remember the hardest days often precede breakthroughs.';
  }
  h+=`<div class="g-overview">${overview}</div>`;

  // ── Key Transits (interactive cards) ──
  const top=transits.filter(t=>t.importance>12).slice(0,4);
  if(top.length){
    h+=`<div class="g-section-title">Key Transits Today</div>`;
    for(const t of top){
      const av=ASPECT_VOICE[t.aspect.name]||{};const hv=HOUSE_VOICE[t.house]||{};
      const aspCol=t.aspect.type==='hard'?'var(--crimson)':t.aspect.type==='easy'?'var(--azure)':'var(--gold)';
      const motionTag=t.aspect.motion==='exact'?'<span class="g-tag exact">Exact</span>':t.aspect.motion==='applying'?'<span class="g-tag applying">Building</span>':'<span class="g-tag separating">Fading</span>';
      h+=`<div class="g-transit">`;
      h+=`<div class="g-transit-head">`;
      h+=`<span class="g-planets">${pSVG(t.tp,16,aspCol)} ${aSVG(t.aspect.name,12,aspCol)} ${pSVG(t.np,16,'var(--text)')}</span>`;
      h+=`<span class="g-transit-label">${t.tp} ${av.label||t.aspect.name} ${t.np}</span>`;
      h+=motionTag;
      h+=`</div>`;
      h+=`<div class="g-transit-body">${av.feel?av.feel+'. ':''}${av.advice||''}</div>`;
      if(hv.name)h+=`<div class="g-transit-house">House ${t.house}: ${hv.name}</div>`;
      h+=`</div>`;
    }
  }

  // ── Emotional Weather (Moon) ──
  if(moonSign){
    h+=`<div class="g-section-title">Emotional Weather</div>`;
    h+=`<div class="g-moon-row">`;
    h+=`<div class="g-moon-icon">${renderMoonSVG(phaseAngle||0,28)}</div>`;
    h+=`<div class="g-moon-text">`;
    h+=`<div class="g-moon-label">${mPhase.name} in ${moonSign.name} ${sSVG(moonSign.name,14,'var(--violet)')}</div>`;
    const msf=MOON_SIGN_FLAVOR[moonSign.name]||'';
    if(msf)h+=`<div class="g-moon-flavor">${msf}</div>`;
    h+=`</div></div>`;
  }

  // ── Focus Areas (most activated houses) ──
  const houseEntries=Object.entries(activeHouses).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(houseEntries.length){
    h+=`<div class="g-section-title">Focus Areas</div>`;
    h+=`<div class="g-focus-grid">`;
    for(const [hNum,score] of houseEntries){
      const hv=HOUSE_VOICE[parseInt(hNum)]||{};
      h+=`<div class="g-focus-card"><div class="g-focus-num">H${hNum}</div><div class="g-focus-name">${hv.name||'House '+hNum}</div></div>`;
    }
    h+=`</div>`;
  }

  // ── Alerts ──
  const alerts=[];
  if(vocResult&&vocResult.voc)alerts.push('Moon is void of course — not ideal for launching new initiatives. Focus on routine tasks and rest.');
  if(stats.length>0)alerts.push(stats.join(' and ')+' '+(stats.length>1?'are':'is')+' stationary, concentrating energy with unusual intensity.');
  if(retros.length>0)alerts.push(retros.join(', ')+' retrograde — themes of review and reassessment run as an undercurrent.');
  if(alerts.length){
    h+=`<div class="g-alerts">`;
    for(const a of alerts)h+=`<div class="g-alert">${a}</div>`;
    h+=`</div>`;
  }

  // ── Practical Advice ──
  const topTransit=top[0];
  let advice='';
  if(topTransit){
    const av=ASPECT_VOICE[topTransit.aspect.name]||{};
    advice=av.advice||'';
  }
  if(!advice){
    if(vibe.score>=7) advice='Channel today\'s supportive energy into your most important priorities. Start things, connect with people, and say yes to opportunities.';
    else if(vibe.score>=4) advice='Pick your battles wisely. Some things will flow; others need patience. Focus your energy where the transits are supportive.';
    else advice='Keep your expectations modest and your patience high. This is a better day for reflection and steady work than bold new moves.';
  }
  h+=`<div class="g-advice"><div class="g-advice-title">Today\'s Advice</div><div class="g-advice-text">${advice}</div></div>`;

  return h;
}

// ── Vibe calculator (importance-weighted) ──
function vibeCalc(transits){
  if(!transits.length)return{score:5,text:'A quiet day cosmically. Good for rest, reflection, and working at your own pace.',dominant:null};
  let p=0,n=0,totalW=0;
  const planetEnergy={};
  for(const t of transits){
    const w=Math.max(1,t.importance);totalW+=w;
    const v=w/20;
    if(t.aspect.type==='easy')p+=v;else if(t.aspect.type==='hard')n+=v;else p+=v*.3;
    planetEnergy[t.tp]=(planetEnergy[t.tp]||0)+w;
  }
  const avg=(p-n)/totalW*10;
  let s=Math.round(5+avg*8);s=Math.max(1,Math.min(10,s));
  // Find dominant transiting planet
  let dominant=null,maxE=0;
  for(const[p,e]of Object.entries(planetEnergy)){if(e>maxE){maxE=e;dominant=p;}}
  return{score:s,dominant};
}


// ── Build transit timeline (upcoming exact dates for non-Moon transits) ──
function buildTimeline(transits,jd){
  const events=[];
  const seen=new Set();
  for(const t of transits){
    if(t.tp==='Moon')continue;
    const key=t.tp+'-'+t.np+'-'+t.aspect.name;
    if(seen.has(key))continue;seen.add(key);
    if(t.exactDate){
      const now=jdToDate(jd);
      const diffDays=Math.round((t.exactDate.getTime()-now.getTime())/(86400000));
      if(diffDays>=-3&&diffDays<=90){
        events.push({
          tp:t.tp,np:t.np,aspect:t.aspect,date:t.exactDate,diffDays,
          importance:t.importance,duration:t.duration,
          cls:t.aspect.type==='hard'?'hard':t.aspect.type==='easy'?'easy':t.aspect.name==='conjunction'?'conj':'minor'
        });
      }
    }
  }
  // Also scan for major transits not currently in orb but coming soon
  const outerPlanets=['Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'];
  const natalPoints=['Sun','Moon','Mercury','Venus','Mars','Ascendant','MC'];
  for(const tp of outerPlanets){
    for(const np of natalPoints){
      const key=tp+'-'+np;
      if(Array.from(seen).some(k=>k.startsWith(key)))continue;
      // Check if an aspect forms within next 60 days
      for(const asp of ASPECTS){
        if(asp.type==='minor')continue;
        const nLon=NATAL[np];
        for(let d=1;d<=60;d+=3){
          const testJd=jd+d;const tLon=getLon(tp,testJd);
          let diff=Math.abs(norm(tLon-nLon)-asp.angle);if(diff>180)diff=360-diff;
          if(diff<2){
            const exactD=findExactDate(tp,np,asp.angle,testJd);
            const now=jdToDate(jd);
            const diffDays=Math.round((exactD.getTime()-now.getTime())/86400000);
            if(diffDays>3&&diffDays<=60){
              events.push({tp,np,aspect:{...asp,motion:'approaching'},date:exactD,diffDays,
                importance:transitImportance(tp,np,asp),duration:DUR[tp],cls:asp.type==='hard'?'hard':asp.type==='easy'?'easy':asp.name==='conjunction'?'conj':'minor'
              });
              seen.add(key+'-'+asp.name);
            }
            break;
          }
        }
      }
    }
  }
  events.sort((a,b)=>a.diffDays-b.diffDays);
  return events.slice(0,12);
}

function renderMoonSVG(phaseAngle,size){
  const cx=size/2,cy=size/2,r=size/2-4;
  const illuminated=.5*(1-cos(phaseAngle));
  const kx=r*Math.abs(2*illuminated-1);
  let litPath;
  if(phaseAngle<=180){
    litPath=`M ${cx} ${cy-r} A ${r} ${r} 0 0 1 ${cx} ${cy+r} A ${kx} ${r} 0 0 ${illuminated>.5?0:1} ${cx} ${cy-r}`;
  }else{
    litPath=`M ${cx} ${cy-r} A ${r} ${r} 0 0 0 ${cx} ${cy+r} A ${kx} ${r} 0 0 ${illuminated>.5?1:0} ${cx} ${cy-r}`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;filter:drop-shadow(0 0 10px rgba(155,109,255,.2))">
    <defs><radialGradient id="mg"><stop offset="0%" stop-color="#f0e8d0"/><stop offset="100%" stop-color="#c8b890"/></radialGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#12153a" stroke="rgba(155,109,255,.15)" stroke-width="1"/>
    <path d="${litPath}" fill="url(#mg)"/></svg>`;
}

let showAspectLines=true,showTransitRing=true;

function renderChartWheel(cur,transits,jd,size){
  size=size||400;const cx=size/2,cy=size/2;
  const lt=document.documentElement.classList.contains("light");
  // Ring layout (outside→in): zodiac band → transit ring → house/natal area → center
  const rZodOuter=size/2-4;         // outermost — zodiac sign band outer edge
  const rZodInner=rZodOuter-26;     // zodiac sign band inner edge
  const rTransit=rZodInner-4;       // transit planet ring outer edge
  const rTransitInner=rTransit-22;  // transit planet ring inner edge
  const rHouse=rTransitInner-2;     // house cusp zone outer edge
  const rNatal=rHouse-24;           // natal planet ring
  const rInner=size*0.12;           // center hub
  const ascDeg=NATAL.Ascendant;

  function toXY(deg,r){const a=(180-(deg-ascDeg))*DEG;return{x:cx+r*Math.cos(a),y:cy-r*Math.sin(a)};}

  // Theme-aware colors
  const bgOuter=lt?'#e8e2d6':'#060a1e';
  const bgMid=lt?'#f0ebe0':'#080c24';
  const bgInner=lt?'#f4f0e6':'#0a0e2a';
  const ringStroke=lt?'rgba(123,82,204,.2)':'rgba(155,109,255,.15)';
  const ringStrokeBold=lt?'rgba(123,82,204,.35)':'rgba(155,109,255,.25)';
  const ringStrokeSubtle=lt?'rgba(123,82,204,.12)':'rgba(155,109,255,.08)';
  const tickColor=lt?'rgba(123,82,204,.25)':'rgba(155,109,255,.15)';
  const tickColorSub=lt?'rgba(123,82,204,.15)':'rgba(155,109,255,.08)';
  const divLine=lt?'rgba(123,82,204,.3)':'rgba(155,109,255,.2)';
  const cuspColor=lt?'rgba(158,122,46,.4)':'rgba(212,168,67,.3)';
  const cuspColorSub=lt?'rgba(123,82,204,.12)':'rgba(155,109,255,.06)';
  const houseNumColor=lt?'rgba(158,122,46,.3)':'rgba(212,168,67,.2)';
  const gradStop1=lt?'#e0d9cc':'#0d1240';
  const gradStop2=lt?'#f4f0e6':'#05081a';

  let svg=`<svg class="chart-svg" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<defs><radialGradient id="cg"><stop offset="0%" stop-color="${gradStop1}"/><stop offset="100%" stop-color="${gradStop2}"/></radialGradient>`;
  svg+=`<filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  // ── BACKGROUND RINGS ──
  // Outermost circle (zodiac band fill)
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rZodOuter}" fill="${bgOuter}" stroke="${ringStrokeBold}" stroke-width="1"/>`;
  // Zodiac inner edge (strong separation)
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rZodInner}" fill="${bgMid}" stroke="${ringStrokeBold}" stroke-width="1"/>`;
  // Transit ring inner edge
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rTransitInner}" fill="${bgInner}" stroke="${ringStroke}" stroke-width=".8"/>`;
  // House area
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rHouse}" fill="none" stroke="${ringStroke}" stroke-width=".8"/>`;
  // Natal ring
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rNatal}" fill="none" stroke="${ringStrokeSubtle}" stroke-width=".6"/>`;
  // Center hub
  svg+=`<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="url(#cg)" stroke="${ringStroke}" stroke-width=".8"/>`;

  // ── ZODIAC BAND (outermost ring) ──
  // Degree tick marks every 5 deg on zodiac outer edge
  for(let d=0;d<360;d+=5){
    const isTen=d%10===0;
    const p1=toXY(d,rZodOuter);
    const p2=toXY(d,rZodOuter-(isTen?5:3));
    svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isTen?tickColor:tickColorSub}" stroke-width="${isTen?'.8':'.5'}"/>`;
  }
  // Sign division lines spanning full zodiac band
  const sColors=lt?
    ['#c03348','#248a64','#2a6db5','#c03348','#248a64','#2a6db5','#c03348','#248a64','#2a6db5','#c03348','#248a64','#2a6db5']:
    ['#e0425d','#3dd9a0','#4a9eff','#e0425d','#3dd9a0','#4a9eff','#e0425d','#3dd9a0','#4a9eff','#e0425d','#3dd9a0','#4a9eff'];
  for(let i=0;i<12;i++){
    const deg=i*30;
    const p1=toXY(deg,rZodInner),p2=toXY(deg,rZodOuter);
    svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${divLine}" stroke-width="1"/>`;
    const mid=toXY(deg+15,(rZodInner+rZodOuter)/2);
    svg+=sChG(i, mid.x, mid.y, 14, sColors[i], lt?0.7:0.5);
  }

  // ── HOUSE CUSPS ──
  for(let i=0;i<12;i++){
    const deg=HOUSES[i];const p1=toXY(deg,rInner),p2=toXY(deg,rTransitInner);
    const isAngle=[0,3,6,9].includes(i);
    svg+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isAngle?cuspColor:cuspColorSub}" stroke-width="${isAngle?'1.2':'.6'}"/>`;
    // Extend angular cusps through transit ring
    if(isAngle){
      const p3=toXY(deg,rTransitInner),p4=toXY(deg,rZodInner);
      svg+=`<line x1="${p3.x}" y1="${p3.y}" x2="${p4.x}" y2="${p4.y}" stroke="${isAngle?cuspColor:'transparent'}" stroke-width=".8" opacity=".5"/>`;
    }
    const nextCusp=HOUSES[(i+1)%12];let midDeg=(deg+nextCusp)/2;
    if(Math.abs(nextCusp-deg)>180)midDeg=norm(midDeg+180);
    const hPos=toXY(midDeg,rInner+16);
    svg+=`<text x="${hPos.x}" y="${hPos.y}" text-anchor="middle" dominant-baseline="central" fill="${houseNumColor}" font-size="9" font-weight="600">${i+1}</text>`;
  }

  // ── ASC/MC LABELS ──
  const ascTick1=toXY(NATAL.Ascendant,rTransitInner),ascTick2=toXY(NATAL.Ascendant,rZodOuter);
  svg+=`<line x1="${ascTick1.x}" y1="${ascTick1.y}" x2="${ascTick2.x}" y2="${ascTick2.y}" stroke="${lt?'rgba(158,122,46,.5)':'rgba(212,168,67,.4)'}" stroke-width="1.8"/>`;
  const ascLbl=toXY(NATAL.Ascendant,rZodOuter+2);
  const ascLx=Math.max(18,Math.min(size-18,ascLbl.x+(ascLbl.x<cx?-14:14)));
  const ascLy=Math.max(10,Math.min(size-10,ascLbl.y));
  svg+=`<text x="${ascLx}" y="${ascLy}" text-anchor="${ascLbl.x<cx?'end':'start'}" dominant-baseline="central" fill="var(--gold)" font-size="9" font-weight="700" opacity=".95">ASC</text>`;
  const mcTick1=toXY(NATAL.MC,rTransitInner),mcTick2=toXY(NATAL.MC,rZodOuter);
  svg+=`<line x1="${mcTick1.x}" y1="${mcTick1.y}" x2="${mcTick2.x}" y2="${mcTick2.y}" stroke="${lt?'rgba(158,122,46,.5)':'rgba(212,168,67,.4)'}" stroke-width="1.8"/>`;
  const mcLbl=toXY(NATAL.MC,rZodOuter+2);
  const mcLx=Math.max(14,Math.min(size-14,mcLbl.x));
  const mcLy=Math.max(10,Math.min(size-10,mcLbl.y+(mcLbl.y<cy?-8:8)));
  svg+=`<text x="${mcLx}" y="${mcLy}" text-anchor="middle" dominant-baseline="${mcLbl.y<cy?'auto':'hanging'}" fill="var(--gold)" font-size="9" font-weight="700" opacity=".95">MC</text>`;

  // ── SPREAD ALGORITHM ──
  function spreadPos(items,minGap){
    const sorted=items.map((it,idx)=>({...it,origIdx:idx,origDeg:it.deg})).sort((a,b)=>a.deg-b.deg);
    for(let pass=0;pass<20;pass++){
      let moved=false;
      for(let i=0;i<sorted.length;i++){
        const next=sorted[(i+1)%sorted.length];
        let gap=norm(next.deg-sorted[i].deg);
        if(gap<minGap){
          const push=Math.min((minGap-gap)/2, 2);
          sorted[i].deg=norm(sorted[i].deg-push);
          next.deg=norm(next.deg+push);
          moved=true;
        }
      }
      if(!moved)break;
    }
    return sorted;
  }

  // ── NATAL PLANETS (inner ring) ──
  const nPlanets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  const nItems=nPlanets.map(p=>({name:p,deg:NATAL[p]}));
  const spreadN=spreadPos(nItems,9);
  for(const item of spreadN){
    const pos=toXY(item.deg,(rNatal+rHouse)/2-2);
    svg+=pChG(item.name, pos.x, pos.y, 12, 'var(--bright)', lt?0.75:0.65);
    // Tick line from true position
    const t1=toXY(NATAL[item.name],rNatal+3),t2=toXY(NATAL[item.name],rNatal-3);
    svg+=`<line x1="${t1.x}" y1="${t1.y}" x2="${t2.x}" y2="${t2.y}" stroke="var(--text)" stroke-width=".8" opacity=".3"/>`;
  }

  // ── TRANSIT PLANETS (middle ring between zodiac and natal) ──
  if(showTransitRing){
    const rTGlyph=(rZodInner+rTransitInner)/2;
    const tPlanets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron'];
    const tItems=tPlanets.map(p=>({name:p,deg:cur[p]}));
    const spreadT=spreadPos(tItems,10);
    for(const item of spreadT){
      const pos=toXY(item.deg,rTGlyph);
      const ms=motionStatus(item.name,jd);
      const color=ms.retrograde?'var(--crimson)':'var(--azure)';
      svg+=pChG(item.name, pos.x, pos.y, 14, color, 1.0);
      // Tick line from glyph to true degree on zodiac inner edge
      const t1=toXY(cur[item.name],rZodInner),t2=toXY(cur[item.name],rZodInner+4);
      svg+=`<line x1="${t1.x}" y1="${t1.y}" x2="${t2.x}" y2="${t2.y}" stroke="${color}" stroke-width="1" opacity=".6"/>`;
      // Also tick inward to show degree on transit ring inner
      const t3=toXY(cur[item.name],rTransitInner),t4=toXY(cur[item.name],rTransitInner-3);
      svg+=`<line x1="${t3.x}" y1="${t3.y}" x2="${t4.x}" y2="${t4.y}" stroke="${color}" stroke-width=".6" opacity=".35"/>`;
    }
  }

  // ── ASPECT LINES with angle labels ──
  if(showAspectLines&&transits.length>0){
    const aspSymbols={'conjunction':'\u2600','opposition':'opp','trine':'\u25B3','square':'\u25A1','sextile':'\u2731','quincunx':'Q','semisextile':'ss','semisquare':'ss','sesquiquadrate':'sq'};
    const topT=transits.slice(0,10);
    for(const t of topT){
      const rAsp=rInner+10;
      const from=toXY(t.tLon,rAsp),to=toXY(t.nLon,rAsp);
      const midDeg=norm((t.tLon+t.nLon)/2);
      const angleDiff=Math.abs(norm(t.tLon-t.nLon));
      const curveR=angleDiff>150?rAsp*0.35:rAsp*0.18;
      const cp=toXY(midDeg+(angleDiff>150?180:0),curveR);
      let color,dash='';
      if(t.aspect.type==='hard')color=lt?'rgba(192,51,72,.4)':'rgba(224,66,93,.35)';
      else if(t.aspect.type==='easy')color=lt?'rgba(42,109,181,.35)':'rgba(74,158,255,.3)';
      else if(t.aspect.type==='minor'){color=lt?'rgba(123,82,204,.15)':'rgba(155,109,255,.12)';dash=' stroke-dasharray="2,3"';}
      else color=lt?'rgba(158,122,46,.35)':'rgba(212,168,67,.3)';
      const w=t.aspect.orbActual<1?'1.8':t.aspect.orbActual<3?'1.2':'.7';
      const filt=t.aspect.orbActual<0.5?' filter="url(#glow)"':'';
      svg+=`<path d="M${from.x},${from.y} Q${cp.x},${cp.y} ${to.x},${to.y}" fill="none" stroke="${color}" stroke-width="${w}"${dash}${filt} stroke-linecap="round"/>`;
      // Aspect angle label at midpoint of the bezier
      if(t.aspect.type!=='minor'){
        const labelR=curveR*0.6;
        const lPos=toXY(midDeg+(angleDiff>150?180:0),labelR);
        const aspName=t.aspect.name==='conjunction'?'0':t.aspect.name==='opposition'?'180':t.aspect.name==='trine'?'120':t.aspect.name==='square'?'90':t.aspect.name==='sextile'?'60':t.aspect.angle+'';
        svg+=`<text x="${lPos.x}" y="${lPos.y}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="7" font-weight="600" opacity=".7">${aspName}°</text>`;
      }
    }
  }

  // ── CENTER ──
  svg+=`<text x="${cx}" y="${cy-5}" text-anchor="middle" fill="var(--gold)" font-size="7" font-weight="600" letter-spacing="1.5" opacity=".5">NATAL</text>`;
  svg+=sChG(signOf(NATAL.Sun).index, cx-7, cy+6, 9, 'var(--gold)', 0.4);
  svg+=sChG(signOf(NATAL.Moon).index, cx+7, cy+6, 9, 'var(--text2)', 0.35);
  svg+='</svg>';return svg;
}

  const cur=detectTheme();
  themeOverride=cur==='light'?'dark':'light';
  applyTheme(themeOverride);
  renderApp();
}

// Caches
const _forecastCache={},_exactDateCache={};
function cachedExactDate(tp,np,aspectAngle,jd){
  const key=tp+np+aspectAngle;
  if(!_exactDateCache[key])_exactDateCache[key]=findExactDate(tp,np,aspectAngle,jd);
  return _exactDateCache[key];
}
function cachedForecast(baseJd){
  const key=Math.round(baseJd*10);
  if(!_forecastCache[key])_forecastCache[key]=compute7Day(baseJd);
  return _forecastCache[key];
}

function getTargetDate(){const d=new Date();d.setDate(d.getDate()+dayOffset);return d;}

// ── Tooltip system ──
function showTooltip(term,el){
  const g=GLOSSARY[term];if(!g)return;
  const tip=document.getElementById('tooltip-el');
  tip.innerHTML=`<strong>${term}</strong>${g}`;
  const rect=el.getBoundingClientRect();
  tip.style.left=Math.min(rect.left,window.innerWidth-290)+'px';
  tip.style.top=(rect.top-tip.offsetHeight-8)+'px';
  tip.classList.add('open');
  setTimeout(()=>tip.classList.remove('open'),4000);
  const close=()=>{tip.classList.remove('open');document.removeEventListener('touchstart',close);};
  setTimeout(()=>document.addEventListener('touchstart',close),100);
}
function showTip(term){const el=event.currentTarget;event.stopPropagation();showTooltip(term,el);}

// ── 7-Day Forecast Engine ──
function compute7Day(baseJd){
  const days=[];
  for(let d=-1;d<=5;d++){
    const fJd=baseJd+d;const fCur=computeAll(fJd);
    const TPS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
    const NPS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode','Ascendant','MC'];
    const fTransits=[];
    for(const tp of TPS){for(const np of NPS){
      if(tp===np&&!['Saturn','Jupiter','Mars','Chiron','NorthNode'].includes(tp))continue;
      const asp=findAspect(fCur[tp],NATAL[np],tp,np,fJd);
      if(asp)fTransits.push({tp,np,aspect:asp,importance:transitImportance(tp,np,asp)});
    }}
    const v=vibeCalc(fTransits);
    const date=jdToDate(fJd);
    days.push({offset:d,date,score:v.score,transits:fTransits,count:fTransits.length});
  }
  return days;
}

  // ══════════ NATAL TAB ══════════
  h+=`<div class="tab-content ${activeTab==='natal'?'active':''}">`;
  h+=`<div class="chart-wrap full" style="margin-bottom:16px">${renderChartWheel(cur,[],jd,400)}</div>`;
  const natalPlanets=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','NorthNode'];
  for(const p of natalPlanets){
    const lon=NATAL[p];const sign=signOf(lon);const house=houseOf(lon);
    const dig=getDignity(p,lon);const nv=NATAL_VOICE[p]||{};const hv=HOUSE_VOICE[house]||{};
    const label=p==='NorthNode'?'North Node':p;
    const id='n-'+p;const isOpen=expandedCards[id];

    h+=`<div class="natal" data-card-id="${id}" onclick="toggleCard('${id}')">`;
    h+=`<div class="natal-head">${pSVG(p,28,'var(--gold)')}<div>`;
    h+=`<div class="natal-name">${label}</div>`;
    h+=`<div class="natal-pos">${sign.name} ${sign.degree}° · House ${house}</div></div></div>`;
    if(nv.title)h+=`<div class="natal-title">${nv.title}</div>`;
    if(nv.desc)h+=`<div class="natal-desc">${nv.desc}</div>`;
    h+=`<div class="natal-tags">`;
    h+=`<span class="natal-tag">${sSVG(sign.name,13,'var(--text2)')} ${sign.name}</span>`;
    h+=`<span class="natal-tag" onclick="event.stopPropagation();showTip('House')">H${house}: ${hv.name||''}</span>`;
    if(dig)h+=`<span class="natal-tag" style="color:${dig.color}" onclick="event.stopPropagation()">${dig.label}</span>`;
    h+=`</div>`;

    // Expandable detail
    h+=`<div class="natal-expand ${isOpen?'open':''}"><div style="padding:12px 0 0;border-top:1px solid var(--surface);margin-top:10px">`;
    if(dig)h+=`<div style="font-size:12px;line-height:1.6;color:var(--text);margin-bottom:8px"><strong style="color:${dig.color}">${dig.label}:</strong> ${dig.desc}</div>`;
    h+=`<div style="font-size:12px;line-height:1.6;color:var(--text);margin-bottom:8px"><strong>House ${house} (${hv.name||''}):</strong> ${hv.desc||''}</div>`;
    // House ruler connection
    const ruler=RULERS[sign.name];
    if(ruler&&NATAL[ruler]!==undefined){
      const rulerSign=signOf(NATAL[ruler]);const rulerHouse=houseOf(NATAL[ruler]);
      h+=`<div style="font-size:12px;line-height:1.6;color:var(--violet)"><strong>Sign Ruler:</strong> ${sign.name} is ruled by ${ruler} (in ${rulerSign.name}, House ${rulerHouse}). The condition of ${ruler} in your chart colors how this ${label} expresses itself.</div>`;
    }
    h+=`</div></div></div>`;
  }
  h+=`</div>`;

  // ══════════ TAB BAR ══════════
  const svgToday=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/><line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/></svg>`;
  const svgChart=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>`;
  const svgNatal=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 20,8 18,18 6,18 4,8" fill="none"/><circle cx="12" cy="11" r="3"/></svg>`;

  h+=`<div class="tab-bar">`;
  h+=`<button class="${activeTab==='today'?'active':''}" onclick="switchTab('today')">${svgToday}<span>Today</span></button>`;
  h+=`<button class="${activeTab==='chart'?'active':''}" onclick="switchTab('chart')">${svgChart}<span>Chart</span></button>`;
  h+=`<button class="${activeTab==='natal'?'active':''}" onclick="switchTab('natal')">${svgNatal}<span>Natal</span></button>`;
  h+=`</div>`;

  document.getElementById('app').innerHTML=h;
}

// ── Event handlers ──
function navDay(offset){
  const app=document.getElementById('app');
  const dir=offset>0?'slide-left':'slide-right';
  app.classList.add(dir);
  setTimeout(()=>{
    dayOffset+=offset;renderApp();
    app.classList.remove(dir);
    app.classList.add('slide-in');
    setTimeout(()=>app.classList.remove('slide-in'),150);
  },120);
}
function navToday(){
  if(dayOffset===0)return;
  const app=document.getElementById('app');
  app.classList.add(dayOffset>0?'slide-right':'slide-left');
  setTimeout(()=>{
    dayOffset=0;renderApp();
    app.classList.remove('slide-left','slide-right');
    app.classList.add('slide-in');
    setTimeout(()=>app.classList.remove('slide-in'),150);
  },120);
}
function switchTab(tab){activeTab=tab;renderApp();window.scrollTo(0,0);}
function toggleCard(id){
  expandedCards[id]=!expandedCards[id];
  // Direct DOM toggle instead of full re-render
  const el=document.querySelector(`[data-card-id="${id}"] .t-expand, [data-card-id="${id}"] .natal-expand`);
  if(el){el.classList.toggle('open');return;}
  renderApp();
}
function toggleChart(opt){if(opt==='transit')showTransitRing=!showTransitRing;else showAspectLines=!showAspectLines;renderApp();}
function setFilter(f){activeFilter=f;renderApp();}

// Touch navigation
let touchStartX=0,touchStartY=0,swiping=false;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;swiping=true;},{passive:true});
document.addEventListener('touchmove',e=>{if(!swiping)return;if(Math.abs(e.touches[0].clientY-touchStartY)>Math.abs(e.touches[0].clientX-touchStartX)*1.2)swiping=false;},{passive:true});
document.addEventListener('touchend',e=>{if(!swiping)return;const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>60){if(dx<0)navDay(1);else navDay(-1);}swiping=false;});

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')navDay(-1);else if(e.key==='ArrowRight')navDay(1);else if(e.key==='Home'||e.key==='Escape')navToday();});

// Close tooltip on scroll
document.addEventListener('scroll',()=>{document.getElementById('tooltip-el').classList.remove('open');});

renderApp();
setInterval(()=>{if(dayOffset===0)renderApp();},10*60*1000);

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

const prefersReduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(prefersReduced){const s=document.createElement('style');s.textContent='*{animation:none!important;transition:none!important}';document.head.appendChild(s);}

</script>
